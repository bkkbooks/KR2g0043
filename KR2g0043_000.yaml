復為邉患諭顧實汗子車臣岱青及達賴巴圖爾等曰分疆别界向有定例邇來爾等率畨衆掠內地抗官兵守臣奏報二十餘次屢諭不悛今特遣官赴甘肅西寧等處勘狀或爾等親至或遣宰桑來質誣妄之罪各有攸歸畨衆等舊納貢蒙古者聽爾轄倘係前明所屬應仍歸中國至漢人蒙古定界與市易隘口務宜詳加察核分定耕牧毋得越境妄行十五年復諭車臣岱青曰前因爾等頻犯內地遣官往勘據奏爾等入邉向畨取貢輒肆攘奪咎自難辭朕悉宥爾前愆但中外本無異視疆圍自有大防爾等向屬畨取貢酌定人數路由正口遣頭目稟告守臣方準入邉至市易定所應從西寧鎮海堡川北洪水等口出入毋得任意取道如或不悛國憲具在朕不爾貸也康熙四年甘肅提督張勇奏蒙古畨衆遊牧莊浪諸境情形叵測請增甘肅西寧駐防兵先是青海蒙古戀西喇塔拉水草饒乞駐牧張勇以其地為甘肅隘不容逼處往責之謝罪去因設永固營聫築八寨至是蒙古等復相繼徙近邉上以漸不可啓詔如張勇請五年勇復奏青海雖通西藏不過荒徼絶塞朝廷曲示招徠準開市自應鈐束部落各安邉境乃邇來蜂屯祁連山縱牧內地大草灘曽遣諭徙復抗拒定羌廟官軍敗之猶不悛聲言紏衆分入河州臨洮鞏昌西寧涼州諸地請設兵備詔嚴防禦仍善撫以柔其心勇等乃自扁都口西水關至嘉峪關固築邉牆六年川陜總督盧崇峻奏青海諸頭目偵於八月將入冦因赴莊浪所備之遣總兵孫思克屯南山隘相形勢固守達賴喇嘛尋檄厄魯特諸台吉毋擾內地駐牧黃城兒大草灘蒙古悉徙去獻駝馬牛羊服罪請撤駐防兵允之十四年西寧諸鎮兵屯河東勦叛賊王輔臣青海蒙古乘隙犯河西永固營副將陳達禦之陳歿孫思克屯涼州宣示朝廷恩威各引罪出塞會達賴喇嘛使至命傳諭達賴巴圖爾等戢部衆勿為邉患十六年凖噶爾台吉噶爾丹襲殺駐牧西套之鄂齊爾圖汗青海和碩特諸台吉懼挈廬幕數千避居大草灘撫逺大將軍圖海等飭歸故巢十七年西套諸台吉偵噶爾丹將侵青海遣使告和碩特台吉達賴巴圖爾等為防禦計上聞之諭張勇曰噶爾丹侵青海如逺從達布素圖瀚海而往則聽之若欲經大草灘則令堅立信約勿擾內地尋噶爾丹以從者異志且距青海逺行十一日撤兵歸遺書張勇詭稱其祖多克辛諾顔偕顧實汗取青海和碩特族獨據之欲往索以將軍所轄地故不果既而懼和碩特諸台吉襲已密遣使議婚以女布木妻博碩克圖濟農子根特爾張勇諜得狀奏噶爾丹讐青海蒙古議婚後恐復往侵甘肅當往來衝請增防報可有巴圖爾額爾克濟農和囉理者巴延阿布該阿玉什子也駐牧西套以避噶爾丹侵乞假內地赴青海許之會噶爾丹屬額爾德尼和碩齊潛掠烏喇特户畜青海墨爾根台吉聞之遣使詰歸所掠喀爾喀台吉畢瑪里吉哩諦亦以厄魯特掠所部隂偵之告額爾德尼和碩齊和囉理及青海台吉茂濟喇克等遊牧額濟內河則未知其為何厄魯特也十八年遣使諭達賴巴圖爾等曰爾墨爾根台吉將被盜劫掠人察獲解送朕甚嘉之夫勸善懲惡者國之法也邇聞厄魯特衆棲處額濟內河爾達賴巴圖爾及墨爾根台吉其照汝例嚴加治罪使至稱茂濟喇克和囉理皆無掠烏喇特事額爾德尼和碩齊為凖噶爾屬已徙牧去詔檄噶爾丹收捕之不從二十九年大軍敗噶爾丹於烏蘭布通青海諸台吉附達賴喇嘛表上尊號詔不允三十年甘肅提督孫思克奏噶爾丹巢距邉月餘從子䇿妄阿喇布坦雖交惡恐復合有侵青海舉道必經嘉峪關外肅州密邇青海請設兵三千為備從之三十二年昭武將軍郎坦奏青海諸台吉私與噶爾丹通問請屯兵哈密絶往來蹤上以噶爾丹自烏蘭布通敗遁後乏邉警且青海諸台吉素恭順詔寢議噶爾丹尋屯牧巴顔烏蘭逼內汛詔西寧設戍兵唐古特部第巴隂比噶爾丹詭為達賴喇嘛奏稱青海諸台吉無異志請撤戍諭曰此為征勦噶爾丹計非防青海諸台吉也會議勦噶爾丹詔檄青海衆勿驚懼三十五年上親征噶爾丹敗之獲青海通噶爾丹使以博碩克圖濟農及薩楚墨爾根台吉為所部長遣使齎敕諭曰爾青海厄魯特尊崇達賴喇嘛法教敬事本朝聘問貢獻恭順有年朕亦頻加恩賚乃噶爾丹違達賴喇嘛法教不遵朕旨朕統軍至圖拉勦而滅之博碩克圖濟農等遣往噶爾丹使為朕所擒俱言達賴喇嘛脫緇已久第巴匿之且噶爾丹詭言青海諸台吉謀與彼同犯中國今噶爾丹亡命西走青海諸台吉如欲仍前修睦其各防邉界遇噶爾丹即行擒解若知而故縱此後永讐絶之我使至察罕托羅海宣諭善巴陵堪布蓋達賴喇嘛遣理青海蒙古務者也善巴陵堪布召青海諸台吉集盟壇言曰噶爾丹殺鄂齊爾圖汗我等與仇但素奉達賴喇嘛言應遣議時達賴喇嘛示寂久唐古特達賴汗尋約和碩特八台吉遣使慶捷達賴汗即鄂齊爾汗子也世長唐古特鄂齊爾汗弟自衮布察琿無嗣外餘八人皆居青海故其裔稱和碩特八台吉三十六年二月上視師寧夏詔額駙阿喇布坦都統都思噶爾巴林台吉德木楚克西寧喇嘛啇南多爾濟等攜青海諸台吉使及賞物往招撫之復以哈密達爾漢伯克額貝都拉內附詔青海厄魯特勿擾哈密境三月阿喇布坦等至察罕托羅海察罕諾捫汗迎告曰皇上令青海衆得享安樂永受恩澤何幸如之時顧實汗子惟達什巴圖爾存阿喇布坦等宣諭之達什巴圖爾議遣博碩克圖濟農及額爾德尼台吉代入覲阿喇布坦等語曰皇上駕臨寧夏爾當率衆往朝毋自誤達什巴圖爾偕察罕諾捫汗善巴陵堪布及唐古特達賴汗子拉藏等檄諸台吉議約四月啓行達爾寺垂藏呼圖克圖溫都遜寺達賴綽爾濟喇嘛及囊素通事等咸請從私向使問獅象狀且相謂曰我等往朝殆必以所未見聞物相示閏三月阿喇布坦德木楚克自青海歸議諸台吉至若露處未協朝典應令秋後入覲京師詔如議命都思噶爾啇南多爾濟留駐鎮海堡俟之扈蹕諸臣奏青海厄魯特與凖噶爾同部聞噶爾丹敗竄咸驚懼皇上定䇿安集所部身至如歸誠非常舉請行慶賀禮諭曰青海職貢有年來朝亦常事耳可勿賀諸臣固請因奉表賀曰青海向雖修貢未𨽻臣屬今舉部歸誠噶爾丹益無竄路皇上安內攘外之心自此允愜矣四月諭留糧騎及羊九千餘於達希圖海俟青海衆至給之十一月達什巴圖爾偕諸台吉入覲諭曰朕非威懾爾等前來不過欲令天下生靈各得其所朕何物不備朕之尊不在爾等來否所望爾等各遂安全副朕好生至意耳詔所從諸宰桑咸列坐預宴以御用冠服朝珠賜達什巴圖爾賞諸台吉鞍馬銀幣有差復傳諭曰爾等自祖父來嵗修職貢故特優錫以寵爾歸十二月上大閲玉泉山達什巴圖爾等扈駕往觀戰栗失色奏天朝兵威若此何敵不克三十七年正月詔封達什巴圖爾為和碩親王諸台吉授貝勒貝子公等爵有差先是噶爾丹詭與青海姻實謀往侵懼大軍討乃寢第巴以䇿妄阿喇布坦不附噶爾丹隂間之偽為達賴喇嘛疏奏䇿妄阿喇布坦將侵青海及唐古特上斥其妄會噶爾丹使至諭曰青海諸台吉奉貢久倘噶爾丹屬犯青海朕必往討之至是噶爾丹就滅䇿妄阿喇布坦憾達什巴圖爾等內附詭請大軍征青海討前助噶爾丹罪諭曰青海諸台吉聞朕出師寧夏逺徙遊牧嗣噶爾丹平定親來稱慶伊等並無過端豈肯遽為加兵朕統馭天下惟願宇內羣生咸獲安堵豈有使爾等搆釁之理二月上幸五臺山詔達什巴圖爾等從將旋蹕召覲行幄溫諭遣歸給駝馬三十九年䇿妄阿喇布坦聲言兵擊第巴遣使赴青海隂覘強弱上以策妄阿喇布坦將不靖詔廷臣留意漢趙充國所議五事為防禦計四十二年上幸西安府達什巴圖爾等來朝扈駕閲駐防兵奏禁卒精練天下無敵外省軍容復若是億萬年可永享升平賜宴遣歸五十四年䇿妄阿喇布坦遣兵掠哈密上以鄰青海左翼牧詔兵備之凖噶爾敗遁初達賴汗子拉藏偕青海諸台吉定議內附尋襲唐古特汗以第巴私立偽達賴喇嘛襲殺之而自立博克達之伊西扎穆蘇為達賴喇嘛瑚畢勒罕青海貝勒察罕丹津等訐其偽奏裏塘之噶爾藏嘉穆錯為真達賴喇嘛瑚畢勒罕詔內閣學士拉都琥往驗尋遣侍衛阿齊圖召青海兩翼議從裏塘達賴喇嘛瑚畢勒罕以弭爭端貝勒色布騰扎勒阿喇布坦鄂木布朋素克旺扎勒台吉達顔索爾扎等僉請徙察罕丹津不從將偕達什巴圖爾子羅卜藏丹津盟率兵攻異已者阿齊圖疏至王大臣等奏察罕丹津若先攻諸部色布騰扎勒等來奔應置邉內察罕丹津牧距松潘僅四五日程請備兵待詔西寧四川松潘諸路設兵備之五十五年察罕丹津畏罪徙裏塘達賴喇嘛瑚畢勒罕至西寧宗喀巴寺阿齊圖奏請集諸台吉定盟以羅卜藏丹津察罕丹津達顔等領右翼額爾德尼額爾克托克托鼐阿喇布坦鄂木布等領左翼令永睦允之會凖噶爾由沙拉襲青海掠台吉羅卜藏丹濟卜等牧畜復謀盜噶斯口官軍駝馬諭曰凖噶爾偵噶斯口兵勢稍弱潛來侵擾青海不可不嚴備之著西安兵會青海左翼四川督標兵會青海右翼協力防禦五十六年遣使赴青海測分野未幾靖逆將軍富寧安諜䇿妄阿喇布坦遣兵赴唐古特馳疏聞上以裏塘達賴喇嘛瑚畢勒罕事初定拉藏汗或隂導凖噶爾侵青海詔理藩院尚書赫壽諭拉藏汗勿得與察罕丹津羅卜藏丹津等搆兵復諭遣侍衛色楞等赴青海曰凖噶爾若侵拉藏汗爾即與青海台吉等定議協勦務令絶無猜忌不至滋變方善或拉藏汗導凖噶爾侵青海爾即諭察罕丹津等曰䇿妄阿喇布坦屢抗大軍今拉藏汗與同謀是顯為讐敵也聖主始終仁愛保護顧實汗子孫爾等正當奮志報效而行尋察罕丹津等以凖噶爾侵拉藏汗告諭內大臣䇿旺諾爾布西安將軍額倫特等分屯青海要地五十七年拉藏汗乞援疏至詔色楞等會青海王台吉議進兵察罕丹津諜拉藏汗被戕謀誘凖噶爾至青海迎擊之凖噶爾懼不至先是哈密伯克額貝都拉獻西吉木達里圖西喇郭勒地詔設赤金靖逆二衛及柳溝所聽兵民耕牧五十八年以其地錯青海左翼牧遣官偕貝子阿喇布坦台吉阿爾薩蘭等勘定界阿喇布坦等曰青海衆荷恩厚何惜隙地可耕者聽給兵民留我等牧地足矣因集所屬宰桑等畫地標識議勿私越時撫逺大將軍固山貝子允禵統兵駐西寧請自索諾木至柴達木路設站五站置青海兵十别令左右翼兵各三百屯近軍地防凖噶爾賊從之允禵復遵旨集兩翼王台吉以上意宣諭曰唐古特部達賴喇嘛班禪喇嘛法教原係爾祖顧實汗所設今凖噶爾戕拉藏汗離散畨衆爾等前稱裏塘羅卜藏噶勒藏嘉穆錯為真達賴喇嘛瑚畢勒罕願置禪榻廣施法教今唐古特民人及阿木島喇嘛如爾言皇上為安藏計遣大兵送往唐古特爾等宜率所屬兵或萬或五六千從往其定議具奏兩翼王台吉等僉稱願聽命五十九年所部兵從大軍敗凖噶爾於卜克河齊諾郭勒綽瑪喇等處因護達賴喇嘛入藏捷聞詔留兵二千屯青海偵防凖噶爾雍正元年諭曰自西陲用兵青海王以下台吉以上各著勞績皇考曽降旨俟凱旋曰計功今青海王台吉等厯年效績應各酌加封賞其率兵進藏及駐防噶斯柴達木等衆應令各處將軍分别加賞是年羅卜藏丹津叛命大軍往討越嵗而定羅卜藏丹津初襲其父達什巴圖爾親王爵從大軍入藏歸覬為唐古特長隂約䇿妄阿喇布坦援已復誘青海台吉等盟察罕托羅海令如所部故號不得復稱王貝勒貝子公等爵而自稱達賴琿台吉以統之郡王額爾德尼額爾克托克托鼐不從偕鎮國公噶爾丹達什來奔上以和碩特族自相殘不忍遽加兵詔撫逺大將軍貝子延信善慰額爾德尼額爾克托克托鼐時兵部左侍郎常壽駐西寧理青海務命傳諭羅卜藏丹津罷兵不從則懲治之羅卜藏丹津詭言親王察罕丹津郡王額爾德尼額爾克托克托鼐謀據唐古特諸台吉不服將率兵與決勝負蓋以察罕丹津額爾德尼額爾克托克托鼐首不附已欲誣罪因脅諸台吉奉已如鄂齊爾汗駐唐古特以遙制青海也察罕丹津為羅卜藏丹津所逼繼額爾德尼額爾克托克托鼐挈衆至敕川陜總督年羮堯曰羅卜藏丹津自其祖顧實汗敬謹恭順達什巴圖爾慕化來歸晉封親王復令其子羅卜藏丹津襲封自宜仰體寵眷敬奉法紀乃妄逞強梁骨肉相仇欺凌親王察罕丹津郡王額爾德尼額爾克托克托鼐等恣行倡亂朕甫聞其事遣使往諭令伊講和修睦式好無尤乃肆意稱兵侵襲察罕丹津額爾德尼額爾克托克托鼐以致投入內境是其欲負朕恩悖逆天常擾害生靈誅戮不可少緩朕欲大張天威特命爾為撫逺大將軍統領大兵往聲羅卜藏丹津罪如敢抗拒即行勦滅其黨有懼羅卜藏丹津勢暫為脅從者果悔罪來歸即行寬宥有能擒斬羅卜藏丹津者分别具奏有情急來歸者加意撫恤其不抗拒者無加殺戮羅卜藏丹津詭罷兵誘常壽至察罕托羅海留之遣叛黨分掠西寧諸路煽賊畨等為應副將軍阿喇納自吐魯畨馳赴噶斯斷由穆嚕烏蘇往藏路副將王嵩參將孫繼宗等擊賊黨於布隆吉爾及鎮海堡申中堡北川新城等處四川提督嶽鍾琪以雜谷土司等兵勦歸德堡外上寺東䇿卜下寺東䇿卜及南川口外郭密諸畨復檄前鋒統領蘇丹等協勦所至告捷羅卜藏丹津懼送常壽歸請罪諭年羮堯曰伊乃深負國恩與大軍對敵之叛賊國法斷不可宥不得因伊曽封王爵稍存疑慮其與羅卜藏丹津同謀之王貝勒貝子公等既經背叛即宜削爵伊等或來歸順或被擒獲不必更論封爵但視行事輕重可寬宥者從寬應治罪者治罪二年詔以嶽鍾琪為奮威將軍參贊軍務鍾琪奉命進勦偵從賊之巴爾珠爾阿喇布坦自烏蘭博爾克遁尾擊之至伊克喀爾吉擒其黨阿喇布坦鄂木布遣西寧總兵黃喜林由西爾哈羅色赴柴達木斷噶斯路偵羅卜藏丹津走烏蘭穆和爾鍾琪復分兵馳擊擒其母阿爾泰俘户畜無算羅卜藏丹津偕賊黨分道竄侍衛達鼐等擒丹津琿台吉於華海子阿布濟車臣台吉於布哈色布蘇吹喇克諾木齊扎什敦多卜等於烏蘭克羅卜藏丹津走凖噶爾逆黨悉檻送京師詔行獻俘禮是役也以兵拒羅卜藏丹津者親王察罕丹津郡王額爾德尼額爾克托克托鼐也不從羅卜藏丹津逆者郡王色布騰扎勒台吉阿喇布坦噶爾丹岱青諾爾布巴爾珠爾察罕喇布坦旺舒克喇布坦也為羅卜藏丹津脅從者貝勒朋素克旺扎勒輔國公車稜台吉諾爾布也始附羅卜藏丹津尋以悔宥罪者貝勒羅卜藏察罕車稜敦多布貝子濟克濟扎布拉察布台吉衮布色布騰納罕伊什也其附羅卜藏丹津者首惡曰吹喇克諾木齊阿喇布坦鄂木布藏巴扎木從黨曰巴爾珠爾阿喇布坦扎什敦多布格勒克阿喇布坦巴蘇泰及察罕丹津從子塔爾寺喇嘛堪布諾捫汗也有中甸者𨽻雲南麗江府羅卜藏丹津給偽劄令附已大軍至率户三千餘請降洮岷界外諸畨舊為青海屬悉就撫其不順者勦誅之阿岡多卜藏瑪嘉鐡布納珠公寺朝天堂桌子山碁子山先密寺興馬寺阿落西脫巴上篤爾素華藏上扎爾的諸畨衆以次底定青海患始靖御製平定青海文立石太學文曰我國家受天眷命撫臨八極日月所照罔不臣順遐邇乂安兆人蒙福乃有羅卜藏丹津者其先世顧實汗自國初稽首歸命當時使臣建議畀以駐牧之地其居雜畨羌密近甘涼我皇考聖祖仁皇帝睿慮深逺每厪於懷既親御六師平定朔漠威靈所加青海部落達什巴圖爾等震讋承命聖祖仁皇帝因沛殊恩封為親王兄弟八人咸錫爵祿羈縻包容示以寬大而狼心梟性不可以德義化三十年來包藏異心朕紹登寶位優之錫賚榮其封號尚冀革心輯寧部衆而羅卜藏丹津昏謬狂悖同黨吹喇克諾木齊阿喇布坦鄂木布藏巴札木等實為元惡謂國家方宏浩蕩之恩不設嚴密之備誕敢首造逆謀迫脅畨羌侵犯邉城反狀彰露用不可釋於天誅遂命川陜總督太保公年羮堯為撫逺大將軍聲罪致討以雍正元年十月師始出塞自冬涉春屢破其衆凡同叛之部落戈鋋所指應時摧敗招降數十萬衆又降其貝勒貝子公台吉等二十餘人朕猶閔其愚蠢若悔禍思愆束手來歸尚可全宥而怙惡不悛負險抗拒乃決翦滅之計以方略密付大將軍年羮堯調度軍謀簡稽將士用四川提督嶽鍾琪為奮威將軍於仲春初旬禡牙徂征分途深入搗其窟穴電掃風馳搜剔巖阻賊徒倉皇糜潰窮蹙失據羅卜藏丹津之母及謀逆渠魁悉就俘執擒獲賊衆纍萬牲畜軍械不可數計賊首逃遁我師逾險窮追獲其輜重人口殆盡羅卜藏丹津孑身易服竄匿荒山殘喘待斃自二月八日至二十有二日僅旬有五日軍士無久役之勞內地無轉輸之費克奏膚功永清西徼三月之朔奏凱旋旅鐃歌喧轟士衆欣喜四月十有二日以倡逆之吹喇克諾木齊等三人獻俘廟社受俘之日臣民稱慶伏念聖祖仁皇帝威靈震於遐方福慶流於奕葉用克張皇六師殄滅狂賊行間將士亦由感激湛恩厚澤為朕踴躍用命斯役也芟夷凶悖綏靖畨羌俾烽燧永息中外人民胥享安阜實成先志以懋有丕績廷臣上言稽古典禮出征而受成於學所以定兵謀也獻馘而釋奠於學所以告凱捷也宜刋諸珉石揭於太學用昭示於無極遂為之銘曰天有雷霆聖作弧矢輔仁而行威逺寧邇維此青海種類實繁錫之茅土列在藩垣被我寵光位崇祿富負其阻遐禍心潛搆恭惟聖祖慮逺智周眷念荒服綏撫懷柔朔野既清四陲攸震爵號洊加示之恩信如何凶狡造謀逆天鼓動昏憝冦侵於邉惟彼有罪自干天罰桓桓虎貔用張九伐王師即路冬雪初零日耀組練雷響聲鉦蠢兹不順敢逆戎旅奮張螳臂以當齊斧止如山嶽疾如雨風我戰則克賊壘其空彼昏終迷曽不悔戾當翦而滅斯焉決計厲兵簡將往搗其巢踰厯嶔嶇坦若坰郊賊棄其家我縶而獲牛馬谷量器仗山積蹇兔失窟何所逋逃枯魚遊釡假息煎熬師以順動神明所福旬日凱歸不疾而速殪彼逆謀懸首藁街獻俘成禮金鼓調諧西域所聸此惟雄特天討既申羣酋惕息櫜戈偃革告成辟雍聲教遐暨萬國來同惟我聖祖親平大漠巍功煥文邁桓軼酌流光悠久視此銘辭繼志述事念兹在兹王大臣等遵旨議善後事冝奏青海王台吉等應論功罪定賞罰遊牧地令各分界如內扎薩克例百户置佐領一不及百户者為半佐領以扎薩克領之設協理台吉及協領副協領參領各一每參領設佐領驍騎校各一嵗會盟令奏選盟長勿私推貢期自明年始分三班九年一周自備馬駝由邉入京市易以四仲月集西寧四川邉外納喇薩喇地官兵督視有擅入邉牆者治又羅卜藏丹津之吹宰桑及察罕丹津從子丹衷之宰桑色布騰達什等率衆降請各授千百户等官又喀爾喀居青海者勿復𨽻和碩特族令别設扎薩克土爾扈特及凖噶爾輝特如之至西寧部衆凡陜西所屬甘州涼州莊浪西寧河州四川所屬松潘打箭爐裏塘巴塘雲南所屬中甸等處或為喇嘛耕地或納租青海但知有蒙古不知有廳衛營伍諸官今畨衆悉歸化應擇給土司千百户巡檢等職令附近道廳及衛所轄又青海及巴爾喀木藏衛舊稱唐古特四大部顧實汗侵據之以青海地廣可牧畜巴爾喀木糧富令子孫遊牧青海而巴爾喀木納其賦藏衛二地舊給達賴喇嘛班禪喇嘛今以青海叛取其地應令四川雲南諸官管理又達賴喇嘛遣人赴市打箭爐駝裝經察木多乍雅裏塘巴塘向喇嘛等索銀有差名曰鞍租至打箭爐納稅請飭達賴喇嘛勿收鞍租打箭爐免取稅嵗給達賴喇嘛茶五千斤班禪喇嘛半之又西寧各寺喇嘛多者數千少者五六百易藏姦前羅卜藏丹津叛喇嘛率畨衆抗大兵請於塔爾寺喇嘛選老成者三百給印照嗣後嵗察二次廟舍不得過二百喇嘛多者三百少者十餘畨民糧賦令地方官管理度各寺嵗用給之又陜西邉外河州西寧蘭州中衛寧夏榆林莊浪甘州等處水草豐美林麓茂密蒙古諸部戀牧大草灘及昌寧湖請於西寧北川邉外上下白塔等處自巴爾托海至扁都口築城堡令蒙古等勿妄據又肅州西洮賚河常瑪爾鄂敦塔拉等處應募民墾膏腴地庶漸致富饒至寧夏險要無過阿拉善顧實汗裔舊遊牧山後今或徙至山前請令阿拉善扎薩克郡王額駙阿寶飭所屬歸阿拉善後其山前營盤水長流水等處悉為內地又甘州西寧界各設營汛令蒙古等不敢覬覦又巴爾喀木等部衆自羅隆宗東察木多乍雅外諸畨目悉給印照視內地土司例又青海屬左格諸畨請徙內地阿巴土司頭目墨丹住等從勦有功請給安撫司銜不𨽻青海轄又西寧邉內可耕地請發直𨽻山西山東河南陜西五省遣犯能種地者官給牛具籽種三年後起科如例又甘州諸黃畨應招撫為青海藩籬青海諸部令各守牧地不得強據妄掠啇賈察罕諾捫汗喇嘛廟毋得私聚議事遣官齎敕往不論秩崇卑王公以下跪迎有背二者必懲上從其議三年詔以博囉充克克地給阿拉善郡王阿寶居之鈐青海族屬越七載始撤歸詳阿拉善厄魯特部傳是年青海和碩特土爾扈特凖噶爾輝特喀爾喀及察罕諾捫汗各設扎薩克鑄總理青海蒙古畨子事務關防遣大臣齎鎮其地轄所部扎薩克嶽鍾琪復奏親王察罕丹津鎮國公拉察布等遊牧河東地近河州松潘各路前議市納喇薩喇之地狹恐不給蒙古需請改市河州及松潘河州定於土門關附近雙城堡松潘定於黃勝關之西河口二地並有城屋水草美互市可久又郡王額爾德尼額爾克托克托鼐色布騰扎勒等遊牧河西地近西寧請改市西寧口外丹噶爾寺至蒙古嵗資牲畜請每年六月後聽不時貿易庶蒙古啇衆獲利益允之六年敕凖噶爾台吉噶爾丹䇿凌曰羅卜藏丹津無故弄兵殘虐骨肉朕遣大臣諭令息兵乃敢悖恩負德侵犯內境被我守邉輕兵擊敗逺竄爾父䇿妄阿喇布坦應即擒獻乃反隱為匿留是何意耶羅卜藏丹津乃不忠不孝之人爾父年髙厯練尚能將伊酌處可以生之亦可以制之必不為所愚弄是以不曽勒令擒獻今爾年與彼相等羅卜藏丹津志氣乖戾不顧恩義斷不守分安居甘處爾下爾務將羅卜藏丹津送至朕念達什巴圖爾前績仍施恩豢養斷不將伊誅戮爾其祗遵朕命是年唐古特部噶卜倫阿爾布巴隆布鼐扎爾鼐等叛擾唐古特謀逋凖噶爾大軍誅之七年上以凖噶爾不靖必擾青海及唐古特因決䇿遣討王大臣等議噶斯為凖噶爾通青海及唐古特要隘請選青海扎薩克兵千五百分屯噶斯及柴達木得卜特爾察罕烏蘇諸路允之會噶爾丹䇿凌遣使告將獻羅卜藏丹津聞大軍就道懼乃攜歸八年詔暫緩進兵諭噶爾丹䇿凌速獻羅卜藏丹津當宥罪復命青海扎薩克備兵遊牧聽調凖噶爾尋襲科舍圖汛諭青海兵速赴噶斯凖噶爾遁九年遣二等侍衛殷扎納傳諭左右翼扎薩克選兵萬屯青海適中地官兵皆賞裝復命所部採買牲畜勿滋擾扎薩克公諾爾布拉察布等尋徙牧叛詔曰朕因凖噶爾賊乘西路軍不備盜駝馬因念青海各扎薩克人衆恐招逆賊侵害諭令𣲖兵防護其採買馬羊者原欲使伊等所有牧畜得變價值可獲利益並非需此區區助也朕曽諭殷扎納一切𣲖兵採買聽蒙古便不可絲毫勉強并慮王台吉等科𣲖所屬諭令嚴行禁約豈肯令遣往人逼迫蒙古從事乎今拉察布等無故他徙或殷扎納不能宣揚朕諭使衆心共曉而採買馬羊又不聽從其便以致拉察布等心懷疑畏暫避差徭特頒旨諭拉察布等令其速歸本處凖噶爾賊或由喀喇沙爾前赴噶斯潛行騷擾或增人衆窺伺青海所部蒙古兵丁尚未齊集器械亦未周備難望捍禦賊鋒亦令官兵善為保護拉察布等不奉命諸扎薩克擒獻復集兵七千為備軍械及馬不給上憫之諭廷臣曰朕所以聚此兵者特為保全伊等家口及遊牧計非為征伐調遣用也今聞其生計情形朕心深為惻然俟從容料理必有加恩之處所聚兵七千著選𣲖三千照前所降恩旨官員賞給本年俸銀兵丁賞銀五兩至戍卒駐防日久資斧維艱著給茶幣等項及每月所食青稞遣歸兵四千名官員等著給三月俸銀兵丁等著給銀三兩令各回遊牧凖噶爾賊或潛擾青海朕意欲將伊等預行從容遷徙令賊由逺路來一無所得不待戰而力盡我官兵與賊交戰時青海三千兵但追襲賊後量力驅賊馬匹所得即賞之仍計馬匹多寡加恩議敘復諭青海扎薩克等曰爾等係顧實汗子孫自爾祖宗以來依附內地邉疆恪順供職聖祖仁皇帝視爾等如子孫撫育六十餘年寵遇優渥且念爾等尊崇黃教是以於達賴喇嘛班禪喇嘛等備極恩眷前羅卜藏丹津聽信流言敢行背叛我朝發兵征勦逃竄凖噶爾困苦恥辱無不聞之今爾等若至彼處路途遙逺馬畜困斃彼豈能為爾等置立産業分給遊牧地各令率屬保聚乎况凖噶爾終嵗爭戰凡用兵必置爾等於前虐使任意豈若各守祖父基業永享太平之為得乎爾等若不熟計利害聽伊誑誘之詞依附賊人妄思蠢動將來興師問罪必先及之諭內附諸畨衆曰爾等沿邉畨衆及青海蒙古同受國家撫綏之恩并無歧視今凖噶爾賊窺伺邉境或將來侵擾青海而蒙古之遊牧黃河以南者畏避賊鋒投奔近邉爾畨族須留心照視勿因向有嫌怨乘其危急加以戕害或蒙古恃衆劫掠爾等用力抵禦不可退縮俟事定後朕自論其曲直分别賞罰畨族蒙古皆朕赤子果能遵朕諭旨彼此相安同受朝廷恩澤方為無窮之福未幾凖噶爾為喀爾喀所敗布偽書煽內附諸蒙古復諭青海扎薩克等曰青海王台吉等久荷隆恩册封位號褒寵顯榮迄今厯有年所至於編設旗分以便稽察賞賚惟恐扎薩克等恃強凌弱互啓爭端譬厄魯特內有得秦者有鄂拓克者有扎薩克勒者有得木齊者皆為易於管轄人衆而已爾有飢饉朕必加之周給隨獵行兵朕必加之賞賚從無徴輸爾蒙古者朝廷恩典至優極渥若以封號旗分為賤亦可奏明酌改且爾阿巴賴諾顔裔現在凖噶爾所果為帥領乎抑為屬下乎凖噶爾係成吉斯汗臣僕爾等俱係成吉斯汗弟哈布圖哈薩爾子孫若以博爾濟吉特氏之先論之凖噶爾乃爾屬𨽻奈何甘心自屈爾等當知凖噶爾賊詭計勸諭屬人分别利害亦令如喀爾喀奮勇立功豈可甘自懦怯朕因凖噶爾反間諄諄降旨爾等如能遵行則可保室家遊牧矣十年以喀爾喀敗凖噶爾於克爾森齊老及額爾德尼昭諭青海扎薩克等曰喀爾喀奮勇勦賊爾等何獨不能各宜鼓舞振興踴躍效命賊衆侵擾青海止有噶斯一路爾等須防守隘口倘凖噶爾前來務期協力追殺悉行勦除十三年詔撤駐防大軍所部仍選兵二千屯得卜特爾伊克柴達木等汛以台吉達瑪璘色布騰色特爾布木領之乾隆十一年辦理青海事務副都統衆佛保遵旨宣諭諸扎薩克嵗防汛議以郡王額爾德尼額爾克托克托鼐之長子索諾木丹津及扎薩克台吉衮布喇布坦色特爾布木多爾濟色布騰薩喇等防得卜特爾汛以郡王衮楚克達什車凌喇布坦貝子丹巴輔國公納木扎勒車凌扎薩克台吉達瑪璘色布騰等防伊克柴達木汛十人為五班三年一察軍械十二年以凖噶爾使赴藏煎茶道噶斯復議自伊克柴達木得卜特爾外設汛哈濟爾察罕烏蘇二十年大軍征達瓦齊抵伊犂羅卜藏丹津就擒諭曰羅卜藏丹津負恩背叛逃往凖噶爾偷生三十餘載今兩路大軍至伊無路奔竄仍就擒獲實足以彰國憲而快人心羅卜藏丹津俘至告祭太廟社稷行獻俘禮上御午門樓受之以世宗憲皇帝有羅卜藏丹津至仍宥罪之旨詔免死子巴朗及察罕額布根授藍翎侍衛餘戚屬處伊犁者諭勿內徙二十三年大軍勦嗎哈沁偵沙拉斯瑪呼斯賊竄呼爾塔克羅卜諾爾以地近噶斯通青海詔副都統濟福赴西寧宣諭所部集兵千為備復遣識噶斯道者偵賊蹤既而所部兵集扎噶蘇台詔歸牧聽調勿遽就道濟福遵旨諭之請遣近牧者歸仍量留逺道兵屯烏圖備不虞上鑒其誠詔酌賞遣歸兵久之噶斯無賊蹤乃撤烏圖兵還二十四年陜甘總督楊應琚奏青海得卜特爾伊克柴達木等處設汛屯兵為防凖噶爾計今凖噶爾及回部悉底定請撤青海駐汛兵從之先是阿睦爾撒納叛大軍分道進勦所部購馬二千駝四百送巴里坤軍詔豫值斃者半至是復輸馬七百餘駝三百二十餘請償斃數詔仍如值給二十七年以所部諸扎薩克請給羅卜藏丹津舊牧地楊應琚遵旨往勘奏洮賚河等處係西寧肅州鎮標馬厰及畨族牧地不便撥給西喇郭勒及西爾噶拉金東西五百餘里南北三十餘里地曠且距扎薩克等遊牧近請給其西爾噶拉金踰河即産礦山場久封禁請飭扎薩克等就近守視詔以西喇郭勒給之西爾噶拉金河東聽駐牧河西鉛礦勿得越界私採所部扎薩克自察罕諾捫汗不立傳外旗二十有九爵三十扎薩克多羅郡王三一由親王降襲一由貝勒晉襲扎薩克多羅貝勒二一由郡王降襲扎薩克固山貝子二一由輔國公晉襲扎薩克輔國公四一由鎮國公降襲扎薩克一等台吉十六一由貝勒降襲二由貝子降襲一由輔國公降襲附固山貝子一公中扎薩克一等台吉二欽定外藩蒙古回部王公表傳卷之八十一欽定四庫全書欽定外藩蒙古回部王公表傳卷之八十二傳第六十六扎薩克和碩親王察罕丹津列傳今襲多羅郡王察罕丹津青海和碩特人姓博爾濟吉特號岱青和碩齊元太祖弟哈布圖哈薩爾之二十二世孫祖伊勒都齊為顧實汗第五子有子二長罕都再傳嗣絶次博碩克圖濟農子四長岱青巴圖爾次墨爾根諾顔次即察罕丹津次根特爾號車臣岱青伊勒都齊裔設扎薩克三詳各傳博碩克圖濟農初以噶爾丹女布木為子根特爾婦屢使通問噶爾丹康熙三十五年上親征噶爾丹獲其使羅壘額木齊及善巴於軍詔羈羅壘額木齊於宏仁寺以善巴從我使齎敕諭博碩克圖濟農等擒獻噶爾丹逆黨及根特爾妻已而副都統阿南達設哨嘉峪關外擒其使之自噶爾丹所歸者於素爾河曰阿勒逹爾宰桑以聞明年復遣羅壘額木齊阿勒達爾宰桑等從我使往招博碩克圖濟農及諸台吉來歸會河州副將李鳯翔遣使博碩克圖濟農所以其私謂之曰爾為噶爾丹姻盍説之降羅壘額木齊等歸牧博碩克圖濟農喜謂其子根特爾曰我使被擒謂戮之矣不意蒙恩釋歸真仁聖主也遣阿勒達爾宰桑等至將軍孫思克所稱願往説噶爾丹降思克馳奏諭曰此雖博碩克圖濟農欲圖報效但噶爾丹降與不降豈係此遣使往説為也况朕已發大兵分路進勦博碩克圖濟農使著遣歸尋青海諸台吉定盟內附達什巴圖爾等入覲博碩克圖濟農以疾不至唐古特部第巴疏請免解根特爾妻理藩院議噶爾丹罪甚重其女斷不可留青海若博碩克圖濟農攜至或可賜生全今反令第巴代請仍當檄取上從之博碩克圖濟農尋卒子察罕丹津嗣奏噶爾丹女為臣弟根特爾妻第巴疏請免解未蒙允許但聖主優眷顧實汗子姓乞以噶爾丹女仍給臣弟令完聚上鑒其情諭免解未幾根特爾卒四十年察罕丹津來朝詔封多羅貝勒五十六年偵凖噶爾侵拉藏汗馳疏聞議政大臣等請檄松潘西寧兵備邉詔遣侍衛拉什偕察罕丹津定議明年察罕丹津奏大兵將赴藏凖噶爾必不敢潛至青海請仍撤松潘等處兵入口牧馬休卒上韙其言復遣侍衛扎卜密諭察罕丹津諜誘凖噶爾兵時凖噶爾賊五百謀侵察木多察罕丹津詭遣宰桑迎赴裏塘都統法喇疑與賊應劾其罪詔傳諭察罕丹津所遣宰桑俟凖噶爾賊至偕駐防裏塘兵禦之察罕丹津尋來朝諭曰人心疑懼之際爾能委身效順甚屬可嘉著晉封多羅郡王歸牧請從大軍赴藏詔撫逺大將軍固山貝子允禵善視察罕丹津且以兵護其牧五十九年從平逆將軍延信護達賴喇嘛入藏雍正元年敘功詔晉封和碩親王復命轄其從子丹𠂻屬衆丹𠂻者根特爾子也初授輔國公以大軍自青海討凖噶爾遣所部助獻糧餼復以兵從至藏諭奬之晉封固山貝子尋卒無嗣詔追封郡王遺奏獻部衆及牧地上不忍納諭曰丹𠂻實心效力身故嗣絶朕富有天下四海為家豈有利其所屬之理著四川提督嶽鍾琪遣員會同扎薩克等察明户口數目歸察罕丹津轄務使各得其所勿稍擾纍至丹𠂻屬宰桑等素著勤勞亦著分别加賞先是議由裏塘遷達賴喇嘛瑚畢勒罕羅卜藏丹津違命且煽察罕丹津盟謀興兵襲諸台吉察罕丹津有惑志尋悔罪詔察罕丹津及羅卜藏丹津領青海右翼察罕丹津牧河東近松潘羅卜藏丹津牧河西近布隆吉爾地以河為界是年羅卜藏丹津叛察罕丹津不之附將搆難上聞之詔西寧松潘兵馳往援有拉察布者察罕丹津兄墨爾根諾顔之子也附羅卜藏丹津以兵掠察罕丹津牧察罕丹津攜孥及屬百餘奔至河州老鴉關外總理青海事務侍郎常壽置之河州邉內羅卜藏丹津復以兵掠河州界因徙孥蘭州察罕丹津屬額爾克扎爾瑚齊阿勒達爾和碩齊拉木布等以户千餘丹𠂻宰桑噶隆色布騰達什等以户七百餘相繼來歸三年詔授扎薩克仍領所部歸青海牧以撫逺大將軍年羮堯不善撫其衆飭責之牧甫定察罕丹津請入覲詔給整裝銀千兩明年將歸以行期聞召見圓明園溫諭之復賜銀千兩九年土爾扈特族諾爾布叛拉察布復為所煽將由索羅木河竄察罕丹津聞變收拉察布牧衆遣屬台吉等捕之或以察罕丹津偕拉察布徙牧告上知其內附誠不之疑拉察布尋就擒諭曰拉察布雖係察罕丹津兄子朕知其素不相睦察罕丹津效力有年今已老病仍奮志報效甚屬可嘉著賜幣二十銀千兩令酌給所部效力人衆十三年卒子敦多布旺扎勒先卒察罕丹津嗣絶詔以拉察布子旺舒克襲一次襲旺舒克察罕丹津從孫父拉察布有子三長察罕喇布坦次旺舒克喇布坦皆别有傳旺舒克其季也雍正十三年詔襲察罕丹津所遺扎薩克和碩親王乾隆十四年卒子旺丹多爾濟帕拉木襲二次襲旺丹多爾濟帕拉木旺舒克子乾隆十四年襲扎薩克和碩親王三十六年卒無嗣諭曰旺丹多爾濟帕拉木所襲扎薩克和碩親王爵前因察罕丹津無嗣以旺舒克襲之旺舒克故後朕復加恩以旺丹多爾濟帕拉木襲今復無嗣此和碩親王爵應即停襲但念察罕丹津誠心報效若竟絶祀朕心深為不忍著加恩令旺丹多爾濟帕拉木胞伯父旺舒克喇布坦之子納罕達爾濟降等襲授多羅郡王管理察罕丹津所遺屬衆三次襲納罕達爾濟旺丹多爾濟帕拉木從弟初襲其父旺舒克喇布坦扎薩克一等台吉互見彼傳乾隆三十六年詔襲旺丹多爾濟帕拉木所遺扎薩克授多羅郡王四十年郭羅克畨掠青海牧戕扎薩克輔國公禮塔爾納罕達爾濟追擊之俘賊畨歸諭奬四十七年詔世襲罔替以承察罕丹津祀多羅郡王䇿旺喇布坦列傳後授扎薩克䇿旺喇布坦青海和碩特人姓博爾濟吉特號達賴岱青扎薩克親王察罕丹津從叔父其父多爾濟為顧實汗第六子有子三長畢嚕咱納次薩楚墨爾根台吉次即䇿旺喇布坦多爾濟裔設扎薩克三詳各傳崇德七年多爾濟遣使哈喇扈濟等附達賴喇嘛表獻駝馬賜幣及朝鮮貢物順治二年來朝三年復獻駝馬十四年表謝賜其父顧實汗賻祭恩并奏稱西寧東向不設驛貢使往來道艱乞設驛西寧東上不允康熙十六年逆藩吳三桂為大軍所迫謀結青海為援遣賊黨饋多爾濟金幣靖逆將軍張勇諜得狀奏松潘茂州道通西寧恐吳逆乘間侵茶馬利詔張勇屯甘州防禦多爾濟卒不助吳逆十九年遣官駐松潘偵厄魯特邉情詔檄多爾濟知之勿疑懼噶爾丹尋與喀爾喀搆兵遣使乞援青海多爾濟遵達賴喇嘛諭不之許三十六年遣使招撫青海時多爾濟前卒䇿旺喇布坦代已久和碩特八台吉集盟壇我使諭之曰達賴岱青當以身入朝否則遣子弟代蓋以多爾濟子故重之䇿旺喇布坦尋入覲優賚遣歸四十二年詔封多羅郡王四十四年卒子額爾克巴爾珠爾襲一次襲額爾克巴爾珠爾䇿旺喇布坦次子康熙四十四年襲多羅郡王四十五年為諸昆弟所迫自戕死子二長朋素克旺扎勒降襲多羅貝勒授扎薩克次伊什多勒扎布别授扎薩克台吉自有傳二次襲朋素克旺扎勒額爾克巴爾珠爾長子康熙四十六年襲多羅貝勒五十四年議由裏塘遷達賴喇嘛瑚畢勒罕遣諭所部朋素克旺扎勒稱聽命察罕丹津不從將搆釁久之事始定五十五年詔選兵百屯噶斯路防凖噶爾賊未幾凖噶爾掠青海敗遁復詔大軍備西寧所部兵聽調六十一年詔撤噶斯駐防軍仍備兵遊牧雍正元年羅卜藏丹津叛脅朋素克旺扎勒以兵掠郡王額爾德尼額爾克托克托鼐牧二年大軍至叛黨吹喇克諾木齊扎什敦多布等遁噶斯朋素克旺扎勒擒吹喇克諾木齊之宰桑都喇勒及扎什敦多布母乞降奮威將軍嶽鍾琪令追勦吹喇克諾木齊果擒至上以朋素克旺扎勒雖附賊尋悔罪詔宥之仍留封爵三年詔授扎薩克四年來朝詔給整裝銀八百兩諭曰朋素克旺扎勒之祖父皆封多羅郡王且於羅卜藏丹津叛逆時尚屬奮勉效力著仍晉封多羅郡王九年詔偕額爾德尼額爾克托克托鼐選兵萬護青海牧會其從弟貝勒達什車稜附土爾扈特族諾爾布叛徙牧圖古哩克朋素克旺扎勒以兵追歸檻獻諭嘉之十三年卒其妻遣使告有子三長衮楚克達什次達木垂次根敦皆幼且避痘不獲入覲乞恩令一子襲爵詔以衮楚克達什襲三次襲衮楚克達什朋素克旺扎勒長子雍正十三年襲扎薩克多羅郡王乾隆四十二年以病罷子索諾木多爾濟襲四次襲索諾木多爾濟衮楚克達什次子乾隆四十二年襲扎薩克多羅郡王四十七年詔世襲罔替欽定外藩蒙古回部王公表傳卷之八十二欽定四庫全書欽定外藩蒙古回部王公表傳卷之八十三傳第六十七扎薩克多羅郡王色布騰扎勒列傳今襲多羅貝勒色布騰扎勒青海凖噶爾人姓綽囉斯號車臣岱青祖巴圖爾琿台吉父卓特巴巴圖爾凖噶爾族舊遊牧阿爾台巴圖爾琿台吉死子僧格嗣為凖噶爾長卓特巴巴圖爾及其兄車臣以爭屬産故與僧格隙劫殺之蓋皆僧格異母兄也噶爾丹為僧格同母弟居唐古特習沙門法達賴喇嘛遣歸轄凖噶爾衆因執車臣戕之卓特巴巴圖爾自阿爾台奔赴青海康熙三十六年大軍定噶爾丹亂遣使招撫青海時卓特巴巴圖爾卒色布騰扎勒幼不獲從和碩特諸台吉至四十二年來朝詔封多羅貝勒五十四年議由裏塘遷達賴喇嘛瑚畢勒罕遣諭所部色布騰扎勒稱聽命且以察罕丹津異志告察罕丹津尋悔事始定雍正元年羅卜藏丹津叛脅凖噶爾族附已色布騰扎勒將拒之懼不敵羅卜藏丹津強授兵令掠西寧色布騰扎勒不從隂遣使告二年聞大軍將至率户口二千餘迎降署撫逺大將軍貝子延信置之西川口外復以導從逆之貝勒羅卜藏察罕輔國公車稜台吉諾爾布等悔罪內附功諭奬之晉封多羅郡王亂定歸牧王大臣等議青海之凖噶爾請勿令𨽻和碩特族允之先是凖噶爾族設扎薩克一曰阿喇布坦三年詔增設扎薩克以色布騰扎勒領之尋入覲詔給整裝銀千兩明年卒子二長車凌喇布坦襲扎薩克次車凌圖勒木為協理台吉一次襲車凌喇布坦色布騰扎勒長子雍正九年襲扎薩克多羅郡王乾隆十三年卒子索諾木多爾濟襲二次襲索諾木多爾濟車凌喇布坦子乾隆十三年襲扎薩克多羅郡王二十三年卒無嗣詔以其叔父車凌圖勒木之子色布騰多爾濟襲三次襲色布騰多爾濟索諾木多爾濟從弟乾隆二十三年襲扎薩克多羅郡王三十年卒無嗣色布騰扎勒裔自此絶詔以其從祖車木伯勒襲四次襲車木伯勒色布騰多爾濟從祖其祖班達哩為巴圖爾琿台吉季子從兄卓特巴巴圖爾徙牧青海子丹巴有子二長丹津早卒次即車木伯勒乾隆三十年詔襲色布騰多爾濟所遺扎薩克降授多羅貝勒三十九年卒子垂忠扎布襲五次襲垂忠扎布車木伯勒長子乾隆三十九年襲扎薩克多羅貝勒四十七年詔世襲罔替以承色布騰扎勒祀多羅貝勒衮布列傳今襲扎薩克多羅郡王衮布青海和碩特人姓博爾濟吉特號阿齊巴圖爾扎薩克親王察罕丹津從叔父其父達蘭泰為顧實汗第三子達蘭泰裔設扎薩克二皆衮布嗣詳各傳衮布遊牧嘉峪關外鄰哈密凖噶爾及諸回使往來必經之順治十三年葉爾羌回長遣使克拜挈衆三百入貢抵肅州衮布以葉爾羌嘗奪其屬將襲之甘肅巡撫周文煜徙貢使至甘州衮布挈千餘騎分道入聞官軍嚴備遁歸卒不敢為邉患康熙三十五年杜爾伯特台吉綽克圖避噶爾丹亂奔依衮布邉吏往詰以情告詔勿究三十六年上視師寧夏衮布遣宰桑禡木特至先是遣使諭䇿妄阿喇布坦絶噶爾丹道經嘉峪關外衮布助糧糗駝馬且為導令得達至是奏遊牧邉外久不敢萌異志數年來青海諸台吉私盟皆未與請內附時額駙阿喇布坦等遵旨招降青海行有期詔攜衮布使往復賜諭奬之阿喇布坦遣禡木特馳語衮布會衮布以建達賴喇嘛塔故遣長子額爾德尼額爾克托克托鼐赴察罕托羅海中道聞達賴汗子拉藏將以兵襲已懼歸衮布復遣次子朋素克往拉藏讓之曰爾父私遣使內附非欲二青海乎將興兵與爾父搆難朋素克馳歸語故衮布備兵待復遣禡木特迎告我使曰若不先臨我地諸台吉疑自息阿喇布坦等恐諸台吉不利之從禡木特言拉藏尋遣語衮布曰爾獨希寵天朝非所宜我將偕青海諸台吉內附因撤兵阿喇布坦至諸台吉定盟衮布遣子朋素克入覲賜御用冠服視諸台吉有加禮三十六年詔封朋素克為固山貝子尋卒無嗣停襲故不立傳四十三年上以衮布先諸台吉內附詔封多羅貝勒四十四年卒子額爾德尼額爾克托克托鼐襲一次襲額爾德尼額爾克托克托鼐衮布長子康熙四十四年襲多羅貝勒五十五年以議遷達賴喇嘛瑚畢勒罕事定詔分領青海左翼五十九年送達賴喇嘛入藏雍正元年敘功晉封多羅郡王未幾羅卜藏丹津叛以兵四千掠其牧額爾德尼額爾克托克托鼐拒之不敵所部多却走因攜妻間道至甘州乞援子阿喇布濟索諾木達什等集衆拒賊鏖戰七日賊始退率兵五百及戚屬千餘來歸署撫逺大將軍貝子延信置之蘇油口內馳疏聞諭額爾德尼額爾克托克托鼐曰青海台吉皆顧實汗嫡孫自我朝太宗文皇帝時顧實汗與達賴喇嘛恭順效力迄今百年蒙皇考施以恩寵加封名號普加庇護後經䇿妄阿喇布坦敗壞黃教圍困西藏殺害拉藏且復謀侵爾等於是我皇考遣發大兵偕爾等送達賴喇嘛至藏振興黃教今羅卜藏丹津無故稱兵以王等不入伊黨自相侵害朕仰體皇考眷念顧實汗子孫之意其罪未明尚不忍即加征討已遣侍郎常壽往問羅卜藏丹津所行情事若能知罪悔過朕當定其是非和解爾衆仍令爾兄弟照舊安居如果羅卜藏丹津不遵朕旨侵犯邉塞豈可不遣兵征勦今王屬衆人等盡被劫掠窮困來自甘州朕聞之不勝惻然特遣郎中通智分給廪餼牲畜令從豐厚王等在彼安居不須憂慮朕斷不使爾等稍有拮據也常壽奏至得羅卜藏丹津叛狀大軍討之亂始定三年詔授扎薩克偕避亂來歸之親王察罕丹津各攜所部衆歸牧撫逺大將軍年羮堯不優恤之上責其罪曰朕聞郡王額爾德尼額爾克托克托鼐部衆窮困流離資生窘乏親王察罕丹津所屬雖稍能存活亦屬貧窮爾身為撫逺大將軍理應酌量事勢緩急人口多寡盡心籌畫分理乃僅發銀萬兩為賑濟用額爾德尼額爾克托克托鼐等遭叛賊掠奪投命來歸全賴安置得所俾其衣食有資咸登樂利此諸部落人衆流離失所豈萬金所能給耶額爾德尼額爾克托克托鼐尋入覲詔給整裝銀千兩歸牧賜如之九年詔領左右翼扎薩克兵萬護青海牧會土爾扈特族諾爾布叛額爾德尼額爾克托克托鼐遣子阿喇布濟偕輝特台吉恭格以兵擊諾爾布就擒時和碩特族拉察布及達什車凌皆以叛徙牧諾爾布詭稱青海諸台吉謀逆阿喇布濟隂約以青海軍援已諭曰青海各台吉世受國恩斷無背逆之事親王察罕丹津聞拉察布叛即遣兵追捕郡王朋素克旺扎勒聞達什車凌叛即率兵攜歸額爾德尼額爾克托克托鼐父子效力行間阿喇布濟現偕恭格追擒諾爾布果有異志寧肯如此奮勉效力耶諾爾布械至訊之果辭誣論誅額爾德尼額爾克托克托鼐尋奏年邁乞以子代從戎上憫其情諭曰額爾德尼額爾克托克托鼐效力有年著將伊子內可襲王爵者指出一人朕加特恩封為長子額爾德尼額爾克托克托鼐以索諾木丹津名奏詔如所請乾隆十四年卒子四長阿喇布濟封輔國公以非世爵不立傳次索諾木達什為協理台吉次即索諾木丹津襲扎薩克郡王次車凌多爾濟别授扎薩克台吉自有傳二次襲索諾木丹津額爾德尼額爾克托克托鼐第三子雍正九年封長子乾隆十年扈蹕木蘭行圍命乾清門行走十四年襲扎薩克多羅郡王十五年詔增得卜特爾及伊克柴達木汛兵以索諾木丹津領之二十年大軍征達瓦齊索諾木丹津請備兵噶斯路允之達瓦齊就擒詔撤歸二十三年詔副都統濟福與議備兵偵防厄魯特逸賊三十六年卒子衮楚克扎布封長子先索諾木丹津卒孫衮楚克敦多布納木扎勒襲三次襲衮楚克敦多布納木扎勒索諾木丹津孫乾隆三十六年襲扎薩克多羅郡王四十年卒子剛噶爾襲四次襲剛噶爾衮楚克敦多布納木扎勒長子乾隆四十年襲扎薩克多羅郡王四十七年詔世襲罔替欽定外藩蒙古回部王公表傳卷之八十三欽定四庫全書欽定外藩蒙古回部王公表傳卷之八十四傳第六十八多羅貝勒達顔列傳後授扎薩克達顔青海和碩特人姓博爾濟吉特郡王䇿旺喇布坦從子父薩楚墨爾根台吉有子三長額爾克諾顔早卒次即達顔次噶爾丹岱青諾爾布薩楚墨爾根台吉嗣父多爾濟為青海右翼長康熙二十九年我使赴䇿妄阿喇布坦所歸經嘉峪關為青海台吉阿竒羅卜藏所掠甘肅提督孫思克誘質其宰桑懼反我使遣兵擊之斬馘四百餘獲駝馬牛羊千計阿竒羅卜藏遁思克檄青海台吉等歸所掠薩楚墨爾根台吉遣宰桑詰阿竒羅卜藏罪察獲畜械罄以獻復代謝罪上以薩楚墨爾根台吉等恭順詔宥之先是喀爾喀為噶爾丹所敗有阿海岱青班第者奔青海依多爾濟久之孑身歸戚屬百餘仍留青海薩楚墨爾根台吉育之三十二年遣官往取悉遵諭送歸三十五年大軍征噶爾丹唐古特部第巴煽薩楚墨爾根台吉以兵萬餘屯雜谷桑湯對河諸畨地為觀望計諜噶爾丹敗遁歸尋卒子達顔嗣五十四年凖噶爾侵哈密敗遁議撤噶斯駐防兵以達顔屬台吉等遊牧柴達木通噶斯之察罕齊老圖遣侍衛等駐其地偵凖噶爾蹤五十五年三月詔選所部兵百屯噶斯閏三月以議遷達賴喇嘛瑚畢勒罕事定詔分領青海右翼先是親王