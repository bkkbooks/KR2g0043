青阿奏誘擒禡木特及從者三十五人諭曰禡木特倘召之不至或至而心懷不服則擒之可今遣使往輒至不明懲其罪反誘擒不可詔宥罪遣歸給冠服禡木特械至鄂倫瑚都克汛侍郎玉保宣諭釋之謝罪歸時輝特台吉阿睦爾撒納與達瓦齊隙達瓦齊檄禡木特數擊之阿睦爾撒納蹙為內降計禡木特以厄魯特及烏梁海兵八千追掠其衆阿睦爾撒納間道至請從大軍擊扎哈沁索所掠內大臣薩拉爾以禡木特遊牧近將擊之而庫列圖嶺當其前雪盛不可行將由索勒畢嶺進遣諜往禡木特既釋歸上以烏梁海及扎哈沁近內汛詔薩拉爾逐之阿爾台外不從當以兵討禡木特感不殺恩且念達瓦齊不足事隂有歸志懼誅其子不果有凖噶爾宰桑别號通禡木特遊牧諾海克卜特爾近索勒畢嶺為布拉罕察罕托輝下遊禡木特赴其牧將掠通禡木特為請降計通禡木特覺誘執之薩拉爾諜得狀由烏蘭山隂以兵驟至通禡木特就擒索得禡木特責負恩罪禡木特陳前情請徙牧內屬遣扎哈沁得木齊等招所部六百餘户降薩拉爾檻禡木特至軍詔釋之禡木特前為凖噶爾使已出痘至是入覲京師上鑒歸志誠授內大臣職賜冠服二十年詔與朝正會宴以通禡木特卒諭禡木特善視其戚屬時議征達瓦齊詔阿睦爾撒納為定邊左副將軍領北路哨探兵以禡木特參贊遣赴軍禡木特密奏曰阿睦爾撒納豺狼也雖降不可命往往必為殃上以不逆詐諭之阿睦爾撒納亦告我參贊大臣固倫額駙色布騰巴爾珠爾曰禡木特非傾心降者不可信今哨探兵以扎哈沁從恐漏師不如令後隊色布騰巴爾珠爾以聞諭曰禡木特老成習事故令之先行若停其前往是滋疑也阿睦爾撒納以禡木特掠其屬與之隙故不願同往朕用人期益事豈以他人言為從違乎詔定北將軍班第飭勿相忌班第請徙扎哈沁衆於扎布堪庫克嶺諸地防乘間竄詔置之齊拉罕勿內徙滋疑授禡木特總管以厄魯特喀喇巴圖魯阿玉錫為翼領包沁宰桑阿克珠勒尋率衆降察獲禡木特族屬給之初凖噶爾定扎哈沁包沁納賦例比年獻脯間年供牲贍喇嘛遇軍事令助詔如舊例恤免期年賦授阿克珠勒為包沁總管以禡木特兼領之阿睦爾撒納不俟禡木特還先行以扎哈沁兵三百從禡木特返牧偕班第議編旗隊以阿勒巴齊唐古特舊司牧哈沁九得秦務請視佐領加一等復以三等侍衛竒徹布及扎哈沁得木齊阿巴策凌等協理包沁牧務尋馳赴哨探軍有賽音伯勒克者乞降巴顔珠爾克汛訊為禡木特族且孥聚扎哈沁班第給視牧者阿睦爾撒納遺書請給扎哈沁牧所獲輝特户五十餘班第以非其戚屬不之給禡木特與阿睦爾撒納會軍於額爾德里克阿睦爾撒納約以兵千待察罕呼濟爾令禡木特繼進禡木特至察罕呼濟爾阿睦爾撒納已赴額密爾引兵八百馳會抵塔本集賽偵杜爾伯特叛賊巴朗竄徙選兵三百追之巴朗尋就擒軍抵伊犁詔晉禡木特三等公爵賜信勇號賞雙眼孔雀翎四團龍服命常服之達瓦齊既擒阿睦爾撒納覬凖噶爾琿台吉漸驕縱班第劾之禡木特私語其屬或以告阿睦爾撒納阿睦爾撒納夙與怨聞之愈憾先是諭班第俟伊犁定偕禡木特議凖噶爾善後事至是班第以禡木特兼管扎哈沁包沁牧請仍置阿爾台增喀爾喀藩籬允之尋撤大軍還扎哈沁兵三百遣歸牧禡木特以疾留伊犁聞阿睦爾撒納驟叛阿克珠勒附之將脫歸乏兵衛為逆黨哈丹等所遮脅之降不從擒赴阿睦爾撒納所阿睦爾撒納慰之曰凖噶爾與天朝疆域殊爾欲內向何也不如歸我當善視爾禡木特唾而言曰天下豈有無君之國哉達瓦齊篡而虐聖天子討其罪噶爾丹策凌嗣已絶我不內歸將焉往且天朝已擒我不即誅復釋還此所謂生死而肉骨也何忍背之爾先我往聖天子待爾厚爾乃謀逆今既擒我我何懼死則死耳大軍至將磔汝犬猶不食汝肉阿睦爾撒納慙縊殺之禡木特孫扎木禪留扎哈沁牧上聞阿睦爾撒納叛詔扎木禪率扎哈沁兵赴大軍且遣屬間道至伊犁告班第及禡木特未行間禡木特屬訥默庫自伊犁脫歸以禡木特將由闥勒竒嶺來會大軍告定北將軍哈達哈遣兵由哈卜塔克拜達克迎之扎木禪至語之故感且泣請從軍往哈達哈給駝馬令其屬識塗者齎諭凖噶爾敕先行扎木禪繼之以道梗返諭禡木特妻曰爾其安處牧所勿過慮爾夫禡木特為凖噶爾舊人熟習厄魯特情諒不至圍困今大兵將進發爾夫禡木特聞之自必以身來迎或有不虞朕必令爾孫扎木禪襲爵復諭扎木禪善慰其祖母志哈達哈不時存恤給食物明年二月定西將軍策楞諜阿睦爾撒納戕禡木特以告諭曰禡木特年就邁效力行間甚為奮勉今逆賊戕之深可憫惻其孫扎木禪著令襲公爵大軍定伊犁械逆黨至訊得禡木特就死狀御製詩憫之褒為烈士且有千載流聲芳之句一次襲扎木禪禡木特孫乾隆二十一年二月襲三等信勇公三月以阿睦爾撒納煽烏梁海梗赴哈薩克道詔從北路定邊左副將軍哈達哈𠞰烏梁海叛賊七月諭曰輝特杜爾伯特人等朕降旨令歸舊牧扎哈沁亦應一體辦理但扎木禪現赴軍所著暫停徙俟大兵凱旋時哈達哈傳諭扎木禪令率屬徙歸舊牧安居樂業以副朕軫恤意九月諭嘉其奮勉效力授內大臣十一月哈達哈奏扎木禪固請挈屬內徙因賜牧哲爾格西喇呼魯蘇諭曰扎哈沁既與喀爾喀鄰牧著即設哨附近卡倫視喀爾喀例支領錢糧以資養贍有噶勒雜特得木齊丹畢根敦者携户二百餘內附𨽻扎哈沁牧二十二年署定邊左副將軍車布登扎布以扎木禪辭告噶勒雜特附牧雖謐不如别置善從之二十三年入覲扈蹕行圍得優賚二十四年從參贊大臣齊努琿追𠞰嗎哈沁至阿爾齊圖以兵先遇賊哈喇呼喇山奮擊之悉就擒奪所盜馬九十餘奬賚幣二十五年扎木禪