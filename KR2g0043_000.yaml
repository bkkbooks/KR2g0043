曰都噶爾阿喇布坦初巴圖爾琿台吉遊牧阿爾台子噶爾丹嗣為厄魯特長諸台吉皆附之貢不得自奉表惟丹津得專使間嵗輒遣至康熙二十二年定厄魯特貢例使入關以二百人為額諭噶爾丹及丹津知之丹津卒都噶爾嗣乞入市京師諭自四厄魯特大台吉外皆市張家口永為令都噶爾卒子車零及達都琥達瑪璘皆早死罕都阿喇布坦與噶爾丹聚牧阿爾台之科布多仍各領部衆阿喇布坦妻曰扎爾為喀爾喀右翼扎薩克圖汗成衮女成衮子沙喇與左翼土謝圖汗察琿多爾濟以爭屬産不相能噶爾丹誘沙喇往會阿喇布坦察琿多爾濟率兵戕之復侵殺噶爾丹弟多爾濟扎卜噶爾丹因與喀爾喀搆兵二十七年罕都阿喇布坦從噶爾丹侵喀爾喀由杭愛山隂至額爾德尼昭敗土謝圖汗兵以喀爾喀內附乃還二十九年噶爾丹復由烏達罕嶺侵喀爾喀罕都阿喇布坦自茂密喀喇色古爾山隂以兵會有策妄阿喇布坦丹津鄂木布者皆噶爾丹兄僧格子也策妄阿喇布坦怨噶爾丹徙博囉塔拉丹津鄂木布仍附噶爾丹牧阿喇布坦善丹津鄂木布與策妄阿喇布坦交惡策妄阿喇布坦偵噶爾丹侵喀爾喀潛兵至科布多掠噶爾丹妻阿努及牲畜去噶爾丹為大軍所敗挈罕都阿喇布坦等遁歸罕都隂語阿喇布坦曰我等當入告天朝及達賴喇嘛令噶爾丹與策妄阿喇布坦息爭否則善自為計分處可也阿喇布坦以其謀告噶爾丹罕都懼奔策妄阿喇布坦所阿喇布坦留事噶爾丹尋異志噶爾丹遊牧孔圭濟達琿所部屯耕鄂爾坤阿喇布坦遊牧察罕色琿所部屯耕扎布堪哈薩克圖既而噶爾丹循克嚕倫河徙牧巴顔烏蘭強阿喇布坦往會三十五年上親征噶爾丹駐蹕什巴爾台遣諭噶爾丹曰汝當親至與朕定議否則以阿喇布坦等為使時噶爾丹屯兵克嚕倫之克勒和碩聞駕至懼夜遣人赴巴顔烏蘭召阿喇布坦與議我大將軍費揚古自西路迎擊兵逼炮聲不絶所部倉皇走阿喇布坦禁之不可馳語噶爾丹曰天朝兵威誰不之知是不可與戰噶爾丹益失所恃與俱遁至特勒爾濟口遇西路軍敗竄阿喇布坦集殘衆赴博囉河偵噶爾丹匿塔密爾之台庫勒復往就會丹津鄂木布以爭牧與噶爾丹隙違之約阿喇布坦偕行阿喇布坦亦棄噶爾丹去由吉齊根特轉徙扎布堪之濟思布隆珠爾庫珠等處與噶爾丹相避行噶爾丹復自伯格爾察罕額爾克遣宰桑車凌布木召之阿喇布坦不往徙牧布顔圖杲爾其屬羅卜藏班珠爾者以來歸久請説降允之復以喀爾喀親王策旺扎布郡王衮布固嚕什喜皆阿喇布坦姻戚詔遣屬往招之降時阿喇布坦及丹津鄂木布謀就策妄阿喇布坦以前憾不果往敕曰朕統大軍敗噶爾丹兵丹巴哈什哈沙克珠木等接踵歸誠俱已授爵秩給衣食今朕復親統六師調各路兵𠞰噶爾丹倘不來降必窮之于其所往爾阿喇布坦及丹津鄂木布前雖附噶爾丹然非倡亂之人今來降者皆云爾等與噶爾丹分析各居朕嘉爾猶知天道能自振拔憫爾牲畜被俘衣食已絶特遣使往諭其扎薩克圖汗之子策旺扎布先經離散朕已收歸封親王爵覔爾妻母令與完聚頻加撫恤頃又擇地賜牧使安生業爾其知之敕至爾即率衆來歸前附噶爾丹罪朕不之究必待爾以富貴顯榮爾之部衆亦令妻孥完聚各得生業爾若尚有疑懼前策妄阿喇布坦使至時請朕勿討爾罪令往與會朕以策妄阿喇布坦遣使納貢敬慎有加深加憐惜爾若往附策妄阿喇布坦朕不究詰倘不擇斯二者徼幸于額克阿喇勒洪郭爾齊斯希等峻險之處棲身茍免朕必往討爾其早作良圖三十六年使至授之敕阿喇布坦及其妻告願遵旨內徙以噶爾丹介居請徙近策妄阿喇布坦牧時丹津鄂木布居吹地遣屬往告各使齎奏至不即降復敕其使諭之會噶爾丹自哈薩克圖哈喇阿濟爾罕遣使土克齊色稜達什召阿喇布坦不赴且奪召者騎自布顔圖杲爾徙阿爾台之喀喇伊齊思呼里木圖等處噶爾丹欲踰阿爾台至額克阿喇勒捕魚食慮阿喇布坦襲已不果尋自殺丹津鄂木布奔策妄阿喇布坦所阿喇布坦仍分牧遊行遣使奏請入貢諭曰朕前聞爾與噶爾丹異處遣使諭爾來降或往依策妄阿喇布坦聽爾自為計但不得據險竄伏兩無所歸爾遣使諾顔格隆藏布額爾克鄂木布阿旺達什等奏稱噶爾丹若至近地必擒執之以歸聖主朕又令爾使齎敕往諭雖不能擒殺噶爾丹但束身來降亦必富貴優養毋疑毋阻今爾稱蒙諭來降即欲親往入奏偕策妄阿喇布坦同牧因臣妻疾甚是以不果往不論所居何地自當請安進貢以此觀之爾無乞降誠意尚為首鼠兩端計目今情事爾所灼知丹濟拉車稜等來降朕悉加寵眷策妄阿喇布坦擒伊拉古克三呼圖克圖授朕使令治罪爾欲他往勿復望加爾厚恩顯榮事今憐爾無歸迫于生計欲使得所爾其熟籌之毋貽悔阿喇布坦復不即降竄齋爾納木初罕都棄噶爾丹往就策妄阿喇布坦達都琥子達爾扎從之策妄阿喇布坦奪其屬禁罕都及達爾扎噶爾丹滅始釋之罕都擕户百餘乘間脫將為內附計至齋爾納木懼為阿喇布坦留棄其屬挈孥大雪中間道赴巴里坤三子皆走死僅以妻女及從者七人行哈密郭帕伯克擒之詰得狀遣使導至三十七年入覲諭曰爾來歸情殊可憫所挈屬衆雖少以爾父嘗納貢故仍授台吉職先是阿喇布坦屬降者詔安置察哈爾牧曰四品官噶羅卜藏曰二等侍衛瑪穆曰三等侍衛達克巴藏布及壯丁百七十餘設佐領一隸鑲黃旗以噶羅卜藏領之至是詔罕都與同牧後授三品散秩大臣子二長索諾木如罕都職次阿喇布珠爾授三等侍衛四十一年阿喇布坦來歸丹津鄂木布既奔依策妄阿喇布坦尋為所禁阿喇布坦懼不赴策妄阿喇布坦掠其牧乃徙額訥倫杲爾集諸宰桑言曰我今決內面矣遣使諾顔格隆藏布齎奏至詔允降阿喇布坦挈屬徙策妄阿喇布坦遣族台吉大策凌敦多卜羅卜藏琳沁等以兵二千追之阿喇布坦列兵禦其宰桑洪科爾額爾竒木子車克擊斬羅卜藏琳沁及兵四百餘會我使往迎大策凌敦多卜等遁阿喇布坦率户七百餘屯茂岱察罕廋爾遣洪科爾額爾竒木馳奏賜御用冠服未幾入覲京師召見保和殿諭曰厄魯特歸降我朝未有率人如爾之衆者爾既傾心來歸甚屬可嘉朕所用避風石數珠最利風疾以賜爾阿喇布坦奏臣産絶域無知昔犯天朝每思及心膽俱裂諭曰爾厄魯特為人多疑朕親率師至克嚕倫遣使諭噶爾丹來降彼不之從故至交戰失利其時若即歸欵朕亦即已前厄魯特來降者朕皆授大臣職爾等尚不之信今已優養數年各安生全雖未從征立功扈從巡哨亦常盡力今觀爾體貌健壯他日得力可知念爾逺涉勞乏且善自調攝暇日可更與爾語也詔封多羅郡王賜貂裘鞍馬銀幣其從者諾顔格隆藏布洪科爾額爾竒木皆賜達爾漢號尋諭遊牧推河阿喇布坦將行奏曰臣為策妄阿喇布坦所掠無衣食窮困已極蒙賜糧畜得更生今來入覲又蒙恩給食乘傳遣侍衛挈駝馬迎臣甫至輒賜宴復賞御用珍服及未經見物天髙地厚之恩此生誠不能報但期臣身及臣子孫世世捐軀效力而已至臣屬衆志尚未寧俟數年後再請給賜官職編設旗隊允之四十二年詔授扎薩克尋卒子二長車稜旺布次色布騰旺布相繼襲一次襲車稜旺布阿喇布坦長子尚郡主授多羅額駙康熙四十二年襲扎薩克多羅郡王先是達瑪璘妻布尼塔爾從兄額璘沁哈什哈至乞降詔優養之子茂海及車稜從阿喇布坦來歸詔封茂海為輔國公五十四年準噶爾襲哈密諭車稜旺布及茂海以兵備之六十一年車稜旺布來朝雍正元年諭曰厄魯特公茂海從阿喇布坦來時皇考深加養愛今在軍前輸誠效力有年著晉封固山貝子三年車稜旺布及弟貝勒色布騰旺布來朝四年理藩院奏遊牧推河諸厄魯特請各設旗分佐領會準噶爾台吉噶爾丹策凌乞和詔遣散秩大臣伯四格等往勘阿爾台界即赴推河議編厄魯特旗隊尋奏以車稜旺布及色布騰旺布茂海轄所屬定四佐領詔各給扎薩克印厄魯特凡六旗曰扎薩克多羅郡王車稜旺布曰扎薩克多羅貝勒色布騰旺布曰扎薩克固山貝子茂海别有準噶爾扎薩克一曰固山貝子多爾濟色布騰阿拉善扎薩克一曰貝勒阿保輝特扎薩克一曰輔國公巴濟以車稜旺布領之授盟長復諭理藩院曰厄魯特諸台吉歸順聖祖仁皇帝特恩加授官職雖無世襲之旨但伊等各有效力之處悉著降一等承襲如承襲之人或能守分盡職仍將品級賞給其以此諭厄魯特知之有烏梁海者錯處唐努山及克木克木齊克近阿爾台汛上以舊為喀爾喀及準噶爾屬詔車稜旺布及喀爾喀貝勒博貝分轄之征其賦策妄阿喇布坦請賜歸準噶爾上不允詔前鋒統領定夀等屯特斯防護烏梁海復諭車稜旺布等往諭德意頒賚茶布六年卒弟色布騰旺布襲二次襲色布騰旺布阿喇布坦次子尚郡主授多羅額駙雍正元年封多羅貝勒四年授扎薩克七年襲扎薩克多羅郡王以貝勒爵乏嗣者詔并兩扎薩克為一復授厄魯特盟長九年準噶爾煽內附諸厄魯特茂海車稜等為所惑誘色布騰旺布屬從叛復助掠諸部牧畜詔撫逺大將軍馬爾賽馳赴扎克拜達哩克防禦叛賊色布騰旺布尋奏至稱臣父阿喇布坦歸誠後世受國恩頃準噶爾賊至方欲偕茂海車稜議徙內地不意二人率臣屬管旗章京班第佐領索騰等五百餘衆叛就噶爾丹策凌臣義不肯二率宰桑等及兵百餘待命諭曰色布騰旺布素為朕所嘉與今感戴朕恩竭力保護所屬遊牧人等不致妄動具奏請旨可嘉可憫著理藩院遣人照視酌量嚴密之處速行徙牧明年色布騰旺布奏臣有宰桑十四屬戶四百二十以避痘不敢至內地若不徙又鄰準噶爾界乞施恩令徙喀爾喀河附近地允之復諭曰宰桑等不隨逆賊誠心歸附其主甚屬可嘉色布騰旺布感念朕恩不為準噶爾賊所誘有逃竄者復能竭力追𠞰著加恩賞色布騰旺布銀千兩宰桑等銀各百兩屬人等每户銀十兩乾隆元年命御前行走賜紫轡先是車稜旺布時烏梁海隸其牧每丁納貂五尋以烏梁海乏生計議減二别給牧畜代之七年議政王大臣等奏色布騰旺布復征烏梁海貂五請察議嗣逾額者罪從之十三年卒嗣子朋素克襲三次襲朋素克祖罕都父索諾木見阿喇布坦傳色布騰旺布以無嗣育朋素克為子乾隆十三年議襲扎薩克詔降襲固山貝子尋命乾清門行走賜雙眼孔雀翎黃馬褂十七年詔察所屬烏梁海之出入內汛者毋得私挈蒙古衆越境二十年大軍征達瓦齊獻馬二百詔納之軍抵伊犁茂海車稜俱前死子齊默特多爾濟密什克多爾濟烏巴什等迎降尋入覲諭挈戚屬附朋素克牧餘仍留伊犁二十一年和託輝特青衮咱卜叛遣逆黨伯爾格赴朋素克及烏梁海牧私調兵八百朋素克偕烏梁海達爾漢巴顔等擒伯爾格及從者送軍諭嘉其不附逆二十五年副都統伊柱視伊犁屯田至海努克獲虎紐銅章一文曰管轄厄魯特後旗扎薩克印驛封至蓋雍正四年頒給茂海物也茂海叛挈往準噶爾獻噶爾丹策凌至是得之詔貯內廷先是朋素克自喀爾喀河徙牧推河二十六年定牧鄂爾坤之烏蘭烏蘇隸喀爾喀賽因諾顔部以齊齊爾里克盟長轄之四十三年議朋素克強取族台吉為己屬匿不報罪削扎薩克職詔其子納木扎勒襲四次襲納木扎勒朋素克長子乾隆三十八年扈蹕木蘭行圍命乾清門行走授二等侍衛三十九年賞黃馬褂會山東夀張逆民王倫擾臨清詔從大學士舒赫德喀爾喀親王固倫額駙拉旺多爾濟往𠞰之四十三年襲扎薩克固山貝子詔歸遊牧四十六年諭曰阿喇布坦以來降功封郡王爵其子車稜旺布色布騰旺布相繼承襲後因色布騰旺布無嗣以其養子朋素克降襲扎薩克固山貝子復因朋素克不稱扎薩克職以固山貝子原品休致令伊長子納木扎勒承襲其扎薩克固山貝子爵著加恩令世襲罔替欽定外藩蒙古回部王公表傳卷之七十七欽定四庫全書欽定外藩蒙古回部王公表傳卷之七十八傳第六十二厄魯特扎薩克輔國公丹濟拉列傳今襲固山貝子丹濟拉厄魯特人準噶爾族姓綽囉斯祖巴圖爾琿台吉父溫春台吉系詳青海厄魯特部傳初溫春台吉與其兄噶爾丹同牧阿爾台康熙十七年附噶爾丹表入貢二十一年復遣使至尋卒子丹濟拉依噶爾丹二十三年偕弟達爾扎扎木揚附噶爾丹表入貢時噶爾丹自號博碩克圖汗厄魯特族皆隸之然性殘虐諸台吉宰桑惟善丹濟拉與阿喇布坦丹津鄂木布格類固英信丹濟拉尤篤有事必與謀嘗以兵從噶爾丹侵喀爾喀敗土謝圖汗察琿多爾濟遣使諭噶爾丹罷兵不從丹濟拉及格類固英以覆奏獻復分兵侵喀爾喀為大軍所敗乞降遁諭噶爾丹親來定盟否則以丹濟拉及丹津鄂木布為使噶爾丹詭稱道逺乏糧糗弗遣復偕丹濟拉循克嚕倫河掠喀爾喀因屯牧巴顔烏蘭三十五年上親征噶爾丹駐蹕拖陵遣使以兵二百齎敕諭降至克嚕倫河丹濟拉率千餘騎突至欲奪前鋒馬我使叱曰爾等何得無禮上率師親至矣西路大將軍費揚古亦自鄂爾坤圖拉且來丹濟拉駭失聲馳語噶爾丹偕竄至特勒爾濟口為西路軍所敗噶爾丹挈數騎遁丹濟拉與相失偵匿塔密爾之台庫勒間道往會以阿喇布坦丹津鄂木布等異志從噶爾丹至庫掄伯勒齊爾復以兵千五百掠遊牧瀚海之喀爾喀有津巴者丹濟拉屬為喀爾喀阿爾薩蘭衛宰桑擒獻遣歸招噶爾丹降至阿濟爾布納遇丹濟拉語之故且曰上遣兵分備邊汛矣丹濟拉遁詭遣察哈岱乞降聞我儲糧翁吉謀往奪會副都統祖良璧撤兵歸行未數里丹濟拉伺前軍過驟劫輜重祖良璧自後馳至前軍旋擊敗走先是丹濟拉以奪糧為非計從者曰與其餒而死不如盜而生丹濟拉強應之語曰勿殺人但掠食耳至是為護糧軍所敗失乘騎丹濟拉撫膺嘆曰欲向清水求魚水已濁魚終不可得奈何率衆竄歸噶爾丹懊語曰我恃汝為命汝今若此將何以存不得已當往哈密以馬易粟而食既而偵我軍設哨嘉峪關外弗敢往走格格特哈朗古特薩克薩特呼里克伯格爾察罕額爾克等處丹濟拉説噶爾丹遣格類固英來乞降時準噶爾諸台吉皆叛棄噶爾丹惟丹濟拉從上不忍盡𠞰厄魯特衆既遣使往招阿喇布坦及丹津鄂木布復以丹濟拉獨為噶爾丹所信賜噶爾丹敕以丹濟拉名次之再使諭降至是復遣格類固英從我使往敕曰爾噶爾丹及丹濟拉如果引罪來降朕無異視務令得所爾屬人等亦得各安生業朕斷不念舊惡試自計之有能收養爾等之人否今已無所歸矣其速率屬來降若仍誤聽匪言後悔難追毋疑毋懼三十六年春我使至噶爾丹所宣諭之丹濟拉私告格類固英曰我説噶爾丹降不從反疑我爾復説之降則我為使往格類固英知噶爾丹無降志從我使歸丹濟拉密陳欲降狀尋以責噶爾丹僕反顔徙牧齊察蘭什爾哈戈壁等處相避行噶爾丹復自薩克薩特呼里克竄哈薩克圖哈喇阿濟爾罕數召丹濟拉不往上聞之詔察哈岱招降丹濟拉敕曰朕為天下元后善善惡惡乃至理也前遣格類固英等歸敕內開載爾名復使格類固英傳諭爾降今格類固英等至爾之辭意皆已備陳爾今能致噶爾丹降必當封爾為多羅貝勒畀以殊榮如不能致爾但束身來歸亦不失爾富貴况爾屬人乞降者朕皆宥罪顯榮優養爾應悉聞往咎槩不介意爾曾密奏若宥臣罪臣即歸誠故特專賜爾敕盡宥爾罪朕為大君豈改成命會噶爾丹召丹濟拉以私恩不忍絶復往會於阿察阿木塔台噶爾丹尋自殺丹濟拉以噶爾丹骸及女鍾齊海至巴雅恩都爾遣齊竒爾宰桑詣大將軍伯費揚古營告降以前不速降故懼討復馳竄布隆吉爾為待命計偵副都統阿南達設備奔巴里坤憊甚集從者議所向咸稱留處便先是噶爾丹兄子策妄阿喇布坦與噶爾丹修怨徙博囉塔拉達爾扎扎木揚等皆從之丹濟拉以附噶爾丹故與策妄阿喇布坦交惡至是謂從者曰爾等徒自謀耳若策妄阿喇布坦知而阻我則難為計矣因遊行博克達額琳哈畢爾噶境至濟木薩遇策妄阿喇布坦之郭蠻喇嘛將以兵拒紿之曰噶爾丹已殁吾欲往投策妄阿喇布坦其遣爾屬偕我使往郭蠻喇嘛撤兵丹濟拉遣從者土克齊哈什哈偕郭蠻喇嘛使達爾漢宰桑往告策妄阿喇布坦而自偕郭蠻喇嘛駐待德伯色克上以丹濟拉既乞降復竄徙詔策妄阿喇布坦擒獻策妄阿喇布坦憾丹濟拉且慮討不聽命罪遣族台吉大策凌敦多卜等兵擊之齊竒爾宰桑既乞降費揚古遣入覲復令準噶爾降人丹巴哈什哈往諭丹濟拉曰爾來歸甚善所需糧騎若何當遣往何不輕身先至令屬衆自後徐行丹巴哈什哈至巴雅恩都爾則丹濟拉竄已久察哈岱竒齊爾宰桑後先抵軍費揚古令齎前敕往諭不之遇復給糧騎遣往令必與丹濟拉相見始歸抵郭蠻喇嘛所授之敕丹濟拉乃決降志挈裝徙就道大策凌敦多卜以兵至掠噶爾丹骸及鍾齊海去丹濟拉馳赴哈密子多爾濟色布騰為大策凌敦多卜兵所掩與相失越九日乃至達爾漢伯克額貝都拉迎諸境遣子郭帕伯克護至內汛時上幸塞外遣官往迎駐蹕可汗特穆爾嶺丹濟拉至召入行幄屏左右垂詢移時始命出詔以丹濟拉為內大臣多爾濟色布騰為一等侍衛其從衆置張家口外視可用者給軍糧丹濟拉出語曰我乃叛逆罪人窮始來歸皇上略不致疑屏侍臣召入見且蒙恩授顯爵聖主至勇至仁如此令我誠心感戴永不敢異志矣三十七年詔隸察哈爾正黃旗曰三品官楚魯克曰六品官都喇圖什賁唐古特及壯丁百有十僕役四十皆丹濟拉屬之來歸者也以多爾濟色布騰為佐領領之四十四年詔封丹濟拉為扎薩克輔國公四十五年諭赴牧推河偕郡王車稜旺布偵防準噶爾賊蓋自是不復隸察哈爾旗四十七年卒子多爾濟色布騰襲一次襲多爾濟色布騰丹濟拉長子康熙四十七年襲扎薩克輔國公五十三年來朝扈蹕避暑山莊賜鞍馬銀幣五十四年準噶爾掠哈密境詔兵備之會準噶爾敗於哈密遁走多爾濟色布騰駐防杭愛招降準噶爾屬貢楚克臧布等內附雍正元年詔晉封固山貝子賜三眼孔雀翎三年來朝八年晉多羅貝勒詔從靖邊大將軍傅爾丹駐防科布多丹濟拉之來歸也為大策凌敦多卜所掠擕衆至僅百餘後賜牧推河給來歸諸厄魯特衆九年大策凌敦多卜遣使擕書誘多爾濟色布騰往附諜者獲之以獻諭廷臣曰此準噶爾反間計也多爾濟色布騰受朕恩甚重伊亦感激效力豈肯墮其術中但伊遊牧人等原非伊之舊屬與伊不睦若仍在喀爾喀地遊牧難以居住爾等其以準噶爾書示多爾濟色布騰觀之令伊父子向內徙牧朕自加恩給與産業時多爾濟色布騰諜準噶爾兵襲推河謀內徙有台吉索諾木吹濟者誘其屬户四十餘叛赴準噶爾多爾濟色布騰至靖邊大將軍順承親王錫保軍訴稱屬衆難信請徙歸化城錫保以聞詔遊牧西喇穆稜未幾以疾請徙牧巴林及科爾沁界諭曰爾屬衆俱係厄魯特若與內扎薩克等遊牧錯處將來彼此不睦别生事端亦未可定已經居定之處不可頻頻移徙屬衆亦甚勞苦人之壽算俱有定數豈可因自疑故即欲徙牧乎爾今聆此諭旨省悟之後亦應自笑其愚也乾隆二年卒子三都布降襲固山貝子二次襲三都布多爾濟色布騰長子乾隆二年襲扎薩克固山貝子十九年命乾清門行走賜雙眼孔雀翎黃馬褂二十年大軍征達瓦齊獻馬百詔納之二十五年卒嗣子貢楚克邦襲三次襲貢楚克邦三都布嗣子乾隆二十六年襲扎薩克固山貝子先是三都布自西喇穆稜徙牧喀爾喀河貢楚克邦復徙牧推河是年始定牧鄂爾坤之烏蘭烏蘇隸喀爾喀賽因諾顔部以齊齊爾里克盟長轄之四十六年諭曰丹濟拉雖以窮蹙來降嗣因奮勉效力封扎薩克固山貝子其子孫相繼襲爵貢楚克邦雖為三都布嗣子朕既允其襲爵著加恩令世襲罔替欽定外藩蒙古回部王公表傳卷之七十八欽定四庫全書欽定外藩蒙古回部王公表傳卷之七十九傳第六十三阿拉善厄魯特部總傳阿拉善厄魯特部至京師五千里東界寧夏西界甘州南界涼州北界瀚海袤延七百餘里即賀蘭山地駐牧蒙古系出元太祖弟哈布圖哈薩爾與和碩特同族和碩特舊為四厄魯特之一故稱厄魯特部哈布圖哈薩爾十九揚至圖魯拜琥號顧實汗有子巴延阿布該阿玉什兄拜巴噶斯初育以為子後自生子二長鄂齊爾圗次阿巴賴遊牧河西套稱西套厄魯特巴延阿布該阿玉什號達賴烏巴什子十六居西套者曰和囉理曰墨爾根曰額爾克曰都喇勒曰哈什哈曰陀音曰土謝圖羅卜藏曰博第曰多爾濟扎布曰諾爾布扎木素曰愛博果特曰鄂木布和囉理號巴圖爾額爾克濟農以來歸授扎薩克賜牧阿拉善諸昆弟子姓𨽻之其居青海者曰扎布曰阿南達曰伊特格勒曰巴特巴扎布授扎薩克領其族見青海厄魯特部傳鄂齊爾圖號車臣汗子三長額爾德尼子噶爾亶多爾濟次噶爾第巴子羅卜藏衮布阿喇布坦次伊拉古克三班第達呼圖克圖後皆絶嗣阿巴賴裔為凖噶爾所掠故不著順治四年鄂齊爾圖遣使貢駝馬六年阿巴賴繼至七年鄂齊爾圖使至以喀爾喀煽蘇尼特部長騰機思叛奏稱力能鋤逆當相機為之否則亦必修貢如初不敢稍萌異志諭絶喀爾喀勿私通好嗣是額爾德尼噶爾第巴伊拉古克三班第達呼圖克圖及所部台吉宰桑等朝貢至者相接凖噶爾台吉噶爾丹遊牧阿爾台號博碩克圖汗覬為厄魯特長鄂齊爾圖妻以孫女阿努尋與隙康熙十六年噶爾丹以兵襲西套戕鄂齊爾圖破其部鄂齊爾圖妻曰多爾濟喇布坦與喀爾喀墨爾根汗額列克妻皆土爾扈特汗阿玉竒女兄也額列克孫察琿多爾濟號土謝圗汗偵噶爾丹侵鄂齊爾圖兵援之不及多爾濟喇布坦奔土爾扈特噶爾丹遣使獻俘諭曰鄂齊爾圖汗與噶爾丹向俱納貢今噶爾丹侵殺鄂齊爾圗獻所獲弓矢等物朕不忍納也其却之西套厄魯特既潰或奔依達賴喇嘛或被噶爾丹掠去和囉理率族屬避居大草灘廬幕萬餘守汛者遣之去仍逐水草徙戀處邉外有楚琥爾烏巴什者噶爾丹叔父也子五長巴哈班第次阿南達次羅卜藏呼圖克圖次犖章次羅卜藏額琳沁噶爾丹以私憾襲殺巴哈班第執楚琥爾烏巴什及羅卜藏額琳沁等禁之巴哈班第子罕都為和囉理甥時年十有三其屬額爾德尼和碩齊擕之逃以兵四百掠烏喇特户畜竄就和囉理居額濟內河喀爾喀台吉畢瑪里吉哩諦偵以告會青海墨爾根台吉等察獻額爾德尼和碩齊所掠遣使詰知為凖噶爾屬諭噶爾丹捕額爾德尼和碩齊治罪并收和囉理歸牧或非所屬當以告二十二年噶爾丹奏和囉理等歸達賴喇嘛已遣使召請以丑年四月為限是年蓋嵗在亥二十三年罕都偕額爾德尼和碩齊遣使貢請宥掠烏喇特罪而和囉理戚屬嘗掠茂明安諸部牧産前以服罪故宥之至是諭曰和囉理既免罪額爾德尼和碩齊等著一體宥赦所貢準上納先是羅卜藏衮布阿喇布坦避噶爾丹走唐古特以達賴喇嘛言表請賜居龍頭山轄西套遺衆命兵部督捕理事官拉都琥往勘奏言龍頭山蒙古謂之阿拉克鄂拉乃甘州城北東大山脈綿延邉境山口即邊關建夏口城距滍川堡五里山盡為寧逺堡距龍頭山里許有昌寧湖界之內地兵民耕牧久似不宜令新附蒙古居上可其奏羅卜藏衮布阿喇布坦尋徙牧布隆吉爾土謝圖汗察琿多爾濟以女妻之事聞諭廷臣曰前鄂齊爾圖汗為噶爾丹所戕其孫羅卜藏衮布阿喇布坦往求達賴喇嘛指授所居之地達賴喇嘛令駐牧阿拉克鄂拉因以為請鄂齊爾圖汗從子和囉理前沿邉駐牧曾檄噶爾丹收取之今羅卜藏衮布阿喇布坦與喀爾喀互相犄角噶爾丹欲以兵向和囉理等則恐喀爾喀躡之欲以兵向喀爾喀則恐和囉理等襲之此必非噶爾丹所能收取也二十四年和囉理請賜敇印鈐部衆廷臣以遊牧未定議不允諭曰和囉理等以避亂故離其舊牧來至邉境劫掠茂明安烏喇特諸部本應即行殄滅朕俯念鄂齊爾圖汗世奉職貢恪恭奔走兼之彼亦迫於飢困是以宥其罪戾又羅卜藏衮布阿喇布坦係鄂齊爾圖汗孫為和囉理從子應令聚合一處其遣官往諭朕旨度可居地歸併安置封授名號給賜金印璽書以示朕興滅繼絶至意理藩院尚書阿喇尼遵旨往諭和囉理奏皇上令臣等聚處乃殊恩達賴喇嘛亦謂羅卜藏衮布阿喇布坦居布隆吉爾地隘草惡不若與臣同處臣等欲環居阿拉克山隂遏冦盜靖邉疆令部衆從此地而北當喀爾喀台吉畢瑪里吉哩諦牧地由噶爾拜瀚海額濟內河姑喇奈河雅布賴山巴顔努魯喀爾占布爾特洪果爾鄂隆以內東倚喀爾喀丹津喇嘛牧西極髙河居之奏至遣使諭達賴喇嘛曰噶爾丹滅鄂齊爾圖汗時和囉理及羅卜藏衮布阿喇布坦等紛紜離散來至邉境又以生計窘迫妄行劫掠朕宥其罪不即發兵𠞰滅和囉理等亦戴朕恩屢請敕印依朕為命朕前諭噶爾丹收取彼約以丑年四月為期今逾期已數月矣伊等骨肉分離散處失所朕心殊為惻然鄂齊爾圖汗于爾喇嘛為護法久矣何忍漠視其子孫宗族至於窮困今朕欲將伊等歸併安置爾喇嘛其遣使與朕使偕往定議二十五年達賴喇嘛奏已遣使遣拉都琥往會勘諭曰爾等召集和囉理羅卜藏衮布阿喇布坦等相視可以遊牧地指給定所其額爾德尼和碩齊等如欲與和囉理同牧亦許之前和囉理已自誓不復令屬衆為非其羅卜藏衮布阿喇布坦亦須嚴禁所屬和睦安居爾等可與和囉理等定沿邉為盜作亂之罰朕所以不憚諄切訓諭者亦以其先世恭順有年不欲令子孫失所也倘伊等復流亡他徙殊負朕歸併眷恤之意矣拉都琥偕達賴喇嘛使約和囉理至東大山北語之曰爾所請噶爾拜瀚海地聽爾遊牧外自寧夏所屬玉泉營西羅薩喀喇山嘴後至賀蘭山隂一帶布爾哈蘇台口又自寧夏所屬倭波嶺塞口北努渾努魯山後甘州所屬鎮畨塞口北沿陶蘭泰薩喇椿濟雷琿希理等地西向至額濟內河俱以距邉六十里為界畫地識之定議蒙古殺邉民論死盜牲畜奪食物者鞭之私入邉遊牧者台吉宰桑各罰牲畜有差所屬犯科一次罰濟農牲畜以五九時罕都及額爾德尼和碩齊請與和囉理同牧羅卜藏衮布阿喇布坦偵其女兄阿努擕兵千赴藏道嘉峪關外懼襲已備之以故未即徙拉都琥奏至詔以所定地域及罰例檄甘肅守臣知之蓋自是和囉理屬始定牧阿拉善二十七年噶爾丹侵喀爾喀和囉理欲往援察琿多爾濟乞師於朝時諭噶爾丹罷兵使已就道詔不允和囉理請而羅卜藏衮布阿喇布坦自率兵援喀爾喀遇我使於道宣諭之亦撤歸布隆吉爾察琿多爾濟尋為噶爾丹所敗上復遣使諭噶爾丹將行命之曰噶爾丹若問和囉理事爾等宜述丑年之約并言達賴喇嘛向雖遣使定議令和囉理與羅卜藏衮布阿喇布坦歸併安置迄今尚未同居和囉理雖駐牧邉地亦未編設旗隊前喀爾喀與厄魯特交惡和囉理曾請兵討爾朕仍諭遣之曰朕欲使爾等安處遊牧而已豈肯給爾兵耶其以是告之令罷兵噶爾丹不從二十八年以羅卜藏衮布阿喇布坦卒賜賻祭其妻及宰桑等請召噶爾亶多爾濟轄部衆允之時噶爾亶多爾濟遊牧凖噶爾界諭曰羅卜藏衮布阿喇布坦率屬內附所遺部衆恐致流亡噶爾亶多爾濟尚幼召之恐未即至著和囉理前往布隆吉爾暫為約束人民俟噶爾亶多爾濟至仍歸本地務期共相扶掖勿侵據所部衆噶爾亶多爾濟以所部飢告不即徙詔授諾顔號遣侍讀學士達琥諭恤所部貧民其母珠木蘇擕噶爾亶多爾濟至詔轄羅卜藏衮布阿喇布坦衆附阿拉善牧有拜達者罕都屬也偕額爾德尼和碩齊誘其主棄和囉理私以厄魯特兵千掠邉畨守汛者責之為所戕且抗官軍甘肅提督孫思克以兵屯邉將𠞰之罕都懼乃降詔宥罪仍駐牧阿拉善其叔父羅卜藏額琳沁尋自凖噶爾至奏為噶爾丹所禁十餘年以凖噶爾與喀爾喀戰乘間脫挈孥屬千餘至乞與兄子罕都同居允之三十年和囉理以不遵旨徙牧歸化城懼大軍討叛遁噶爾亶多爾濟羅卜藏額琳沁罕都等從之分道竄將軍尼雅漢等招降噶爾亶多爾濟屬納木喀班爾等五十餘户和囉理女弟之夫克竒及從者二十一人以聞詔安置歸化城時和囉理弟博第遊牧中衛邉外距阿拉善三百餘里聞其兄叛遁欲往會偵副將陳祚昌等屯昌寧湖遣子索諾木至軍詭稱假道詣南山否則請牧馬昌寧湖祚昌知為緩軍計令挈屬至歸化城不從擊之斬五百餘級博第僅以身免走伊巴賴遇和囉理屬台吉齊竒克假糧馬竄額濟內河三十一年和囉理悔罪降命仍牧阿拉善羅卜藏額琳沁罕都齊竒克等從和囉理降尋復叛走提督孫思克以兵追至庫勒圖斬四十餘級齊竒克就擒詔宥死附和囉理牧羅卜藏額琳沁罕都逸遇自青海來歸之喀爾喀台吉阿海岱青班第掠其資復竄哈密羅卜藏衮布阿喇布坦有女弟曰阿海始與䇿妄阿喇布坦議婚噶爾丹奪之策妄阿喇布坦怒棄噶爾丹徙額琳哈畢爾噶上聞之遣員外郎馬迪齎敕諭絶噶爾丹道哈密羅卜藏額琳沁罕都等偕噶爾丹屬圖克齊霍什哈哈爾海達顔額爾克以兵劫之由大草灘毁邉垣遁為青海台吉額爾德尼納木扎勒所擊走死三十三年和囉理弟博第率屬百餘降乞仍與兄同牧許之命輯所屬潰散者未幾齊竒克復叛遁和囉理遣所部莽奈霍什哈等以兵追諸耨爾格山諭之降不從擊斬之三十五年所部兵隨西路大軍敗噶爾丹於昭莫多副都統阿南達奉命設哨以和囉理屬布爾噶齊達爾漢宰桑瑪賴額爾克霍什哈齊勞墨爾根薩里呼納沁齊倫琿塔漢占霍什哈布達哩杜喇勒和碩齊等分屯額布格特阿木格特昆都倫額濟內及布隆吉爾之博羅椿濟敖齊喀喇莽奈諸地時噶爾亶多爾濟竄徙嘉峪關外有哨卒拜格者其屬也阿南達召至遣歸説噶爾亶多爾濟曰上待汝恩甚厚將撫育之顧叛逃可乎和囉理棄牧時汝不能戢屬故從往上灼知汝情念汝祖鄂齊爾圖汗將玉成汝汝其思之噶爾亶多爾濟遣告曰上念臣祖臣兄令臣與和囉理接壤居臣無知從和囉理叛遁今悔罪欲死臣幼臣母一婦人未能達乞以情代奏阿南達欲堅內附志遣使歸約如期會肅州諭設哨援哈密復檄哈密伯克額貝都拉曰噶爾丹至汝地汝即召噶爾亶多爾濟往援勿復疑噶爾亶多爾濟遣宰桑阿約等齎降表至肅州會上視師寧夏阿南達馳疏至詔優恤所部衆三十六年噶爾亶多爾濟詣阿南達告曰噶爾丹不共戴天讐也願效力從戎答殊恩且復私讐軍事蕆乃入覲阿南達以聞允之噶爾丹遣使説噶爾亶多爾濟曰爾姊阿努存日言必以我女鍾齊海妻爾今阿努殁爾娶我女與否其自為計策妄阿喇布坦貽之書曰我等向為姻戚噶爾丹行不義致棄前好今遣使招爾特為誑爾計爾勿妄從未幾唐古特部第巴煽青海諸台吉盟察罕托羅海繕軍械助噶爾丹檄噶爾亶多爾濟以兵往辭不赴遣使俄濟通問策妄阿喇布坦自携兵百會阿南達於布隆吉爾阿南達偵噶爾丹死其從子丹濟拉竄瀚海遣噶爾亶多爾濟屬輝特台吉羅卜藏等馳赴噶斯而自偕噶爾亶多爾濟以兵繼之至色爾滕值俄濟歸以丹濟拉將自郭蠻喇嘛所往附策妄阿喇布坦告因撤噶斯兵遣噶爾亶多爾濟仍赴布隆吉爾設哨其屬阿勒達爾霍什哈恭格等煽之叛至西欣驛劫駝馬奉母珠木蘇由喀喇烏蘇遁阿南達遣兵四百追之不及招降其屬茂海烏訥恩巴圖爾阿喇木扎木巴阿喇木班及輝特台吉羅卜藏等遣歸阿拉善羅卜藏後徙牧喀爾喀即附扎薩克圖汗部之厄魯特扎薩克也是年和囉理以所部數叛請視四十九旗例編佐領廷臣議徙烏喇特界諭曰若將和囉理移牧近地則沿邉别部蒙古甚多豈可盡徙且治蒙古貴得其道不係地之逺近著停徙仍遊牧阿拉善地給扎薩克印復以噶爾亶多爾濟竄赴凖噶爾敕䇿妄阿喇布坦曰噶爾亶多爾濟率衆來降安置耕種今忽留其屬人棄禾私遁其中必有不得已之情務即察明具奏朕於噶爾亶多爾濟略無責備之意且降旨收集其遺衆倘往汝地汝可善為撫恤如欲內徙即行遣歸時噶爾亶多爾濟陽附䇿妄阿喇布坦隂二之䇿妄阿喇布坦將侵哈薩克噶爾亶多爾濟詭以兵從中道遁庫車為回衆所殺母珠木蘇擕屬九百餘奔青海部青海諸台吉以獻詔安置什巴爾台𨽻察哈爾雍正二年大軍定青海王大臣等議阿拉善為寧夏邉外要地青海顧實汗諸子裔舊皆遊牧山後今或徙山前請敕阿拉善扎薩克郡王阿寶飭青海衆歸牧山後允之阿寶奏臣祖顧實汗歸誠內附百年於兹受天朝恩甚厚前青海昆弟阻兵搆亂上干天討臣當束身受誅重荷恩宥令安遊牧感激莫報乞賜青海曠地令臣鈐諸部不復萌異志詔以青海貝子丹忠所遺博囉充克克牧地給之并諭撫逺大將軍年羮堯遣員齎餉助徙牧博囉充克克者即漢書地理志所稱潢水也七年阿寶以博囉充克克牧地隘擅請徙烏蘭穆倫及額濟內河界議罪削爵尋命復之詔仍歸阿拉善牧不復居青海乾隆二十一年二等台吉達瓦車稜從大軍𠞰厄魯特竄黨遇伏於博囉齊奮擊之陳殁詔議恤入祀昭忠祠先是阿寶屬達瑪琳從靖邉大將軍傅爾丹擊凖噶爾於和通呼爾哈諾爾為所掠至是携孥及屬布庫勒等四十戶詣都統雅爾哈善軍請歸阿拉善舊牧詔如所請從衆仍置伊犂二十四年以台吉達瓦佐領布岱等𠞰嗎哈沁及逆回布拉呢敦霍集占功詔優賚之所部旗一爵三曰扎薩克和碩親王由貝勒晉襲附鎮國公二一由貝子降襲一由輔國公晉襲欽定外藩蒙古回部王公表傳卷之七十九欽定四庫全書欽定外藩蒙古回部王公表傳卷之八十傳第六十四扎薩克多羅貝勒和囉理列傳今襲和碩親王和囉理厄魯特人和碩特族姓博爾濟吉特號巴圖爾額爾克濟農初駐牧西套𨽻鄂齊爾圗汗嗣鄂齊爾圖汗被難和囉理徙牧大草灘遣使至靖逆將軍張勇所稱避難赴青海以邉外道逺乏水草請由內地行張勇遵旨諭由水泉過邉和囉理戀牧大草灘草盡北徙不果赴青海偵噶爾丹屯布隆吉爾慮襲已由雙井避入內地甘肅提督孫思克請率兵禦時張勇屯甘州諭令親視出邉和囉理謝去徙牧額濟內河界遣宰桑博克等奉表至思克營服罪康熙十八年詔兵部督捕理事官拉都琥赴和囉理所詰掠烏喇特諸部罪先是厄魯特衆避噶爾丹侵分牧邉外額爾德尼和碩齊私掠烏喇特和囉理弟土謝圖羅卜藏等復掠寧夏及茂明安鄂爾多斯諸部和囉理未之知也拉都琥往勘遣召額爾德尼和碩齊至詰責之察歸所掠之未售者十八人復獻馬百餘為弟請罪諭曰和囉理既未行劫可勿罪二十年遣使入貢詔納之二十一年補解馬至其母格楚爾哈屯弟土謝圖羅卜藏博第等各遣使從奏荷帡幪居邉境屬衆妄行盜竊深悔罪又遊牧邇寧夏乞允赴市理藩院議償缺解馬仍照例治罪諭曰和囉理等以敗竄來至邉境所部罔知法紀迫于飢困盜竊牲畜等物今既陳其苦情諄諄奏請著寬免前罪嗣後鈐束屬衆勿得妄行滋事其寧夏地向無厄魯特喀爾喀市易例所請不允二十二年和囉理徙牧河岸逼鄂爾多斯貝勒松喇布以聞諭退歸二十四年冬和囉理率屬七百餘來朝詔以二百人入關為額餘留歸化城給羊及宣府貯米贍之二十五年正月至京賞宴視大台吉例召覲以御服貂裘賜之諭曰爾祖顧實汗于太宗文皇帝時偕達賴喇嘛輸誠通欵爾叔父鄂齊爾圖汗當世祖章皇帝時每年遣使請安所貢土産白鷹朕猶及見之夫貢物何足珍賞特鑒其誠敬耳爾厄魯特內亂噶爾丹攻滅鄂齊爾圖汗遣使獻俘朕念鄂齊爾圖汗前此勉修誠悃倐爾敗亡不勝軫恤何忍受之因諭却所獻頃爾為噶爾丹擊敗奔至邉境劫掠沿邉居民牧産朕何難遣兵𠞰除明正爾罪念爾昔時頗竭誠悃復引罪自首以迫于飢困屬衆妄行等情陳奏朕即宥爾罪今若徙爾于邉境內外不拘安置何地爾焉敢不凛遵特念爾祖顧實汗爾叔父鄂齊爾圖汗素致恭謹故俾爾絶者復繼散者復聚欲使鄂齊爾圖汗孫羅卜藏衮布阿喇布坦與爾聚處尚其共相輯睦善自安業爾等聚處與否在朕本無損益惟是朕為天下主凡在函蓋咸欲使之共樂升平朕兹諭旨自爾身及爾子孫當世世念之勿替尋遣歸賜牧阿拉善地三十年以噶爾丹侵喀爾喀逼阿拉善境諭內徙會其部衆掠喀爾喀丹津額爾德尼牧畜有拒者輒格殺之事聞上以和囉理仍留阿拉善牧將不靖詔遣官徙至歸化城將置察哈爾復諭寧夏兵防護之將軍尼雅漢等聞命旬餘始赴和囉理以駐牧阿拉善久不願內徙聞大兵將至懼討率衆竄詭稱駐西喇布里圖待命尼雅漢遣諭曰大兵來非討汝以徙汝歸化城虞中道為喀爾喀擾故耳汝若此豈不悖哉和囉理不從尼雅漢追至庫克布里圖不及以所部牧畜歸詔給丹津額爾德尼復諭曰朕思黃河冰凍時恐和囉理等以流兵掠我西界喀爾喀其令鄂爾多斯烏喇特喀爾喀各整兵備之和囉理既叛遁尋悔罪挈屬二千餘棲牧額濟內河之明安雅瑪圖上聞之諭曰前和囉理來歸朕給地安置不思圖報反劫內附喀爾喀因令徙居察哈爾復違命逺竄朕以向加養育並無執殺之意彼欲遊牧何地惟其所擇但不得擾害邉塞耳明年將軍瑪拉等遣侍衛阿南達往招之和囉理乞降且請遣子來朝諭曰和囉理雖悔罪或因時序不宜馬匹羸瘠不得已乞降遣子至往返之際馬匹休息又復為逋逃計其共商徙入內地策瑪拉奏和囉理感仁恩不忍悖棄前遣使陳情以道阻未達故招檄甫至不自疑臣親率和囉理及色目五十餘人至寧夏其屬衆餒甚請給糗糧令鄂爾多斯蒙古送至歸化城允之上知其內附誠諭入覲和囉理偕次子玉木楚木馳至泣服罪詔撤鄂爾多斯諸部備兵唐古特部第巴偽為達賴喇嘛奏請以和囉理徙牧青海敕責之三十三年和囉理上書自理稱前鄂齊爾圖汗嵗納貢噶爾丹興兵襲臣不獲已挈衆內徙自賜牧阿拉善後富且安臣前入覲蒙恩以鄂齊爾圖汗進貢往來時諸密旨遣官傳諭臣至今銘不忘後使臣徙內地臣畏大兵威且屬衆潰故未即至然臣雖奔遁不敢負聖恩留處邉外望綸音如重生臣以族屬困餒不獲內徙請賜牧舊地蒙恩允許又察臣戚屬令完聚臣願集遊牧衆捐軀效力向以無知失信每念及懊欲死乞賜鑒恤上慰諭之三十五年大軍既敗噶爾丹所部卒分屯設哨和囉理復督兵千餘赴阿爾台之土魯圖防緝之三十六年遣達爾漢噶布楚車臣宰桑等赴青海收諸戚屬抵鎮海堡私向我守臣乞糧騎不之給訴所屬乏牲畜恐困斃不獲至遊牧詔如所請給是年詔封和囉理為多羅貝勒授扎薩克印轄其衆四十二年上幸西安和囉理迎覲臨潼縣扈蹕閲駐防兵賜宴優賚銀幣四十六年卒子六長巴圖先卒子恭格阿喇布坦由協理台吉晉輔國公後停襲故不立傳次玉木楚木封輔國公别有傳次阿寶襲扎薩克次齊木特次布木為間散台吉次丹津索諾木為協理台吉一次襲阿寶和囉理第三子康熙四十三年尚郡主授和碩額駙賜第京師命御前行走四十八年襲扎薩克多羅貝勒遣歸遊牧五十四年凖噶爾掠哈密詔以阿寶為右衛將軍費揚固參贊率所部兵五百赴推河會凖噶爾敗于哈密遁走詔仍以參贊往會西安將軍席柱等駐巴里坤襲擊凖噶爾于伊勒布爾和碩阿克塔斯烏魯木齊諸地皆克捷五十九年自巴里坤赴青海參贊平逆將軍延信軍敗凖噶爾賊于卜克河齊諾郭勒綽瑪喇等處護達賴喇嘛入藏六十年詔統兵五百駐藏地為署理定西將軍公䇿旺諾爾布參贊雍正元年議撤駐藏軍會青海羅卜藏丹津叛詔諸路蒙古兵聽撫逺大將軍年羮堯檄調時阿寶自藏歸年羮堯忌其功復以身為大將軍蔑視之奏阿寶所率兵不堪用且身有疾應遣歸遊牧未幾阿寶來朝上憫其勞慰諭之詔封多羅郡王賜銀萬兩二年以青海亂定詔徙牧往轄其衆七年議擅請牧地罪削郡王爵仍留多羅貝勒八年詔率所部兵會西路大軍于巴里坤進擊凖噶爾甫就道噶爾丹䇿凌遣使乞和諭聽調勿遽進未幾凖噶爾襲我西路軍詔以內扎薩克赴調噶斯兵千聽阿寶轄力能𠞰凖噶爾即率往否則入邉偕緑旗兵防內汛既而其子衮布擊凖噶爾敗遁阿寶乃自軍所歸阿拉善牧九年諭嘉之詔復郡王爵乾隆四年卒子三長衮布封固山貝子先卒次羅卜藏多爾濟襲扎薩克次拉爾濟旺舒克襲固山貝子别有傳二次襲羅卜藏多爾濟阿寶次子乾隆四年襲扎薩克多羅貝勒十五年尚郡主授多羅額駙二十年以所部兵五百從西路軍征達瓦齊於伊犂達瓦齊就擒定北將軍班第遣歸牧阿睦爾撒納叛逆黨克什木等擾伊犁羅卜藏多爾濟請仍以兵五百赴西路軍諭駐牧聽調二十一年詔羅卜藏多爾濟以兵千赴北路從