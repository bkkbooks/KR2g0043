是科爾沁內附莽古斯以女歸太宗文皇帝是為孝端文皇后孫烏克善等復以女弟來歸是為孝莊文皇后曽孫綽爾濟復以女歸世祖章皇帝是為孝惠章皇后科爾沁以列朝外戚荷國恩獨厚列內扎薩克二十四部首有大征伐必以兵從如親征噶爾丹及勦䇿妄阿喇布坦羅卜藏丹津噶爾丹䇿凌逹瓦齊諸役扎薩克等效力戎行莫不懋著勤勞土謝圖親王逹爾漢親王卓哩克圖親王扎薩克圖郡王四爵俸幣視他部獨增非惟禮崇姻戚抑以其功冠焉所部六旗分左右翼土謝圖親王掌右翼附扎賚特部一旗杜爾伯特部一旗逹爾漢親王掌左翼附郭爾羅斯部二旗統盟於哲哩木右翼旗駐巴顔和朔左翼旗駐伊克唐噶哩克坡右翼前旗駐席喇布爾哈蘇右翼後旗駐額木圖坡左翼前旗駐伊嶽克里泊左翼後旗駐雙和爾山爵十有七扎薩克和碩土謝圖親王一附多羅貝勒一扎薩克和碩達爾漢親王一附卓哩克圖親王一多羅郡王二一由親王降襲多羅貝勒一固山貝子一輔國公四一由貝子降襲扎薩克多羅扎薩克圖郡王一扎薩克多羅氷圖郡王一扎薩克多羅郡王一由貝勒晉襲附輔國公一由貝子降襲扎薩克鎮國公一土謝圖汗奧巴列傳今襲扎薩克和碩土謝圖親王奧巴科爾沁部人姓博爾濟吉特元太祖弟哈布圖哈薩爾十八世孫父翁果岱號巴圖魯琿台吉子二長即奧巴次布逹齊封扎薩克圖郡王别有傳初奧巴隨父助葉赫烏拉二部來侵敗歸上宥罪諭令內附天命九年遣使表稱嫩江水濵科爾沁台吉等聞諭皆欽服何以修好共定大業惟帝命無敢敗約但察哈爾及喀爾喀知我歸附必見掠乞賜援允之遣侍臣希福往蒞盟十年察哈爾林丹汗糾喀爾喀掠科爾沁奧巴告急上親往援次開原命台吉阿巴泰濟爾哈朗等先馳至農安塔時林丹汗圍城數日奧巴城守堅攻之不克聞我師至夜遁圍遂解十一年五月奧巴來朝獻駝馬貂皮陳前被掠狀上慰諭之賜宴及冠帶鞍馬妻以貝勒舒爾哈齊女孫授和碩額駙六月辭歸誓曰天生奧巴俾得事我皇帝當察哈爾喀爾喀來掠蒙大軍助幸獲免世不敢忘德若渝盟永罹災害上嘉其誠特封土謝圖汗賚甲胄雕鞍蟒幣諭曰為惡而蒙天譴國乃敗亡為善而蒙天祐國乃昌熾總之主宰在天也當察哈爾兵至時科爾沁族衆多遁獨奧巴奮力拒戰故朕仰承天意賜令名以優異之天聰二年九月上親征察哈爾檄所部諸台吉會綽洛郭勒奧巴偕弟布逹齊私以兵掠察哈爾邊遽還不遵旨會大軍十二月遣侍臣索尼等齎書詰責奧巴病捧書大驚力疾起謂索尼曰我見上應袒謝惟懼威嚴之下不見而逐我將安歸索尼曰汝引咎入朝即弗獲免罪以姻戚且逺來故弗汝逐也三年正月奧巴至獻駝十馬百謝罪禮遇如初十月上征明次遼河奧巴偕其族圖美洪果爾烏克善等二十三台吉以兵會命分隸左右翼十一月奧巴隨貝勒濟爾哈朗等入明邊克遵化州進圍北京敗明寧逺巡撫袁崇煥錦州總兵祖大壽援兵五年奉詔會大軍於三窪將進征察哈爾奧巴奏蒙古馬不堪用所發兵又少不如暫止俟馬肥乃大舉臣等蒙恩養久願前驅非敢憚勞上韙其議班師還六年四月詔所部兵至昭烏逹會征察哈爾奧巴如期至諭曰朕以察哈爾林丹汗不道整旅徂征先期諭蒙古諸台吉等以兵來會今多寡不齊遲速亦異惟土謝圖額駙率兵甚多又盡出所蓄馬給部衆疾馳來會具見立心誠慤憂樂相同朕甚嘉之五月隨貝勒阿濟格略明大同宣府邊詔以所得財幣五之一賜奧巴九月卒上素服垂涕曰傷哉往者臨陳土謝圖額駙每獨當一面長於謀議政事多所裨益倚毗方殷遽聞溘逝深為悼惜復諭侍臣曰凡人無益於國家而徒取憎於人者雖屬姻戚朕未嘗痛惜若喀喇沁塔布囊蘇布地與土謝圖額駙皆最優之才如此良臣何可再得曩時朕賜以元狐冠狐裘及金鞓帶聞彼於彌留之際執鞓帶泣曰昔從征察哈爾時我於上前欲衝陳先入人皆歡羡今不幸至此如養育之恩未報何其勇敢忠赤如此誠足助朕臂指也遣宗室篇古額駙揚古利等致祭尋授其子巴逹禮為濟農襲土謝圖號一次襲巴逹禮奧巴長子天聰七年八月襲土謝圖濟農十二月偕布逹齊來朝上憶奧巴惻然久之八年正月優賚遣歸有台吉噶爾珠塞特爾者巴逹禮族弟也糾黨海賴布顔代伯谷壘塞布壘等叛逃索倫巴逹禮偕布逹齊及洪果爾烏克善追之時近侍阿什伊拜奉命徴兵至其部以聞諭巴逹禮等曰法律所載叛者必誅爾等若擒獲諸亡者欲誅則誅之若不誅而欲以之為奴者聽六月噶爾珠塞特爾等就擒誅之詔分轄所遺人户諭曰往者噶爾珠塞特爾等凡遇興師多不隨行又違令肆掠朕不念其罪猶欲保全而屢宥之乃久受豢飬之恩安享逸樂不知報德聞伊嘗欲奔察哈爾今果叛逃索倫為其族兄巴逹禮等擒誅朕甚憫之朕視諸台吉猶臂指然今殺彼猶傷吾指也七月偕台吉滿珠習禮等以兵五千會大軍征明入上方堡至大同敗城外營獲馬百復克堡一臺一崇德元年敘功封扎薩克和碩土謝圖親王詔世襲罔替是年冬命偕卓哩克圖親王烏克善追緝喀木尼堪部逃人葉類初葉類與其黨舍爾特庫等盜氷圖郡王洪果爾馬且殺人寧古塔副都統烏巴海及參領錫特庫追之不獲巴逹禮遣屬鄂爾多木等隨烏巴海軍往偵會大雪遇宿雁三射其一雁負矢墜賊營賊遁追及之於溫多河擒斬之賜鄂爾多木逹爾漢號七年命議巴逹禮從征退縮罪先是上征明松山大破總督洪承疇軍諭巴逹禮隨睿郡王多爾衮等由塔山協擊朝暮至旦乃詣營至是議削親王奪官屬諭曰昔朕念土謝圖額駙奧巴來歸功故封其子為土謝圖親王原非巴逹禮功所得未可議削并免奪官屬仍罰馬百順治三年隨豫親王多鐸𠞰蘇尼特叛人騰機思康熙十年卒子四長巴雅斯呼朗襲親王次沙津封貝勒後襲親王次布延圖次鄂齊爾均授台吉二次襲巴雅斯呼朗巴逹禮長子順治三年尚固倫崇康公主授固倫額駙康熙十一年襲扎薩克和碩土謝圖親王尋卒子阿喇善襲三次襲阿喇善巴雅斯呼朗長子康熙十三年襲扎薩克和碩土謝圖親王二十七年以不稱職削爵命其叔父貝勒沙津襲四次襲沙津巴逹禮次子初授一等台吉康熙十四年封多羅貝勒互見彼傳二十七年襲扎薩克和碩土謝圖親王二十九年隨尚書阿喇尼迎擊噶爾丹偵賊營近請馳往諭俟諸路軍噶爾丹既為撫逺大將軍裕親王福全所敗自烏蘭布通遁沙津復請追裕親王欲致賊來降檄止之三十年喀爾喀土謝圖汗察琿多爾濟車臣汗烏默客等舉部降上幸多倫諾爾大閲受其朝沙津率蒙古四十九旗王貝勒等疏上尊號不許賚服幣有差先是烏蘭布通之役沙津既奉檄不獲追𠞰欲私以兵擊遣屬鄂齊爾誘止噶爾丹黑龍江將軍薩布素密奏沙津有異志會烏喇特佐領畢哩克圖至噶爾丹所遇科爾沁使於館延入廬飲之酒且出噶爾丹書授畢哩克圖令致土謝圖王至是畢哩克圖歸獻所致書上留中三十一年召沙津入覲諭曰昔爾遣鄂齊爾於噶爾丹衆皆疑爾附賊將軍薩布素亦以為言今又有人以賊遺爾書密首朕思爾科爾沁自太祖太宗時歸附職貢聨姻厯有年所爾必無此意朕略無所疑沙津奏世受隆恩無附賊理本欲誘致賊酋曽遣使上悅三十四年命侍郎錫喇密遣鄂齊爾齎沙津書説噶爾丹三十五年噶爾丹得書以為科爾沁十旗皆附已沿克嚕倫河而東詔三路出師上統大軍由中路進𠞰諭貝勒巴克什固爾設伏阿思哈岡沙津及逹爾漢親王班第等由巴爾岱哈山麓誘賊噶爾丹遁為西路大將軍費揚古所敗乃撤還四十一年以侍妾僣用儀仗罪削爵仍命阿喇善襲五次襲阿喇善康熙四十一年仍襲扎薩克和碩土謝圖親王五十年卒子鄂爾齋圖襲六次襲鄂爾齋圖阿喇善長子康熙五十一年襲扎薩克和碩土謝圖親王五十九年卒子阿喇布坦襲七次襲阿喇布坦鄂爾齋圖長子康熙五十九年襲扎薩克和碩土謝圖親王乾隆二十四年卒子垂扎布襲八次襲垂扎布阿喇布坦長子乾隆二十四年襲扎薩克和碩土謝圖親王命乾清門行走三十二年卒子二長納旺次喇什納木扎勒相繼襲九次襲納旺垂扎布長子乾隆三十二年襲扎薩克和碩土謝圖親王尋卒弟喇什納木扎勒襲十次襲喇什納木扎勒垂扎布次子乾隆三十三年襲扎薩克和碩土謝圖親王四十七年卒子諾爾布琳沁襲十一次襲諾爾布琳沁喇什納木扎勒長子乾隆四十七年襲扎薩克和碩土謝圖親王附多羅貝勒沙津列傳沙津土謝圖親王巴逹禮次子尚郡主授和碩額駙康熙十四年以察哈爾布爾尼叛詔偕卓哩克圖親王鄂齊爾隨撫逺大將軍信郡王鄂扎往討未至大軍敗布爾尼於逹祿沙津奉檄追至扎嚕特境壁於貴勒蘇台布爾尼及弟羅卜藏竄伏山後聞沙津至遣送羅卜藏妻乞勿追羅卜藏妻者沙津妹也沙津留其妹往圍之布爾尼遁沙津謂羅卜藏曰爾欲乞命當招爾兄來遣三十騎同往羅卜藏遁潛遣黨布逹禮馳告布爾尼沙津所遣騎有孟克者知其狀追之被刺死沙津怒自往射斃羅卜藏及布逹禮夜襲布爾尼旦及之賊十二騎以死拒射之盡殪亟布爾尼首以獻諭曰沙津感纍朝厚恩親統所屬追斬布爾尼兄弟克繼祖父忠貞深可嘉尚其特封多羅貝勒世襲罔替二十七年沙津兄子扎薩克和碩土謝圖親王阿喇善以不稱職削爵詔沙津晉襲親王理藩院請并兩爵為一不别襲貝勒從之其後事互見彼傳三十三年上念沙津貝勒原爵係功封不宜并入王爵仍命其子阿必逹襲自為一爵四十一年沙津以罪削親王命其子阿必逹襲貝勒如故一次襲阿必逹沙津長子康熙三十三年襲多羅貝勒六十一年卒子多爾濟襲二次襲多爾濟阿必逹長子雍正元年襲多羅貝勒乾隆十一年卒子特古斯額爾克圖襲三次襲特古斯額爾克圖多爾濟長子乾隆十一年襲多羅貝勒二十四年卒子衮布扎布襲四次襲衮布扎布特古斯額爾克圖長子乾隆二十四年襲多羅貝勒欽定外藩蒙古回部王公表傳卷之十七欽定四庫全書欽定外藩蒙古回部王公表傳卷之十八傳第二扎薩克和碩逹爾漢巴圖魯親王滿珠習禮列傳滿珠習禮科爾沁部人姓博爾濟吉特土謝圖汗奧巴從子曾祖納穆賽號都喇勒諾顔子三長莽古斯次明安次洪果爾莽古斯為孝端文皇后父追封和碩福親王妻封福妃子一曰宰桑為孝莊文皇后父追封和碩忠親王妻封賢妃子四長烏克善封卓哩克圖親王次察罕子綽爾濟封貝勒次索諾木子竒塔特封郡王次即滿珠習禮明安子棟果爾封貝勒洪果爾封氷圖郡王别授扎薩克皆有傳滿珠習禮尚郡主授和碩額駙嘗偕兄烏克善等駐守綽勒們城禦察哈爾獻所獲駝馬天聰二年上親征察哈爾徴所部兵惟滿珠習禮至力戰敗敵賜號逹爾漢巴圖魯優賚之六年從略明大同宣府邊七年來朝八年偕土謝圖濟農巴逹禮等會大軍征明入上方堡至大同執哨卒十獲馬四十克堡六崇德元年封扎薩克多羅巴圖魯郡王詔世襲罔替二年偕扎薩克圖郡王布逹齊等隨承政尼堪由朝鮮進征瓦爾喀至吉木海敗平壤巡撫安州總兵及安邊道援兵三年從入明邊由義州進圍中後所五年來朝賚甲胄弓矢六年偕烏克善扈駕征明圍杏山髙橋師還獲優賚八年遣屬蘇們得哩隨護軍統領阿爾津等𠞰黑龍江諸部順治三年五月以蘇尼特部騰機思叛奔喀爾喀詔隨豫親王多鐸往討七月由盈阿爾察克山繞出賊營賊懼遁偕副都統明安逹禮追擊之抵諤特克山獲其孥復由扎濟布拉克敗喀爾喀土謝圖汗車臣汗援兵九年詔敘前功