十二年隨定邊將軍親王成衮扎布𠞰巴里坤逃賊吞圖布等於固爾班伯爾克河賊三千餘騎設柵為負嵎計擊之賊遁以馬疲還諭責令追賊自效有恩克圖者喀喇沁宰桑也糾衆踞庫隴癸山二十三年色布騰巴爾珠爾隨定邊將軍兆惠由巴里坤進𠞰夜襲其營賊潰伏林際以死拒色布騰巴爾珠爾麾衆前被鎗傷腋侍衛五岱射恩克圖殪之詔封色布騰巴爾珠爾和碩親王諭曰爾自往軍營深悔前愆頗知奮勉夤夜鏖戰致受重傷是以復封親王此爵在科爾沁逹爾漢親王之外爾為朕子壻有過則督責之能改則體恤之似此效力奮勉庶幾不負教育之恩而於衆扎薩克內更增光寵矣尋命還京賜三眼孔雀翎命圖形紫光閣御製贊曰惟科爾沁世連姻戚魯館承訓王庭宣力參贊軍務賊營夜侵中創弗退嘉乃忠心三十七年將軍溫福統大軍𠞰金川命往參贊軍務抵阿喀木雅軍奏臣等度地勢南山設大炮擊賊碉北山已摧碉角賊恃山險碉堅匿其中度官兵近然後發鎗拒擊我軍奮勇易受傷今南山築碉自衛從碉孔內擊運送水糧賊我兵不致傷至北山據險要軍營濵河便取水兵萬二千足迅克賊巢復偕溫福等攻普爾瑪及喇卜楚克由北山進擊斬賊二千餘奪寨九會參贊大臣五岱欲劾侍衛烏什哈逹總兵馬彪違令罪溫福不從因互劾入奏詔色布騰巴爾珠爾鞫之讞詞至上以未疏是非狀令仍確訊色布騰巴爾珠爾奏溫福與五岱不協并及飾奏狀溫福劾色布騰巴爾珠爾輕信員外郎明德言誘賊降又偏聽五岱圖陷己詔削色布騰巴爾珠爾親王爵降授其子鄂爾哲特穆爾額爾克巴拜多羅貝勒并奪明德職遣戍五岱仍命侍郎鄂寶傳詢色布騰巴爾珠爾因奏言明德未預機宜五岱亦未遣迎無由偏聽至攻取普爾瑪及喇卜楚克時降畨悉送軍營會訊非臣一人主持上念其非有心僨事色布騰巴爾珠爾抵京命撤黃帶禁之三十八年六月定西將軍阿桂代溫福為將軍色布騰巴爾珠爾參贊軍務由路頂宗勦小金川復美諾賜御用元狐冠三十九年正月進勦大金川自布朗郭宗分兵三隊色布騰巴爾珠爾率二隊兵進發次谷噶山令侍衛烏什哈逹分兵千五百隨首隊兵繼進攻喇穆喇穆克色依古二月攻羅博瓦山六月克色淜普盡收其碉卡諭奬將軍參贊等調度有方賜御用燧囊七月進圍遜克爾宗十月賜元狐冠貂馬褂是月克凱立葉及日爾巴當噶十一月抵格魯克古督兵登山梁遣侍衛柏齡等分應丹壩官軍四十年色布騰巴爾珠爾疾篤上聞之命復親王爵尋卒於軍訃至諭曰色布騰巴爾珠爾以固倫額駙久侍禁庭稟性篤誠恪勤夙著前者西陲底定懋建功勳此後命往川省軍營為參贊大臣董率將辨奪隘攻碉屢彰勞績擬俟捷奏到日茂賞䇿勳昨聞其舊疾復發勢甚委頓實切厪懷因復親王原爵用昭恩眷並遣侍衛偕伊子鄂爾哲特穆爾額爾克巴拜同御醫馳往診視以冀速痊兹遽聞溘逝深為悼惜其加恩賞內庫銀三千兩治喪總管內務府大臣都統邁拉遜經理其事仍令伊子前往迎喪歸櫬所經飭沿途地方官護送賜祭葬諡曰毅子鄂爾哲特穆爾額爾克巴拜降襲多羅郡王四十一年金川平復命圖形紫光閣御製贊曰伊犁宣力屢立戰功金川參贊仍勵勇忠抱病軍營弗令奏聞惜竟不起未觀成勳一次襲鄂爾哲特穆爾額爾克巴拜色布騰巴爾珠爾長子尚郡君授固山額駙初襲多羅貝勒乾隆四十年襲多羅郡王四十七年授鑲黃旗蒙古都統四十九年詔世襲罔替欽定外藩蒙古回部王公表傳卷之十八欽定四庫全書欽定外藩蒙古回部王公表傳卷之十九傳第三附多羅郡王竒塔特列傳竒塔特逹爾漢親王滿珠習禮從子父索諾木嘗偕土謝圖汗奧巴等由遼河隨大軍征明入大安口至遵化克其城進圍北京卒於軍崇德四年竒塔特尚固倫端靖公主授固倫額駙八年來朝順治六年上追念索諾木從征功又以竒塔特為皇太后戚屬詔封多羅郡王世襲罔替十年卒子三長額爾德尼襲郡王次鄂齊爾子班第授固倫額駙次格哷勒圖授台吉一次襲額爾德尼竒塔特長子順治十年襲多羅郡王康熙十四年卒子畢哩克圖襲二次襲畢哩克圖額爾德尼長子康熙十五年襲多羅郡王四十九年卒子諾捫額爾赫圖襲三次襲諾捫額爾赫圖畢哩克圖長子康熙四十九年襲多羅郡王乾隆八年卒子阿旺藏布襲四次襲阿旺藏布諾捫額爾赫圖長子乾隆八年襲多羅郡王二十四年卒子喇什噶爾當襲五次襲喇什噶爾當阿旺藏布第四子乾隆二十四年襲多羅郡王附多羅貝勒綽爾濟列傳綽爾濟逹爾漢親王滿珠習禮從子孝惠章皇后父天聰五年綽爾濟從征明圍大凌河敗監軍道張春等援兵六年來朝八年正月尚郡主授多羅額駙四月賚鞍馬綵幣崇德三年從大軍由義州進圍中後所六年從攻錦州敗出城拒戰兵列圍城北復擊其騎兵敗之七年從下山東還偕輔國公圖訥赫擊明總兵白廣恩等於螺山敗其監軍太監兵渡河敵來襲復敗之于漁梁橋順治三年隨豫親王多鐸追剿蘇尼特叛人騰機思九年封鎮國公十八年晉多羅貝勒詔世襲罔替康熙七年卒子七長鄂齊爾襲貝勒次諾木齊次額爾德尼均授額駙次諾穆德勒格哷固嚕克齊授台吉次畢哩衮逹賚封輔國公子喇什封貝子自有傳次畢哩克圖次逹賚均授台吉一次襲鄂齊爾綽爾濟長子康熙九年襲多羅貝勒二十年卒子巴克什固爾襲二次襲巴克什固爾鄂齊爾長子康熙二十一年襲多羅貝勒三十五年扈駕征噶爾丹設伏阿思哈岡擒賊哨有功五十九年卒子阿喇布坦襲三次襲阿喇布坦巴克什固爾長子康熙五十九年襲多羅貝勒雍正十三年卒子薩木丕勒扎木素襲四次襲薩木丕勒扎木素阿喇布坦第四子雍正十三年襲多羅貝勒乾隆二十二年卒嗣子三音察