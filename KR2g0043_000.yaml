封授或因伊祖父功績賞給若照院議於出缺後降等承襲日久遞降非朕久逺撫恤回衆之至意今施恩將議定降等承襲之額爾德錫爾色提卜阿勒氐鄂斯璊伊巴喇伊木鄂囉木咱卜巴巴阿布勒丕爾敦阿卜都呢咱爾帕爾薩等十人現襲之王貝子公台吉等封爵出缺時不必降等承襲俱著世襲罔替以示朕優恤回僕之至意併交該院行文各回城大臣將朕此旨通行曉諭衆回人等交相欣慶欽定外藩蒙古回部王公表傳卷之一百八欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百九傳第九十三吐魯番回部總傳吐魯番回部在嘉峪關外至京師八千三百五十里東界哈密西界喀喇沙爾南至沙磧北至博克達山為天山界邑二十有九曰塔呼曰納呼曰齊克塔木曰特庫斯曰洪曰舒歸曰色爾奇布曰魯克沁曰闢展曰英格曰喀喇和卓曰阿斯塔納曰玉門口曰勒木丕曰交河城曰雅木什曰安吉彥曰波衮曰托克遜曰伊拉里克曰勒木津曰雅土溝曰漢暾曰蘇巴什曰僧吉木曰罕和囉曰穆爾圖拉克曰布拉里克曰濟木薩皆吐魯番屬漢為車師前王庭地唐宋稱吐蕃元明稱吐魯番今仍之設扎薩克一居吐魯番城别設官兵五百屯闢展以駐防大臣領之順治三年吐魯番蘇勒檀阿布勒阿哈默特阿濟汗遣都督瑪薩朗琥珀峯等奉表貢詔京師會同館及蘭州豫市以官役監勿市熟鐵與軍器違者罪諭曰吐魯番乃元成吉思汗次子察哈岱受封之地前明立國隔絶二百八十餘載今幸而復合豈非天意乎爾等誠能恪修貢職時來朝賀大貢小貢悉如舊例則恩自相加豈有忽忘之理爾國所受有明敕印可遣使送來以便裁酌授爾封爵蘇勒檀者猶蒙古稱汗明成化時酋號如之六年河西逆回丁國棟等叛據肅州陰通哈密煽吐魯番助掠內地民大軍定肅州斬吐魯番頭目哈什克伽等閉嘉峪關絶貢十年吐魯番使穆蘇喇瑪察帕克等叩關請貢表署蘇勒檀賽伊特汗甘肅提督張勇責盡歸內地人民乃可十二年回使克拜齎葉爾羌表至獻內地民十五人以拜城薩嘛罕諸地使從表署阿布都喇汗勇斥不盡歸內地民詰表異名違例故克拜告曰哈密吐魯番葉爾羌長皆昆弟其父曰阿都喇汗居葉爾羌卒已久有子九長即阿布都喇汗居葉爾羌次即阿布勒阿哈默特汗居吐魯番先二年卒次蘇勒檀賽伊特汗嗣之次巴拜汗居哈密以得罪天朝故為葉爾羌長所禁阿布勒阿哈默特汗子代之次瑪哈默特蘇勒檀居帕力次沙汗居庫車次早死次伊思瑪業勒居阿克蘇次伊卜喇伊木居和闐前葉爾羌汗遣其弟自吐魯番請貢故表稱吐魯番汗名今以葉爾羌汗為昆弟長故表稱葉爾羌汗名察歸內地民百五十為凖噶爾巴圖爾琿台吉所掠存者僅十五人謹以獻小國不諳大體歸易表逾期乃獲至請即納貢上嘉逺道誠詔允之時青海台吉衮布憾葉爾羌嘗奪其屬將以兵襲貢使偵甘肅巡撫周文煜徙貢使入甘州且嚴備馳遁明年貢使至京初議遣十人入覲請益乃定額三十人從者三百留肅州請給糧賞川陕總督金礪奏前明羈縻外番多陋習吐魯番貪無厭入貢輒擕四五百人詭稱質孥不以歸牟利內地潛通哈密以故甘肅五郡回衆日多致滋前變今雖悔罪通貢然初至輒多擕男婦喋索糧物若仍聽留內地久將滋患上可其奏賜吐魯番貢使宴定賞額獨峯駝四給緞絹各十二西馬一給緞絹各二蒙古馬三百二十四給緞絹如馬數璞玉千斤給絹三百餘物各給緞絹有差貢使分五等一等給緞絹各五襲衣一餘以次減尋遣歸以吐魯番貢久仍賜敕曰爾吐魯番早識時數貢賦維謹今又遣使入貢誠篤之意實可嘉悅念爾國逺隔山河跋涉不易宜酬賞賚用勸忠誠今遣歸來使特賜爾緞三百三十八匹絹七百二十匹以昭寵錫之意自此以後著五年一次進貢貢使入關不得過百人不許携帶婦女進京人數止許三十人餘留住甘肅俟來京進貢人歸一齊出關不得久留內地所帶貨物許在京會同館照例互市無得沿途借端遷延滋擾其進貢馬匹止大馬四匹又蒙古馬十五匹此外不許多貢用昭朕優恤逺人之意康熙十二年吐魯番使烏魯和卓等至貢西馬四蒙古馬十五璞玉千斤表稱禡木特賽伊特汗署一千八十三年奏臣國向以方物入貢聞天朝統一寰區私兾恩寵過故明貢物視舊增蒙諭貢期馬額臣國亂以故不獲如期至嗣仍前例或别定額惟命諭吐魯番道逺貢艱嗣令自璞馬外餘物免進二十年吐魯番使伊思喇木和卓等貢璞馬如前額表署阿布勒穆咱帕爾蘇勒檀瑪哈瑪特額敏巴圖爾哈什汗奏天朝都極東吐魯番居極西道逺請賜恤詔免貢馬二十五年復遣使烏魯和卓至表稱臣成吉思汗裔承蘇賚滿汗業謹守疆界向風殊切今特遣獻方物向入貢頭目所携僕從多留駐甘肅後漸析寓西寧請遣歸便臣使往來詔察吐魯番屬無居西寧者遣使歸諭所部知之三十四年大軍議征噶爾丹先是凖噶爾台吉噶爾丹強脅吐魯番為已屬兄僧格子策妄阿喇布坦與搆怨携父僧格舊臣七人走吐魯番尋徙和博克薩哩吐魯番為策妄阿喇布坦屬至是刑部尚書圖納請檄吐魯番令知罪祗噶爾丹勿驚懼詔允之三十五年噶爾丹敗遁葉爾羌汗阿卜都賽伊特自軍所降告葉爾羌有兵二萬吐魯番有兵五千請擕孥赴吐魯番宣聖德偕䇿妄阿喇布坦擒獻噶爾丹上憫其情遣歸噶爾丹尋走死䇿妄阿喇布坦師噶爾丹詐復不靖五十四年隂以兵襲哈密詔議大軍進勦事宜西安將軍席柱奏吐魯番鄰哈密且凖噶爾隘當先取沿途設站運米屯兵巴里坤布隆吉爾俟馬壯由哈密北大山後烏蘭烏蘇路進闢展取吐魯番傳檄哈薩克布魯特諸部協勦䇿妄阿喇布坦詔俟明年勦吐魯番五十五年議暫停進兵散秩大臣祁里德奏俟來年由巴里坤𠞰吐魯番乘勢取珠勒都斯地諭軍所大臣等定議五十六年靖逆將軍富寧安請遣巴里坤兵分擊烏嚕木齊及吐魯番諭曰大兵前進攻取吐魯番地招撫之即與哈密類既入國家版圖自不得不善為保護若襲擊兵勢稍弱凖噶爾擁衆援吐魯番或吐魯番有變志彼時不能守視必將得而復失著軍前大臣詳加籌議尋奏大兵抵吐魯番視易攻易守乃取之否則襲擊而還諭嚴設備富寧安以兵抵烏嚕木齊擒賽因塔喇諸邑回人百餘振旅還五十九年散秩大臣阿喇納以兵赴闢展魯克沁吐魯番諸城諭曰大兵征凖噶爾非仇爾也若不速決計將破爾城悔無及矣回衆乞降納畜械各五百餘撫其衆以總管沙克扎拍爾頭目阿克蘇勒坦等歸别有吐魯番頭目曰阿濟斯和卓者不即降走凖噶爾大軍旋策妄阿喇布坦授之兵脅吐魯番户數千徙喀喇沙爾中道脫歸者千餘户聚魯克沁以托克托瑪木特為總管拒凖噶爾兵六十年議政大臣等請令富寧安統大軍屯烏蘭烏蘇别選兵取吐魯番得地即以兵守會吐魯番回人阿喇布坦等抵富寧安軍訴回衆不堪凖噶爾虐約內附且獻所獲凖噶爾甲請大軍援諭曰策妄阿喇布坦既不能徙回人赴喀喇沙爾又不能護衛凖噶爾足見萬不能敵我軍此機斷不可失今收復吐魯番若不守視恐自凖噶爾來歸者回人妄行殺掠此路必致阻隔著富寧安簡兵一千赴吐魯番收納降回留兵駐視回人等歸降於我與凖噶爾世成仇敵即係我民巴里坤距吐魯番止六百里如䇿妄阿喇布坦率衆侵擾我師往援為途不逺富寧安預飭回人於我師尚未抵境時若有凖噶爾使及逃人至萬勿隱匿侵犯即行解送時凖噶爾博斯和勒額穆齊宰桑以兵襲吐魯番托克托瑪木特等乞援撫逺大將軍固山貝子允禵偕富寧安等議大軍征凖噶爾賊必竄留兵少無濟多則糧運艱不留兵魯克沁回衆萬必乞內徙不收撫師旋後恐厄魯特乘之欲收撫恐無以資口食徙屯哈密恐地狹不給徙布隆吉爾達里圖沙磧難行且喀喇沙爾諸城邇吐魯番大軍至相繼附必請留兵護以故不即進申命之乃遣阿喇納以兵二千馳援吐魯番副都統莊圖穆克登各督兵二千繼之别以兵八千屯鄂隆吉科舍圖色畢特伊勒布爾和碩路為應阿喇納抵吐魯番遇凖噶爾賊二千餘迎擊之賊棄騎走俘斬百餘詔興屯吐魯番六十一年議遣巴里坤兵五千赴吐魯番築城墾地挽糧守汛防禦凖噶爾賊雍正二年吐魯番納屯糧五千餘石嗣嵗報穫數以贏計三年撤大兵還諭曰策妄阿喇布坦乞和請給吐魯番地朕因諭將從前內附諸酋長徙入內地據將軍穆克登奏吐魯番回衆共萬餘若但徙首領數人不遷所屬生計必致艱窘且伊所屬回人願內徙者甚衆朕思瓜州沙州地甚寬廣亦必用人耕種若有願移往者可即給一二年養贍令其耕種羅卜諾爾回人亦照吐魯番例有願移者從所部酋長至不願者仍留本處大軍之屯吐魯番也羅卜諾爾頭目固爾班等至請以喀喇和卓喀喇庫勒邑千餘衆內附羅卜諾爾鄰吐魯番為巨澤葉爾羌喀什噶爾諸境水六十餘滙之回衆習水居稱不便徙內地詔聽之闢展魯克沁吐魯番諸城回衆徙至者六百五十户詔給駝馬廬幕四年安置肅州金塔寺威魯堡諸地以托克托瑪木特為總管六年托克托瑪木特與闢展頭目伊特格勒和卓以違言故搏斃川陜總督嶽鍾琪遣諭曰爾等久為凖噶爾虐蒙恩內徙今因私忿輒爭若仍聚處恐相激生變必視內地律治罪爾等去留惟便回衆謝罪固請留諭嗣勿妄滋釁違者論死八年寧逺大將軍嶽鍾琪統大軍屯巴里坤私遣使赴吐魯番載軍糧會入覲凖噶爾襲泛盜駝馬總兵樊廷等馳擊之敗遁九年護理寧逺大將軍紀成斌偵凖噶爾侵吐魯畨遣兵援諭責之曰紀成斌聞賊侵吐魯畨遣樊廷等統兵四千往援實為錯謬從前採買吐魯番糧石本應給與運價令其自送軍營計不出此遣官兵發駝馬逺行運送致啓賊心去冬逆夷猖獗後猶不將運糧辨兵撤回此則踈忽之甚者也惟是朕以怙冒萬方為心若坐視吐魯番被冦侵掠而不為之籌畫保護朕心實所不忍前曽降旨吐魯番衆若畏懼凖噶爾即移向近地居住是以托克托瑪木特帶領之人移駐近邉者皆享安寧之福可再行曉諭回人等倘自量力不能敵不妨仍為移避之計朕當從厚賞給行資使之得所若此番曉諭後伊等仍復觀望不至則賊人再來侵掠時聽伊等自為計我軍不復往護之矣命甫下樊廷兵抵吐魯番凖噶爾遁師還凖噶爾復來襲吐魯番乞援師不復遣諭曰凖噶爾賊侵吐魯番徒欲疲勞我士馬故為此出沒詭計朕閲紀成斌奏即嚴加申飭賊人未見我師果潛遁無蹤矣賊之狡獪如此是以諭令吐魯番人衆商酌遷移暫避之計蓋欲善為保全之以俟大軍凱旋共享升平福也今凖噶爾復侵吐魯番大營未曾發兵前往朕思賊人若仍以千餘衆侵擾吐魯番彼地城垣兵力自足捍禦倘賊復傾衆至吐魯番力不能支朕心有所不忍况伊等前次感恩望濟之言甚為懇切朕又有令其遷移暫避之旨料賊人必知之倘乘其遷移之際而侵害劫掠吐魯番人因遵旨而受纍尤朕心所惻然者也著嶽鍾琪酌視應否往援變通辦理不必固執前説至賊衆去後吐魯番回有情願遷移者又如何沿途防護不受賊人劫奪侵掠著嶽鍾琪悉心經理會肅州威魯堡回民告飢諭曰前因凖噶爾肆虐吐魯番回民畏其侵掠有願移居內地者諭令地方有司善為安置撫綏使之寬裕從容得所項聞在肅州居住回民等田瘠水少收成歉薄所有牲畜亦不敷用生計未免艱難著署陜甘總督查郎阿酌定加恩撫理事宜即以此諭吐魯番移駐內地回民知之鍾琪尋奏偵凖噶爾圍魯克沁請率兵三千馳進賊遁即駐吐魯番諭曰朕恐凖噶爾賊以大力侵吐魯番伊等不能抵敵為其所困已降旨令嶽鍾琪酌量發兵應援若果確有所見即應遣兵速往吐魯番乃阿爾護喀喇沙爾兩路關鍵既駐我軍將來築城烏嚕木齊時呼吸相應賊人不敢襲我軍後况我軍正欲進攻凖噶爾賊若賊果以大衆犯吐魯番我軍不勞逺行可以殄滅亦為善策爾其悉心籌議鍾琪奏遣總兵張元佐率兵三千赴吐魯番别以兵六千屯塔呼及洮賚隘凖噶爾賊圍魯克沁越四旬餘不下復以木梯三百攻喀喇和卓回衆拒斬五百餘級賊聞我師將至棄甲械竄上以凖噶爾數擾吐魯番雖失利將復增衆至我軍往援不值誤自取糧吐魯番始致進退兩失之飭責嶽鍾琪罪凖噶爾尋侵吐魯番副將王廷瑞等擊斬二百餘賊遁諭曰此次幸獲小勝不足為喜朕更為吐魯番憂之賊人屢被吐魯番敗創懷恨益深必復以大衆報復可速傳諭吐魯番衆嗣後賊人來犯但當堅守城池不可迎戰若魯克沁一城可容回民人衆則令防守官兵堅守一城如一城不能容住多人可别住相近之喀喇和卓等處將馬匹牧畜收歸城中預貯芻薪以備應用賊衆若分兵來圍彼此固守堅壁清野俾賊無所肆其伎倆且有大軍襲其後奪取馬匹坐致疲斃自必逺遁然亦不可追逐賊衆長於騎射吐魯番回民十不及一若固守城垣以拒敵賊人亦不及回民十之一用我之長乘彼之短此萬全無弊道也凡事當持重慎靜為之但能保護吐魯番城垣人衆其功勝殺賊多矣十年凖噶爾遣宰桑額爾克得松犯喀喇和卓參將劉琰等鏖擊之賊敗走護理大將軍印務張廣泗奏吐魯番孤懸一隅舊設駐防兵八千自運糧兵五百外分屯各邑而勒木津塞木津漢暾三邑逼賊營請撤兵歸魯克沁喀喇和卓闢展英格四邑并令喀喇和卓諸邑回衆聚魯克沁絶賊伺志從之時北路軍大敗凖噶爾賊於額爾德尼昭賊創甚不敢復襲西路諭曰賊人於北路大創後力量衰弱不能復侵擾吐魯番回民乘此遷移似屬應行朕思回民誠心內向屢拒賊鋒甚屬可嘉而冬月寒冷之時倉皇竄徙又甚可憫除在途加意防護外伊等至日務須安置妥協重加賞賚出其望外使老幼男婦咸慶得所不可為愛惜錢糧起見致負逺人內附之心也尋吐魯番頭目額敏和卓率回衆就道上聞之諭曰吐魯番逺在邊境外距巴里坤軍營尚有七八百里易為賊所窺伺我師難以庇護朕以仁愛為心是以聽其自便不強令歸順我朝致受賊人侵擾乃前嵗嶽鍾琪并未奏聞直以己意遣官帶領駝隻前往採買米石致啓賊人侵擾額敏和卓與回衆等誠心歸順我朝奮拒賊兵上年賊衆三次圍攻回衆與官兵并力抵禦不但全城無恙且出不意乘間擊刺屢挫賊鋒忠勇之氣甚屬可嘉然賊夷狡獪無常時以侵擾吐魯番為疲敝我師計是以議徙爾等近邊以避賊人侵害朕念爾等內徙之時賊人或於中途窺伺又恐男婦老幼行役苦寒屢降諭旨俟至日善為安置務令人人得所數月以來朕無時不以爾等安土重遷縈繫於心也今聞陸續啓行羣情踴躍朕心甚為欣慰因思年來爾等屢遇強冦未遭戕害嗣此安居樂土世受我朝恩庇此皆爾等忠誠感格上天寵錫福佑之明徴也著授額敏和卓為扎薩克輔國公其餘有應加恩賞授官職者俟大將軍查奏到日再降諭旨已而吐魯番回衆屯塔勒納沁查郎阿奏請安置肅州王子莊諭曰回民輸誠向化自應選給水土饒衍氣候和煦之地俾得樂業安居肅州王子莊水泉甚少亦不敷耕種朕思瓜州地土肥饒水泉滋潤氣候亦和與吐魯番回民原駐地風景相似且現在開墾地甚為寬濶庶足資回民耕牧由塔勒納沁遷至瓜州地不甚逺可免跋涉勞著署陜甘總督劉于義將吐魯番回衆安置瓜州其築堡建屋給賜口糧牛具榖種各事宜著查郎阿自軍營遣武職大員先赴瓜州會同悉心妥辦并遣官沿途護視回衆明年奏吐魯番自塔勒納沁徙瓜州凡八千一十三口詔廩給如初至額勿議減尋定所部頭目功次一等給正千户二等副千户三等正百户四等副百户各頒號紙乾隆二年定吐魯番來朝廪給限四旬扎薩克視喀爾喀輔國公正千户視佐領副千户而下視驍騎校十九年遣官赴瓜州編旗隊置管旗章京副管旗章京參佐領驍騎校各員如哈密例二十年瓜州回兵三百從大軍征達瓦齊軍機大臣奏吐魯番舊係內地俟凖噶爾定察獲頭目安置之併遣瓜州扎薩克歸報可定邊右副將軍薩拉爾奏遣瓜州扎薩克佐領愛特瑪特賫檄招吐魯番有伯克莽噶里克者遣使納户籍四百餘頒賜貂冠朝珠而莽噶里克率回兵百五十將赴薩拉爾軍道遇布爾古特賊掠駝馬不達而返復偕弟阿里尼咱爾集兵七十餘就道迎降定西將軍永常納户籍千餘永常遣莽噶里克歸牧阿里尼咱爾赴薩拉爾軍疏聞書其名曰莽里克上詢同異故以莽里克即莽噶里克告莽噶里克祖曰瑪爾占楚克父曰圖默爾庫濟世居吐魯番為總管莽噶里克嗣稱達爾漢伯克有綽囉斯台吉噶爾藏多爾濟輝特台吉巴雅爾者凖噶爾屬遊牧額琳哈畢爾噶鄰吐魯番聞大軍至請降巴雅爾以乏畜産告永常遣赴吐魯番耕牧檄莽噶里克給榖種大軍尋抵伊犁定北將軍班第奏吐魯番舊頭目莽蘇爾為元太祖裔居喀喇沙爾應遣歸吐魯番轄舊屬至瓜州回衆請遣官護歸魯克沁軍機大臣議奏額敏和卓徙歸邇吐魯番頭目牧恐不相安俟勘界定乃議徙達瓦齊既就擒撤瓜州兵歸尋阿睦爾撒納叛擾伊犁莽蘇爾不獲歸吐魯番偕弟哈什木走葉爾羌後大軍定逆回霍集占亂乃獲之以歸詔授一等台吉𨽻蒙古正白旗二十一年薩拉爾自伊犁歸吐魯番莽噶里克迎告曰噶爾藏多爾濟等盟俟擒阿睦爾撒納將以子諾爾布琳沁轄四衛拉特抗天朝師薩拉爾以聞詔勿遽聽回人言滋疑慮尋陜甘總督黃廷桂獻額敏和卓繪吐魯番圖奏吐魯番不復有蒙古裔瓜州回民願歸故土請視舊納凖噶爾賦為貢額詔俟厄魯特靖乃徙復諭曰伊等進貢方物若原係噶爾丹䇿凌之人今伊犁既定自應充作貢賦如係噶爾藏多爾濟及巴雅爾等所屬此番遷回故土應仍歸伊等管轄方為允協已而阿睦爾撒納竄哈薩克詔徙瓜州回衆歸魯克沁莽噶里克請偕弟額什哩木子呢雅斯入覲詔留視牧以子弟一人代莽噶里克遣子白和卓至且請視額敏和卓例編置旗隊允之授公爵軍機大臣議奏吐魯番東界自闢展至喀喇和卓令額敏和卓轄西界自伊拉里克至阿斯塔克令莽噶里克轄又額敏和卓請給麥種千石俟來嵗倍納租自第三年始每年納四千石莽噶里克如之應各酌賞示勵又額敏和卓請設汛扎里布拉克塔呼納呼齊克塔木闢展五邑每泛兵五馬十請令莽噶里克并設汛伊拉里克諸邑從之未幾噶爾藏多爾濟以巴雅爾叛告寧夏將軍和起㩦索倫兵百往𠞰檄額敏和卓莽噶里克兵集闢展而噶勒雜特宰桑哈薩克錫喇布魯古特台吉呢瑪隂應巴雅爾詭以兵千五百會和起望兵至疑之遣莽噶里克往偵莽噶里克紿曰我兵也逾時呢瑪等操戈前莽噶里克自後譟和起偕從兵百死之詔安西提督傅魁馳往𠞰會白和卓入覲旋抵哈密就擒諜者以噶爾藏多爾濟及從子扎納噶爾布叛附呢瑪召莽噶里克莽噶里克不從且遣兵助額敏和卓告諭駐防巴里坤辦事大臣雅爾哈善曰此不過伊子白和卓未歸謬為恭順之狀未可輕信已令傅魁領兵會同額敏和卓密商辦理仍著傳諭傅魁俟見莽噶里克時即諭知伊子現在肅州并未加罪伊或親赴肅州即行解京候朕辦理二十二年春傅魁兵次鹽池莽噶里克擕厄魯特俘一馘十二迎告曰厄魯特虐我甚我子入覲不即歸以故擒獻厄魯特賊且將迎我子傅魁以執而獻非己功磔莽噶里克及從者十九人詭稱道遇莽噶里克擊斬三十三級上以賊迎赴我軍且從者寡不俘獻反聚殱之情必詐詔械傳魁至廷訊悉欺罔狀豫辟宥白和卓罪自吐魯番取其妻默里克及弟托克托納咱爾等至𨽻蒙古正白旗後白和卓由三等侍衛任鑲黃旗蒙古副都統莾噶里克既死額敏和卓自魯克沁馳赴吐魯番擒斬其從逆宰桑十餘人詔徙居吐魯番兼轄莽噶里克屬户五百餘會霍集占使詭入覲額敏和卓遵旨將遣屬赴葉爾羌書示莽噶里克獲罪誅吐魯番歸己轄故令霍集占悔罪內附噶爾藏多爾濟等梗道不果往大軍𠞰之敗遁其屬回沙呼里唐噶塔爾等擕户百餘走魯克沁詔𨽻吐魯番扎薩克諭曰伊等久為噶爾藏多爾濟屬倘有潛通噶爾藏多爾濟之事乘間逃葉爾羌喀什噶爾等處俱未可定著額敏和卓加意防範如尚屬安靜即令其種地謀生形迹稍有可疑即奏聞請旨辦理有沙拉斯瑪呼斯者凖噶爾二十四鄂拓克之二也居喀喇沙爾之海杜河西以庫爾勒伯克托克托鄰牧掠之托克托挈弟阿卜都賚子色提克由羅卜諾爾走吐魯番請內附授散秩大臣秩二品其屬瑪木特托爾岱尋擕庫爾勒衆百餘至詔𨽻吐魯番有潛遁者誅之二十三年户部侍郎阿里衮勦沙拉斯瑪呼斯賊兵抵羅卜諾爾羅卜諾爾舊有户二千餘內附後不即徙凖噶爾虐其衆因奔徙阿克蘇多倫諸城存者六百餘聞大軍擒達瓦齊遣使擕鶴貢抵吐魯番值莾噶里克叛不達至是伯克哈什哈呢雅斯呼里等獻户籍請降阿里衮慰令暫𨽻吐魯番轄大軍尋討霍集占額敏和卓以吐魯番兵從抵葉爾羌護衛錫丕呢雅斯等擊賊獲傷奬賜翎頂明年春傷痊復固請從𠞰賊詔給銀幣二十五年副管旗章京呼岱巴爾氐參領瑪哲克勒木佐領瑪木特克勒木護衛阿璊密喇木驍騎校蘇爾等以勦喀什噶爾逆回邁喇木呢雅斯等功得優賚二十六年二月陜甘總督楊應琚奏肅州威魯堡安置吐魯畨回民計二百五十户墾地萬五千三百六十餘畝户口日增地畝有限請遣千户珈如拉等歸吐魯番詔廷議尋奏肅州回民較初附增額吐魯番已成樂土且多可耕地應視瓜州回民例悉遣歸但千户珈如拉祖托克托瑪木特與額敏和卓俱被凖夷虐先後歸應酌給附闢展吐魯番可耕地俟秋收後徙往并以千户珈如拉百户伊明和卓為正副伯克令闢展大臣徵賦從之三月諭曰從前辦理回人莽噶里克後因伊屬人無所統束暫令安置吐魯番交額敏和卓管理今大功告成回部皆朕臣僕自應各統其屬不相兼并朕意將此項回人內擇其賢能者授為伯克等職仍安置舊處查明舊日賦役照例供辦又阿里衮前因追賊至羅卜諾爾所收回人亦照此例辦理七月舒赫德奏附闢展之連木齊木有地六千畝闢展英格二邑有地千餘畝請令千户珈如拉徙舊居魯克沁衆赴連木齊木百户伊明和卓徙舊居闢展英格衆歸故地按户給田以珈如拉伊明和卓授五品伯克别設六品副伯克二分轄九月奏羅卜諾爾部二一為喀喇庫勒一為喀喇和卓喀喇庫勒置伯克一約束難周請增一員協理喀喇和卓凡五邑各置伯克一不相屬請令二員總管二員協理别設小伯克一居吐魯番理賦役屬户百八十三每年納哈什翎百枝海倫九張詔廷議尋奏羅卜諾爾前以軍務未竣暫𨽻額敏和卓今回部蕩平自應一體辦理請定總管伯克秩五品協理伯克及理賦役伯克秩六品五品缺出由闢展大臣奏請六品缺出即行補授具奏納賦如前額十月舒赫德奏吐魯番莽噶里克屬及額琳哈畢爾噶之沙呼里烏默特等屬舊𨽻額敏和卓轄給官榖充吐魯番役今僉稱安置久不願徙請以莽噶里克屬户五百餘設總管四品伯克一協理五品伯克二分理六品伯克五沙呼里等屬户七十四請即以沙呼里為總管五品伯克烏默特為協理六品伯克統𨽻闢展大臣轄二十七年闢展辦事郎中德爾格奏闢展屯田兵裁二百四十所遺地畝舊以吐魯番額敏和卓屬六十户居闢展九十三户居連木齊木威魯堡珈如拉屬六十户居連木齊木二十七戶居英格每户給田五十請令額敏和卓屬歸闢展珈如拉屬歸連木齊木以便約束仍有餘田三千畝分給莽噶里克沙呼里回人等墾耕至裁汰兵丁所餘牲畜農具請量給威魯堡回人令納糧抵詔悉如議復諭吐魯番免納糧以喀喇和卓托克遜屯田給回民為世業所部旗一爵三扎薩克多羅郡王一附一等台吉一二等台吉一欽定外藩蒙古回部王公表傳卷之一百九欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百十傳第九十四扎薩克多羅郡王額敏和卓列傳額敏和卓吐魯番回部人祖素丕和卓為喀喇和卓阿琿父呢雅斯和卓為吐魯番大阿琿額敏和卓嗣聚族居魯克沁康熙五十九年大軍撫吐魯番額敏和卓族以魯克沁降軍旋凖噶爾脅徙喀喇沙爾固拒之遣使告內附數乞援軍雍正四年頭目托克托瑪木特攜回人六百餘內徙魯克沁有衆萬不盡行以額敏和卓轄之八年寧逺大將軍嶽鍾琪奏額敏和卓嵗勤屯田務賜銀幣九年凖噶爾侵魯克沁及喀喇和卓額敏和卓閉城伺間擊賊退而至者三皆創之我軍至賊遁額敏和卓出郭迎十年遵旨攜魯克沁回衆內徙詔封扎薩克輔國公十一年置瓜州詔視內地官祿支粳米乾隆二十年以兵三百從大軍征達瓦齊檄招吐魯番達爾漢伯克莽噶里克內附事詳總傳伊犁定撤還阿睦爾撒納叛遵旨遣所部兵從和碩特輔國公納噶察將赴阿克蘇宣諭伯克霍集斯勿附逆諭曰額敏和卓帶領回兵直抵伊犁甚屬奮勉今復派伊所屬兵丁前赴阿克蘇城著加恩封鎮國公復以所部兵甫自伊犁旋輒逺道行詔優給裝資已而諜阿睦爾撒納竄博囉塔拉詔停赴阿克蘇二十一年額敏和卓自瓜州歸魯克沁尋以兵四百迎會寧夏將軍和起剿逆賊巴雅爾抵闢展厄魯特及莽噶里克兵驟叛戕和起將擒額敏和卓莽噶里克謂厄魯特曰此回人也乃釋歸魯克沁莽噶里克旋召之不赴遣告變諭曰額敏和卓係輸誠最久之人感激厚恩遣人報信朕甚嘉豫伊身在賊中實深軫念現在甫從瓜州遷至彼處諸務未經整理豈有擒賊之力如能誘擒莽噶里克固屬甚善俟奏凱後其地方悉交伊管轄倘力有不能惟將駐劄地方嚴加防範靜候內地大兵前往即可勘定額敏和卓尋遣子素賚璊至哈密稱固禦賊乞大軍援哈密扎薩克貝子玉素卜以聞諭曰額敏和卓拒賊固守甚可嘉豫著加恩封授貝子其子素賚璊著賞給公品級以示奬勵安西提督傅魁著選兵五百帶同素賚璊馳赴額敏和卓遊牧應援倘兵力不足即著額敏和卓帶領屬人同傅魁回至哈密俟大兵到彼再行辦理二十二年春諭曰前降旨令傅魁領兵擒拏莽噶里克後留兵駐吐魯畨俟大兵至進剿厄魯特逆賊今思莽噶里克就擒之後其地即給額敏和卓管轄留兵在彼守候大兵尚須時日額敏和卓轉不無供應兵丁之費非所以示體恤著駐劄巴里坤辦事大臣雅爾哈善等飭知額敏和卓如辦理莽噶里克事竣會同伊所屬回人力足以擒剿巴雅爾即令其同傅魁領兵辦理否則即將內地兵全行撤回不必在彼駐劄倘額敏和卓懇請留兵一二百名以為聲援亦從其便莽噶里克亂定遵旨徙吐魯畨請遣子素賚璊入覲謝賜爵恩詔馳驛至秋以逆回布拉呢敦霍集占叛據葉爾羌喀什噶爾議遣大兵討罪諭額敏和卓曰布拉呢敦霍集占二賊前被凖噶爾囚繫朕特加恩俾仍領舊部乃負恩黨逆戕害我副都統阿敏道其罪必不可逭然皆二賊狡謀其脅從回衆尚屬可宥爾受朕厚恩且係回部望族為衆所信若能設計誘擒或使回衆離心執獻二賊更可不勞師旅爾即酌量辦理若必需用兵若干應於何時進剿爾即據所見密奏額敏和卓疏至諭嘉之授領隊大臣時喀喇沙爾之沙拉斯瑪呼斯等賊以徙牧叛遁額敏和卓遵諭遣諜喀喇沙爾復以俟諜至遣兵恐不及期自率兵赴托克遜以待奬協機宜賜幣復諭曰明嵗辦理葉爾羌喀什噶爾時雖有將軍大臣而回部情形爾所熟悉將命爾參贊軍務在前隊行走爾其益體朕恩實心奮勉以奏膚功永膺懋賞額敏和卓偵喀喇沙爾無賊蹤遣諜呼嚕木什和羅復自請從户部侍郎阿里衮軍剿賊詔賜貝勒品級廩給視參贊大臣額敏和卓從阿里衮由阿思罕布拉克和什特勒克路擒嗎哈沁二百餘於塔木順和爾納木噶復馳赴呼嚕木什和羅將扺肯色嶺諜賊誘戕我都統滿福遁哈喇和落尾擊之賊絶嶺遁走庫車阿里衮屯庫爾勒額敏和卓屯哈喇和落遣使檄索之不達二十三年春詔授參贊大臣俟歸從靖逆將軍雅爾哈善剿布拉呢敦霍集占復諭雅爾哈善資額敏和卓謀勿岐視且令酌以回兵從如數減緑旗兵額易給糧騎時額敏和卓將進兵庫車申命歸吐魯番偕雅爾哈善定議額敏和卓偵沙拉斯等賊由庫車遁葉爾羌復自哈喇和落旋兵呼爾塔克路剿嗎哈沁馬疲乃返諭視貝勒秩設長史護衛司儀等員額敏和卓偵霍集斯仍居烏什告雅爾哈善曰霍集斯勢埒兩和卓若遣使往間或成功速雅爾哈善以聞不署額敏和卓名諭曰招撫伯克霍集斯等頗合機宜但額敏和卓既為參贊大臣即應列名同奏勿存分别之見夏四月詔授多羅貝勒仍兼參贊大臣諭曰進取回部自可立奏膚功但擒獲逆酋後仍令選本處伯克令其辦事伊等俱係新附恐一時難知賢否且伊犁駐兵屯田關係甚重亦宜預為籌畫從前伊犁地畝皆回人耕種今俟回城平定即將回人酌量遷移與緑旗兵錯處額敏和卓係回部望族應同將軍大臣等管束屯田兵丁俟耕作􅈺習主客相安再回吐魯番方為有益至一切進𠞰機宜額敏和卓頗屬實心效力嗣後益加奮勉䇿勳懋賞朕將疊沛殊恩五月扺庫車雅爾哈善兵驟進賊自堞施炮額敏和卓傷右顴退誓曰我受聖恩厚必舍身力戰奏至頒賜御用佩飾銀千兩諭曰朕因額敏和卓老成諳練故命其參贊軍機并非欲伊身在行間親當矢石也今聞奮勇得傷深為軫念嗣後惟盡心協力相機辦理不可冒險攻戰致有疏虞復飭責雅爾哈善曰豈有同為大臣而聽其舍身攻戰不行勸阻之理額敏和卓顴痊射降書入庫車城賊不應逆黨阿卜都克勒木自阿克蘇以援至敗之奬賜御用佩飾霍集占尋攜賊五千餘援庫車復大敗之獲纛二額敏和卓識為霍集占纛雅爾哈善不設備霍集占已入庫車復聽逸沙雅爾舊伯克嗎哈默第遣子阿三和卓乞降告霍集占自庫車遁乃録狀聞先是議以額敏和卓從定邊將軍兆惠赴沙拉伯勒剿厄魯特逸賊次及回逆諭曰額敏和卓熟悉回部情形人亦果毅兆惠務宜優待以收其益尋議分道進兵額敏和卓奏自沙拉伯勒取道巴達勒達喀什噶爾取道穆素爾嶺達阿克蘇然徑皆險别有間道臣遣使赴兆惠軍為導詔兆惠俟剿厄魯特靖移師赴回部或不及可詢額敏和卓使屯要隘防霍集占等竄至是飭責雅爾哈善縱賊罪以兆惠代將其軍復諭曰額敏和卓係回人雖與雅爾哈善不同亦不得謂無過念其素能出力姑從寬貸用觀後效即在兆惠隊內行走秋軍校瑚圖禮俘賊黨阿里至詢悉雅爾哈善不善用羣䇿罪旨慰額敏和卓賜三眼孔雀翎尋克庫車進兵阿克蘇兆惠至從赴烏什招霍集斯降奬賜佩飾冬抵葉爾羌逆賊抗大軍於喀喇烏蘇額敏和卓等固拒之賜郡王品級紅寶石頂四團龍服霍集占乞和軍門額敏和卓偕兆惠議斥小醜安敢以和為辭上聞而嘉之詔賜御用佩飾蓋至是凡三錫明年春援兵至破圍還阿克蘇其屬有賚資者偵嗎哈沁賊越阿克蘇遁偕索倫卒擒之詔給俘額敏和卓夏進兵喀什噶爾諜布拉呢敦霍集占棄城遁以喀什噶爾麥甫熟遣子協理台吉茂薩馳入城收糧濟軍食詔賞茂薩公品級大軍抵喀什噶爾兆惠以茂薩理阿竒木伯克務遣額敏和卓赴葉爾羌撫其衆諭曰葉爾羌喀什噶爾二城乃回人根本補授阿竒木伯克甚為緊要朕意欲以額敏和卓管葉爾羌以玉素卜管喀什噶爾有此等舊人在彼始堪倚任俟大功告成後辦理冬十月巴達克山函獻霍集占首諭曰額敏和卓玉素卜俱著勞績此時若同來則回部經理乏人額敏和卓著加恩晉封郡王駐葉爾羌辦事十二月復諭曰現在大功告成自應令額敏和卓還家但葉爾羌等城俱屬新附必得熟悉回部老成厯練之人駐劄辦理額敏和卓以舊人效力軍營頗著勞績深悉機宜是以暫令留駐但伊數年來久離家室若仍令其隻身居外朕心深為軫念可傳諭量攜家口暫行駐劄俟諸事就緒即可復回二十五年春詔圖形紫光閣御製贊曰吐魯番族早年歸正命贊軍務以識回性知無不言言無不宜其心匪石不可轉移夏四月吏部侍郎副都統海明遵旨赴葉爾羌辦事諭曰海明係內地大臣奏事列名應在額敏和卓前但不可以名居前列即輕視額敏和卓額敏和卓老成諳練辦理一切事宜當與和衷商酌時議設伊犁阿竒木伯克轄屯田回民詔以茂薩任之會喀什噶爾逆回邁喇木呢雅斯等叛掠克勒塔里木諸汛茂薩從參贊大臣阿里衮剿賊派蘇巴特偵由薩林都遁和羅木魯克尾之賊方炊以兵掩擒詔封茂薩輔國公兼敘額敏和卓功冬葉爾羌伯克鄂對喀什噶爾伯克噶岱默特和闐伯克阿什默特等訐額敏和卓縱通事等虐回衆參贊大臣舒赫德察其誣飭責之鄂對等謝罪奏至諭曰回人積習相沿彼此猜嫌讒毁惟在駐劄大臣持平守正嚴加約束著舒赫德曉示葉爾羌喀什噶爾回衆云大皇帝用人不過因材器使即如茂薩先因喀什噶爾需員辦事故加委任今伊犁駐兵屯田又將伊補授阿竒木并非常在喀什噶爾爾等何得造言誣謗至通事等皆哈密吐魯畨之人若盡行裁革轉至無所見聞且此畨訐告呈詞實屬姦狡之徒所搆嗣後通事等若敢於苛纍回人亦即從重辦理以示懲創二十六年冬詔額敏和卓歸吐魯番俟年班伯克入覲偕至二十七年葉爾羌辦事都統新柱偕額敏和卓奏葉爾羌和闐積榖多請令以其二折交騰格採買牲畜以其八折交紬布運伊犁市哈薩克馬諭曰折交錢布所及者廣最宜留心查辦即如鄂對阿什默特二人鄂對尚可信無取巧之事然此特因額敏和卓在彼有所顧忌耳今以玉素卜往代雖同屬舊時臣僕而資望少減恐鄂對不無玩忽額敏和卓於鄂對宜從容開導云爾當勿改初心我暫歸一二年再來駐劄仍可相見如故庶伊知所謹凛將來與玉素卜交代時亦宜告知俾得留心辦理凡遇回部伯克等俱當詳悉訓誡務期正己率屬以挽頽風尋議遣使巴達克山詔額敏和卓暫留葉爾羌先是巴達克山伯克素勒坦沙戮布拉呢敦不謹視尸為逆屬所竊瘞我使索不獲至是額敏和卓偵布拉呢敦尸瘞派蘇巴特逆子和卓阿斯瑪阿卜都哈里克和卓巴哈敦等匿巴達克山將遣使索會素勒坦沙以兵襲博羅爾奪齊特喇爾地遣弟沙卜多爾噶達爾據之博羅爾長沙瑚沙默特以告額敏和卓書示逆順義遣葉爾羌噶雜納齊伯克薩里赴巴達克山責侵鄰罪令獻布拉呢敦尸及其孥新柱奏巴達克山若違辭臣率兵往討留額敏和卓辦事諭曰巴達克山如斥責不從自當進剿但新柱向未厯練戎行額敏和卓頗悉回部情事自當同往會喀什噶爾辦事尚書永貴等疏蠲回人賦役不肯列額敏和卓及玉素卜名訓責之二十八年春永貴新柱疏調補諸城伯克復不列額敏和卓等名諭曰前次或謂所辦係加恩回衆之事伊等不欲市德署名至補授伯克自應同伊等商辦復有何嫌疑不行開列額敏和卓等俱久𨽻臣僕用至參贊大臣伊等如意欲辭避亦宜曉示令其勿存形迹已而素勒坦沙獻布拉呢敦尸及其子三覆書額敏和卓尊稱之曰父詭言齊特喇爾為己舊邑不以給博羅爾額敏和卓復遣薩里往責罪疏至嘉協宜以御用佩飾賜之諭仍留葉爾羌俟事蕆歸薩里抵巴達克山素勒坦沙悔罪歸所掠撤其弟自齊特喇爾旋奬賚額敏和卓時副都統額爾景額代新柱抵葉爾羌上慮不更事詔額敏和卓仍留處三月二十九年素勒坦沙聞額敏和卓歸遣使和濟克蘭齎書至稱葉爾羌大臣等前聽沙瑚沙默特偏辭齊特喇爾邑請仍察歸額爾景額疏聞敕責素勒坦沙曰爾詭詞具奏豈以葉爾羌大臣新經更替謂可欺飾耶前駐大臣吐魯番郡王額敏和卓日後仍來更替爾斯時又將何以為詞爾從前稱額敏和卓為父乃伊甫回遊牧即詆其偏聽人言亦太反覆矣爾其循理守分勿萌僥幸無厭之心始可永承恩澤復詔録額爾景額疏素勒坦沙書寄示額敏和卓今以己意達之素勒坦沙尋遣鄂斯敏伯克至奏嗣鈐部衆不敢稍存異志復覆書額敏和卓諉罪和濟克蘭稱以妄造語言故已懲之詔録示額敏和卓尋入覲命乾清門行走每晝接輒詢諸回部情習三十年春遣歸甫就道聞烏什衆叛戕副都統素誠奏請馳剿時伊犁將軍明瑞以兵往諜烏什賊乞援霍罕諭曰明瑞兵若尚須協助額敏和卓即暫駐烏什軍前喀什噶爾與霍罕額爾德尼部落相近亦關緊要烏什事竣仍任參贊大臣駐劄喀什噶爾辦事復以烏什之叛由伯克阿卜都拉虐衆故諭曰阿卜都拉所屬人等任意擾害回人素誠全未查辦額敏和卓與玉素卜俱𨽻臣僕自不致縱容所屬擾害回人然所屬愚人不知事體輕重希圖小利倚勢橫行著傳諭駐劄大臣等烏什既有此等情事可為警戒將來必須留心體察約束下人斷不可失於防範以致自貽伊戚有庫爾勒哈資伯克鄂璊者以阿竒木伯克色提克責違役故憾之飲其兄噶雜納齊伯克和碩爾及族子弟等言曰我將殺阿竒木往取烏什和碩爾叱之率子三人急起走或以告色提克曰阿璊和碩爾叛矣時喀喇沙爾辦事副都統明普赴烏什色提克檄兵歸告庫爾勒將不靖詔額敏和卓便道察順逆狀復諭明普聽額敏和卓議勿執己見額敏和卓抵庫爾勒訊得鄂璊情以和碩爾不附逆將疏請免死明普執不可議誅鄂璊族疏至詔和碩爾等免坐尋聞明普匿額敏和卓議飭責謬戾罪額敏和卓抵烏什長子素賚璊從次子茂薩亦從明瑞至額敏和卓督偕官軍擊賊績屢著上以素賚璊茂薩善遵父訓詔給幣復奬賜額敏和卓佩飾尋烏什城下額敏和卓赴喀什噶爾三十二年還入覲命御前行走四十二年卒子七長素賚璊襲郡王以罪削次茂薩封輔國公以非世爵不立傳次鄂囉木咱卜授一等台吉别有傳次色普拉授協理二等台吉次伊斯堪達爾繼襲郡王次丕爾敦授二等台吉别有傳次拜拉木授二等台吉一次襲素賚璊額敏和卓長子乾隆十七年授三等伯克二十一年詔封公品級二十三年夏大兵圍庫車有嗎哈沁賊自庫爾勒路掠解軍鉛藥上以庫爾勒距吐魯番近詔素賚璊攜兵往清臺路冬以察哈爾總管敏珠爾代詔素賚璊歸復諭辦理屯田侍郎永貴酌給所部牧畜俾得專力耕作二十四年春素賚璊偕弟協理伯克茂薩獻馬百助軍上念所部甫徙牲畜或不給詔歸之仍傳旨奬急公二十四年議徙多倫回衆於喀喇沙爾素賚璊赴布古爾庫爾勒度引水溉田分地定居諸務奬賜銀幣二十五年入覲命乾清門行走二十七年授一等台吉二十九年率子莫弩啓雅爾護屯田回民赴伊犁三十年從大軍剿烏什叛賊諭嘉之四十二年襲扎薩克多羅郡王四十四年以虐所部衆且私宫其屬論罪削郡王爵召赴京授一等侍衛四十五年素賚璊卒詔歸葬吐魯番二次襲伊斯堪達爾額敏和卓第五子乾隆三十一年從其兄鄂囉木咱卜赴伊犁協理屯田務三十八年敘功授五品秩賞孔雀翎四十一年入覲四十二年命乾清門行走四十四年襲扎薩克多羅郡王四十八年詔世襲罔替五十三年正月奉上諭吐魯番郡王伊斯堪達爾前入覲時朕觀其材具尚堪造就今散秩大臣鄂斯璊病故所遺喀什噶爾三品阿竒木伯克之缺即著伊斯堪達爾補授前往喀什噶爾隨同明亮伯興辦理事務伊斯堪達爾之兄色普拉弟丕爾敦等俱現在吐魯番著色普拉辦理遊牧事務吐魯番大臣更當善為照料伊斯堪達爾著賞銀一百兩以為遷徙家口之需即於吐魯番官銀內撥給伊斯堪達爾雖係郡王且在乾清門行走但初赴喀什噶爾阿竒木伯克任明亮伯興諸事須常指示令照鄂斯璊任內事宜辦理附一等台吉鄂囉木咱卜列傳鄂囉木咱卜吐魯番扎薩克郡王額敏和卓第三子乾隆二十六年喀什噶爾辦事左都御史永貴疏鄂囉木咱卜善理所部諭曰額敏和卓數年辦事軍前伊長子素賚璊次子茂薩俱承辦公事吐魯番等處事務係伊第三子鄂囉木咱卜管理著加恩賞戴二品頂帶孔雀翎以示鼓勵三十一年詔授一等台吉任伊犁三品阿竒木伯克四十八年詔俟出缺後視有績令子如爵無績以次降襲三等台吉五十三年詔世襲一等台吉罔替附二等台吉丕爾敦列傳丕爾敦吐魯番扎薩克郡王額敏和卓第六子乾隆三十六年入覲詔授二等台吉賜孔雀翎命乾清門行走四十八年詔俟出缺後視有績令子如爵無績以次降襲四等台吉五十三年詔世襲二等台吉罔替欽定外藩蒙古回部王公表傳卷之一百十欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百十一傳第九十五厄魯特和碩親王達瓦齊列傳居今京師之厄魯特襲固山貝子達瓦齊厄魯特人姓綽囉斯系出凖噶爾巴圖爾琿台吉有布木者號額爾德尼台吉子䇿凌敦多卜以族台吉同名别稱大䇿凌敦多卜子五長納木扎爾達什次多爾濟丹巴次巴哩次達什車稜次班珠爾納木扎爾達什子即達瓦齊康熙十六年布木附噶爾丹表貢駝馬嗣噶爾丹不靖上三駕親征之平其部布木偕䇿妄阿喇布坦表乞命上以不助噶爾丹逆宥之布木死大䇿凌敦多卜倚䇿妄阿喇布坦為姦兵襲唐古特大軍敗之遁歸雍正九年噶爾丹䇿凌遣襲我北路阿爾台軍十年納木扎爾達什侵哈密大軍復敗之乾隆十八年杜爾伯特三車凌來歸以達瓦齊襲凖噶爾台吉告蓋自噶爾丹䇿凌死䇿妄多爾濟納木扎勒嗣其庶兄喇嘛達爾扎篡之召達瓦齊往謁達瓦齊遊牧額密爾領凖噶爾二十一昻吉之一懼喇嘛達爾扎誅走和通呼爾哈將携衆五千來降定邉左副將軍喀爾喀親王成衮扎布以聞諭曰達瓦齊乃大䇿凌敦多卜孫前與凖噶爾定界時無不納降人約且自噶爾丹亂後收飬凖噶爾人甚衆若達瓦齊至而不納是絶其歸路矣達瓦齊果力窮來歸可量給糧騎馳送京師既而達瓦齊走哈薩克喇嘛達爾扎索之竄歸偕阿睦爾撒納謀弒喇嘛達爾扎襲其位杜爾伯特諸台吉因亂叩關內附十九年達瓦齊遣使奉表詔逐歸阿睦爾撒納以綽囉斯氏自相殘凱為琿台吉而非其族懼厄魯特不從隂助達瓦齊逆俟厄魯特叛將計取達瓦齊察阿睦爾撒納異志兵擊之阿睦爾撒納蹙乃為內面計偕和碩特台吉班珠爾等間道來降上以達瓦齊虐所部降者至輒告凖噶爾如水火狀衛拉特諸台吉挈數萬衆屯內汛非安撫之不可將拯凖噶爾亂俟伊犁定議設四衛拉特如舊諭曰凖噶爾本元之臣僕竄處西北恃其荒逺􅑀陵畨部我皇祖聖祖仁皇帝三次親征肅清沙漠皇考世宗憲皇帝時䇿妄阿喇布坦父子濟惡仍肆跳梁是以命將出師聲罪征討朕嗣統當皇考降旨撤兵之後而噶爾丹䇿凌遵守定界遣使請安求通貿易朕特加恩俯允以示懷柔逮噶爾丹䇿凌物故其子䇿妄多爾濟納木扎勒為孽兄喇嘛達爾扎所殺而喇嘛達爾扎復為達瓦齊所弒在喇嘛達爾扎雖承緒不正尚屬噶爾丹䇿凌之子至達瓦齊則篡竊亂臣耳乃今年夏間遣使來京仍請赴藏熬茶靦然以噶爾丹䇿凌自處試思堂堂大清中外一統而夷部亂臣妄思視同與國此其逆天悖理為何如耶上年杜爾伯特台吉車凌等率衆來降今秋輝特台吉阿睦爾撒納等又舉部內附斯均窮蹙來歸之人朕為天下共主兼覆并載既無拒而不納之理而喀爾喀內地俾此輩數萬衆仰食聚處將來滋生蕃庶亦豈久安善䇿朕於達瓦齊初無興師問罪之意而時會所至揆之理勢實有不得不從長經理者特將此畨用兵始末宣示中外知之二十年詔大軍往討分西北兩路諭曰達瓦齊雖有罪究屬一部台吉倘伊屬人見事勢窮蹙將伊擒獻毋加戕害候朕諭旨遵行定邉右副將軍薩拉爾道遇達瓦齊使入貢請罪叱之曰我奉天子命往討達瓦齊他非所知以表達京師羈達瓦齊使遣侍衛塔齊圖等齎檄往招達瓦齊竄格登大軍逾伊犁追之視達瓦齊營負格登崖臨淖議曰大軍經萬餘里未嘗血刃遺鏃今達瓦齊懼誅為負嵎計撻伐之將玉石俱焚毋乃非聖天子敉絶域意不如誘擒之善以喀喇巴圖魯阿玉什巴圖濟爾噶爾察哈什三人領健卒二十二宵䇿馬入達瓦齊營招降台吉宰桑等四十九人及厄魯特兵五千餘達瓦齊逸參贊大臣達爾黨阿等躡擊之收達瓦齊叔父班珠爾及從者六千餘達瓦齊踰庫爾克嶺定北將軍班第遣使分道索烏什阿竒木伯克霍集斯偵達瓦齊赴喀什噶爾以兵伏林遣弟携酒及馬紿迎達瓦齊至伏驟起達瓦齊及子羅卜扎宰桑阿爾齊丹津達爾巴蓋烏巴什敦多克摩羅木色克色德克吹索諾木額木齊圖巴等七十餘人悉就縳霍集斯馳告班第遣兵五百迎諸穆素爾械赴京師凖噶爾平是役也上獨申睿斷於天時人事智深勇決洞悉先機師行萬里兵不血刃大功迅奏廟算無遺具纂平定凖噶爾方略中上御製凖噶爾全部紀略於其世次事迹特詳十月俘達瓦齊至告祭太廟社稷行獻俘禮上御午門樓受之詔宥罪賜冠服白銀時阿睦爾撒納叛綽囉斯降台吉噶爾藏多爾濟封綽囉斯汗遵旨赴定西將軍䇿楞營達瓦齊奏臣俘囚蒙聖主不加誅賜厚恩捐糜頂踵不足報阿睦爾撒納背恩竄臣夙讐恨不奮擒杜爾伯特台吉伯什阿噶什庫本諾音台吉諾爾布等臣知不與賊黨請遺書令協擒庶彰國法快人心諭曰前因凖噶爾夷部數年以來篡奪頻仍所屬諸部率衆向嚮接踵而至朕為天下共主既不忍拒而不納將為之經理遊牧即因其地處之為久長計而兩朝未竟之緒亦乘此事機一勞永逸此用兵之本意也至達瓦齊之立為台吉不過外夷自相篡竊原可不必聲罪致討從前所降諭旨甚明但以達瓦齊進貢請安尚居然以噶爾丹䇿凌自處是以降敕切責旋復遣使叩關情詞恭順則大軍已入其境未得至京將軍等取其書奏之及王師進取伊犁伊畏避逃竄亦情理所有是達瓦齊原無獲罪於天朝之處伊之殘酷暴虐亦皆出於阿睦爾撒納之口逮俘獲來京視之則一庸慤可憫之人耳且言久思歸順特以阿睦爾撒納領兵前往實不便於其軍前納欵此其肝膈本懷非由飾説古者異國降王或優以封爵示無外也達瓦齊著加恩封為親王賜第京師奉朝請朕撫馭萬國一秉大公仁育義正惟聽人之自取可將此宣示達瓦齊并曉諭中外知之復諭曰朕已將達瓦齊宥罪施恩封為親王𢃄領伊子居住京師伊舊日屬人著查出四五十户令來京役使并著䇿楞曉諭噶爾藏多爾濟等及凖噶爾人衆從前進兵擒𠞰達瓦齊止因阿睦爾撒納訴其暴戾無狀凌虐凖夷朕軫念羣生拯救水火是以聲罪致討今拏解來京乃一庸愚無用之人即伊種種虐行其初亦皆係阿睦爾撒納從中相助非伊一人之罪且達瓦齊原係綽囉斯台吉朕憐憫其愚備藩京邸斷不令回至遊牧現在達瓦齊感戴朕恩思圖報效繕寫書信寄伊親信之杜爾伯特台吉伯什阿噶什庫本諾音台吉諾爾布等令其協擒阿逆以彰國法具見誠悃著䇿楞即行轉交仍將伊等接到達瓦齊書後言語情形速行奏聞後伯什阿噶什諾爾布皆降噶爾藏多爾濟叛從子扎納噶爾布戕之復為扈魯瑪台吉達瓦所殺阿睦爾撒納走死俄羅斯凖噶爾亂永定二十一年尚郡主授多羅額駙二十四年卒諭曰厄魯特親王達瓦齊曽為凖噶爾台吉被獲獻俘朕念伊係外藩宥罪錫爵伊自受恩以來隨侍禁近一意抒忱奮勉且為人尚屬朴誠今聞溘逝深為軫惻著給治喪銀千兩伊子羅卜扎仍準其襲封郡王一次襲羅卜扎達瓦齊長子乾隆二十一年授公品級命乾清門行走二十四年襲多羅郡王二十七年尚郡君授固山額駙三十九年大學士舒赫德劾其私交外吏貪鄙牟利詔削郡王爵禁之弟富塔喜降襲多羅貝勒二次襲富塔喜逹瓦齊次子乾隆三十九年襲多羅貝勒命乾清門行走四十六年因鴆逸不勤職詔削貝勒爵以羅卜扎子富爾納降襲固山貝子復諭富塔喜偕羅卜扎居家悔罪嗣此若復别滋事端當重治罪三次襲富爾納羅卜扎長子乾隆四十六年襲固山貝子四十八年理藩院議俟出缺時降等襲爵諭曰富爾納之祖逹瓦齊原係凖噶爾大台吉平定凖噶爾時將伊擒獲朕乃加恩封為親王逮伊身故其長子羅卜扎降等承襲郡王乃并不安分守法以故議罪革職逹瓦齊次子富塔喜降等承襲貝勒又復懶惰猥鄙續行革職以羅卜扎子富爾納降等承襲貝子出缺後自應依議降等但念逹瓦齊乃承襲凖噶爾大台吉之人若令由貝子遞降世爵朕心實為不忍著加恩將富爾納現襲貝子爵俾豫世襲罔替欽定外藩蒙古回部王公表傳卷之一百十一欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百十二傳第九十六土默特輔國公喇嘛扎布列傳居歸化城之土默特喇嘛扎布土默特人姓博爾濟吉特元太祖十六世孫阿爾坦裔阿爾坦號格根汗初由河套徙豐州灘築城架屋居之曰拜甡即明時訛為板升者也明以其通好封順義王以歸化名所居城至今仍之阿爾坦子九長僧格號杜稜汗子噶爾圖以避察哈爾東徙鄰喀喇沁為土默特東路即今駐牧巴顔和碩之土默特右翼扎薩克其居西路者自格根汗凡四傳至博碩克圖汗仍居歸化城察哈爾強役屬博碩克圖汗不從偕喀喇沁部布顔台吉等敗察喀爾兵四萬於土默特之趙城又敗其赴張家口請明賞兵三千與察哈爾林丹汗交惡博碩克圖汗卒林丹汗襲之有其衆本朝天聰六年大軍征察哈爾以林丹汗西奔唐古特移師趨歸化城博碩克圖汗子俄木布及其部頭目古祿格杭髙託博克等集衆降詔安堵如故九年以林丹汗竄死大草灘遣使取道歸化城往諭唐古特命所部人護送之九年睿親王多爾衮率師收林丹汗子額哲於黃河西託里圖地貝勒嶽託留駐歸化城所部人告變言俄木布乳母之夫毛罕潛通明沙河堡守將以歸化城叛偽稱俄木布為西土格根汗且導明使約喀爾喀兵為外應嶽託遣諜往喀爾喀兵在途追襲之無脫者毛罕伏誅執俄木布以歸諭古祿格杭髙託博克分守歸化城轄土默特部衆崇德元年詔編所屬三千三百餘丁為二旗以古祿格為左翼都統杭髙為右翼都統領之託博克尋代杭髙子巴桑掌右翼嗣是博碩克圖汗裔分隸左右翼稱台吉喇嘛扎布祖素爾巴勒濟圖父達木巴世居歸化城隸左翼乾隆二十年詔徴歸化城土默特兵千隨北路大軍𠞰達瓦齊於伊犂喇嘛扎布獻馬三百助敘功授一等台吉命乾清門行走二十一年奉命隨承恩公明瑞赴巴里坤徙厄魯特達什達瓦部衆於阿爾台並以其女妻和託輝特郡王青衮咱卜會青衮咱卜叛詔隨左副將軍喀爾喀親王成衮扎布由烏里雅蘇台進𠞰偵青衮咱卜欲遁俄羅斯復隨參贊大臣納穆扎爾等輕騎尾之抵杭哈將噶斯青衮咱卜就擒捷聞詔增設土默特一旗封喇嘛扎布為輔國公授扎薩克𨽻烏蘭察布盟敕曰朕仰荷天庥撫綏區宇中外臣工凡有效力宣猷勞績茂著者罔弗優封爵秩用奬忠勤爾土默特一等台吉喇嘛扎布追擒叛逃奮勇有功朕甚嘉之爾其副朕豢養之隆恩歸撫爾旗人衆恪守典常靖共爾職勿蹈愆尤敗乃成業國有常刑勗哉毋斁二十五年以不入覲及違例妄行罪議削爵諭曰喇嘛扎布自優封公爵以來不思感激朕恩奉公守法乃日耽逸樂恣意妄為本應照議削爵但念公爵究係從前勤勞所得著加恩免削其扎薩克及乾清門行走之處一併革退飭令回旗效力三十一年卒子索諾木旺扎勒襲一次襲索諾木旺扎勒喇嘛扎布次子乾隆三十一年襲輔國公四十九年詔世襲罔替原授土默特左翼都統古祿格列傳居歸化城之土默特今改襲三等子兼三等男古祿格土默特人姓納喇其先本姓土默特因滅扈倫國之納喇部遂以為姓世居葉赫部古祿格以葉赫部亡往依土默特部博碩克圖汗於歸化城號楚琥爾嗣博碩克圖汗卒察哈爾林丹汗攻滅土默特役屬之天聰六年大軍征察哈爾古祿格偵林丹汗由歸化城西遁懼掠匿山呰乃免旋請內附九年來朝優賚之崇德元年授左翼都統與右翼都統杭髙並駐守歸化城三年春以喀爾喀扎薩克圖汗擁衆逼歸化城馳疏聞上統大軍征之扎薩克圖汗遁師旋諭古祿格及右翼都統杭髙曰爾等所守城小壕狹勢難禦敵宜於城外建築層垣以資捍衛垣如城然髙一丈五尺濶稱之俾可屯兵其上垣四面置四門門各置甕城四隅各建望樓垣外環以深壕工竣之日內城外垣嚴加防守敵自不敢窺伺爾等其善為之夏率參領韜瑚等九十六人來朝遣官迎宴詔授一等男爵賜弓矢冠服冬遣烏巴什等貢朝珠文綺四年獻所獲明嵗給幣五年授其子烏克蘇穆佐領職俾協守歸化城六年正月古祿格遣弟巴圖等貢駝馬三月復遣使納穆習禮等解送來降蒙古奬賜白金有差順治元年遣使獻方物賜雕鞍