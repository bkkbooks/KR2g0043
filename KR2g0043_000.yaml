body:
  text: 欽定四庫全書欽定外藩蒙古回部王公表傳卷首諭旨乾隆四十四年七月二十九日奉上諭我國家開基定鼎統一寰區蒙古四十九旗及外扎薩克喀爾喀諸部咸備藩衛世篤忠貞中外一家逺邁前古在太祖太宗時其抒誠效順建立豐功者固不乏人而皇祖皇考及朕御極以來蒙古王公等之宣猷奏績著有崇勳者亦指不勝屈因念伊等各有軍功事實若不為之追闡成勞裒輯傳示非奬勳猷而昭來許之道著交國史館會同理藩院將各蒙古扎薩克事迹譜系詳悉採訂以一部落為一表傳其有事實顯著之王公等即於部落表傳後每人立一專傳則凡建功之端委傳派之親疏皆可按籍而稽昭垂奕世該總裁大臣等即選派纂修各員詳慎編輯以清漢蒙古字三體合繕成帙陸續進呈候朕閲定成書後即同宗室王公表傳以漢字録入四庫全書用垂久逺其各部落並將所部之表傳專傳以三體合書頒給一册俾其子孫益知觀感奮勵副朕推恩念舊至意乾隆四十四年九月初二日奉上諭朕因內外扎薩克等於皇祖皇考及朕臨御以來宣力勤勞克懋厥績者甚多已交國史館會同理藩院將伊等從前功績追表各立表傳以示悠久再各城回子等自投誠以來在軍營宣力勤勞業已晉封王貝勒貝子亦復不少理宜一體施恩纂立表傳著交該部查明伊等內實心效力克奏軍功者會同國史館與蒙古王公一體纂立表傳宣諭以示朕優恤回臣一體之意欽定外藩蒙古回部王公表傳卷首欽定四庫全書欽定外藩蒙古回部王公表傳目録卷之一表第一科爾沁部表扎賚特部表杜爾伯特部表郭爾羅斯部表卷之二表第二喀喇沁部表土默特部表卷之三表第三敖漢部表奈曼部表巴林部表扎嚕特部表阿嚕科爾沁部表翁牛特部表克什克騰部表喀爾喀左翼部表卷之四表第四烏珠穆沁部表浩齊特部表蘇尼特部表阿巴噶部表阿巴哈納爾部表卷之五表第五四子部落表茂明安部表烏喇特部表喀爾喀右翼部表卷之六表第六鄂爾多斯部表卷之七表第七喀爾喀土謝圖汗部表卷之八表第八喀爾喀車臣汗部表卷之九表第九喀爾喀扎薩克圖汗部表卷之十表第十喀爾喀賽因諾顔部表卷之十一表第十一阿拉善厄魯特部表青海厄魯特部表卷之十二表第十二西藏部表杜爾伯特部表卷之十三表第十三土爾扈特部表和碩特部表卷之十四表第十四哈密回部表吐魯畨回部表卷之十五表第十五居京師之厄魯特表居歸化城之土默特表居察哈爾之和碩特表居黑龍江之厄魯特表居科布多之扎哈沁表卷之十六表第十六居京師之回爵表居新疆之回爵表卷之十七傳第一科爾沁部總傳土謝圖汗奧巴列傳附多羅貝勒沙津列傳卷之十八傳第二扎薩克和碩達爾漢巴圖魯親王滿珠習禮列傳附和碩卓哩克圖親王烏克善列傳附和碩毅親王色布騰巴爾珠爾列傳卷之十九傳第三附多羅郡王竒塔特列傳附多羅貝勒綽爾濟列傳附固山貝子喇什列傳附固山貝子烏爾呼瑪爾列傳附輔國公圖訥赫列傳附輔國公噶爾弼列傳附輔國公哈達列傳卷之二十傳第四扎薩克多羅扎薩克圖郡王布達齊列傳扎薩克多羅冰圖郡王洪果爾列傳追封多羅貝勒棟果爾列傳附固山貝子色布騰多爾濟列傳扎薩克鎮國公喇嘛什希列傳卷之二十一傳第五扎賚特部總傳追封固山貝子蒙衮列傳杜爾伯特部總傳扎薩克固山貝子色稜列傳卷之二十二傳第六郭爾羅斯部總傳扎薩克鎮國公布木巴列傳扎薩克一等台吉畢哩衮鄂齊爾列傳附輔國公固穆列傳卷之二十三傳第七喀喇沁部總傳扎薩克多羅杜稜貝勒固嚕思竒布列傳附固山貝子敏珠爾喇布坦列傳附輔國公羅卜藏車布登列傳卷之二十四傳第八扎薩克鎮國公色稜列傳扎薩克一等塔布囊格哷爾列傳附追封輔國公丹巴列傳卷之二十五傳第九土默特部總傳扎薩克達爾漢鎮國公善巴列傳附喀爾喀多羅貝勒巴爾布冰圖列傳扎薩克固山貝子固穆列傳卷之二十六傳第十敖漢部總傳扎薩克多羅郡王班第列傳附追封多羅郡王索諾木杜稜列傳附多羅貝勒羅卜藏列傳附固山貝子三濟扎勒列傳附固山貝子羅卜藏錫喇布列傳卷之二十七傳第十一奈曼部總傳扎薩克多羅達爾漢郡王衮楚克列傳卷之二十八傳第十二巴林部總傳扎薩克多羅郡王色布騰列傳附固山貝子德勒克列傳扎薩克固山貝子滿珠習禮列傳附固山貝子色稜列傳卷之二十九傳第十三扎嚕特部總傳追封扎薩克多羅貝勒內齊列傳追封扎薩克多羅達爾漢貝勒色本列傳附追封鎮國公瑪尼列傳附輔國公朋素克列傳卷之三十傳第十四阿嚕科爾沁部總傳追封多羅貝勒扎薩克固山貝子穆彰列傳卷之三十一傳第十五翁牛特部總傳扎薩克多羅杜稜郡王遜杜稜列傳附固山貝子鄂齊爾列傳附鎮國公噶爾瑪列傳扎薩克多羅達爾漢岱青棟岱青列傳卷之三十二傳第十六克什克騰部總傳扎薩克一等台吉索諾木列傳卷之三十三傳第十七喀爾喀左翼部總傳扎薩克多羅貝勒衮布伊勒登列傳卷之三十四傳第十八烏珠穆沁部總傳扎薩克和碩車臣親王多爾濟列傳附鎮國公塔旺扎木素列傳附輔國公德勒克旺舒克列傳扎薩克多羅額爾德尼貝勒色稜列傳卷之三十五傳第十九浩齊特部總傳扎薩克多羅額爾德尼郡王博羅特列傳扎薩克多羅郡王噶爾瑪色旺列傳卷之三十六傳第二十蘇尼特部總傳原封扎薩克多羅郡王騰機思列傳附多羅貝勒薩穆扎列傳扎薩克多羅杜稜郡王素塞列傳附多羅貝勒噶爾瑪列傳卷之三十七傳第二十一阿巴噶部總傳扎薩克多羅卓哩克圖郡王多爾濟列傳扎薩克多羅郡王都思噶爾列傳附固山達爾漢貝子多