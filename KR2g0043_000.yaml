臣緩行俟諭曰此奏甚屬錯謬策楞率師進𠞰為時已久兵力亦復不多亟宜繼進策應扎拉豐阿既為副將軍身荷重任當奮勇效力迅奏膚功乃稱候印緩行殊不識事理輕重况達爾黨阿帶兵行走到期亦未可預定著即傳諭扎拉豐阿馳赴策楞處協𠞰如策楞已趨伊犁伊即駐額琳哈畢爾噶辦事二十一年正月扎拉豐阿至策楞軍詔仍預參贊二月復授定邊右副將軍隨策楞進𠞰伊犁會訛傳阿睦爾撒納就擒策楞等遽以聞已而諜阿睦爾撒納竄哈薩克遣參贊大臣玉保往追而自與扎拉豐阿屯伊犁諭責在事諸臣四月諭曰扎拉豐阿身為副將軍一籌莫展著削郡王爵降授貝子品級來京候旨五月復命削貝子品級飭還牧阿睦爾撒納之竄哈薩克也上嚴諭玉保以兵索達爾黨阿繼進策楞與扎拉豐阿尾應而策楞等以牧馬留登努勒台且檄達爾黨阿玉保還命逮策楞等治罪扎拉豐阿以蒙古人不更事僅豫削職命甫降扎拉豐阿已隨定西將軍達爾黨阿馳赴哈薩克詔復授公品級七月師至雅爾拉阿睦爾撒納與哈薩克汗巴巴糾衆二千餘伏谷扎拉豐阿等擊斬五百餘級擒十一人賊潰走追至努喇復斬三百餘級阿睦爾撒納易服遁捷聞上嘉其功仍封貝子會扎拉豐阿以馬瘠請撤兵召入覲諭曰扎拉豐阿前奉朕切責之旨始進攻哈薩克今則聞命遽還蓋伊見事有難成遂託故而還即此可見伊尚未改觀望之習不得仍為貝子著降授輔國公二十二年賜紫轡二十四年正月署蒙古正紅旗都統十一月詔復貝子二十六年授漢軍正黃旗都統二十七年仍授領侍衛內大臣三十年調蒙古鑲白旗都統三十八年授御前大臣四十四年諭曰貝子扎拉豐阿在御前行走有年頗屬奮勉出力伊父僧衮扎布原係貝勒著加恩晉封貝勒如其父爵四十五年兼襲扎薩克鎮國公諭曰朕因鎮國公濟克濟特扎布獲罪將所遺扎薩克授貝勒扎拉豐阿兼襲但念此鎮國公爵原係其祖色稜效力軍營所封嗣後出缺時貝勒或應停襲公爵仍世襲罔替四十八年四月扈駕幸盛京扎拉豐阿道疾上追念前功仍封郡王賜三眼孔雀翎遣歸牧行次遙亭卒提督剛塔以聞諭曰扎拉豐阿宣力內廷有年適因患病遣歸調攝冀速就痊今聞溘逝深堪軫惻若即令伊櫬歸牧朕心尤為不忍著加恩令伊子丹巴多爾濟入京治喪畢再歸遊牧丹巴多爾濟幼著賞銀四千兩派內大臣金簡經理其喪先派御前侍衛豐紳濟倫迎奠茶酒令丹巴多爾濟扶柩由東直門入到日遣皇十七子出城迎接仍至伊家奠醊其祭儀悉照郡王例辦理七月理藩院請停襲郡王令丹巴多爾濟襲鎮國公特命襲扎薩克固山貝子八次襲丹巴多爾濟扎拉豐阿長子初尚郡君授固山額駙郡君卒復尚縣君詔留固山額駙秩乾隆四十四年授一等塔布囊四十七年擢鑲白旗蒙古護軍統領四十八年五月升正紅旗蒙古都統七月襲扎薩克固山貝子四十九年理藩院議丹巴多爾濟所襲貝子係恩封例弗豫襲出缺時應襲其祖色稜所遺扎薩克鎮國公原爵其貝子爵奏聞請旨詔如議扎薩克一等塔布囊格哷爾列傳今襲公品級格哷爾喀喇沁部人姓烏梁罕杜稜貝勒固嚕思奇布從孫曽祖萬丹偉徴天聰三年偕蘇布地來朝尋從征察哈爾九年從征明至遼河源遇明哨卒偕塔布囊色稜奮擊之崇德元年敘功授一等塔布囊三年從貝勒嶽託自密雲墻子嶺入明邊敗其兵二千順治十三年卒子額林臣尚郡主授多羅額駙孫茂秀嗣塔布囊子二長即格哷爾初名默納克後賜今名次們都尚鄉君授額駙康熙二十五年格哷爾襲一等塔布囊四十四年以族屬繁積三十八佐領命增設一旗授格哷爾扎薩克五十四年四月大軍防禦策妄阿喇布坦詔選所部兵赴推河八月右衛將軍費揚固以病解任詔格哷爾偕散秩大臣祁里德統右衛及外藩軍務尋以擒厄魯特賊羅卜藏錫喇布功擢參贊大臣五十八年卒無嗣弟們都之子喀寧阿襲一次襲喀寧阿格哷爾從子尚郡主授和碩額駙康熙五十九年襲扎薩克一等塔布囊乾隆五年卒子齊齊克襲二次襲齊齊克喀寧阿長子乾隆五年襲扎薩克一等塔布囊十九年晉公品級賜孔雀翎三十九年卒子瑪哈巴拉襲三次襲瑪哈巴拉齊齊克長子乾隆四十年諭曰齊齊克子瑪哈巴拉年雖幼材堪造就著加恩仍賜公品級襲扎薩克一等塔布囊四十九年理藩院議瑪哈巴拉所襲扎薩克應令世襲罔替至公品級係恩封例弗豫襲俟出缺時請旨詔如議五十一年尚鄉君授額駙附輔國公丹巴列傳丹巴扎薩克塔布囊格哷爾從叔父祖德爾格爾以從征功授三等塔布囊父扎木素從大軍敗噶爾丹於烏蘭布通授二等塔布囊雍正八年丹巴以二等塔布囊駐防阿爾台軍營詔晉一等塔布囊九年隨靖邊大將軍傅爾丹𠞰噶爾丹䇿凌於和通呼爾哈諾爾力戰被創卒命優恤追封輔國公以其子丹津襲詔世襲罔替一次襲丹津丹巴長子雍正十年襲輔國公乾隆十八年卒子托克托瑚襲二次襲托克托瑚丹津長子乾隆十八年襲輔國公二十二年卒無嗣弟溫都爾瑚襲三次襲溫都爾瑚丹津第三子乾隆二十二年襲輔國公欽定外藩蒙古回部王公表傳卷之二十四欽定四庫全書欽定外藩蒙古回部王公表傳卷之二十五傳第九土默特部總傳土默特部在喜峯口外至京師千里東西距四百六十里南北距三百有十里東界陽什穆牧場西界喀喇沁南界盛京邉墻北界喀爾喀左翼及敖漢土默特分左右翼異姓同牧主左翼者為元臣濟拉瑪裔自濟拉瑪十三傳至善巴與喀喇沁為近族主右翼者為元太祖裔自元太祖十九傳至鄂木布楚琥爾生子固穆與歸化城土默特為近族天聰三年善巴鄂木布楚琥爾各率屬來歸八年六月選兵從征明頒示軍律七月由獨石口入明邉會大軍於保安州