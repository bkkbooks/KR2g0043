欲代解偕同族俄木布額爾德尼上書乞好上因其書不稱名詞近悖慢切責之七年俄木布額爾德尼等詭稱行獵私入歸化城界掠牧産遣官飭歸所掠會素巴第卒子諾爾布嗣稱畢錫哷勒圖汗遣使入貢諭曰朕本欲許爾等和好故命察歸所掠以贖前罪今爾等反以朕留爾逃人為詞是何心耶朕統一四海爾等彈丸小國勿恃荒逺勿聽姦詞致隕爾緒十二年諾爾布偕俄木布額爾德尼各遣子來朝謝罪十四年復偕同族車臣濟農昆都倫陀音奉表乞好詔宥前罪十六年遣大臣齎服物諭賚之先是喀爾喀左右翼設八扎薩克諾爾布及俄木布額爾德尼車臣濟農昆都倫陀音各領右翼扎薩克之一諾爾布卒子旺舒克襲仍號扎薩克圖汗俄木布額爾德尼卒子額琳沁襲號羅卜藏台吉康熙元年額琳沁以私憾襲殺旺舒克奔就厄魯特其叔父衮布伊勒登避難來歸封扎薩克貝勒駐牧喜峯口外察罕和朔圖詳喀爾喀左翼部總傳九年命旺舒克弟成衮襲扎薩克圖汗號輯其衆二十三年成衮以額琳沁之亂屬衆潰多往依左翼土謝圖汗部察琿多爾濟屢索不獲與搆釁命阿齊圖格隆等諭解之會成衮卒厄魯特噶爾丹謀掠喀爾喀誘成衮子沙喇攻察琿多爾濟沙喇因會噶爾丹於固爾班赫格爾台吉德克德赫等從往察琿多爾濟惡之追殺沙喇及德克德赫二十七年噶爾丹以兵三萬掠喀爾喀至杭愛山所部大潰沙喇弟䇿旺扎布偕同族色稜阿海等相繼來歸詔附牧烏喇特諸部界三十年駕幸多倫諾爾會閲以所部屢經變亂被芟夷詔封色稜阿海等王貝子台吉有差各授扎薩克令集所屬編佐領撫輯之而以䇿旺扎布為扎薩克圖汗成衮子特封和碩親王統其衆自是始稱扎薩克圖汗部三十一年定所部為喀爾喀西路三十六年詔歸杭愛山遊牧四十年賜牧産贍之尋命䇿旺扎布仍襲扎薩克圖汗號雍正四年遣額駙策凌等赴阿爾台勘所部與凖噶爾界九年大軍𠞰噶爾丹䇿凌詔所部扎薩克等內徙遊牧十年以凖噶爾敗遁諭曰去嵗朕降旨令爾等徙居內地並不感悅遵行屢次催促始勉強遷移今幸大軍於蘇克阿勒達呼及額爾德尼昭兩敗賊衆爾等始得安居否則豈能保護牲畜乎朕思爾等本屬一體豈有甘居庸懦受人庇蔭之理嗣後各宜激烈奮發不惟永享升平亦且垂光史册矣是年扎薩克圖汗䇿旺扎布以從征退縮罪削爵詔郡王朋素克喇布坦子格埒克延丕勒襲汗號十二年調兵駐防察罕廋爾乾隆元年選兵赴鄂爾坤防秋二年定邊大將軍平郡王福彭奏喀爾喀四部防秋兵皆駐鄂爾坤扎薩克圖汗部駐牧扎克拜達哩克西南距鄂爾坤尤邇請即令在彼駐防徵調無難即至詔如所請五年諭曰前以軍務方興恐爾部遊牧被賊侵擾悉令內徙今噶爾丹䇿凌謹遵朕旨奏稱不敢越阿爾台遊牧甚屬恭順朕亦降旨令爾部遊牧毋越扎布堪齊克慎哈薩克圖庫克嶺等處爾等當遍諭所屬永逺遵行倘有違令生事者嚴行治罪况今雖許凖噶爾和好罷息干戈而平日不可不訓習武備爾等其留意毋忽六年命參贊大臣副都統慶泰察閲防秋兵於哈里勒邁十三年選駝五百運歸化城米赴塔密爾軍營十六年敕禁所部越境與凖噶爾及回衆私市十七年選兵千駐防錫喇烏蘇二十年隨大軍進𠞰達瓦齊二十二年以其部和託輝特郡王青衮咱卜叛誅之尋諭諸扎薩克曰前因青衮咱卜負恩背叛散布流言衆喀爾喀間有煽動經朕訓諭爾等旋知悔悟各奉職守今逆賊就誅黨附人等應分别治罪以彰國憲但爾等為國家臣僕百餘年誤聽浮言致干罪戾並非有心附賊免其查究嗣後益宜仰體朕恩湔滌前愆約束所屬各案本業綏靜邊隅長享太平之福先是扎薩克圖汗部編佐領分十旗後增八旗附厄魯特一旗扎薩克十有九盟於扎克畢賴色欽畢都哩雅諾爾設正副盟長各一副將軍參贊各一爵二十有二扎薩克圖汗兼多羅郡王一附公品級三等台吉一由輔國公降襲扎薩克郡王品級多羅貝勒一扎薩克鎮國公二一由貝勒降襲一由扎薩克台吉晉襲扎薩克輔國公六一由貝子降襲附輔國公一扎薩克一等台吉八附輔國公一厄魯特扎薩克一等台吉一原封扎薩克圖汗和碩親王䇿旺扎布列傳以罪削爵其族弟多羅郡王格埒克延丕勒襲扎薩克圖汗别有傳䇿旺扎布喀爾喀部人姓博爾濟吉特元太祖裔格哷森扎扎賚爾琿台吉之七世孫其曽祖曰素巴第為喀爾喀三汗之一號扎薩克圖汗子諾爾布繼之有子四長綽墨爾根次旺舒克次成衮次噶爾旦呼圖克圖成衮子三長沙喇次色布騰次即䇿旺扎布初旺舒克嗣父諾爾布稱汗為同族羅卜藏台吉額琳沁所戕土謝圖汗察琿多爾濟及丹津喇嘛兵擊之額琳沁奔厄魯特旺舒克兄綽墨爾根因自立為汗以未請於朝衆弗附多歸察琿多爾濟康熙九年詔廢綽墨爾根以成衮襲扎薩克圖汗二十一年命都統阿密達等往賚冠服佩帶弓刀器幣成衮既襲汗遣告察琿多爾濟索逃衆匿弗豫至是厄魯特台吉噶爾丹送額琳沁歸成衮以舊列八扎薩克令隨已入貢額琳沁懼前罪約俄羅斯攻成衮成衮覺遣子沙喇率兵萬餘襲執額琳沁尋逸復奔厄魯特成衮盡收其户畜復遣赴察琿多爾濟所索逃衆會達賴喇嘛遣阿爾布奈召察琿多爾濟與成衮盟卒弗聽成衮自是與察琿多爾濟交惡二十三年遣阿齊圖格隆約達賴喇嘛使赴其部諭和會達賴喇嘛所遣參巴陳布呼圖克圖至歸化城疾卒召阿齊圖格隆還二十五年達賴喇嘛復遣噶爾旦西勒圖往尚書阿喇尼齎敕會未至成衮卒詔其子沙喇襲扎薩克圖汗尋隨阿喇尼赴庫掄伯勒齊爾與察琿多爾濟盟察琿多爾濟僅歸逃衆之半復交惡二十六年噶爾丹與察琿多爾濟搆兵沙喇女兄之夫曰阿喇布坦為噶爾丹戚族噶爾丹誘沙喇往會沙喇因率台吉德克德赫卓特巴移牧就阿喇布坦察琿多爾濟追及之沙喇被殺屬衆潰二十七年噶爾丹掠杭愛山遷沙喇妻布尼達喇子巴朗恭格格色克居阿爾台山陽䇿旺扎布隨母扎爾穆轉徙年餘遂相失二十九年三月巴朗等由阿爾台逃歸遇卓特巴偕內附聞同族嶽蘇圖阿海遊牧烏蘭往依之五月來朝乞襲汗上憫其父沙喇無辜被殺欲俟會閲以雪其寃而後命之襲未許也明年四月駕幸多倫諾爾巴朗與弟恭格已相繼卒格色克以幼不能赴䇿旺扎布自與母相失困靡依至是長史瑪尼圖以小車載之入覲諭曰扎薩克圖汗沙喇存日抒誠奉貢備著勤勞若其子巴朗尚在即應襲封但今已身故䇿旺扎布係沙喇弟年雖幼衆皆稱賢著加恩封和碩親王代領部衆尋召宴御前䇿旺扎布以次應列車臣汗烏默客後特命先之並賜冠服朝珠九月命駐牧歸化城北以嶽蘇圖阿海理旗務十月封格色克輔國公附䇿旺扎布旗别有傳十二月所屬乏食賑之三十一年來朝優賚遣歸初䇿旺扎布有姑曰額爾克布第素克為噶爾丹所掠尋釋歸台吉羅卜藏貧不給諾爾布妾烏特罕默齊克自厄魯特逃歸與遇因偕赴歸化城乞賑會喇嘛商南多爾濟奉使青海攜䇿旺扎布母扎爾穆至詔悉歸策旺扎布令完聚三十五年大軍敗噶爾丹以阿喇布坦謀降未決諭遣長史瑪尼圖往招之至四十二年尚縣主授多羅額駙尋晉和碩額駙命襲扎薩克圖汗號四十四年迎覲喀喇河屯賜鞍馬銀幣嗣是每時巡輒入覲錫賚便蕃雍正九年授所部副將軍隨靖邊大將軍順承親王錫保駐察罕廋爾軍營以額駙郡王䇿凌等敗凖噶爾賊酋大䇿凌敦多卜於蘇克阿勒達呼優賜䇿旺扎布銀五千先是命所部遊牧內徙衆扎薩克戀故土不即徙牲畜多失至是䇿旺扎布自請償詔免十年小䇿凌敦多卜掠克爾森齊老振武將軍傅爾丹由烏遜珠勒邀擊之䇿旺扎布𠞰不力棄軍歸且縱屬劫糧議削爵論死諭曰䇿旺扎布昔為噶爾丹所掠流離遷徙狼狽來歸聖祖仁皇帝憫其窮困收集潰散人户悉以畀之封親王授額駙洊襲汗號恩養備至朕念伊係一部之汗復授副將軍俾赴軍營統兵進𠞰乃甫與賊戰望風奔潰擾動衆心復不歸軍營匆遽移居內地恬不知恥反藉保護遊牧為詞且並不約束所屬任令劫糧沿途商賈亦被侵擾甚玷國家養育之恩理應於削爵後立正典刑但念伊祖父纍代抒誠不忍豫以顯戮著從寬免死永逺監禁朕觀伊族弟多羅郡王格埒克延丕勒人材出衆此次追擊凖噶爾奮勇效力足為所部表率著加恩襲封扎薩克圖汗兼副將軍至䇿旺扎布屬人膽敢劫糧不可不示懲警著御前侍衛旺扎勒赴歸化城傳諭格埒克延丕勒嚴緝治罪欽定外藩蒙古回部王公表傳卷之六十一欽定四庫全書欽定外藩蒙古回部王公表傳卷之六十二傳第四十六扎薩克多羅郡王朋素克喇布坦列傳今係扎薩克圖汗兼襲朋素克喇布坦喀爾喀部人姓博爾濟吉特元太祖裔格哷森扎扎賚爾琿台吉之六世孫曽祖崆奎號車臣濟農居伯蘇特子六長䇿璘楚琥爾生多爾濟見輔國公索諾木伊斯扎布傳次䇿哩斯竒布賽因阿海生巴喇斯騰額哩陀音見貝子博貝傳次固魯諾木齊生博托果見扎薩克台吉哈瑪爾岱青傳次濟農陀音生薩瑪第號額爾德尼濟農即朋素克喇布坦父次察噶斯竒布生烏爾占授扎薩克次諾爾布額爾德尼生衮布扎布封輔國公均有傳初多爾濟為右翼扎薩克之一嘗以濟農號奉貢康熙十九年扎薩克圖汗成衮與多爾濟隙奪濟農號授薩瑪第俾代貢九白理藩院請却其使詔納之二十一年命都統喇克達等往賚冠服佩帶弓刀器幣二十五年朋素克喇布坦嗣稱額爾德尼濟農遣使貢上聞成衮與土謝圖汗察琿多爾濟交惡詔朋素克喇布坦導之修好賜珊瑚朝珠二十九年來朝三十年迎覲多倫諾爾時多爾濟子索諾木伊斯扎布乞襲車臣濟農朋素克喇布坦訴世為額爾德尼濟農奉貢有年不應居索諾木伊斯扎布後且出前所賜朝珠為信詔除濟農舊號封扎薩克多羅郡王三十六年上視師寧夏朋素克喇布坦來朝請駕臨牧許之尋授盟長五十一年卒子格埒克延丕勒襲一次襲格埒克延丕勒朋素克喇布坦長子康熙五十一年襲扎薩克多羅郡王五十四年隨散秩大臣祁里德赴推河防禦䇿妄阿喇布坦五十六年移駐塔斯果爾瑪及哲斯庫布轂爾庫業根會大軍由布嚕勒擒厄魯特羅卜藏錫喇布等還至和通呼爾哈諾爾格埒克延丕勒獻牲畜濟軍雍正八年詔偕同部輔國公通謨克以兵千赴塔爾弼阿嚕誥助前鋒統領定夀防禦凖噶爾時賊酋謀犯阿濟畢濟界定夀屯伊克斯諾爾遏賊衝故令格埒克延丕勒等助之九年秋還駐科布多尋偕侍郎查克丹由烏遜珠勒分擊賊衆於齊克齊諾爾冬十月賊入阿濟掠通謨克屬格埒克延丕勒牧地邇亦被掠振武將軍傅爾丹檄由科布多馳歸即內徙十一月遣侍衛常尼慰諭十年春頒牲糧賑被掠人户並賜銀千兩諭隨建勳將軍達爾濟駐防伯格爾尋授盟長會凖噶爾賊由克爾森齊老轉掠額爾德尼昭為額駙親王䇿凌所敗格埒克延丕勒引兵由拜達哩克追至哈琳城復由布克哈喇追至烏蘭布拉克斬賊數百搴其纛偵走庫爾圖勒夜攻之斬四百餘級獲牲械無算賊潰遁諭奬之方賊衆之掠克爾森齊老也扎薩克圖汗䇿旺扎布棄軍私歸且縱屬劫糧議罪削爵詔格埒克延丕勒襲扎薩克圖汗仍留多羅郡王爵兼授所部副將軍是年冬遵旨議防遊牧奏洪郭爾鄂隆可駐兵千東南百餘里外圖伯䇿克可駐二千西什巴爾台河至濟爾噶朗圖可駐三千請令都統哈什哈副都統綽爾多等率兵分駐詔如議十一年春命督辦軍駝格埒克延丕勒選健駝以獻詔察䇿旺扎布舊屬令轄之尋請入覲諭隨定邊大將軍平郡王福彭駐烏里雅蘇台賜元狐冠服冬請隨額駙䇿凌由科布多進𠞰諭曰爾初襲汗號現駐軍營董率爾屬保護遊牧自可出力報效况軍營蒙古王公甚少爾可無庸隨往十二年五月解駝馬赴科布多以䇿凌入覲諭留屯科布多轄蒙古兵十三年四月還駐烏里雅蘇台十月奏臣遊牧舊在察罕廋爾附近崆格地以凖噶爾掠內移現居鄂爾坤迤西哈魯納不利畜牧請外徙推河伊克鄂拉翁吉等處不惟生計可復且距軍營近效力便詔䇿凌等議尋議所請地為賽因諾顔部親王德沁扎布扎薩克台吉阿保吹木丕勒牧錯處不便應令所屬以納壘察罕和賴西伊克鄂拉等處為界就推河鄂羅克諾爾和爾博爾津阿爾察喀喇托輝東伊克鄂拉山陰廋濟迤西遊牧從之乾隆元年遵旨議駐兵備邊請選內地兵萬駐鄂爾坤三千駐烏里雅蘇台伺賊蹤決進止選西三部兵萬車臣汗部兵五千以三千分駐偉衮特里默及台錫里餘萬二千令副將軍扎薩克等訓練備調至扎布堪台錫里崆格特斯四地請仍設內汛令蒙古遊牧無踰察罕和羅畢留台齊老圖色楞額上以言多可採示廷臣是年命駐防偉衮特里默賜貂冠及裘五年五月定所部遊牧自鄂爾海取中南以博羅椿濟塔爾喇布喀岱罕諾爾黨納爾台圖穆爾哈巴沙喇布魯都竒齊格納阿魯通津鄂倫諾爾達蘭固魯北以額德爾齊德爾伯勒齊爾凖舒瑪勒台桑錦達賚喀喇塔爾阿勒坦噶達蘇為界諭嚴飭屬人毋越汛十月偕䇿凌等議烏里雅蘇台及鄂爾坤専用喀爾喀兵駐防從之六年卒子巴勒達爾襲二次襲巴勒達爾格埒克延丕勒長子乾隆六年襲扎薩克多羅郡王七年來朝諭曰扎薩克汗號尚未承襲已召郡王巴勒達爾偕原封扎薩克圖汗䇿旺扎布兄孫輔國公多嶽特入覲朕思䇿旺扎布身獲重譴兼乏子嗣而格埒克延丕勒自襲汗以來效力軍營甚屬奮勉其子自應承襲况多嶽特又非應襲汗號之人其扎薩克圖汗仍著郡王巴勒達爾承襲是年冬授盟長十三年所屬有多爾濟者匿厄魯特逃人察岱嵗餘巴勒達爾始縛獻額駙䇿凌劾不嚴緝賊罪詔免議十七年偕副都統達青阿以兵三千駐防鄂爾海喀喇烏蘇十八年獻駝馬助軍十九年以杜爾伯特部台吉車凌車凌烏巴什車凌蒙克等率屬降為喀爾喀人所虐詔偕土謝圖汗部扎薩克台吉達什丕勒駐巴雅特防護之未幾車凌蒙克子巴朗叛逃巴勒達爾馳報烏里雅蘇台軍分路追緝奬賜冠服及幣諭仍駐巴雅特二十一年和託輝特逆賊青衮咱卜叛檄杜爾伯特兵赴軍青衮咱卜揚言將盡擒喀爾喀王公治罪巴勒達爾以遊牧密邇和託輝特懼禍私歸上鑒其無他詔定邊左副將軍親王成衮扎布諭勿疑懼令協𠞰青衮咱卜冬授所部副將軍二十三年來朝命乾清門行走二十五年扈駕木蘭行圍命之射賜三眼孔雀翎及黃馬褂三十年命御前行走三十二年賜杏黃轡三十五年卒子齊旺巴勒齋襲三次襲齊旺巴勒齋巴勒達爾長子初授一等台吉賜公品級乾隆二十五年扈駕木蘭行圍賜孔雀翎二十八年署盟長二十九年賜黃馬褂三十二年命乾清門行走三十三年轄烏里雅蘇台軍營學舍三十五年襲扎薩克圖汗兼多羅郡王尋授盟長四十年賜三眼孔雀翎四十三年賜其子貝喇特納公品級四十六年諭曰扎薩克圖汗號因䇿旺扎布獲罪削爵伊族弟格埒克延丕勒承襲至齊旺巴勒齋已襲三世其郡王爵又係齊旺巴勒齋始祖朋素克喇布坦來歸時所封俱著恩豫世襲罔替附輔國公格色克列傳今襲公品級三等台吉格色克原封扎薩克圖汗䇿旺扎布兄沙喇之第三子偕兄巴朗恭格為噶爾丹所遷居阿爾台山陽康熙二十九年來歸居烏蘭三十年四月上幸多倫諾爾會巴朗恭格相繼殁格色克幼不赴因封其叔父䇿旺扎布親王爵代掌部衆十月格色克隨母布尼達喇赴訴京師諭曰舊扎薩克圖汗沙喇之子格色克被噶爾丹所虐逃難來歸雖於多倫諾爾會閲時未至念伊先世通貢有年伊父無辜被殺其子又僅留格色克一人朕甚憫之著加恩封輔國公四十二年來朝乾隆十七年卒子多嶽特襲一次襲多嶽特格色克長子乾隆十七年襲輔國公二十年大軍𠞰達瓦齊以軍營所用馬由喀爾喀購未至定邊左副將軍親王成衮扎布恐後期檄由烏里雅蘇台督解科布多多嶽特私攜所解馬歸牧成衮扎布劾之詔削爵仍解馬贖罪二十二年隨賽因諾顔部郡王車木楚克扎布招降烏梁海宰桑博和勒納木扎勒等單騎赴濟伯拉克堡偵賊為所窘不屈歸詔嘉之授三等台吉賜公品級二十三年烏梁海總管阿拉善攜户百餘叛逃多嶽特隨車木楚克扎布追擒有車根者亦烏梁海總管也縛獻阿拉善收其衆二十四年以隨賽因諾顔部郡王車布登扎布赴伊犁追捕嗎哈沁不力訓飭之二十六年解軍需赴伊犁濟貝子額爾克沙喇軍四十六年理藩院議多嶽特所封公品級例弗豫襲諭曰三等台吉多嶽特原襲伊父格色克輔國公爵因獲罪後在軍營效力又招降烏梁海朕復施恩賜公品級雖於例不應承襲但削除朕復不忍俟出缺時詳察有無功過另降諭旨四十八年卒詔其子幹珠爾扎布襲公品級三等台吉尋諭曰幹珠爾扎布之祖格色克係舊扎薩克圖汗沙喇之子聖祖仁皇帝格外加恩封輔國公格色克卒朕命多嶽特襲嗣因自蹈愆尤旋知悔懼復賜公品級今伊己卒若即將公品級削除祇令幹珠爾扎布承襲原有三等台吉朕實不忍是以加恩仍令襲公品級俟出缺時再行奏聞請旨二次襲幹珠爾扎布多嶽特長子乾隆四十八年襲公品級三等台吉欽定外藩蒙古回部王公表傳卷之六十二欽定四庫全書欽定外藩蒙古回部王公表傳卷之六十三傳第四十七扎薩克多羅貝勒根敦列傳今襲郡王品級根敦喀爾喀部人姓博爾濟吉特扎薩克圖汗格埒克延丕勒族祖號額爾克岱青祖碩壘烏巴什父杭圖岱世為琿台吉居和託輝特杭圖岱兄曰俄木布額爾德尼有子額琳沁以和託輝特兵戕其汗旺舒克奔厄魯特見扎薩克圖汗傳蓋和託輝特為喀爾喀極邊西近厄魯特北近俄羅斯俗喜鬭烏梁海復錯處其間捕貂射獵依木而居納賦和託輝特有事則籍之為兵故和託輝特雖隸扎薩克圖汗實自為一部康熙二十五年尚書阿喇尼奉命赴庫掄伯勒齊爾蒞喀爾喀盟以和託輝特自額琳沁西奔久無主承制授根敦扎薩克使領其衆二十七年噶爾丹侵所部根敦徙屬避色楞額河自引兵擊走噶爾丹將濟喇克偉徴哈什哈等二十八年所部齊巴克塔爾及諾木齊扎朗阿伊爾扎海等附噶爾丹逸走根敦追執之收其户畜乘勝由杭愛山趨阿爾台斬噶爾丹將察罕台吉及烏爾衮而還三十二年遣達爾漢諾顔獻捷先是上以衆喀爾喀內附獨根敦與其族錫布推哈坦巴圖魯為噶爾丹所阻不得歸根敦復轉戰數載貢表久不至詔遣人間道往諭令偕錫布推哈坦巴圖魯內徙至是根敦使至奏由色楞額河南徙杭愛山上嘉悅厚賚其使三十三年四月以錫布推哈坦巴圖魯既內徙根敦弗至遣官赴圖拉河約錫布推哈坦巴圖魯往召之九月根敦遵諭至詔封多羅貝勒仍兼扎薩克三十四年命偵噶爾丹詔所至備給馬會噶爾丹掠巴顔烏蘭根敦復被阻居色楞額河尋移牧齊斯希布三十五年五月上親征噶爾丹遣土謝圖汗部輔國公車木楚克納木扎勒屬齎書赴額格穆爾布爾哈蘇台諭根敦令協𠞰有阿喇布坦者噶爾丹戚族也根敦擊其衆盡降之六月大將軍費揚古遣人由齊斯希特克木齊克往迎根敦九月至自博羅罕請追擒噶爾丹奬賜冠服三十六年獻所降阿喇布坦人户是年卒子松津僧格降襲輔國公一次襲松津僧格根敦長子康熙三十六年襲扎薩克輔國公四十三年卒無嗣根敦嗣子博貝降襲扎薩克一等台吉四十四年所屬人穆庫爾等請以博貝襲輔國公諭曰貝勒根敦子松津僧格曽經承襲輔國公爵因伊身故令根敦嗣子博貝以扎薩克台吉管理旗務今屬人又請承襲公爵朕念根敦從征噶爾丹懋著勤勞著加恩即令博貝襲扎薩克輔國公二次襲博貝根敦嗣子初授侍衛康熙四十三年襲扎薩克一等台吉四十四年襲輔國公五十四年秋七月隨大軍赴推河防禦䇿妄阿喇布坦因言凖噶爾不靖恃烏梁海障之乞往招若抗即以兵取扎薩克台吉濟納彌達阿里雅及根敦羅卜藏兵俱習戰請與同往上韙其議從之九月烏梁海頭目和羅爾邁率屬降先是和羅爾邁居吹河嘗以越界射獵為博貝縛獻上宥其罪諭還巢至是將遣子瑚洛虎納請降博貝至因遷其遊牧赴特斯冬和羅爾邁遁博貝追至哷爾罕什巴爾執之還五十六年三月大軍分路𠞰凖噶爾上知博貝勤慎諭偕署副都統常關保由布嚕勒趨博羅布爾噶蘇自為一路七月敗賊衆於和特克什哩及額納特珂克擒宰桑羅卜藏錫喇布竒爾薩噶勒等以歸五十九年隨征西將軍祁里德由鏗格爾河擊宰桑色布騰降其屬二千餘並擒烏梁海逃衆四百封多羅貝勒籍凖噶爾降衆賜之雍正二年正月來朝諭廷臣曰朕詢貝勒博貝管轄烏梁海何以資生據奏在將軍祁里德處借餉一萬八千餘兩買牲分給各得産業今勝於昔所借項伊自以貝勒俸逐年扣抵朕思博貝宣力戎行勳績卓著且烏梁海均朕百姓豈有朕之百姓而借餉於朕之理所借銀兩著不必扣還諭祁里德知之二月以撤兵詔偕親王丹津多爾濟額駙䇿凌為所部副將軍留駐阿爾台尋賜博貝軍用正白旗纛三年和羅爾邁復遁由阿哩克竄凖噶爾界博貝遣次子額琳沁由托濟邀擒而自赴克木克木齊克緝叛黨誅之四年正月偕䇿凌赴阿爾台勘界初厄魯特與喀爾喀未搆兵時錯處科布多烏蘭固木噶爾丹既滅喀爾喀西境直抵阿爾台故自唐努山陰之克木克木齊克至博木等處皆博貝及來歸之厄魯特貝子䇿稜旺布所屬烏梁海遊牧其地至是䇿妄阿喇布坦奏克木克木齊克舊隸凖噶爾乞還上弗許慮伺間掠烏梁海詔博貝率所部兵千隨前鋒統領定夀駐唐努山陽特斯地防護之尋諭理藩院曰朕詳思克木克木齊克烏梁海皆博貝等所屬和羅爾邁既已就擒交博貝撫恤居之公所但念此等人向在喀爾喀邊外林木中射獵為生與凖噶爾所屬烏梁海接壤又與俄羅斯連界宜令博貝等同大臣前往曉諭令自為預備以防不虞著傳諭博貝知之八年卒子二長班第襲貝勒子青衮咱卜嗣次額琳沁封輔國公子旺布多爾濟嗣後以青衮咱卜叛誅旺布多爾濟襲貝勒三次襲班第博貝長子雍正八年襲扎薩克多羅貝勒九年十一月上以親王丹津多爾濟額駙䇿凌既敗凖噶爾於蘇克阿勒達呼馳疏告捷不列班第名恐駐牧被擾詔順承親王錫保傳諭班第令東徙十二月錫保奏遵旨遣詢班第知前因凖噶爾入掠由原駐桑錦達賚東遷額格地偵賊敗遁由額格至色楞額河同扎薩克根敦等駐牧南北兩岸嶺峻林密兼河流深濶據要害可禦敵報聞十二年獻駝馬助軍大將軍平郡王福彭豫之值辭不受乾隆二年卒子青衮咱卜襲後以謀叛伏誅故不立傳仍載其事附班第傳青衮咱卜既襲扎薩克多羅貝勒授所部副將軍八年以怠玩為額駙䇿凌所劾諭曰朕聞青衮咱卜凡事怠惰並不赴軍營效力去嵗察閲所部防秋兵伊係副將軍所屬兵丁器械全不整飭又將伊本身開入軍營行走之列希圖雙俸經䇿凌察出除名嚴行訓誡喀爾喀副將軍有統轄全部之責為衆蒙古表率豈可稍有怠玩茍且因諭䇿凌傳旨詢問伊俯首無詞理應治罪但既自知其罪姑行寬免飭令嗣後加意奮勉效力贖罪十三年請以其叔父公品級一等台吉額琳沁别授扎薩克許之十六年諭曰青衮咱卜縱所屬人私出汛界與凖噶爾回衆貿易以致潛居烏梁海甚屬疏懈且於特諭擒解之喇嘛扎木闡尚未解到怯懦推諉深負朕恩著革副將軍及扎薩克貝勒爵朕觀額琳沁人材出衆著襲扎薩克多羅貝勒但念青衮咱卜係博貝長孫一旦全削朕心殊為不忍著即以額琳沁所遺公品級扎薩克台吉職令其調補十九年二月隨參贊大臣薩拉爾由崆格進屯卓克索招撫烏梁海尋以額琳沁赴調逗遛獲罪詔仍授青衮咱卜扎薩克貝勒原爵九月隨參贊大臣努三以兵千擊烏梁海宰桑赤倫於阿勒和碩諜遁吹河由喀喇莾奈追擒之盡降其衆令所屬台吉班扎喇克察徙之特斯偉衮地十二月敘功晉封郡王品級復授所部副將軍二十年三月大軍赴伊犁𠞰達瓦齊青衮咱卜引兵先進賜三眼孔雀翎四月以招降烏梁海宰桑齊巴漢等賜佩飾諸物六月至伊犁偕賽因諾顔部郡王納木扎勒齊素嚨等收達瓦齊遊牧獲其孥屬並喇嘛六千餘是月編新降烏梁海旗分補授總管以青衮咱卜習烏梁海情命總轄之先是杜爾伯特車凌蒙克子巴朗叛逃青衮咱卜追至和通鄂博率兵還言巴朗由西路額琳哈畢爾噶遁以故追之不及至是巴朗就擒青衮咱卜言盡妄諭責之達瓦齊就擒大軍旋以舊屬凖噶爾之烏梁海散居汗哈屯等處命青衮咱卜往諭降八月宰桑哈爾瑪什瑪濟岱納木扎勒保衮莽噶拉克納穆克布珠庫鄂木布等相繼降九月諭率烏梁海兵隨參贊大臣哈達哈𠞰叛賊阿睦爾撒納青衮咱卜請選兵五萬俟來嵗進𠞰諭曰前聞青衮咱卜諸事迎合阿逆曾降旨擒治念其情尚可恕旋諭停止以觀後效今詢阿逆屬人供稱青衮咱卜實有以班第薩拉爾參奏之處通信阿逆伊既從中漏泄則聞其叛遁心必惶懼現今所請派兵追𠞰之説不過藉此姑延時日著傳諭哈達哈遵前旨擒解來京方大軍之𠞰達瓦齊也青衮咱卜與阿睦爾撒納同隊交甚昵定北將軍班第參贊大臣薩拉爾密奏阿睦爾撒納逆狀青衮咱卜微聞之私以告阿睦爾撒納叛青衮咱卜潛遣烏梁海人諾爾布丹津赴阿睦爾撒納所至是事發故有擒解之命未幾上追念其招撫烏梁海功宥勿究會烏梁海偽傳阿逆煽哈薩克阿布賚汗入寇仍命青衮咱卜以參贊大臣隨哈達哈進𠞰二十一年五月大軍抵烏梁海青衮咱卜私攜所部兵還牧且遣人赴烏里雅蘇台軍煽衆喀爾喀令散歸蓋自青衮咱卜屢干重譴上不忍置之法恩宥者三至是叛迹顯著不可復逭諭廷臣曰青衮咱卜受朕恩最深去嵗將軍大臣參奏阿逆伊敢私自漏泄百計趨承以致阿逆趾髙氣揚肆行無恥後於追緝之時觀望還縮妄言必得兩路出師五萬方可追擒種種乖謬指不勝屈前此屢欲擒治念伊祖博貝夙著勤勞施恩寬宥今無故自軍營擅歸又揚言額璘沁多爾濟達木巴扎布等治罪之後衆心疑懼而喀爾喀數年以來皆以用兵為纍以其怨望之私托為他人之説妄行瀆奏藐法已極斷難姑容必當明正典刑以示懲戒著傳諭舒明阿蘭泰如已歸遊牧可諭哈達哈等旋師往𠞰如至舒明所駐地方即降旨擒解七月宣諭喀爾喀王公等曰青衮咱卜係獲罪斥革之人復加恩令襲貝勒並授副將軍去嵗從征伊犁封授郡王伊稍有人心自當圖報孰意深負朕恩實出情理之外此次辦理烏梁海授為參贊豫以自新之路伊至烏梁海並未擒獲鄂木布郭勒卓輝等即撤兵還雖自有哈達哈率兵往𠞰伊即退還無關輕重但既為參贊並不奏請諭旨亦未咨報將軍率兵擅還律以軍法罪不容誅且妄造浮言煽惑衆聽其心實不可問試思辦理凖噶爾一事原為喀爾喀經理長久之計命將興師以期一勞永逸然選派爾部官兵俱經賞給錢糧米石購辦牲畜何次不給價值而伊乃謂以連年用兵為纍是誠何心至軍營賞罰乃國家憲典所必行達木巴扎布係管理杜爾伯特遊牧之人縱令巴朗遁走諱匿不報額璘沁多爾濟監視阿逆來京明知叛迹已著袖手旁觀致令脫二人情罪斷無可逭然猶不忍加以顯戮令其自裁此而曲為寬貸國法何在伊乃謂成吉思汗裔向不治罪此語舛謬更甚如朕宗室中有犯刑章者朕又何嘗廢法耶至於稍知奮勉如巴雅爾什第桑齋多爾濟及車布登扎布等則優封顯秩賜賚便蕃伊寧不聞之耶本應除其屬衆削其封爵朕始終眷念舊勳不忍遽令澌滅所有貝勒爵仍著施恩以額琳沁之子輔國公旺布多爾濟承襲先是衆喀爾喀為青衮咱卜所煽或棄汛私歸或乘間肆劫青衮咱卜又分遣其黨誘厄魯特貝子朋素克公丹拜及烏梁海總管赤倫察達克等與同叛及聞諭無不悔悟乞罪八月詔以賽因諾顔部親王成衮扎布為定邊左副將軍率師往擒會哲卜尊丹巴呼圖克圖以青衮咱卜悔罪乞宥具奏詔弗許青衮咱卜窘懼為擁兵自衛計脅所屬伊克和託輝特巴罕和託輝特明噶特哈柳沁托斯奢集努特六鄂拓克及烏梁海十六鄂拓克附已大兵至皆棄去青衮咱卜攜孥由托濟走齊斯吉特謀遁俄羅斯十一月成衮扎布遣參贊大臣納穆扎爾率輕騎往追至杭哈將噶斯擒青衮咱卜及其子車蘇隆多爾濟齊旺扎布巴里械送京師二十二年正月伏誅諸子皆連坐旨宥其幼子巴里諭曰逆賊青衮咱卜親屬理應概豫駢誅但念伊祖母原封貝勒博貝之妻巴勒津年逾八旬孤苦無依博貝曽著勞績不忍令其絶嗣著加恩令巴里與之同居免其正法以示朕格外優恤至意四次襲旺布多爾濟博貝次子額琳沁之子額琳沁初授二等台吉雍正五年隨父博貝追擒烏梁海逃人和羅爾邁於托濟降其衆八年赴科布多軍九年大軍擊凖噶爾於蘇克阿勒達呼額琳沁由烏爾衮援𠞰大敗之十年復敗之於克爾森齊老乾隆八年晉一等台吉尋賜公品級十二年命轄烏梁海降衆十三年授扎薩克十四年烏梁海降人巴黨遁有烏勒木濟者馳告旺布多爾濟追至貢替伯勒齊爾盡擒還理藩院議雖擒獲究因疏懈所致停敘功上以旺布多爾濟聞信疾追奮勇可嘉賜幣尋授二等台吉十六年青衮咱卜坐縱屬私與凖噶爾互市罪削貝勒詔額琳沁代襲其爵即命議定烏梁海出入汛界例十七年授所部副將軍參贊詔隨參贊大臣達青阿等以兵三千赴錫喇烏蘇駐防十八年達青阿緝擅入內汛之宰桑禡木特定邊左副將軍親王成衮扎布檄額琳沁偕車臣汗部公格勒克巴木丕勒助之額琳沁以馬疲弗至禡木特逸成衮扎布劾其逗遛應削爵諭曰額琳沁原係二等台吉朕因其人材出衆行走奮勉授一等台吉復賜公品級嗣因伊兄子青衮咱卜獲罪奪貝勒爵令額琳沁承襲伊自宜感激隆恩益加奮勉乃奉將軍調遣託故不前理應治罪但念伊父博貝舊有勞績仍賞公品級留軍營效力其貝勒爵仍以青衮咱卜襲之伊等若知朕恩效力自贖朕亦不究前愆否則必重治其罪十九年二月隨參贊大臣薩拉爾擒禡木特黨扎木闡等薩拉爾奏額琳沁悔罪奮勉詔封輔國公九月率兵千餘隨薩拉爾𠞰撫烏梁海宰桑察達克車根等於察罕烏蘇十月復擊宰桑禡木特及通瑪木特降之尋命率兵二百赴圖蘇爾勒軍營聽調二十年二月行至松樹塘病卒諭曰額琳沁所封輔國公原非應襲之爵但念伊雖未至軍營中途溘逝亦屬可憫著加恩以旺布多爾濟襲時旺布多爾濟隨西路大軍進𠞰達瓦齊抵伊犁達瓦齊就擒旺布多爾濟偕賽因諾顔部貝勒車木楚克扎布引所部兵千餘還尋以阿睦爾撒納叛隨定西將軍䇿楞由博囉塔勒進𠞰賜孔雀翎二十一年四月遣歸遊牧七月青衮咱卜叛詔旺布多爾濟就近擒獻諭曰逆賊青衮咱卜背恩叛逆所襲之爵自不應復令承襲但念此爵本係博貝所襲且效力有年不忍遽削著加恩即令旺布多爾濟晉襲青衮咱卜所屬盡轄之九月諭旺布多爾濟爾必無與逆賊同謀之事朕可深信昨據貝勒車登扎布屬人告稱逆賊令遷爾遊牧爾雖聽從並非有心附之今大兵已抵和託輝特爾若能擒獻朕必加重賞否即率屬速赴軍營既可永受朕恩且不墮爾祖博貝舊勳况青衮咱卜屬人不過脅從若棄之來歸概免治罪爾其熟思審慮善自為計毋貽後悔十一月旺布多爾濟隨參贊大臣納穆扎爾協擒青衮咱卜賜雙眼孔雀翎尋量給青衮咱卜所屬人户二十二年五月授副盟長六月隨大軍由巴里坤擒凖噶爾叛賊呢瑪於阿爾察圖山諭奬其功賜郡王品級十一月卒於軍時土謝圖汗部一等台吉三濟扎布亦以疾卒將軍親王成衮扎布以聞諭曰旺布多爾濟及三濟扎布久駐軍營黽勉行走前曽降旨令歸遊牧休息今已溘逝深堪憫惻著加恩以旺布多爾濟之子車都布襲貝勒仍賞郡王品級賜銀五百兩治喪三濟扎布之一等台吉亦令伊子三都布多爾濟承襲並賞公品級賜銀三百兩治喪五次襲車都布旺布多爾濟長子乾隆二十二年襲郡王品級扎薩克多羅貝勒二十三年以烏梁海叛賊恩克就擒賜銀幣二十四年扈駕木蘭行圍賜雙眼孔雀翎命乾清門行走二十九年授盟長三十年賜黃馬褂三十五年授所部副將軍四十六年諭曰車都布所襲貝勒原因博貝軍營效力由輔國公晉封之爵著加恩世襲罔替其郡王品級係因車都布之父旺布多爾濟效力所加出缺時朕不忍即行削除是以仍令承襲但即令世襲罔替於例又不可行著暫令承襲如故俟出缺時再行請旨欽定外藩蒙古回部王公表傳卷之六十三欽定四庫全書欽定外藩蒙古回部王公表傳卷之六十四傳第四十八扎薩克多羅貝勒卓特巴列傳今襲鎮國公卓特巴喀爾喀部人姓博爾濟吉特扎薩克圖汗格埒克延丕勒族祖父烏巴岱為賚瑚爾汗次子號達爾瑪什哩琿台吉子二長即卓特巴襲達爾瑪什哩號次諾木齊子額爾德尼衮布授扎薩克台吉别有傳康熙十四年卓特巴遣使入貢二十一年命前鋒參領扎木素等往賚冠服佩帶弓刀器幣二十五年以扎薩克圖汗成衮與土謝圖汗察琿多爾濟搆釁諭卓特巴導之修好二十六年成衮子沙喇謀糾噶爾丹攻察琿多爾濟卓特巴偕同族台吉德克德赫與其謀從沙喇迎噶爾丹尋為察琿多爾濟所追德克德赫被殺卓特巴遁二十九年偕沙喇子巴朗率屬來歸授扎薩克賜居歸化城同族台吉喇布坦納木扎勒鄂齊爾冰圖岱青等相繼降命轄之賜粟賑所屬貧户三十年四月駕幸多倫諾爾卓特巴弗至有遵義台吉朋素克者額爾德尼衮布從子也嗣父阿海岱青為所部扎薩克時以疾卒卓特巴率台吉桑噶斯轄布掠其牧額爾德尼衮布訴諸朝詔奪扎薩克職九月服罪來朝詔封多羅貝勒仍授扎薩克尋以乏食賜粟賑之三十一年卒子二長薩穆多爾濟襲貝勒次喇布坦襲扎薩克台吉别有傳一次襲薩穆多爾濟卓特巴長子康熙三十一年襲扎薩克多羅貝勒三十五年卒子諾爾布班第襲二次襲諾爾布班第薩穆多爾濟長子康熙三十五年襲扎薩克多羅貝勒尋賜牧塔爾弼克哩葉庫布轂爾四十年賜黃馬褂杏黃轡五十九年隨振武將軍傅爾丹由布嚕勒進𠞰凖噶爾至格爾額爾格擒宰桑貝坤等百餘人焚其糧於烏蘭呼濟爾軍旋赴汗庫奎烏伯爾賽堪呼拉濟駐防雍正十二年以縱屬奪軍糧議罪詔降扎薩克鎮國公尋卒子齊巴克扎布先卒孫旺扎勒襲三次襲旺扎勒諾爾布班第孫雍正十二年襲扎薩克鎮國公十三年由哈魯納解牲畜納科布多軍營乾隆十七年卒子瑪哈巴拉襲四次襲瑪哈巴拉旺扎勒長子乾隆十七年襲扎薩克鎮國公三十六年扈駕木蘭行圍賜孔雀翎四十六年諭曰瑪哈巴拉所襲鎮國公係其祖諾爾布班第獲罪降襲之爵著恩豫世襲罔替扎薩克固山貝子博貝列傳今襲輔國公博貝喀爾喀部人姓博爾濟吉特扎薩克圖汗格