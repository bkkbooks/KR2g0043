皮雕翎及俄羅斯鳥鎗命喀爾喀三汗嵗獻白駝一白馬八謂之九白之貢以為常順治三年蘇尼特部長騰機思叛逃豫親王多鐸率師追剿至扎濟布喇克衮布遣喇瑚里等以兵二萬援騰機思為大軍所敗棄駝馬千餘竄額爾克楚琥爾者衮布族也復私掠巴林部人畜詔使責之會所部額爾德尼陀音貢馬至敕歸諭其汗等擒獻騰機思并以所掠歸巴林五年騰機思降衮布等表乞罪詔各遣子弟來朝不從八年以其部不歸巴林人畜僅獻駝十馬百入謝嚴諭詰責十年命侍郎畢哩克圖往察巴林被掠人畜衮布等匿不盡給會喇瑚里之子台吉本塔爾擕衆來歸封扎薩克親王駐牧張家口外塔嚕渾河因詭言巴林人畜本塔爾盡擕往應就彼取並乞遣本塔爾等還諭曰爾等不遵旨遣子弟來朝不進本年九白常貢不盡償巴林人畜冒此三罪反請遣還來歸之人是何理耶今即各遣子弟來朝盡償巴林人畜朕亦弗使本塔爾等還爾等自擇之是年秋遣使補貢九白至張家口詔勿納十二年夏土謝圖汗察琿多爾濟繼其父衮布為左翼長約同族墨爾根諾顔逹爾漢諾顔丹津喇嘛等表遣子弟來朝諭曰爾等遵旨服罪朕不咎既往其應歸巴林人畜缺少之數悉從寬免嗣後逃人至此當即遣還冬復遣使乞盟許之賜盟於宗人府是年設喀爾喀八扎薩克仍分左右翼命土謝圖汗及墨爾根諾顔各領左翼扎薩克之一十五年遣大臣齎服物賚之敕曰朕觀爾等審知天命誠心誓好凡一詔下靡不敬從自茲以往其益勵忠貞仰膺寵眷以慰朕懷柔至意果克恪慎罔懈以獲天眷以承國恩奕世永享太平之福矣康熙二十三年以其部與右翼扎薩克圖汗成衮搆釁命阿齊圖格隆偕逹賴喇嘛使諭解之二十六年察琿多爾濟偕車臣汗諾爾布等疏上尊號諭曰爾等恪恭敬順具見悃忱但宜仰體朕一視同仁無分中外至意自今以後親睦雍和母相侵擾永享安樂庶慰朕懷勝於受尊號也二十七年厄魯特噶爾丹掠喀爾喀察琿多爾濟拒弗勝偕族弟固嚕什喜等擕屬來歸詔附牧蘇尼特諸部界發歸化城倉米贍之二十八年復遣內大臣伯費揚古往賑諭廷臣曰朕聞土謝圖汗屬衆有乏食致斃者深為軫念費揚古採買牲畜尚需時日著速發張家口倉米運往散給計支一月牲畜繼之則衆命可活矣二十九年詔察所屬貧户遣就食張家口三十年春上以察琿多爾濟來歸後車臣汗烏默客扎薩克圖汗成衮子䇿旺扎布踵至喀爾喀全部內附封爵官制宜更定且降衆數十萬錯處應示法制俾遵守將幸多倫諾爾行會閲禮詔理藩院檄察琿多爾濟等隨四十九旗扎薩克先集以俟尚書馬齊奉命往議禮定賞格九等坐次七行以察琿多爾濟為之首夏四月駕至喀爾喀汗濟農諾顔台吉等三十五人以次朝見諭曰爾等以兄弟之親自相侵奪啓釁召侮致全部潰散其時若令四十九旗扎薩克將爾人衆收取爾部早已散亡朕好生之心出於天性不忍視爾滅亡置附界內給豫贍養自古以來未有如朕拯救愛養若此者也用是親臨教誨普加賞賚會同之時見爾等傾心感戴特沛恩施俾與四十九旗同列以示一體撫育罔分中外爾等其知朕意尋命改所部濟農諾顔舊號封王貝勒台吉有差各授扎薩克編佐領仍留察琿多爾濟汗號統其衆自是始稱土謝圖汗部三十一年改喀爾喀左右翼為三路土謝圖汗稱北路三十五年四月上親征噶爾丹所部諸扎薩克奏臣等被噶爾丹掠全部潰賴聖主天威正其罪請從征效力諭曰朕為中外萬國主凡小國危亡罔弗加之撫恤况爾等朝貢有年猝被劫掠百姓流離失所朕以此故躬統大軍除暴安良我朝用兵以來所向無敵此行朕必成功為爾等雪恥捷音指日可至無庸盡行隨往五月大軍既破噶爾丹於昭莫多凱旋大賚之明年噶爾丹竄死朔漠平詔所部歸圖拉河遊牧四十年賜牧産贍給五十四年以準噶爾䇿妄阿喇布坦煽衆喀爾喀命散秩大臣祁里德率大軍赴推河偵禦廷議屯田鄂爾坤圖拉裕軍食詔詢土謝圖汗旺扎勒多爾濟勘奏所部可耕地因言附近鄂爾坤圖拉之蘇呼圖喀喇烏蘇明愛察罕格爾庫爾竒呼扎布堪河察罕廋爾布拉罕口烏蘭固木及額爾德尼昭十餘處俱可耕命公傅爾丹選善耕人往屯種是年詔簡所部兵駐防阿爾台雍正二年移駐察罕廋爾及扎克拜逹哩克三年以增設賽因諾顔部定所部為喀爾喀後路四年旺扎勒多爾濟等因額爾德尼昭乏相宜穀種遣人購之俄羅斯並請助屯田兵糧諭廷臣曰前議屯田時曾有奏言喀爾喀未必踴躍從事者朕思此舉正為伊等計及久逺豈有反不樂從之理今果感恩抒誠與朕意相符殊可嘉尚著交理藩院議敘尋議各豫紀録并賚幣有差詔如議五年以庫掄及恰克圖為所部與俄羅斯互市地詔非市期毋許俄羅斯踰楚庫河界九年選兵隨大軍剿噶爾丹䇿凌十三年撤大軍還詔所部兵留駐鄂爾坤及烏里雅蘇台乾隆元年復選兵赴鄂爾坤防秋六年命參贊大臣都統塔爾瑪善察閲防秋兵於烏克圖爾濟爾哈朗十三年選駝五百運歸化城米赴塔密爾軍營十七年增駐防鄂爾坤兵十九年移駐鄂爾海喀喇烏蘇二十年隨大軍剿逹瓦齊於伊犁二十三年所部被災乏食詔發銀萬兩賑之先是土謝圖汗部編佐領積三十七旗以分設賽因諾顔部析二十一旗𨽻之留十六旗仍𨽻土謝圖汗部尋增四旗扎薩克凡二十盟於汗阿林設正副盟長各一副將軍參贊各一爵二十有一土謝圖汗一扎薩克和碩親王一由貝勒晉襲附公品級一等台吉一扎薩克多羅郡王二一由貝勒晉襲扎薩克固山貝子二一由郡王降襲一由扎薩克台吉晉襲扎薩克輔國公六三由扎薩克台吉晉襲扎薩克一等台吉八一由貝子降襲欽定外藩蒙古回部王公表傳卷之四十五欽定四庫全書欽定外藩蒙古回部王公表傳卷之四十六傳第三十土謝圖汗察琿多爾濟列傳察琿多爾濟喀爾喀部人姓博爾濟吉特元太祖裔格哷森扎扎賚爾琿台吉之五世孫父衮布為喀爾喀三汗之一號土謝圖汗子三長即察琿多爾濟嗣稱汗復受鄂齊賴賽因汗號於逹賴喇嘛與弟哲卜尊丹巴呼圖克圖西第什哩駐牧圖拉河之南額爾德尼昭康熙十六年厄魯特部鄂齊爾圖汗為噶爾丹所襲察琿多爾濟以兵助會鄂齊爾圖汗被戕因與噶爾丹搆難遣台吉色稜逹什引兵三百劫其貢使事聞諭罷兵誓好二十一年命內大臣費揚古等往賚冠服佩帶弓刀器幣二十二年遣長子噶爾旦多爾濟入謝二十四年遣次子多爾濟額爾德尼阿海來朝二十五年以同族扎薩克圖汗成衮劾其收匿逃衆詔理藩院尚書阿喇尼約逹賴喇嘛使噶爾旦西勒圖召察琿多爾濟與成衮盟於庫掄伯勒齊爾并諭哲卜尊丹巴呼圖克圖勸盡遣所收逃衆歸成衮令成衮亦如之會成衮卒子沙喇新襲汗察琿多爾濟僅歸逃衆之半明年疏請給印詔不允先是庫掄伯勒齊爾之盟哲卜尊丹巴呼圖克圖與噶爾旦西勒圖抗禮噶爾丹聞之怒其不尊逹賴喇嘛也又怨察琿多爾濟嘗助鄂齊爾圖汗攻已且以其女妻鄂齊爾圖汗孫羅卜藏衮布阿喇布坦貽書詰責揚言率衆來攻察琿多爾濟奏請往擊詔守前約勿復與噶爾丹搆釁是年秋扎薩克圖汗沙喇暨台吉德克德赫卓特巴等迎附噶爾丹察琿多爾濟追擊之具以聞命傳諭逹賴喇嘛召還噶爾丹而先遣學士拜哩等諭察琿多爾濟罷兵比至察琿多爾濟已執殺沙喇及德克德赫復偕其壻羅卜藏衮布阿喇布坦追斬噶爾丹之弟多爾濟扎卜進屯喀喇額爾竒克察罕額爾竒克地與噶爾丹相拒二十七年春噶爾丹引衆三萬由杭愛山入掠察琿多爾濟暨子噶爾旦多爾濟禦之於特穆爾不克走翁吉噶爾丹偵哲卜尊丹巴呼圖克圖居額爾德尼昭遂分兵越圖拉河東趨克嚕倫掠車臣汗牧地别遣將丹津鄂木布由喀喇卓爾渾攻額爾德尼昭哲卜尊丹巴呼圖克圖攜察琿多爾濟孥避居額古穆爾聞車臣汗牧被掠因南走蘇尼特部界馳告急詔發阿巴哈納爾部兵沿瀚海防禦之秋噶爾丹自克嚕倫還掠圖拉察琿多爾濟悉衆由尼列圖至鄂羅會諾爾鏖戰三日衆潰遂自察衮庫勒踰瀚海會哲卜尊丹巴呼圖克圖籲請內附噶爾丹上書訴其棄好興兵妄殺無辜請勿納上弗許命入居蘇尼特界內鄂琳圖尋諭與噶爾丹會盟議和二十八年察琿多爾濟疏乞免諭廷臣曰朕統御天下窮者救絶者繼離散者使之完聚交惡者使之和協恆欲中外生靈羣底安樂察琿多爾濟與噶爾丹交惡朕屢遣使諭止不肻罷兵以致屬衆潰散窮困來歸朕因其昔日職貢維謹憐而納之留置邊境頒給米粟但念兵端未息生民何日可安是以敕令議和今伊既以會盟為難朕亦不強其諭使知朕意是年同族台吉諾木齊岱青子齊巴克額爾克鄂齊爾子逹什敦多卜等相繼攜屬來歸命轄之三十年夏上幸多倫諾爾撫輯衆喀爾喀以察琿多爾濟前擅殺沙喇等詔所司追議罪先是上未至遣內大臣索額圖諭察琿多爾濟據實陳情至是以所具疏不引罪反諉咎沙喇及德克德赫議削汗號上念其率衆歸誠命宥之仍留土謝圖汗號召覲行幄溫旨慰諭并詢知有子七詔各加封授察琿多爾濟奏臣等垂斃軀賴聖主鴻慈得更生願長此安居樂業共享太平翌日召所部三十五人侍宴賜酒遍飲之諭舒懷共語勿過謹會大閲扈駕從觀以御用帳幕賜之是役也察琿多爾濟感恩隆恨來歸晚及上旋蹕伏地涕零依戀不已諭曰朕欲攜爾至京師但路遙天暑恐生長邊外之人不習內地水土俟他年朕臨幸邊塞時即召爾等相見秋理藩院議土謝圖汗既留故號請令仍貢九白上憫其新附牧産未裕詔寬其期三年尋疏請給地耕作以贍生計許之冬率第四子車稜巴勒來朝三十一年秋上幸塞外駐蹕舒琥爾杲爾察琿多爾濟迎覲行幄冬遣第七子齊旺多爾濟來朝均優賚之蓋自察琿多爾濟攜族附蒙恩納內地噶爾丹以不得逞私忿屢請逐還故土上惡其狡因決䇿親征三十五年駕由克嚕倫視師大敗噶爾丹於昭莫多凱旋察琿多爾濟偕哲卜尊丹巴呼圖克圖等迎覲賀捷厚賚遣歸三十六年來朝以土爾扈特台吉恭格鄂欽車布登三都布等為祖母弟阿玉竒汗族屬代請入貢報可尋賜牧圖拉河東喀里雅爾山界其地居額爾德尼昭東北三十八年卒子七長噶爾旦多爾濟封郡王先卒别有傳子敦多布多爾濟襲汗爵次多爾濟額爾德尼阿海後襲汗次班第逹額爾德尼納木扎勒授扎薩克附見扎薩克台吉班珠爾多爾濟傳次車稜巴勒封輔國公别有傳次衮楚克多爾濟次桑丕勒多爾濟次齊旺多爾濟均授一等台吉一次襲敦多布多爾濟察琿多爾濟孫初襲其父噶爾旦多爾濟扎薩克郡王爵互見彼傳康熙三十九年晉親王尋襲土謝圖汗四十一年以溺職降襲郡王其汗號以多爾濟額爾德尼阿海襲二次襲多爾濟額爾德尼阿海察琿多爾濟次子康熙四十一年襲土謝圖汗五十年卒子旺扎勒多爾濟襲三次襲旺扎勒多爾濟多爾濟額爾德尼阿海長子康熙五十年襲土謝圖汗五十一年來朝五十四年詔給軍符防禦䇿妄阿喇布坦六十年允哲卜尊丹巴呼圖克圖請賜旺扎勒多爾濟印文曰鄂齊賴巴圖土謝圖汗命督理俄羅斯邊境事雍正四年請助給屯田兵糧諭獎之五年授盟長十年卒子四長延丕勒多爾濟次敦丹多爾濟均襲汗次琳丹多爾濟授台吉次敦多布多爾濟亦襲汗四次襲敦丹多爾濟旺扎勒多爾濟次子雍正十年襲土謝圖汗十一年賜親王俸及銀幣先是哲卜尊丹巴呼圖克圖示寂後其弟子襲故號代演黃教由額爾德尼昭移居車掄乾隆六年詔敦丹多爾濟駐守其地護視之八年