布木青海土爾扈特人扎薩克台吉棟從弟其曽祖格爾埒圖為莽海孫詳見棟傳格爾埓圖子色稜吉斯扎布有子三長臧布次伊斯拉裔不著次鄂爾齊子四長諾爾布授扎薩克以叛誅故不立傳次即色特爾布木次衮布扎布次拉蘇嚨扎布雍正元年羅卜藏丹津叛諾爾布附之尋悔罪從凖噶爾族貝勒色布騰扎勒來歸亂定詔宥罪三年詔授諾爾布扎薩克一等台吉九年諾爾布以防凖噶爾設汛騰格里乘間叛率佐領里塔爾等盜掠汛馬奔徙衮額爾吉庫克蘇時和碩特族拉察布附諾爾布叛色特爾布木不從其兄徙牧且以兵勦拉察布於索羅木河副都統格默爾偕輝特公恭格和碩特台吉阿喇布濟等分道擊諾爾布至喀喇郭勒將就擒復逸走窮追至蒙固爾托羅海獲之詔以色特爾布木不從逆賜銀八百兩授扎薩克一等台吉諾爾布之就擒也詭稱青海諸部合謀令率騰格里兵為逆且誣阿喇布濟以青海全軍援尋械至廷臣鞫上其罪稱諾爾布為土爾扈特族微台吉妄行叛逆里塔爾身為佐領附逆作亂皆應斬諾爾布叛時妻孥皆在遊牧請免奴給色特爾布木轄上從其議十三年撤防凖噶爾軍詔所部備兵二千護遊牧以色特爾布木及和碩特台吉達瑪璘色布騰領之乾隆二十一年卒子烏爾占襲一次襲烏爾占色特爾布木長子乾隆二十一年襲扎薩克一等台吉四十七年詔世襲罔替四十九年卒無嗣詔以其叔父衮布扎布之子伊達木襲二次襲伊達木烏爾占從弟乾隆四十九年襲扎薩克一等台吉扎薩克一等台吉達爾扎列傳達爾扎青海土爾扈特人扎薩克台吉索諾木喇布坦多爾濟族子其髙祖翁貴為貝果鄂爾勒克弟子額濟內有子四長瑪哈斯次特穆納次青巴圖爾次庫德特皆遊牧青海瑪哈斯及青巴圖爾裔不著庫德特裔詳扎薩克台吉丹忠傳特穆納子三曰墨爾根濟農額墨根無嗣曰阿玉什其孫即丹忠别授扎薩克曰阿勒達爾子二長察罕喇布坦次達爾扎察罕喇布坦以罪削扎薩克故不立傳雍正元年羅卜藏丹津叛察罕喇布坦偕和碩特親王察罕丹津來歸復從大軍勦逆黨諭嘉之三年詔授察罕喇布坦扎薩克一等台吉時達爾扎授協理二等台吉九年土爾扈特族諾爾布叛和碩特族拉察布亦徙牧遁察罕喇布坦從之達爾扎留牧從副都統達鼐等以兵勦逆黨拉察布尋悔罪歸察罕喇布坦不即降為達鼐等所擒以狀聞疏稱察罕喇布坦舊為土爾扈特族微台吉以不從羅卜藏丹津叛賜爵秩乃無故潛逃軍至又不即降應論罪如律但未乘亂滋事請免死圈禁西寧以其弟達爾扎襲扎薩克令佐領等不𨽻他族諭曰察罕喇布坦前從勦羅卜藏丹津尚屬效力著從寬免死其弟達爾扎著授扎薩克一等台吉以察罕喇布坦給之令其嚴加管轄乾隆十九年達爾扎卒子色布騰多爾濟襲一次襲色布騰多爾濟達爾扎長子乾隆十九年襲扎薩克一等台吉三十四年卒無嗣詔以其伯父察罕喇布坦之子衮楚克襲二次襲衮楚克色布騰多爾濟從子乾隆三十四年襲扎薩克一等台吉四十七年詔世襲罔替扎薩克一等台吉丹忠列傳丹忠青海土爾扈特人扎薩克台吉達爾扎從子祖阿玉什為特穆納次子見達爾扎傳阿玉什子拜博號額爾克濟農丹忠其子也號額爾德尼濟農雍正元年羅卜藏丹津叛不之附三年詔授扎薩克一等台吉乾隆十年卒子納木錫哩䇿旺襲一次襲納木錫哩䇿旺丹忠子乾隆十年襲扎薩克一等台吉十四年卒無嗣阿玉什裔自此絶以族弟都勒瑪扎布襲二次襲都勒瑪扎布其髙祖曰庫德特為丹忠從曽祖三傳至丹津子三長拉扎布次垂扎布皆早卒都勒瑪扎布其季也乾隆十四年詔襲納木錫哩䇿旺所遺扎薩克一等台吉四十七年詔世襲罔替欽定外藩蒙古回部王公表傳卷之八十九欽定四庫全書欽定外藩蒙古回部王公表傳卷之九十傳第七十四公中扎薩克一等台吉車凌納木扎勒列傳車凌納木扎勒青海和碩特人姓博爾濟吉特其髙祖哈納克土謝圖為顧實汗伯兄有子二長秉圖達賴烏巴什次洪果爾秉圖達賴烏巴什子二長圖瑚爾綽克圖次墨爾根瑪拉蓋自哈納克土謝圖祖博貝密爾咱始稱衛拉特汗越四傳至圖瑚爾綽克圖皆世為長嗣圖瑚爾綽克圖子四長塔爾巴額爾克次達木巴達爾濟次僧格子即車凌納木扎勒次扎木揚康熙三十六年哈納克土謝圖裔從達什巴圖爾內附雍正元年羅卜藏丹津叛脅車凌納木扎勒等附之不從賊黨掠其牧以兵拒弗敵集昆弟子姓來歸自編屬丁為佐領二年青海定遣歸牧三年設公中扎薩克二猶滿洲蒙古八旗之公中佐領也其一為喀爾喀族别有傳其一即和碩特族凡三十三台吉詔以車凌納木扎勒領之授一等台吉八年凖噶爾掠其牧上憫之詔攜戚屬居京師十年卒無嗣詔以其伯父達木巴達爾濟之子巴勒丹襲一次襲巴勒丹車凌納木扎勒從弟初授二等台吉以凖噶爾侵牧失其孥孑身赴京師詔優養之雍正十一年襲公中扎薩克一等台吉遣歸青海牧乾隆二十九年卒子達什車木伯勒襲二次襲達什車木伯勒巴勒丹長子乾隆二十九年襲公中扎薩克一等台吉四十七年詔青海諸扎薩克咸世襲罔替惟車凌納木扎勒及喀爾喀達什敦多布所遺扎薩克仍以公中議襲公中扎薩克一等台吉達什敦多布列傳達什敦多布青海喀爾喀人姓博爾濟吉特喀爾喀祖格埒森扎扎賚爾琿台吉有子七名詳喀爾喀部傳鄂特歡諾顔其季也子青達瑪尼默濟克號車臣諾顔有子二長唐古特墨爾根岱青三傳至通謨克授扎薩克輔國公𨽻喀爾喀扎薩克圖汗部别有傳次多爾濟阿喇布坦伊勒登徙牧青海子訥克額爾德尼阿海生達什敦多布不復歸喀爾喀部喀爾喀與和碩特同祖故喀爾喀族之徙牧青海者皆𨽻和碩特族雍正元年和碩特羅卜藏丹津叛脅青海喀爾喀諸台吉附已有根敦者訥克額爾德尼阿海從子也二年聞大軍至迎降王大臣等議青海之喀爾喀請别設旗分佐領令勿𨽻和碩特族允之三年詔喀爾喀族設公中扎薩克一以根敦領之授一等台吉青海厄魯特凡五族設公中扎薩克二一為和碩特族自車凌納木扎勒始别有傳一為喀爾喀族自根敦始未幾以根敦嗜酒且與喀爾喀諸台吉隙不任扎薩克職罷之故不立傳先是噶爾丹侵喀爾喀根敦從多爾濟阿喇布坦伊勒登攜孥奔青海唐古特墨爾根岱青及子本塔爾岱青巴圖爾前卒孫墨德卓哩克圖亦以避難從至後噶爾丹就滅乞由青海還喀爾喀因賜牧阿爾台額爾齊斯烏隴貴界餘仍留處青海墨德卓哩克圖卒子通謨克嗣至是詔根敦自青海往附之乾隆三年上以喀爾喀族聚青海不忍令析處詔簡台吉領之以達什敦多布任公中扎薩克一等台吉四十年卒子羅卜藏車木丕勒先卒孫車德爾襲一次襲車德爾達什敦多布孫乾隆四十二年襲公中扎薩克一等台吉四十七年詔仍世以公中議襲欽定外藩蒙古回部王公表傳卷之九十欽定四庫全書欽定外藩蒙古回部王公表傳卷之九十一傳第七十五西藏總傳西藏即唐古特别稱土伯特至京師萬四千餘里東界四川西界大沙海南界雲南北界青海東西距六千四百餘里南北距六千五百餘里凡四部曰衛曰藏曰喀木曰阿里轄城六十餘衛在四川打箭爐西北諺稱前藏其首城曰拉薩藏在衛西南諺稱後藏其首城曰日喀紫喀木在衛東南其首城曰巴塘阿里居藏極西有城曰達克喇距岡底斯山三百餘里西南徼地漸髙至岡底斯山而極其西北有僧格喀木布諸山亘阿里北二千餘里入喀齊部諸境東北有諾穆汗烏巴什諸山環衛地達西寧凡六千餘里西南有們那克尼爾諸山亘阿里南二千餘里入額訥特珂克境額訥特珂克即古天竺國也東南有達木楚克喀木布諸山亘藏衛達喀木凡七千餘里禹貢曰導黑水至于三危衛藏喀木統為三危喀拉烏蘇經其地入海蒙古謂黑曰喀拉謂水曰烏蘇在唐宋為吐蕃元明即烏斯藏地俗喜浮屠法設紅黃二教以冠别尤重黃教達賴喇嘛班禪喇嘛掌之代理藏務者曰噶卜倫次曰代奔次曰西爾奔次曰尚卓特巴分理兵刑財賦其治民者曰宗奔户五出兵一賦納達賴喇嘛市打箭爐地貢道由西寧入達賴喇嘛班禪喇嘛使稱堪布噶卜倫使稱囊素喀拉烏蘇設堪布喇嘛一穆嚕烏蘇設蒙古宰桑一司郵務唐古特西南布嚕克巴拉達克巴勒布諸國道逺不自至因達賴喇嘛納貢達賴喇嘛居拉薩曰布達拉布達拉與普陀音近普陀山有三一在浙江定海縣一在額訥特珂克之南海一在唐古特即達賴喇嘛居别有伊克昭巴罕昭相傳布達拉為吐蕃贊普建牙所伊克昭為唐文成公主建巴罕昭為吐蕃妻他國女建今猶存唐長慶中與吐蕃定盟碑及文成公主所事佛像班禪喇嘛居日喀紫曰扎什倫布唐古特謂如來相曰昭大曰伊克小曰巴罕福壽曰扎什須彌曰倫布以示慶也達賴喇嘛班禪喇嘛明宗喀巴二大弟子宗喀巴興黃教弟子數千人達賴喇嘛位居首其名曰羅倫嘉穆錯説者謂羅倫嘉穆錯而前行教額訥特珂克巴勒布唐古特諸境凡五十一世率荒邈難稽自羅倫嘉穆錯而後世以化身掌黃教一世曰根敦珠巴二世曰根敦嘉穆錯始立第巴代理所部事三世曰索諾木嘉穆錯即明時所稱活佛鎖南堅錯也明懲唐吐蕃亂思制御之永樂中封畨僧為犬寶法王大乘法王大慈法王闡教王顯教王化教王贊善王護教王凡八王並給敕印成化中大寶法王來朝遣內監以鹵簿送之不達而返索諾木嘉穆錯時諸畨僧莫不俯首稱弟子四世曰雲丹嘉穆錯五世曰阿旺羅卜藏嘉穆錯即所稱第五輩達賴喇嘛也喀爾喀及厄魯特部長敬禮之有藏巴者為唐古特汗居日喀紫第巴奉達賴喇嘛居拉薩不相能本朝崇德二年喀爾喀三汗奏請發幣使延達賴喇嘛四年厄魯特繼至因賜書達賴喇嘛五年遣使往以喀爾喀有違言不果七年達賴喇嘛班禪喇嘛偕藏巴及厄魯特顧實汗遣使貢方物達盛京表稱曼珠師利大皇帝義取文殊佛號且切音與滿洲近也今嵗獻丹書表如之使至賜宴命諸王貝勒宴如次留八閲月八年遣使存問達賴喇嘛稱金剛大士復賜書班禪喇嘛給銀幣器物有差會第巴乞兵厄魯特稱藏巴虐部衆蔑釋教顧實汗自青海擊之事聞賜敕顧實汗復諭藏巴曰爾稱佛法護國遣使上書邇聞為厄魯特所敗特賜函緘嗣當修好勿絶藏巴尋為顧實汗所狀初藏衛及青海巴爾喀木皆𨽻唐古特顧實汗襲青海據之令巴爾喀木納賦復侵藏衛陽崇釋教隂自強給地達賴喇嘛班禪喇嘛遣長子達延轄其衆號鄂齊爾汗第六子多爾濟佐之號達賴巴圖爾台吉順治三年達賴喇嘛顧實汗各遣使貢金佛念珠賚甲胄弓矢皮幣四年達賴喇嘛班禪喇嘛表頌功德獻方物五年烏斯藏闡化王遣僧索諾穆拉什來貢賜妙勝慧智灌頂國師號是年遣使召達賴喇嘛明年嵗在寅達賴喇嘛奏俟辰年入覲九年壬辰正月達賴喇嘛以行期聞鄂齊爾汗使從遣官迎詔定正副貢使賞例十二月達賴喇嘛入覲獻方物賜宴南苑詔建黃寺居之是年明烏斯藏暨長河西魚通寧逺董卜韓胡諸指揮宣慰司獻敕印請內附十年正月賜宴達賴喇嘛於太和殿賚金幣鞍馬二月詔和碩親王碩塞率八旗兵送至岱汗四月遣官齎金册印封為西天大善自在佛領天下釋教普通鄂齊賴達喇達賴喇嘛十三年闡化王遣僧嘉穆錯諾爾布等貢方物先是索諾穆拉什至詔闡化王納明所給敕印比年凡四遣使至是獻舊玉印一及敕書稱闡化王舊為土伯特國主藏巴襲之顧實汗戕藏巴以闡化王歸達賴喇嘛轉給第巴第巴因有闡化王敕印詭遣邉內安島人稱闡化王貢使詔改授闡化王敕印復賜書達賴喇嘛詰第巴罪十七年達賴喇嘛班禪喇嘛鄂齊爾汗表貢方物遣官存問賚雕鞍玉壺等物十八年達賴喇嘛請市茶北勝州允之康熙九年鄂齊爾汗卒賜賻祭子朋素克嗣號達賴汗十四年達賴喇嘛遣使代逆藩吳三桂乞降敕曰吳三桂初叛時朕遣使往諭喇嘛大兵分路進𠞰若吳三桂竄赴唐古特當即擒獻喇嘛奏稱吳三桂曽取延打木結達木二城乃三噶爾瑪地今既發兵攻取防守沿邉若欲徴兵深入惟候詔旨達賴巴圖爾台吉已自唐古特遣赴青海令其有事相援無事則鈐束部衆朕思喇嘛崇尚信義必如所奏而行因以青海蒙古進兵故傳諭滇蜀二省達賴巴圖爾台吉辭松潘路險未即赴喇嘛又奏稱蒙古兵雖強得城池恐貪據且西南地熱風土不宜若吳三桂勢窮悔罪乞免死允降吳三桂背恩謀逆罪不容誅朕豈容伊為裂土罷兵請又靖逆將軍張勇等奏稱青海蒙古入邉侵擾蓋以叛鎮王輔臣倡亂寧羌故也今西陲已晏然無事喇嘛宜恪守前言令達賴巴圖爾台吉等統轄部衆毋得滋事擾民二十二年達賴喇嘛示寂第巴匿不奏嗣是殘喀爾喀及噶爾丹就滅皆第巴為之噶爾丹幼棄家依達賴喇嘛後歸凖噶爾詭言達賴喇嘛授已博碩克圖汗號以所居阿爾台鄰喀爾喀牧謀侵之未幾喀爾喀右翼扎薩克圖汗成衮與左翼土謝圖汗察琿多爾濟搆釁達賴喇嘛遣扎爾布奈定盟察琿多爾濟不從成衮子沙喇訴於朝敕達賴喇嘛擇使善輯喀爾喀達賴喇嘛奏唐古特以噶爾丹西勒圖為尊遣之往蒙古謂喇嘛坐牀者為西勒圖蓋喇嘛大弟子也而喀爾喀哲卜尊丹巴呼圖克圖亦奉詔赴盟壇與議哲卜尊丹巴呼圖克圖者土謝圖汗弟也偕噶爾丹西勒圖集喀爾喀兩翼汗濟農諾顔台吉宣諭定盟噶爾丹偵哲卜尊丹巴呼圖克圖與噶爾丹西勒圖並坐詰責之因搆兵土謝圖汗不敵偕哲卜尊丹巴呼圖克圖挈部內附上以喀爾喀厄魯特奉達賴喇嘛教申命遣使罷兵第巴煽噶爾丹侵喀爾喀索哲卜尊丹巴呼圖克圖二十九年詭為達賴喇嘛表偕唐古特厄魯特汗台吉請上尊號諭曰朕聞喀爾喀部兄弟不睦遣使達賴喇嘛諭令兩翼歸好達賴喇嘛遣噶爾丹西勒圖往不能仰體朕心及達賴喇嘛意雖已和喀爾喀而喀爾喀與厄魯特相仇之故實從此起後聞交惡興戎即遣使達賴喇嘛所達賴喇嘛遣齊緝克塔賴堪布等往卒不能諭止之聽其縱戰喀爾喀為所敗朕復遣使達賴喇嘛所諭令定盟息兵達賴喇嘛遣濟隆呼圖克圖朕遣伊拉古克三呼圖克圖往説之詎意伊等不行諭止反令闌入邉汛朕出兵問罪伊等立視其戰我軍不得已而擊之致厄魯特敗遁朕與達賴喇嘛期於撫育衆生而使臣故違意旨至於如此如能令厄魯特與喀爾喀修好朕尚欲加達賴喇嘛嘉號此皆任事行人不能仰副朕心及達賴喇嘛意致喀爾喀殘破厄魯特喪敗朕心實為隱痛復何尊號之可受乎其以是諭達賴喇嘛及諸汗台吉等來使貢物著並發還三十年以收撫喀爾喀全部諭達賴喇嘛知之三十二年達賴喇嘛使至有巴圖爾額爾克濟農和囉理者青海和碩特族也遊牧西套避噶爾丹侵來歸賜居阿拉善尋叛復悔罪至䇿妄阿喇布坦為噶爾丹從子修怨噶爾丹第巴忌之奏和囉理安置青海保無盜賊虞厄魯特衆半附䇿妄阿喇布坦若生亂端何以禦之唐古特舊市打箭爐請勿禁聽內地民與蒙古互市敇曰和囉理以困窮來歸朕優恤之使居阿拉善乃忘朕豢飬恩妄生猜疑奔竄他所今窮而復歸朕復宥罪安置并無欲得其利欲用其力之心也今爾欲和囉理遊牧青海何不即遣人遷往爾又言䇿妄阿喇布坦恐生亂端目前並無妄為之事茍有此等事端其時自當從公裁度爾又奏打箭爐交市之事殆欲屯戍意也爾與朕一道同風厯年已久如爾設立駐防朕必量增戍卒况我內地兵丁約束甚嚴未嘗私出邉境爾但嚴禁屬衆戍兵之設可無用也達賴喇嘛尋奏年邁事皆決第巴請給之爵詔封第巴為土伯特國王以達賴喇嘛辭異前奏遣使往察不得狀三十四年諭召班禪喇嘛來朝第巴與噶爾丹隂阻之明年班禪喇嘛使至稱避痘達賴汗奏貽書勸赴召不之從會上親征噶爾丹俘降衆得第巴姦狀諭達賴喇嘛班禪喇嘛知之復敕奬達賴汗曰爾自顧實汗以來與本朝和協同心専尚宗喀巴道至汗身益誠信不渝頃噶爾丹陽護宗喀巴法隂為悖逆邪行朕親統大兵勦滅之第巴乃達賴喇嘛下司事之人反不遵達賴喇嘛教惟爾汗敬待朕使預以噶爾丹事奏聞朕知爾不忘舊好甚堅且専凡悖壞教法煽誘噶爾丹者爾汗殆知之特遣使往以示褒善貶惡之意敕責第巴曰爾陽奉宗喀巴教隂與噶爾丹比以久故之達賴喇嘛詐為尚存遣濟隆呼圖克圖至噶爾丹所烏蘭布通之役為擇戰日朕遣人往召班禪喇嘛爾又謂噶爾丹將要殺之不遣行青海博碩克圖濟農與噶爾丹結姻又不舉發爾果能改過仍思遵宗喀巴道奏明達賴喇嘛已故始末尊奉班禪喇嘛使赴朕召執獻濟隆呼圖克圖及博碩克圖濟農子所娶噶爾丹女朕仍待汝以尊崇禮不然朕必問爾欺達賴喇嘛助噶爾丹罪爾向對朕使言四厄魯特為爾護法主爾其召四厄魯特助汝朕將觀何如也三十六年第巴疏詭稱達賴喇嘛存令其使尼麻唐呼圖克圖密奏達賴喇嘛示寂恐唐古特生變故隱期今第六世靜體已十五年乞念唐古特衆勿遽宣遣理藩院主事保住等齎敕諭曰朕數年來久知達賴喇嘛已故今爾輸誠密奏朕不欲摘發隱私傾人家國嗣當益加恭順勿違朕旨保住等行我使自䇿妄阿喇布坦所歸言西北諸厄魯特知達賴喇嘛示寂久第巴阻䇿妄阿喇布坦兵令勿勦噶爾丹復煽青海諸台吉私盟詔保住等視新達賴喇嘛嚴訐第巴罪第巴奏䇿妄阿喇布坦自撤兵非臣阻青海諸台吉懼噶爾丹侵備兵盟第六世達賴喇嘛尚坐禪濟隆呼圖克圖請勿壞身命班禪喇嘛將赴召噶爾丹女乞仍給博碩克圖濟農子賜敕詰責濟隆呼圖克圖尋械至禁之班禪喇嘛奏學淺不敢赴召博碩克圖濟農子察罕丹津奏請免獻噶爾丹女乃允之是年達賴汗遣使慶征噶爾丹捷子拉藏以建達賴喇嘛塔故赴青海聞上招撫使至偕諸台吉內附達賴汗卒拉藏嗣第巴惡之初第巴與䇿妄阿喇布坦讐噶爾丹既滅第巴䇿妄阿喇布坦畏天朝威各卑詞乞命然皆貌恭順懷不靖志䇿妄阿喇布坦詭遣使赴青海聲言兵擊第巴奏第巴壞宗門教禁班禪喇嘛偽立達賴喇嘛名羅卜藏琳沁䇿旺嘉穆錯者惑諸蒙古恐將滋變上燭其姦諭廷臣曰䇿妄阿喇布坦由博囉塔拉至土伯特必經喀拉烏蘇等處路徑險惡斷不能往欲悉衆大舉則附近哈薩克布魯特諸部相仇殺無留護妻孥者若兵單力弱斷難成事惟有奮激而行妻孥與俱幸濟則已否則有歸附土伯特之謀耳其意特張虛聲欲觀青海動靜未必果欲爭戰也䇿妄阿喇布坦果寢兵第巴計毒拉藏不死以兵逐拉藏因集唐古特衆執殺第巴奏至敕封輔教恭順汗諭獻第巴所立達賴喇嘛使至䇿妄阿喇布坦遣人往迎拉藏不豫復不以獻諭曰達賴喇嘛存日六十年來塞外不生一事及身故後第巴誘噶爾丹妄行不靖朕觀奏詞非復昔日語氣遣使細訪乃盡得欺詐狀蒙古素崇佛教有達賴喇嘛名皆皈嚮之倘為䇿妄阿喇布坦所迎歸則西藏蒙古皆向䇿妄阿喇布坦矣拉藏今雖不從朕命後必執之來獻四十六年拉藏汗獻第巴所立達賴喇嘛羅卜藏琳沁䇿旺嘉穆錯道死復立博克達之阿旺伊什嘉穆錯為達賴喇嘛青海諸台吉以不辨真偽爭詔遣官往視拉藏汗奏以班禪喇嘛言置禪榻王大臣等議拉藏汗與青海諸台吉隙請遣官理藏務詔侍郎赫壽往四十九年班禪喇嘛拉藏汗奏阿旺伊什嘉穆錯諳經典青海諸台吉信之請給册印詔封第六世達賴喇嘛撤赫壽歸青海諸台吉訐拉藏汗辭誣以裏塘之羅卜藏噶勒藏嘉穆錯為真達賴喇嘛瑚畢勒罕詔詢班禪喇嘛如拉藏汗言青海諸台吉復固爭上以不輯之將搆難遣官檄集盟壇示班禪喇嘛印文諭徙羅卜藏噶勒藏嘉穆錯置內地青海貝勒察罕丹津台吉羅卜藏丹津等稱避痘不宜逺行初議送紅山寺繼請送西寧宗喀巴寺卒不遣且以兵脅異已者詔大軍備之乃懼送羅卜藏噶勒藏嘉穆錯至宗喀巴寺五十六年偵凖噶爾潛兵赴藏詔赫壽遺書拉藏汗曰將軍富寧安等擒凖噶爾哨卒言拉藏汗子娶䇿妄阿喇布坦女已三年且生子䇿妄阿喇布坦遣其將䇿凌敦多卜及托卜齊都噶爾三都克等率兵往阿里克或䇿妄阿喇布坦侵藏地或爾欲侵青海導䇿妄阿喇布坦兵至俱未可定爾既受我主封食我主祿而侵我邉部我川兵三萬餘豈有聽爾臨諾穆汗烏巴什穆嚕烏蘇境侵青海之理乎彼時助察罕丹津等與爾戰悔無及矣蓋拉藏汗咱仇殺第巴後使貢不絶䇿妄阿喇布坦忌之語哲卜尊丹巴呼圖克圖使拉藏汗嗜酒無謀詭議姻拉藏汗子三長噶爾丹丹忠次索爾扎次色布騰䇿妄阿喇布坦以女博托洛克為噶爾丹丹忠婦來娶留不遣上聞之諭歸拉藏汗子不從西域謂善巫蠱者曰鮓答噶爾丹丹忠習其術䇿妄阿喇布坦誘縳之夾兩釜間烙死遣兵六千襲藏詭稱送噶爾丹丹忠及博托洛克歸拉藏汗前以爭達賴喇嘛與青海諸台吉違言事甫定凖噶爾兵赴藏上疑之或拉藏汗煽䇿妄阿喇布坦搆兵也青海尋以凖噶爾侵拉藏汗告詔荆州太原駐防兵赴成都西安以署西安將軍額倫特屯西寧都統和禮屯雲南護軍統領溫布屯打箭爐侍衛色楞宣諭青海諸台吉備兵時䇿凌敦多卜率凖噶爾衆由特幾斯踰淨科爾庭山拉藏汗不之備賊至達木始覺偕子索爾扎拒不敵奔守布達拉遣使齎疏乞援賊誘噶卜倫沙克都爾扎卜唐古特台古納木扎勒等開布達拉門入戕拉藏汗拘色布騰及宰桑等禁阿旺伊什嘉穆錯於扎克布里廟索爾扎率兵三十餘潰走為所擒其妻間道來奔詔安置博囉充克克優養之明年拉藏汗疏始至詔額倫特色楞往援失利從兵或為凖噶爾所掠䇿凌敦多卜復誘裏塘營官喇嘛等赴藏裏塘外曰巴塘而察木多而乍雅而巴爾喀木皆距近五十八年都統法喇奉詔屯打箭爐以裏塘第巴色布騰阿住達瓦喇木扎木巴等抗不就撫誅之傳檄巴塘察木多乍雅各籍其土及民數復詔自打箭爐進屯巴塘䇿凌敦多卜懼送所掠兵自巴爾喀木歸言唐古特時有瘴凖噶爾難久處羅卜藏噶勒藏嘉穆錯唐古特衆僉稱為真達賴喇嘛若置禪榻善甚命撫逺大將軍固山貝子允禵宣諭青海台吉等從大軍入藏羅卜藏噶勒藏嘉穆錯奏隨地可置禪榻興大兵恐擾衆王大臣等以藏地逺且險不決進兵議五十九年諭曰䇿凌敦多卜聞我師至自必望風逺遁俟定立法教後或暫留兵守視或久鎮其地唐古特衆皆如我兵凖噶爾至以逸待勞何難勦滅西寧至四川雲南境外土畨錯處西藏皆土畨族若䇿凌敦多卜侵據藏地唐古特衆即為凖噶爾兵邉疆土畨復安能保全耶喀爾喀及青海俱服朕風化凖噶爾乃侵據藏地青海台吉理應棄命忘身乃口稱維持黃教乏實心效力人朕思䇿凌敦多卜兵逺道衝雪尚能至藏我兵獨不能赴乎此時若不安藏賊益無所忌憚安藏大兵決宜前進詔封羅卜藏噶勒藏嘉穆錯為宏法覺衆第六世達賴喇嘛賜金册印以護軍統領噶爾弼為定西將軍都統延信為平逆將軍率青海及內扎薩克喀爾喀阿拉善兵護達賴喇嘛行噶爾弼自拉里進擊凖噶爾宰桑春丕勒於章來爾戎抵墨朱工喀第巴達克咱喇嘛鍾科爾等迎降集皮船渡宣諭大小第巴及各寺喇嘛封達賴喇嘛倉庫斷賊糧道誅所置喇嘛總管等延信自青海進敗凖噶爾於卜克河齊諾郭勒綽瑪喇賊由克勒底雅遁軍抵藏出阿旺伊什嘉穆錯於禁所廢之蓋自第五世達賴喇嘛示寂後幾四十年第六世達賴喇嘛始定先是凖噶爾賊未至藏遣理藩院主事勝住喇嘛楚爾沁藏布喇木占巴等往圖地域至是大兵入諸畨內附上以山川名號畨漢異稱命大學士九卿等詳考西南徼外輿地六十年御製平定西藏文碑建伊克昭文曰昔者太宗文皇帝崇德七年班禪額爾德尼達賴喇嘛顧實汗謂東土有聖人出特遣使自人迹不至之區經仇敵之國閲數年始達盛京至今八十載同行善事俱為施主頗極安寧後達賴喇嘛之歿第巴隱匿不奏者十有六年任意妄行拉藏滅之復興其法因而允從拉藏青海羣衆公同之請中間䇿妄阿喇布坦妄生事端動凖噶爾之衆肆行姦詐滅壞達賴喇嘛并廢第五輩達賴喇嘛之塔辱衊班禪毁壞寺廟殺戮喇嘛名為興法而實滅之且欲竊據土伯特國朕以其所為非法爰命皇子允禵為大將軍又遣朕子孫等調發滿洲蒙古緑旗兵各數萬厯煙瘴之地士馬安然而至賊衆三次乘夜盜營我兵奮力擊殺賊皆喪膽逺遁一矢不發平定西藏振興法教賜今瑚畢勒罕册印封為第六輩達賴喇嘛安置禪榻撫綏土伯特僧俗人衆各復生業於是文武臣工咸謂王師西討厯瘴癘險逺之區曽未半載輒建殊勳實從古所未有而諸蒙古部落及土伯特酋長亦合詞奏曰皇帝勇略神武超越往代天兵所臨邪魔掃蕩復興蒙古向所尊奉法教喀木藏衛等部人衆咸得拔離湯火樂土安居如此盛德大業非臣下頌揚所能宣罄請賜御製碑文鐫勒昭地以垂永久朕何功焉而羣衆勤請不已爰紀斯文立石西藏俾中外知達賴喇嘛等三朝恭順之誠諸部落纍世崇奉法教之意朕之此舉所以除逆撫順綏衆興教云爾雍正元年詔給第六世達賴喇嘛册印文視第五世達賴喇嘛别賜敕司噶卜倫務二年大軍討青海叛賊羅卜藏丹津誅助逆喇嘛等諭曰喇嘛助羅卜藏丹津為逆糾數千餘衆抗拒官軍以致追勦覆滅玷辱法教甚矣前凖噶爾據唐古特戮僧徒燬寺廟大軍往討之恢復昭地法教振興如此隆恩不知感激反助悖逆尚可謂遵奉法教者乎其以此諭喇嘛等知之三年川陜總督嶽鍾琪奏打箭爐外裏塘巴塘乍雅察木多中甸請𨽻內地給頭目等土司職察木多外魯隆宗雜哇坐爾剛桑噶吹宗衮卓諸部距打箭爐逺內地遙制不便請𨽻唐古特以噶卜倫康濟鼐阿爾布巴理之遣副都統鄂齊往諭達賴喇嘛蓋自大軍定藏亂以第巴康濟鼐阿爾布巴隆布鼐頗羅鼐等迎降功詔封康濟鼐阿爾布巴固山貝子隆布鼐輔國公理前藏務頗羅鼐扎薩克一等台吉理後藏務各授噶卜倫四年鄂齊奏達賴喇嘛幼康濟鼐恃績蔑視諸噶卜倫阿爾布巴隆布鼐等隂險黨扎爾鼐附之恐搆達賴喇嘛與康濟鼐不睦請罷隆布鼐扎爾鼐翦阿爾布巴翼諭達賴喇嘛偕康濟鼐阿爾布巴和衷復詔設駐藏大臣以副都統瑪拉內閣學士僧格往五年瑪拉等至藏阿爾布巴隆布鼐扎爾鼐殺康濟鼐叛遣賊黨侵阿里頗羅鼐集後藏兵拒賊却走將往擊之馳奏乞援詔左都御史查郎阿率兵萬五千餘赴藏六年頗羅鼐諜大軍將至集後藏及阿里兵九千自潘玉口馳赴前藏聞瑪拉等駐拉薩護達賴喇嘛遣兵助召諸寺喇嘛擒阿爾布巴隆布鼐扎爾鼐等送瑪拉所查郎阿至誅阿爾布巴等及其孥請留兵二千駐藏徙達賴喇嘛居裏塘允之以頗羅鼐領後藏務轄阿里岡底斯境諭給銀三萬賞從兵查郎阿將撤大軍還奏舊設噶卜倫理前藏務今藏地初定頗羅鼐為衆服請令兼領前藏從之諭曰前用兵西藏時頗羅鼐甚為效力其後噶卜倫等嫉妬爭權阿爾布巴隆布鼐等潛結匪類公然肆惡擅殺朝廷敕封貝子總理事務之康濟鼐並欲害及頗羅鼐頗羅鼐奏聞逆黨罪狀朕遣大臣領兵前往察詢情由分别治罪頗羅鼐聞大軍將至率衆奮勇前馳直抵藏地阿爾布巴等力屈勢窮被各寺喇嘛擒獻大臣至彼盡得悖逆妄亂之情已將阿爾布巴及叛逆等盡行殱誅自此黃教可興畨衆可輯頗羅鼐深知大義討逆鋤姦俾無辜受害者得雪沈寃背惡肆行者早正刑辟甚屬可嘉著封為固山貝子以奬義勇以昭國憲明年達賴喇嘛至裏塘詔建噶達寺居之嶽鍾琪奏移化林兵五百往護復以兵四百屯噶達西吹音堡及鴉籠江上中下三渡尋徙泰寧四川總督黃廷桂奏泰寧距打箭爐道險舊屯兵五百不給防禦請增兵如數令與西藏裏塘巴塘互犄角從之大軍之討阿爾布巴也噶爾丹䇿凌使至奏請赴藏煎茶上不允以凖噶爾覬唐古特將不靖七年遣兵討凖噶爾諭曰䇿妄阿喇布坦假黃教為名潛兵入藏無故殺拉藏汗遣使往討復敢阻兵抗命其後䇿妄阿喇布坦身故子噶爾丹䇿凌遣使至奏稱欲使衆生樂業黃教振興噶爾丹䇿凌不過一微末台吉此豈伊應出語耶且西藏阿爾布巴隆布鼐扎爾鼐等濟惡同謀皆以凖噶爾鄰伊地青海叛賊羅卜藏丹津係伊等姻戚彼此相依窘迫時必往投之頗羅鼐勇往直前截賊去路阿爾布巴等未得前進輒被擒凖噶爾若仍留遊牧將來青海及西藏地必受其害此朕所熟思而審處者也明年僧格偕頗羅鼐以兵千五百屯騰格里諾爾防凖噶爾九年布嚕克巴部諾顔琳臣齊壘喇布濟喇嘛扎爾西里布魯克顧濟噶碧棟嚕布等納貢諭曰朕為天下主一視同仁無分中外乃者附近帕爾城之布嚕克巴人等起釁搆兵互相讐殺朕聞之甚不忍頗羅鼐仰體朕意與班禪喇嘛遣使往諭朝廷恩德布嚕克巴人等感悟息爭敬順無違且請施恩訓誨朕甚嘉恱嗣此恪守疆界共相和睦永遵釋教祇奉恩綸朕自益加優眷復以頗羅鼐招撫功詔晉封多羅貝勒總理衛藏噶卜倫務賜敕印班禪喇嘛尋偕頗羅鼐助駐藏軍糧瑪拉却之復固請詔給如值以軍餉足不煩獻助宣諭先是凖噶爾掠索爾扎色布騰禁之哲卜尊丹巴呼圖克圖説䇿妄阿喇布坦獻謝罪不從子噶爾丹䇿凌嗣給索爾扎户十詭稱將遣歸唐古特頗羅鼐聞之以告諭曰凖噶爾戕拉藏汗掠其子索爾扎等歸今稱遣還西藏不可不嚴為防備前䇿妄阿喇布坦遣䇿凌敦多卜襲西藏時誑稱噶爾丹丹忠偕其女歸乘拉藏汗不備襲唐古特地今遣歸索爾扎之言正噶爾丹䇿凌姦計若唐古特少為玩忽即蹈前䇿凌敦多卜故轍矣凖噶爾既殺拉藏汗豈肯令其子索爾扎歸藏襲爵唐古特現有訓練蒙古兵爾其與駐藏大臣等定議設汛阿里哲斯肯圖魯克勒底雅等處協力防禦凖噶爾若以兵隨索爾扎至可即迎擊之索爾扎父兄被人殺害焉有不忿恨之理若果思報仇感戴朕恩率屬來歸爾等自可悉心安頓至若立汗之事當令達賴喇嘛班禪喇嘛奏聞於朕方可建之豈可令噶爾丹䇿凌任意妄行久之索爾扎不至後大軍定凖噶爾色布騰及索爾扎子納噶察始來歸附牧察哈爾旗十年拉達克汗德忠納木扎勒奏臣理國事尊釋教偵凖噶爾情輒以告乞賜恩綸敕曰爾父尼瑪納木扎勒偕貝子康濟鼐同心報效前已大沛恩膏今爾亦效爾父與貝勒頗羅鼐一體效力甚屬勤勞嗣當益加黽勉以紹前徽僧格復奏巴勒布部雅木布車稜庫庫木三汗慕聖德遣貢請覲上憫其道逺敕曰爾汗慕朕仁化萬里輸誠朕甚嘉恱納所進方物第念道路遙逺往返維艱爾使即由西藏遣歸爾汗但與貝勒頗羅鼐協力和衷維持黃教以副朕普育羣生至意十一年諭曰西藏駐劄辨兵本為保護唐古特衆防範凖噶爾設比來賊衆敗竄不能復涉藏地頗羅鼐抒誠效力唐古特兵皆訓練壯勇目今藏地無事兵丁多集米榖錢糧雖給自內地唐古特不無解送勞著量留守藏兵五百餘盡撤還前令達賴喇嘛移駐泰寧因唐古特有阿爾布巴等事恐凖噶爾乘間來犯其從至弟子久違鄉土各懷歸志班禪喇嘛現復年邁有疾著仍遣達賴喇嘛歸藏乾隆元年布嚕克巴部諾顔琳臣齊壘喇布濟等奉表貢三年拉達克汗遣獻方物各賜敇奬四年駐藏副都統杭奕祿奏巴勒布三汗邇搆兵臣遣頗羅鼐諭輯之咸聽命獻所部民數詔優賚復以頗羅鼐績晉封多羅郡王噶爾丹䇿凌尋請赴藏煎茶諭曰朕為天下大君不阻奉教之人爾凖噶爾前曽潛往藏地擾害土伯特衆今若徑赴彼地土伯特或懷憤滋事爾果誠心布施朕當遣兵護往既而凖噶爾煎茶使道棟科爾以爭市值不果往詔責違信罪噶爾丹䇿凌遣謝固申前請允之八年凖噶爾使至藏謂頗羅鼐曰聞拉達克言土伯特黃教盛今信然噶勒招穆倫河濵舊設溫都遜喇嘛禪榻噶爾丹䇿凌乞代葺凖噶爾乏諳經典喇嘛乞給我攜歸聞唐古特不善騎且乏軍械今觀之武備稍勝頗羅鼐語之曰大皇帝闡黃教輯衆生以故土伯特富庶甚爾等至藏煎茶賞焉駝路費令極裕此皆恭順天朝所致土伯特以凖噶爾襲始嚴武備我蒙恩統藏務簡兵繕械有侵圉者足禦之矣所謂修廟延僧事非奉旨安敢擅行凖噶爾使唯而退諭奬頗羅鼐應使得體賚幣噶爾丹䇿凌忌之訐頗羅鼐不善理煎茶務諭曰頗羅鼐奏凖噶爾衆有侵害土伯特讐喇嘛等不願前往故不之給爾奏頗羅鼐念拉藏汗仇辦給爾使諸物俱未協朕為大君不分內外頗羅鼐與爾等皆僻處逺地彼此互有違言朕豈肯偏聽爾遽罪頗羅鼐乎復詔駐藏副都統傅清等偕頗羅鼐議防凖噶爾十年詔駐藏大臣三年一代十一年諭頗羅鼐曰爾素效忠誠勤勞𢡟著自朕御極以來悉心靖共凡事竭力奮勉辦理妥協甚屬可嘉著加特恩於爾子內封一長子日後承襲王爵總理藏務所係甚要其善擇才堪嗣爾恱服衆心禆益公務者以聞頗羅鼐子二長珠爾默特䇿布登次珠爾默特納木扎勒珠爾默特䇿布登病足以長子讓弟珠爾默特納木扎勒詭讓兄頗羅鼐愛少子請以珠爾默特納木扎勒為長子允之頗羅鼐善服衆為諸噶卜倫所敬事有綏奔喇嘛扎克巴達顔者書其名瘞詛之事覺頗羅鼐欲弭變輕議綏奔喇嘛扎克巴達顔罪上嘉之諭鎮壓左道不足患其偕達賴喇嘛協輯唐古特衆十二年頗羅鼐卒遣官賻祭以珠爾默特納木扎勒襲郡王爵兼理衛藏噶卜倫務諭傅清曰珠爾默特納木扎勒不更事或未服唐古特衆且頗羅鼐以暴疾亡珠爾默特納木扎勒或以綏奔喇嘛扎克巴達顔故與達賴喇嘛搆隙不肖衆起而間之不無滋事虞爾其留意體察導珠爾默特納木扎勒任用舊人復以協理藏務當如頗羅鼐存日宣諭衆噶卜倫知之會凖噶爾台吉䇿妄多爾濟納木扎勒復遣使赴藏煎茶入寺詭避痘以已卒守門不令官兵從上以凖噶爾狡甚飭嚴防雖歸巢勿稍忽珠爾默特納木扎勒奏藏地謐無事請撤官兵歸上念頗羅鼐有安藏功且蒙恩厚珠爾默特納木扎勒必無異志不從撤兵請適滋疑不如示之信詔可復諭達賴喇嘛嗣勿令凖噶爾使入藏雖固請弗允珠爾默特納木扎勒詭稱凖噶爾衆襲唐古特至碩翁圖庫爾遣兵備喀拉烏蘇徙達木畨衆不數旬揚言凖噶爾至阿哈雅克自率兵往備上聞之詔撤喀拉烏蘇兵及達木畨歸牧勿惑衆十五年駐藏都統傅清左都御史拉布敦以珠爾默特納木扎勒攜兵離藏告蓋是時珠爾默特納木扎勒忌其兄珠爾默特䇿布登襲殺之私攜炮至後藏誣籍噶卜倫輔國公班第達及第巴布隆贊等旋達木距前藏三百餘里擁衆二千餘不歸奏至上不忍即誅之諭曰此或珠爾默特納木扎勒以部衆不皆順擁兵自護且或因弟兄啓釁懼朕問罪妄意離巢穴可茍免此時惟應靜以鎮之待其自起自止在我原無治罪之心則彼亦不生猜疑之念也嗣傅清等密疏叛狀詔俟副都統班第自青海赴藏討罪復諭四川總督䇿楞提督嶽鍾琪等馳兵往會而是時賊猖甚梗驛道軍書不達者旬日傅清偕拉布敦計不急誅賊必據唐古特為變召珠爾默特納木扎勒至待諸樓甫登起責其罪曰爾違天子命且忘爾父無君無父罪不可赦傅清趨前扼其臂拉布敦拔佩刀刺之諭脅從罔治有羅卜藏扎什者趨下呼賊千餘突至聚圍樓集藁焚達賴喇嘛遣畨僧往護不得入傅清拉布敦死之羅卜藏扎什攫帑二萬餘挺走翌日達賴喇嘛擒禁之遣畨衆屯要汛諭勿傷漢民抗官軍偕班第達馳疏至時䇿楞班第等赴藏就道諭曰此措置唐古特一大機會也若經理得宜自可永逺寧謐否則久復别生事端珠爾默特納木扎勒敢懷逆萌由於地廣兵強事權専一嗣此唐古特應多立頭目以分其勢爾等其詳議善後事宜為一勞永逸計䇿楞等至藏磔珠爾默特納木扎勒子達爾扎䇿楞及羅卜藏扎什奏傅清拉布敦誅逆被害狀上召諭廷臣曰從前頗羅鼐實心恭順料理藏中事務一切安帖皇考世宗憲皇帝屢次加恩由台吉封為貝勒伊感激我朝厚恩彌益恪誠朕即位以後封為郡王後因頗羅鼐年力就衰朕詢伊二子之中孰堪為嗣伊奏稱長子人軟弱又已出家二子珠爾默特納木扎勒人尚強幹能勝彈壓因令其承襲逮伊奏事一二次以後朕於其辭意之間即知其非伊父居心可比日後必生事端諭駐藏大臣留心體察傅清前經駐藏為伊等所信服遂令前往且慮其勢孤益以拉布敦協同駐藏乃珠爾默特納木扎勒心益狡悖將長兄珠爾默特䇿布登圖害又與達賴喇嘛素有仇釁既戕其兄遂欲計害藏中不順伊之班第達等其勢將延及達賴喇嘛獨居其地雄長一方近遂將塘汛文書禁絶不通悖逆情形漸益昭著傅清拉布敦稔知其姦摺請便宜從事以絶後患於今年十月初八日奏到朕以僅二大臣孤懸絶域未可輕舉批令俟班第更換拉布敦到藏日會同達賴喇嘛及藏中大噶卜倫等明正其罪以申國法乃傅清等未及接到諭旨即於十月十三日傳珠爾默特納木扎勒到通司岡加以誅戮而傅清拉布敦旋為伊屬下羅卜藏扎什所害總督䇿楞奏到朕深為憫惻不覺涕零因思傅清拉布敦若靜候諭旨遵行或不至是但珠爾默特納木扎勒反形已露倘不先加誅戮傳清等亦必遭其荼毒則傅清拉布敦之先幾籌畫殱厥渠魁實屬可嘉非如霍光之誘致樓蘭而斬之也夫臨陳捐軀雖奮不顧身然尚迫以勢所不得不然如傅清拉布敦揆幾審勢決計定謀其心較苦而其功為尤大以如此實心為國之大臣不保其令終安能不倍加軫悼耶傅清拉布敦著加恩追贈為一等伯入祀賢良昭忠祠春秋致祭傅清並入伊家祠從祀伊等子孫給與一等子爵世襲罔替以示朕褒忠録庸之至意並將伊二人為國捐軀之大節明白宣示使天下共知其不得已之苦心否則好事喜功者借此二人為口實而事外無知之人又議其擅開邉釁而仍邀國家如此厚恩者朕豈肯令其是非倒置若此哉十六年䇿楞等以珠爾默特納木扎勒通凖噶爾逆書聞諭曰前駐藏都統傅清左都御史拉布敦因珠爾默特納木扎勒逆謀顯著先事翦除奮不顧身忠誠卓越俱已加恩贈恤入祀賢良祠昭忠祠傅清並入伊家祠從祀不知者或訾二人冒險邀功且議朕為酬庸過厚也今據䇿楞班第等奏珠爾默特納木扎勒自立名號潛遣其心腹通欵凖噶爾稱䇿妄多爾濟納木扎勒為汗且求其發兵至拉達克地方以為聲援幸值凖夷內潰所遣使人回藏被獲得其逆書并餽獻諸物是其隂蓄異志勾結凖夷罪不容誅設非二臣協力同心決計先發則其遺害藏地將不可言是二臣之心甚苦而其有功於國家甚大應特建雙忠祠合祀二人春秋致祭丕昭勸忠之典復御製雙忠詩紀之有雙忠迹烈傳斯篇他年以待信史編之句是年䇿楞等議設駐藏兵五百防汛兵千自咱拉山至拉卜賽那木自阿哈雅克至碩翁圖庫爾各設汛哨以達木畨歸駐藏大臣轄視內地例置佐領驍騎校各職每年一察視設噶卜倫四以輔國公班第達扎薩克台吉車稜旺扎勒色玉特色卜騰喇嘛尼瑪嘉穆錯任之别設代奔五第巴三堪布一分理藏務𨽻駐藏大臣及達賴喇嘛轄唐古特正副二使均歸達賴喇嘛四噶卜倫附以達勿私遣允之敕四噶卜倫曰西藏廣興黃教為清淨善地達賴喇嘛掌管西方釋教廣演經法從前供養喇嘛一切事務原設噶卜倫四人至珠爾默特納木扎勒諸事擅専不與諸噶卜倫啇議負恩任性潛懷異圖因此駐藏大臣將伊正法噶卜倫事務不可一人専辦特令䇿楞等簡選賢能仍照舊例分設噶卜倫四員公同辦事爾等當感戴朕恩尊敬達賴喇嘛和衷協力黽勉供職勿存私意致生猜疑勿分彼此互相瞻顧遇有重務稟知達賴喇嘛與駐藏大臣等遵奉指示而行爾等其感恩宣力副朕興黃教安羣生至意凖噶爾台吉喇嘛達爾扎尋請赴藏煎茶延唐古特喇嘛上不允喇嘛達爾扎復因拉達克汗致書唐古特達賴喇嘛責勿擅請明年喇嘛達爾扎遣申前請上仍不允詔議防藏地班第等奏凖噶爾通藏隘有阿里那克桑騰格里諾爾阿哈雅克四路那克桑路稍近已設汛拉達克距阿里近雖與凖噶爾互市必不令兵入境葉爾羌亦可通阿里中有大山隔之且阿里距藏兩月餘聞賊至易備惟騰格里諾爾阿哈雅克路較濶亦俱嚴設汛唐古特有馬兵萬餘步兵萬五千餘若凖噶爾自騰格里諾爾阿哈雅克至則令車稜旺扎勒以蒙古唐古特兵禦之檄衮布達克布等畨兵援由阿里那克桑至則令色玉特色布騰以近牧兵禦之檄阿里兵援班第達及尼瑪嘉穆錯留藏護視達賴喇嘛至班禪喇嘛駐扎什倫布距前藏七百餘里值用兵令移居前藏若凖噶爾傾衆至則移達賴喇嘛班禪喇嘛至泰寧以駐藏官軍及唐古特兵屯要汛待大兵援允之凖噶爾使久不至諭達賴喇嘛嚴備復定議西自阿里東至喀拉烏蘇增雜拉沙木等十三汛二十年大軍討凖噶爾擒台吉達瓦齊諭唐古特部知之達賴喇嘛獻銅佛三慶捷詔納會阿睦爾撒納叛擾伊犁詔唐古特復設汛二十二年第七世達賴喇嘛示寂上軫悼之二十三年阿睦爾撒納走死逆回布拉呢敦霍集占等復叛據葉爾羌喀什噶爾詔勿撤唐古特汛二十四年拉達克汗諜定邉將軍兆惠取烏什阿克蘇等城將抵葉爾羌奏請助勦回逆諭曰爾逺處邉地感戴恩澤朕鑒爾忱深為慰恱大軍進勦回逆凡所克城俱設兵駐防今布拉呢敦霍集占力窮勢蹙必將棄巢逺遁朕不以出兵擒勦事責爾倘逆回竄入爾境爾當擒獻藏所朕必優加恩賚若不遵奉諭旨異日朕必知之非爾益也是年大軍定葉爾羌喀什噶爾霍集占等竄巴達克山詔拉達克汗勿復遣偵巴達克山尋函獻霍集占首詔撤唐古特汛西陲蓋自此永定二十九年欽定西域同文志御製烏斯藏即衛藏説曰藏地處蜀與滇之徼曰藏云者非華言實畨言也番又或謂之唐古特今班禪額爾德尼所居實稱藏達賴喇嘛所居實稱衛元明時有烏斯藏朵甘衛指揮諸司之名或以為異於衛藏而不知實同也蓋嘗以唐古特文字詳核互證乃知烏斯藏即衛藏其音其義無不一以貫之也且以音言斯蓋薩之餘音滿字為薩音半字為斯音唐古特收音之斯字即與國書之伊字收音通則烏斯之切為衛如烏伊之切為衛也亦猶阿伊之為愛噶伊之為該喀伊之為開也國書斯字伊字雖各為收音然唐古特收音字無伊字而有斯字由烏斯推之而愛亦阿斯該亦噶斯開亦喀斯何不可通之有若夫衛藏之為義則衛蓋彼言中也非華言置衛之謂也以烏合斯為衛音而中義藏則切匝阿為藏音而其義則淨之謂也唐古特若老若幼無不知之今以不識唐古特文字之人而與一二譯出華言中辨其是非豈非嚼蠟哉或又曰衛既以中為義則今之所謂前藏之説何居曰此更非唐古特之本有而興於今之華言也然以今日疆域言之自打箭爐取道由東南迤及西南先經喀木次衛次藏是全藏形勢固宜前喀木而後藏而衛適其中處之地喀木之木為半字音應從上喀字而其義則邉界之謂也今稱前後藏者則因二地有達賴喇嘛班禪額爾德尼居之而達賴喇嘛位居長遂並以藏屬之更易中為前而今自京都目之且統以為西藏云耳然則烏斯藏之即為衛藏不愈信哉夫藏之內屬肇自元代音譯展轉沿薩為斯原無歧舛惟文士墨守蠧簡既不克兼諳西竺之書而彼中服習梵文者又豈能筆授心通取腹地史乘傳訛一一悉為釐訂毋惑乎此考文之難也豫因輯同文志類次西藏所𨽻為系三合切音者特揭是説以發其凡三十六年詔建布達拉於避暑山莊右肖衛式初厄魯特崇黃教噶爾丹䇿凌建都綱於伊犂河濵北曰固爾扎南曰海弩克設西勒圖四集喇嘛千餘以塔本集賽輪值贍之蒙古謂五為塔本謂輪值為集賽每嵗首及盛夏台吉宰桑等以瞻禮至後固爾扎為阿睦爾撒納所燬大軍定噶爾丹亂詔如固爾扎式建安逺寺於避暑山莊北隅以凖噶爾台吉達什達瓦屬來歸者居其側青海厄魯特及喀爾喀杜爾伯特諸台吉值班秋覲輒命瞻禮至是布達拉落成土爾扈特汗渥巴錫和碩特台吉恭格等挈數萬衆來歸詔瞻禮之蓋以綏靖荒服非惟闡揚黃教為也四十四年班禪喇嘛奏請入覲祝釐詔建扎什倫布於布達拉左肖藏式四十五年五月駕南巡旋班禪喇嘛使伊什巴爾珠布等迎覲於趙北口命觀龍舟水嬉六月幸承德府駐蹕避暑山莊班禪喇嘛使穆占巴等齎輜重至詔居扎什倫布旁舍時盛暑仍服氊毳詔賜紗葛并給銀及藥物七月班禪喇嘛至舊例以達賴喇嘛班禪喇嘛有高行諭旨至始下牀入覲惟令跽不拜至是班禪喇嘛固請拜上嘉其誠敬聽之賜宴萬樹園詔瞻禮布達拉八月行萬壽慶典班禪喇嘛稽首頌無疆九月扈蹕旋賜宴南苑以香山昭廟蕆工詔慶讃之班禪喇嘛自崇德時通貢至是凡三世初封曰羅卜藏吹吉嘉穆錯次曰羅卜藏伊什皆敕賜班禪額爾德尼號次曰羅卜藏巴爾丹伊什如之是役也以不召至跋涉二萬餘里入覲蒙古內扎薩克四十九旗及喀爾喀厄魯特諸部汗王公台吉聞之莫不歡忭舞蹈執役觀慶典十一月班禪喇嘛示寂敕於所居建清淨化城明年送舍利歸藏復遣官齎金册印封羅卜藏丹巴旺舒克扎木巴勒嘉穆錯為達賴喇嘛時其父第巴阿木布木前卒諭曰第六世達賴喇嘛羅卜藏噶勒藏嘉穆錯之父索諾木達爾扎曽封輔國公今新達賴喇嘛已賜册命其父已故未及受封其兄索諾木達什為哲卜尊丹巴呼圖克圖父著授輔國公爵如索諾木達爾扎例索諾木達什尋卒詔以哲卜尊丹巴呼圖克圖弟喇布丹納木扎勒襲四十八年理藩院議奏索諾木達什以達賴喇嘛故封輔國公爵子喇布丹納木扎勒繼襲嗣若仍豫世襲則與來歸有功之蒙古王公等無别請俟喇布丹納木扎勒出缺後停襲嗣有似此者皆令承襲一次詔如議以非世爵故不立傳四十九年遣官齎玉册印賜達賴喇嘛復敕封班禪喇嘛之瑚畢勒罕為班禪額爾德尼以幼未賜名西藏自達賴喇嘛班禪喇嘛外爵五輔國公三一由貝子降襲一由鎮國公降襲一定世襲一等台吉扎薩克一等台吉二一現奉旨停襲詳各傳欽定外藩蒙古回部王公表傳卷之九十一欽定四庫全書欽定外藩蒙古回部王公表傳卷之九十二傳第七十六扎薩克鎮國公珠爾默特䇿布登列傳今襲輔國公珠爾默特䇿布登唐古特人父頗羅鼐以功封郡王爵珠爾墨特䇿布登弟珠爾默特納木扎勒嗣後叛誅故不立傳雍正八年以珠爾默特䇿布登統阿里諸路兵防凖噶爾賊保唐古特詔授扎薩克一等台吉九年諭嘉其奮勇效力晉封輔國公乾隆八年凖噶爾煎茶使赴藏珠爾默特䇿布登以兵五千駐防阿里克明年凖噶爾使自藏歸賜幣奬之會病足自阿里歸藏十一年頗羅鼐遵旨擇子襲爵珠爾默特䇿布登以疾讓弟上聞而嘉之諭曰珠爾默特䇿布登雖有疾前曽出兵效力著加恩封鎮國公十二年疾痊駐藏副都統傅清等請遣屯阿里克汛允之是年頗羅鼐卒珠爾默特納木扎勒襲郡王爵十四年駐藏副都統紀山劾珠爾默特納木扎勒志戾請檄珠爾默特䇿布登至協理藏務上不允諭紀山善導之勿露防範迹已而珠爾默特納木扎勒以珠爾默特䇿布登發阿里兵將擾藏告蓋計陷之也敕諭珠爾默特䇿布登曰爾父子昆弟受朕恩深重爾所素知爾今無故發兵是既負朕恩又玷辱爾父矣爾於兄弟之間素敦和好爾父爵尚讓爾弟襲今乃轉欲搆兵取罪果爾兄弟不睦宜親身至藏以實情告辦事大臣及達賴喇嘛俟奏至朕議爾兄弟事務令永逺和睦如爾有欲奏言亦即具奏朕自有措置也復諭傅清曰珠爾默特納木扎勒年幼躁急性好滋事若果無他故其兄欲進兵至藏是特兄弟間互相侵犯耳若其兄並無此事而伊造言誣搆則宜相機辦理十五年珠爾默特䇿布登為珠爾默特納木扎勒所戕子朋素克旺布及珠爾默特旺扎勒皆居後藏珠爾默特納木扎勒詭以兄暴疾聞請收葬并育兄子上允之珠爾默特納木扎勒以兵至後藏戕朋素克旺布陽稱逃亡珠爾默特旺扎勒奔扎什倫布依班禪額爾德尼為喇嘛乃免珠爾默特納木扎勒誅上念珠爾默特䇿布登功不忍絶其爵詔珠爾默特旺扎勒襲輔國公一次襲珠爾默特旺扎勒珠爾默特䇿布登次子乾隆十六年襲扎薩克輔國公四十二年卒嗣子諾爾布朋素克襲二次襲諾爾布朋素克珠爾默特旺扎勒嗣子乾隆四十三年襲扎薩克輔國公四十八年詔世襲罔替輔國公索諾木達爾扎列傳今定世襲一等台吉索諾木達爾扎唐古特人初居裏塘其妻曰羅卜臧吹木索有子二長羅卜藏噶勒藏嘉穆錯次恭格丹津羅卜藏噶勒藏嘉穆錯即第六世達賴喇嘛也幼慧甚唐古特衆及青海諸台吉敬事之時别有博克達之阿旺伊什嘉穆錯者拉藏汗立為達賴喇嘛聞羅卜藏噶勒藏嘉穆錯名忌之將以兵戕索諾木達爾扎襁負走乃免青海諸台吉訐拉藏汗與爭達賴喇嘛真偽遣官往徙羅卜藏噶勒藏嘉穆錯以索諾木達爾扎護居西寧宗喀巴寺未幾凖噶爾襲唐古特戕拉藏汗大軍將討其罪都統法喇奏裏塘至唐古特咸敬瑚畢勒罕請移打箭爐兵屯裏塘相機勦凖噶爾復令索諾木達爾扎諭營官喇嘛等使知駐兵裏塘乃聖主保護瑚畢勒罕鄉衆至意裏塘外諸境可傳檄定詔可五十九年封羅卜藏噶勒藏嘉穆錯為達賴喇嘛以大軍護往索諾木達爾扎從至藏詔偕噶卜倫康濟鼐阿爾布巴隆布鼐等護視達賴喇嘛已而索諾木達爾扎娶隆布鼐女二隆布鼐恃達賴喇嘛姻隂比阿爾布巴忌康濟鼐雍正四年遣官諭達賴喇嘛輯諸噶卜倫有衮都阿喇木巴者羅卜臧吹木索弟也善翼視達賴喇嘛賜達爾漢號五年阿爾布巴隆布鼐以兵戕康濟鼐大軍至誅之詔徙達賴喇嘛居裏塘七年索諾木達爾扎代達賴喇嘛來朝奉表貢物賜珊瑚頂雙眼孔雀翎復諭曰索諾木達爾扎訓示達賴喇嘛學習經典保護多方西藏諸務毫不干預甚屬可嘉著封為輔國公十三年從達賴喇嘛歸藏乾隆九年卒諭曰索諾木達爾扎係達賴喇嘛父皇考加恩達賴喇嘛特豫封爵伊亦深感皇考恩行走謹慎厯有餘年著加恩令伊子恭格丹津仍襲輔國公以示優眷一次襲恭格丹津索諾木達爾扎次子乾隆九年襲輔國公二十八年授噶卜倫三十八年卒子扎什納木扎勒襲二次襲扎什納木扎勒恭格丹津子乾隆三十八年襲輔國公四十八年理藩院議俟出缺後停襲諭曰索諾木達爾扎以生達賴喇嘛故封輔國公爵伊子孫承襲二次今達賴喇嘛示寂若其父所遺世爵竟爾裁汰朕心實為不忍如仍世襲公爵於例又屬難行朕念達賴喇嘛俟扎什納木扎勒出缺後著加恩賞給一等台吉世襲罔替並著為例永逺遵行欽定外藩蒙古回部王公表傳卷之九十二欽定四庫全書欽定外藩蒙古回部王公表傳卷之九十三傳第七十七追授一等台吉喀錫鼐色布登喇什列傳今襲輔國公喀錫鼐色布登喇什唐古特人其弟曰康濟鼐初為達賴喇嘛第巴任阿里總管康熙五十九年凖噶爾擾藏大軍往討康濟鼐集唐古特兵絶賊糧道偵賊走多特追擊之俘斬甚衆六十年敘功詔封固山貝子授噶卜倫理前藏務時第巴阿爾布巴頗羅鼐等以迎降功各賜爵有差雍正三年撤大軍還以康濟鼐總藏務阿爾布巴副之王大臣等奏阿里形勝地康濟鼐既駐藏請令擇代理阿里務者康濟鼐遵旨議以其兄喀錫鼐色布登喇什為阿里總管撫逺大將軍年羮堯請令康濟鼐専居藏地上察阿爾布巴等與康濟鼐異志諭曰若令康濟鼐孤身在藏阿爾布巴等不之服康濟鼐雖欲效忠勢必不能仍令兩處往來行走兼理藏及阿里務為善五年阿爾布巴等隂以兵戕康濟鼐遣賊黨侵阿里喀錫鼐色布登喇什以義不反兵驟擊之戰歿其長子噶錫巴納木扎勒色布騰從台吉頗羅鼐以兵至藏阿爾布巴等就擒六年大軍至藏亂定上憫康濟鼐無嗣詔追授喀錫鼐色布登喇什為一等台吉子二長噶錫巴納木扎勒色布騰次班第達相繼襲一次襲噶錫巴納木扎勒色布騰喀錫鼐色布登喇什長子雍正六年襲一等台吉賞孔雀翎九年表謝恩獻方物諭曰前以喀錫鼐色布登喇什陳亡阿里經頗羅鼐奏請特贈一等台台其子噶錫巴納木扎勒色布騰襲之邇聞為國效力辦理事務亦善且為康濟鼐兄子康濟鼐宣力有年抒誠報效始終不懈并無子嗣著將噶錫巴納木扎勒色布騰格外施恩封授輔國公世襲罔替尋授噶卜倫乾隆四年卒弟班第達襲二次襲班第達噶錫巴納木扎勒色布騰弟乾隆五年襲輔國公九年十二年凖噶爾使再入藏煎茶班第達襄頗羅鼐理諸務賜幣奬之十三年詔授其兄噶錫巴納木扎勒色布騰子巴桑車凌一等台吉諭昆弟子姓世受國恩嗣益勉無怠初郡王頗羅鼐以女妻班第達頗羅鼐卒班第達察珠爾默特納木扎勒有逆志不之附珠爾默特納木扎勒惡之奪其孥十五年駐藏都統傅清等將除逆密與謀珠爾默特納木扎勒就誅羅卜藏扎什等復為變班第達奔告達賴喇嘛集兵捕逆獲所掠帑銀二萬餘撫輯唐古特兵民達賴喇嘛善之奏令暫理藏務時四川總督䇿楞等奉詔赴藏定亂諭曰班第達不能救護駐藏大臣念其勢孤力弱尚屬無過然亦無功可録但不附逆黨猶知尊向天朝著以輔國公爵管理噶卜倫務應俟徐加恩賜有清特古斯者屯兵阿里助珠爾默特納木扎勒為逆班第達誅之遣台吉集都鼐理阿里務給卓哩克圖號事聞諭䇿楞等曰班第達擅給台吉號儼以藏王自居今令管理噶卜倫務復命多立數人班第達或大失所望雖朱必顯有違抗但其心稍恐不足務須明切導之以珠爾默特納木扎勒恃有王爵擁勢太重釀成嫌隙今多立噶卜倫正可保全終始令彼渙然疑釋庶可永寧䇿楞抵藏奏達賴喇嘛以鎮阿里要地必重名號故權給之班第達恭順可信臣遵旨宣諭感且泣矢竭誠報效明年議西藏設噶卜倫四以班第達領其一賜敕訓諭扎薩克一等台吉車稜旺扎勒列傳車稜旺扎勒唐古特人雍正六年噶卜倫阿爾布巴等亂定扎薩克貝子頗羅鼐請以車稜旺扎勒協理藏務詔授扎薩克一等台吉兼噶卜倫乾隆九年協頗羅鼐理凖噶爾煎茶務賜幣奬之十二年凖噶爾復入藏煎茶駐藏副都統傅清等遣車稜旺扎勒以喀拉烏蘇兵三百監之十三年凖噶爾使自藏歸復奬賜十六年珠爾默特納木扎勒亂定議設噶卜倫四詔仍以車稜旺扎勒領其一賜敕訓諭十七年駐藏都統班第等遵旨籌防凖噶爾議車稜旺扎勒以厄魯特及唐古特兵屯阿哈雅克騰格里諾爾汛從之二十八年卒孫索諾木旺扎勒襲一次襲索諾木旺扎勒車稜旺扎勒孫乾隆二十九年襲扎薩克一等台吉三十八年授噶卜倫四十四年班禪額爾德尼入覲索諾木旺扎勒由穆嚕烏蘇助途次所需物賜幣奬四十八年詔世襲罔替五十三年巴勒布賊侵西藏界侍郎巴忠奉命赴藏查辦奏索諾木旺扎勒素向巴勒布商賈勒索狀諭曰索諾木旺扎勒平素既向巴勒布商賈勒索巴勒布賊人侵藏之事即係伊激成伊身若在必當從重治罪今伊業已病故雖不加深究但不當仍令其子承襲扎薩克台吉索諾木旺扎勒之扎薩克一等台吉著停其承襲以示懲警扎薩克一等台吉諾顔和碩齊列傳諾顔和碩齊唐古特人郡王頗羅鼐弟雍正六年頗羅鼐定阿爾布巴等亂以諾顔和碩齊轄喀拉烏蘇兵護唐古特衆奏請賜爵詔授扎薩克一等台吉乾隆元年卒駐藏副都統瑪拉等奏偕頗羅鼐議代領喀拉烏蘇兵者頗羅鼐子珠爾默特納木扎勒嵗領塔木騰格里諾爾兵防汛塔木距喀拉烏蘇邇可令兼轄諾顔和碩齊所遺扎薩克一等台吉其弟車臣哈什哈現理古木布木務請令襲爵詔允之一次襲車臣哈什哈諾顔和碩齊弟乾隆元年襲扎薩克一等台吉五年卒弟齊旺多爾濟襲二次襲齊旺多爾濟車臣哈什哈弟乾隆五年襲扎薩克一等台吉九年以協頗羅鼐理凖噶爾煎茶務賜幣奬十年卒駐藏副都統傅清等奏頗羅鼐請以諾顔和碩齊子旺對襲諭曰伊係舉家受思之人令其辦理諸務自為有益諾顔和碩齊受國厚恩授為扎薩克一等台吉伊弟相繼承襲亦各奮勉效力今齊旺多爾濟病故著照所請以其兄諾顔和碩齊子旺對承襲扎薩克一等台吉三次襲旺對諾顔和碩齊子乾隆十年襲扎薩克一等台吉十二年凖噶爾使入藏煎茶駐藏副都統傅清等議設汛阿哈雅克阿里克路以旺對領之十三年凖噶爾使自藏歸賜幣奬未幾珠爾默特納木扎勒詭稱凖噶爾兵至碩翁圖庫爾將襲唐古特駐藏提督索拜遣旺對赴喀拉烏蘇備之比至無迹撤歸三十年授噶卜倫三十一年卒子索諾木喇什襲四次襲索諾木喇什旺對子乾隆三十一年襲扎薩克一等台吉四十八年詔世襲罔替欽定外藩蒙古回部王公表傳卷之九十三欽定四庫全書欽定外藩蒙古回部王公表傳卷之九十四傳第七十八杜爾伯特部總傳杜爾伯特部厄魯特為綽囉斯種與內扎薩克之𨽻科爾沁右翼一旗同名異族厄魯特舊設四衛拉特杜爾伯特其一也輝特𨽻之後並稱衛拉特詳青海厄魯特部傳和碩特土爾扈特或遊牧青海或徙牧俄羅斯惟杜爾伯特與凖噶爾聚牧阿爾台乏析處者準噶爾台吉噶爾丹虐諸昆弟子姓兄子䇿妄阿喇布坦棄徙博囉塔拉杜爾伯特諸台吉從往分牧額爾齊斯迄凖噶爾族亂杜爾伯特內附設扎薩克十有四附輝特扎薩克二統稱賽因濟雅哈圖杜爾伯特部杜爾伯特祖曰博羅納哈勒與準噶爾祖額斯墨特達爾漢諾顔為昆弟博羅納哈勒子額什格泰什三傳至達賴泰什子七長敏珠裔不著次垂因次陀音其裔皆𨽻察哈爾次鄂木布岱青和碩齊為扎薩克汗車凌親王車凌烏巴什貝勒剛多爾濟三旗祖次衮布次達延泰什次塔爾琿泰什其裔𨽻各扎薩克達賴泰什弟曰保伊爾登子四長鄂爾囉斯為扎薩克台吉恭錫喇達什敦多克二旗祖次巴特瑪多爾濟為扎薩克貝勒色布騰貝子班珠爾輔國公剛巴圖蒙克台吉額布根五旗祖次額璘沁巴圖爾為扎薩克貝子根敦瑪什巴圖台吉巴爾三旗祖次伯布什為扎薩克郡王車凌蒙克一旗祖初和碩特台吉鄂齊爾圖為衛拉特首汗綽囉斯諸台吉𨽻之順治十四年杜爾伯特台吉陀音遣使霍什哈等自鄂齊爾圖所以貢馬至十五年鄂木布岱青和碩齊子伊斯扎布復遣使額爾克貢馬康熙十四年台吉額勒敦噶木布從鄂齊爾圖使入貢自稱為阿勒達爾泰什族阿勒達爾泰什者垂因子也時蓋為所部長十六年噶爾丹戕鄂齊爾圖遣使告自稱博碩克圖汗因脅諸衛拉特奉已令諭給諸貢使符驗不從詭稱杜爾伯特及和碩特土爾扈特雖𨽻準噶爾以牧地逺不及給二十四年定四衛拉特貢例噶爾丹使入關額二百人餘市張家口及歸化城其綽囉斯自貢之噶爾瑪岱青和碩齊杜爾伯特台吉阿勒達爾泰什及和碩特土爾扈特長如之三十三年台吉巴拜來歸巴拜者陀音子也噶爾丹以附牧強取其戚屬巴拜索之不獲畏弗敢爭嗣從噶爾丹侵喀爾喀至烏蘭布通欲棄之降為伊拉古克三呼圖克圖所隂阻至是偕從子齊克宗至上以其習邉外不便駐內地詔𨽻喀喇沁牧三十六年台吉車稜復來歸車稜為阿勒達爾泰什孫其父烏爾衮從噶爾丹侵喀爾喀為大軍所敗携屬三百餘竄圖拉河境上聞之諭遣護軍統領瑪喇曰爾等馳赴圖拉遣人問故伊等或欲內附懼為喀爾喀阻或力不能至而在彼可收之至如欲往阿爾台則聽之既不內附又不前往則當相機行事瑪喇至偵不獲蹤噶爾丹再侵喀爾喀烏爾衮復從至和託輝特台吉根敦陳斬之車稜從噶爾丹竄牧巴顔烏蘭根敦以告詔使諭車稜降不至噶爾丹尋敗遁車稜將乞降我師不知而擊之乃逸其屬綽克圖巴圖爾宰桑莽奈霍什哈都喇圖巴圖爾班丹霍什哈宰桑扎爾瑚齊什賁達爾漢宰桑蘇穆齊扎爾瑚齊阿哈雅扎爾瑚齊畢哩克扎爾瑚齊等率衆百餘內附時巴拜屬從至詔置張家口外巴拜遣宰桑博克請賜所屬遣官察給之巴拜尋來朝請效力禁廷詔曰爾先衆來降朕自有加恩之處其仍率所屬駐喀喇沁牧車稜敗知噶爾丹不足恃遣使奏杜爾伯特部自始貢中國至阿勒達爾泰什往來朝請已五世前蒙恩遣巴扎爾傳諭臣屬功格額爾克令臣歸誠許恩待臣遵旨降反為將軍所擊臣復懼逃乞賜恩綸諭曰車稜來歸時我緑旗蒙古兵不知而擊之今復遣使奏請理藩院其檄令速降朕將優恤之會遣使招噶爾丹詔以其使從至則車稜他徙其使齎檄往諭車稜遣功格額爾克奉表降自詣大將軍費揚古所告曰烏蘭布通戰後臣父烏爾衮降志誠不獲達臣前為大軍擊心甚懼率殘卒十餘奔達瑪爾遇噶爾丹偕赴薩克薩特呼哩克未浹旬棄之走額克阿喇勒臣知噶爾丹罪與彼伍徒就死聞上撫厄魯特降人咸得所集臣屬二百五十餘户內徙道踰汗阿林翁吉閲四月始至乞以此情代奏費揚古馳疏聞留其孥屬於張家口外遣車稜覲行營詔授散秩大臣巴拜如之明年詔以巴拜車稜屬𨽻察哈爾正白旗編佐領二車稜屬六品官班丹畢哩克及壯丁百餘以功格額爾克為驍騎校領之巴拜屬五品官戴和碩齊納木喀琳沁額爾德尼達木巴六品官達爾扎巴圖蒙克色稜泰墨爾根伊什德克及壯丁百餘以達木巴領之後巴拜卒無嗣車稜卒子䇿旺達爾濟嗣五十四年詔招降台吉丹津于阿爾台丹津者鄂木布岱青和碩齊孫也與車稜為從昆弟遊牧阿爾台户千餘和託輝特台吉博貝請赴阿爾台招丹津降抗即以兵取之諭車稜遣使齎書從比至丹津徙䇿妄阿喇布坦牧五十九年靖夷將軍富寧安擒台吉垂木拍爾于伊勒布爾和碩蓋是時䇿妄阿喇布坦假兵力據四衛拉特令諸台吉環牧烏嚕木齊額爾齊斯為負嵎計我大兵因屯巴里坤阿爾台兩路遏之偵凖噶爾襲唐古特詔大軍往討罪復以兵分擊準噶爾境垂木拍爾者丹津族台吉也率屬駐烏嚕木齊設哨伊勒布爾和碩阿克塔斯路富寧安以兵至阿克塔斯設哨賊遁尾至伊勒布爾和碩擊之擒垂木拍爾歸烏嚕木齊衆聞之咸竄乾隆十八年冬台吉三車凌來歸三車凌者曰車凌曰車凌烏巴什曰車凌蒙克統稱杜爾伯特台吉巴約特其屬部也杜爾伯特以車凌為長車凌烏巴什次之巴約特以車凌蒙克為長聚族額爾齊斯凖噶爾台吉舊有䇿凌敦多卜二大䇿凌敦多卜善謀小䇿凌敦多卜以勇聞䇿妄阿喇布坦及子噶爾丹䇿凌倚任之大䇿凌敦多卜孫達瓦齊襲殺噶爾丹䇿凌嗣而自立小䇿凌敦多卜孫訥默庫濟爾噶爾與搆兵各令杜爾伯特族助車凌等欲拒之不敵欲事之莫知所從集族言曰依凖噶爾非計也不如歸天朝為永聚計有喀爾喀卒額璘沁達什者為凖噶爾所掠聞其謀脫歸以告詔定邉左副將軍喀爾喀親王成衮扎布俟車凌等至察其誠可納之既而三車凌棄額爾齊斯牧由準噶爾東烏蘭嶺烏英齊而行越旬有九日至博東齊遣使巴顔克什克都圖爾噶等馳赴巴顔珠爾克以降故告而留其衆于額克阿喇勒以待成衮扎布遣守汛者視慮詐檄喀爾喀兵備之以聞諭曰車凌等降非叵測也達瓦齊與訥默庫濟爾噶爾搆兵車凌等助之勝負難預定幸而從者勝卒為人役不若歸降之為得計也既遣使以情告若仍令處汛外恐追兵至或有失可即徙入內汛暫給牧畜徐議安置事宜先以車凌車凌烏巴什及從至者酌遣數人令其瞻仰朕躬朕自優加恩賚遣侍郎玉保齎賞物往諭甫就道上念所部習邉外以未出痘者為生身若即令至內地雖傷一僕從不忍詔俟明嵗受朝塞外勿遽來京師負矜恤意而三車凌懼凖噶爾兵襲請急徙入汛且獻馬為贄成衮扎布納之令暫駐烏里雅蘇台達瓦齊遣宰桑禡木特以兵襲不及乃逸玉保至三車凌忭迎十里外宣諭之跪奏噶爾丹䇿凌時思內附以衆志未變且法嚴故不獲間今避亂歸思覲天顔蒙恩軫念避痘令緩入覲期請先以宰桑等朝京師車凌使曰和通巴顔克什克車凌烏巴什使曰哈錫塔車凌蒙克使曰巴圖明年正月使至詔與朝正諸藩臣宴上以所部間道至駝馬疲甚且乏畜産不忍遽逺徙詔視推河扎克拜達里克庫爾竒勒可耕地置之榖種取諸歸化城復賜車凌車凌烏巴什羊各五千車凌蒙克羊三千贍之尋定牧扎克拜達里克車凌烏巴什屬巴啓齊倫等叛逸喀爾喀卒盜車凌屬伊爾都齊馬索不給且射殺之詔喀爾喀扎薩克以鄂爾坤防秋兵百視牧復檄諸扎薩克鄰汛者弋叛賊務獲後巴啓等就擒論罪夏四月諭曰內扎薩克及喀爾喀咸設正副盟長董理牧務今新降台吉車凌等擕至户口悉編旗分佐領其設正副盟長如內扎薩克及喀爾喀例賜賽因濟雅哈圖盟名五月駕幸熱河駐蹕避暑山莊三車凌率諸台吉至賜宴萬樹園命觀火戲諭曰杜爾伯特台吉車凌等皆準噶爾渠酋向慕仁化率萬餘衆傾心來歸宜敷渥澤錫豫封爵以示懷柔至意其各鈐所屬令安分謀業勿負朕恩時所部設扎薩克十有三自三車凌外曰色布騰曰蒙克特穆爾曰根敦曰班珠爾曰剛曰巴圖蒙克曰瑪什巴圖曰達什敦多克曰恭錫喇曰巴爾封親郡王貝勒貝子公一等台吉有差後蒙克特穆爾以從車凌蒙克子巴朗叛逃别授其弟額布根為扎薩克餘仍爵詳列傳秋七月將軍䇿楞請徙三車凌牧于歸化城青山東時議偹兵征達瓦齊諭曰巴朗等甫叛竄若徙之將滋新降疑懼且非辦理凖噶爾本意其令安處舊牧勿他徙三車凌之至也告族台吉訥默庫留凖噶爾户千餘剛多爾濟額爾德尼巴圖博羅特如之將乘間內徙至是果偕輝特台吉阿睦爾撒納和碩特台吉班珠爾至詔賜牧畜置塔楚鄰三車凌牧十月駕由盛京旋蹕避暑山莊訥默庫等入覲復賜宴錫之爵曰訥默庫封郡王曰剛多爾濟曰巴圖博羅特封貝勒曰布圖克森曰額爾德尼曰羅壘永端封貝子曰布顔特古斯曰蒙克博羅特封輔國公曰烏巴什曰伯勒克封一等台吉凡設扎薩克十詔編旗分佐領如三車凌例分左右翼設正副盟長各一訥默庫者車凌烏巴什兄子也剛多爾濟布圖克森額爾德尼羅壘永端烏巴什伯勒克皆車凌烏巴什曽祖察衮裔布顔特古斯巴圖博羅特蒙克博羅特亦戚族也後訥默庫晉親王子喇嘛扎卜授貝勒以叛除爵布圖克森羅壘永端烏巴什皆無嗣停襲伯勒克卒子多第巴襲多第巴卒子呢爾瓦齊襲呢爾瓦齊卒無嗣以多第巴弟布雅德勒格爾襲布雅德勒格爾卒無嗣停襲布顔特古斯卒子舍稜襲以叛除剛多爾濟無嗣額爾德尼子襲之額爾德尼卒無嗣亦停襲巴圖博羅特蒙克博羅特皆以叛除故自剛多爾濟外皆不立傳二十年烏梁海降臣察達克招服包沁察獲杜爾伯特屬以獻詔給所部尋從大軍征達瓦齊三車凌既入覲歸詔選兵二千以車凌領其一𨽻北路車凌蒙克色布騰從之以車凌烏巴什領其一𨽻西路各授參贊大臣訥默庫等繼至請從軍詔𨽻西路以車凌烏巴什訥默庫皆幼不更事詔調車凌蒙克赴西路軍從車凌烏巴什訥默庫等行而是時阿睦爾撒納為北路副將軍訥默庫其妻弟也固請𨽻北路軍允之以故偕三車凌至者𨽻西路副將軍薩拉爾隊偕訥默庫至者𨽻北路副將軍阿睦爾撒納隊賜車凌整裝銀二千車凌烏巴什訥默庫各減十之二給從軍者羊及餱糧有差復詔車凌及車凌蒙克遣宰桑以善耕卒百赴額爾齊斯蓋杜爾伯特衆兼耕牧業視喀爾喀專以牧為産者異將遣緑旗及喀爾喀兵屯耕額爾齊斯以所部識水泉道且善耕命簡卒往導俟大功成遣牧衆歸額爾齊斯會北路軍奏至以訥默庫恭贊列名詔西路軍奏如之列三車凌及色布騰名次恭贊大臣鄂容安後復諭定北將軍班第俟伊犁定遣車凌車凌烏巴什等率新降諸台吉入覲初議征達瓦齊上以衛拉特諸台吉後先附凡數萬衆錯處內牧非得地衆建之不可詔俟準噶爾定將復設四衛拉特以車凌為杜爾伯特汗别以班珠爾為和碩特汗以阿睦爾撒納為輝特汗以噶爾丹䇿凌子姓為綽囉斯汗車凌等赴軍時輒聞命大兵抵伊犁達瓦齊就擒班第以車凌車凌烏巴什訥默庫及新降之綽囉斯台吉噶爾藏多爾濟和碩特台吉沙克都爾曼濟輝特台吉巴雅爾等列入覲初班駕幸木蘭車凌等至召覲行幄慰諭之旋蹕避暑山莊御淡泊敬誠殿受朝詔以車凌為杜爾伯特汗諸扎薩克𨽻之扎薩克而下設管旗章京副管旗章京參佐領驍騎校等職時阿睦爾撒納覬轄四衛拉特知不可得叛竄班珠爾以附逆械至噶爾藏多爾濟沙克都爾曼濟巴雅爾仍各賜汗爵統所部衆諭曰凖噶爾互相殘殺羣遭塗炭不獲安生朕統一寰區不忍坐視特發兩路大兵進討諸台吉宰桑等畏威懷德率屬來歸從軍自效今已平定伊犁擒獲達瓦齊是用廣沛仁恩酬庸效績凖噶爾舊有四衛拉特汗令即仍其部落樹之君長其各董率所屬務勤養教共圖生聚受朕無疆之福其後綽囉斯汗噶爾藏多爾濟叛從子扎納噶爾布戮之所部就滅輝特汗巴雅爾以叛為大軍所擒誅和碩特汗沙克都爾曼濟懷二志副都統雅爾哈善殱其衆于巴里坤惟杜爾伯特部恪守臣節世受封爵罔替是年十二月車凌等以乏牧産請徙額克阿喇勒諭曰前議平定伊犁後遣歸舊牧額爾齊斯若額克阿喇勒距額爾齊斯較扎克拜達里克路更邇且附內汛外調所部兵亦易俟擒獲阿逆後仍當遣歸舊牧所部生計既艱其給籽糧六百石務令及時耕種毋誤農期至從軍所給駝馬自應交納但念往返道逺牲畜不無疲瘠可姑緩期二載訥默庫之將從征達瓦齊也請徙牧拜達里克北扎布堪河源博囉喀卜齊爾至鄂爾海喀喇烏蘇界允之諭努力成功勿念遊牧衆至是以車凌等將徙牧詔往會而訥默庫隱有叛志謀竄就阿睦爾撒納剛多爾濟巴圖博羅特布顔特古斯等阻之卒不戢從衆復乘間劫驛騎戕守汛辨奪運糧商民駝物及資二十一年春駐防烏里雅蘇台辦事大臣阿蘭泰偕車凌車凌烏巴什等以兵擒訥默庫及其孥械至論如律詔不附逆諸扎薩克各安遊牧勿疑懼復諭曰剛多爾濟等屬妄行劫掠應交部議扎薩克罪但念伊等新降未諳內地禁例姑從寬免夏以所部鄰扎哈沁盜不戢諭曰伊等生計全賴牧畜若復盜竊相仍不獲蕃孳生計焉能充裕其各鈐束部衆務期守分安生副朕休養羣生至意有伯什阿噶什者伊斯扎布之曾孫也祖扎勒父車凌多爾濟伯什阿噶什兄曰布達扎卜曰達瓦克什克弟曰達瓦濟特曰格咱巴克聚牧伊犁河西沙拉伯勒境鄰哈薩克牧達瓦齊虐其衆伯什阿噶什將棄之懼襲而寢大軍征達瓦齊抵伊犁班第遣使招因獻籍三千餘户降將遣從車凌等入覲告哈薩克數掠所部請歸視比抵牧偵哈薩克集兵遣告且請大軍援諭嘉其恭順會阿睦爾撒納叛逆黨擾伊犁詔遣和碩特輔國公納噶察賫敕往諭曰準噶爾內亂頻仍各部人衆咸失生業朕為統一天下之君懷保羣生無分中外特發大軍往定伊犁方欲施恩立制永安反側乃逆賊潛懷叛志妄思并吞諸部肆其荼虐罪狀已著畏誅潛遁朕已命將窮追務期弋獲逆賊一日不獲諸部一日不安爾台吉輸誠歸命果能仰體朕旨去逆效順或以兵協𠞰阿逆或俟至爾牧擒獻之朕必大沛殊恩爾其奮勉自效達瓦齊復奏伯什阿噶什及庫本諾音台吉諾爾布必無異志命遺之書未達而伯什阿噶什徙牧初傳偕諾爾布內附久之不至或以居博囉塔拉告詔將軍䇿楞等偵之無其迹時阿睦爾撒納敗竄諭參贊大臣侍郎玉保等偵阿逆赴伯什阿噶什牧即諭擒獻或故縱以兵𠞰之伯什阿噶什養子博東齊尋偕宰桑諾斯海挈衆至以哈薩克侵牧告宰桑賽音伯勒克得木齊恩克濟爾哈爾等踵至告哈薩克道掠間走乃免詔博東齊以兵迎其父暫置從衆于額爾齊斯諾斯海護視之賽音伯勒克或從博東齊往或留牧額爾齊斯惟其便博東齊將行伯什阿噶什擕户八百餘抵額爾齊斯請內附烏巴什其族台吉也從至詔封伯什阿噶什為扎薩克和碩親王烏巴什為扎薩克固山貝子賜諭曰爾誠心感戴率衆投誠前大軍抵伊犁即謁將軍大臣甫欲加恩封賞旋遇阿逆背叛未獲舉行爾為哈薩克所掠輾轉遷徙始克內附爾衆甫至不必簡兵往從大軍亦無須徙內地即遊牧額爾齊斯所爾族台吉車凌等將歸舊牧爾等聚族而處實為允協不必逺離故土徒勞往返也命甫下伯什阿噶什等擕衆抵哈達青吉勒詔暫留俟明嵗歸額爾齊斯牧七月車凌車凌烏巴什剛多爾濟等以徙牧額爾齊斯請定入覲年班諭嘉其誠悃詔自來年始定三班前給從軍駝馬姑緩期納示恤九月伯什阿噶什來朝弟達瓦濟特及兄子丹巴都噶爾布魯特扣肯以視牧故各遣宰桑代至賜宴賚馬七百牛百五十羊三千詔編旗分佐領如三車凌及剛多爾濟等來歸例别為一盟以伯什阿噶什為盟長烏巴什副之丹巴都噶爾授協理台吉伯什阿噶什甫歸牧其妻卒遣侍衛佛保往醊伯什阿噶什尋卒無子詔副都統唐喀祿賻祭宣諭以丹巴都噶爾為扎薩克固山貝子以達瓦濟特為扎薩克公轄伯什阿噶什衆聽歸車凌牧及內徙而丹巴都噶爾與佐領色布騰互攘畜産佛保將至牧駝馬為所掠詔撤恩命還復諭烏巴什勿驚懼俟事定歸車凌牧後烏巴什卒停襲故不立傳二十二年車凌以哈薩克不擒獻阿逆諸厄魯特叛擾邉請由額爾齊斯徙牧烏蘭固木避之時喀爾喀貝子車布登扎布遵旨遣兵𠞰掠佛保賊收伯什阿噶什屬户給喀爾喀將遣博東齊歸車凌牧族台吉布圖庫班珠爾布林等挈屬至稱與車凌等析處久請異牧允之布圖庫等抵汛聞佛保自哈達青吉勒歸和碩特台吉桑濟復掠諸道遣從卒馳馬迎上聞之諭曰車凌等自歸誠以來感激朕恩約束屬衆甚為寧謐邇因叛賊紛起亟請內徙遊牧其歸附之心益堅可允所請并給榖種令為謀生資博東齊雖與杜爾伯特同族若往歸之反仰賴車凌等養贍著遣往烏里雅蘇台交車布登扎布酌徙呼倫貝爾通肯呼裕爾等處布圖庫班珠爾等接迎侍衛佛保俟至烏里雅蘇台軍所各給幣賞之後博東齊及布圖庫等咸置呼倫貝爾布圖庫班珠爾以內附誠各授二等台吉而貝勒巴圖博羅特輔國公舍稜不從車凌等徙牧叛應阿睦爾撒納副都統瑚爾起以兵擒諸輝巴朗山妻孥悉論誅先是杜爾伯特及烏梁海未內屬錯牧額爾齊斯後杜爾伯特諸台吉至遊牧扎克拜達里克初徙牧額克阿喇勒再徙額爾齊斯烏梁海就撫以烏蘭固木地給之車凌等復請由額爾齊斯往徙遣都統納穆扎爾勘杜爾伯特及烏梁海牧界車凌復請以烏蘭固木為屯耕地而遊牧于科布多額克阿喇勒允之詔嚴禁所屬勿攘竊尋以錯牧不便定烏蘭固木為杜爾伯特牧别以科布多為烏梁海牧二十四年烏梁海以科布多産貂不給捕請徙就阿爾台陽額爾齊斯諭車凌烏巴什等曰額爾齊斯為爾舊牧今爾移處烏蘭固木烏梁海察達克請遊牧額爾齊斯地向曾降旨爾等若願歸舊牧聽爾便今哈薩克已全部內附伊犁厄魯特賊衆復殱無孑遺若爾果願歸舊牧可即徙往額爾齊斯所遺烏蘭固木自可給烏梁海處之但哈薩克新附非爾等久為內屬者比務宜嚴飭所屬安靜無事若爾部衆既遵鈐束而哈薩克反來肆擾可即擒誅之爾等或安土重遷則額爾齊斯地與其為哈薩克俄羅斯所竊據不若令烏梁海往徙之也車凌烏巴什等奏察達克所請地係烏梁海舊牧距臣等牧逺且烏蘭固木地肥不磽臣等遊牧久請勿徙以額爾齊斯地給烏梁海詔如所請是年十月以大軍定回部蕆功諭車凌烏巴什等知之十二月偵哈薩克襲烏梁海以兵三百餘擊走得旨奬賚二十五年四月以所部有溫圖呼爾者貧不給聞其弟居察哈爾牧告諸扎薩克往就之諭曰杜爾伯特自歸誠以來編設旗分佐領原欲伊等各安生業若不善恤之漸至析處殊為可憫其各加意撫綏令守分謀生勿至流離失所副朕痌瘝一體之懷七月車凌烏巴什等扈蹕行圍奏所部蒙恩安置牧産漸饒嗣請自備駝馬上嘉其誠悃不忍驟勞之詔仍官給駝馬二十七年詔左右翼各設副將軍一右翼用正黃旗纛左翼用正白旗纛以敕印軍符給之所部旗十有六爵如之扎薩克特古斯庫魯克達賴汗一扎薩克和碩親王一扎薩克多羅郡王一扎薩克多羅貝勒二扎薩克固山貝子二扎薩克鎮國公一由貝子降襲扎薩克輔國公二扎薩克一等台吉四輝特扎薩克一等台吉二欽定外藩蒙古回部王公表傳卷之九十四欽定四庫全書欽定外藩蒙古回部王公表傳卷之九十五傳第七十九扎薩克特古斯庫魯克達賴汗車凌列傳車淩杜爾伯特部人姓綽囉斯系出博羅諾哈勒詳總傳曾祖鄂木布岱青和碩齊有子三長伊斯扎布三傳至伯什阿噶什以來歸封親王後停襲故不立傳次察衮其裔别為兩扎薩克詳親王車凌烏巴什傳次車臣台吉子二長固哩什達子即車凌次德濟特無嗣鄂木布岱青和碩齊裔設扎薩克三車凌其一也且以汗爵統所部初遊牧額爾齊斯為準噶爾屬乾隆十八年以達瓦齊不足事率所部衆來歸從者三千百七十餘户口以萬計上鑒其誠遣官齎御用冠服頒賜十九年二月詔選所部兵二百以台吉色布騰領之赴內大臣薩拉爾軍招烏梁海衆四月授盟長五月入覲詔封扎薩克和碩親王歸牧復以所部兵五百從薩拉爾𠞰烏梁海二十年詔授參贊大臣從西路軍征達瓦齊車凌等聞命自牧所馳抵軍賞三眼孔雀翎諭常服之軍行抵察罕烏蘇遣佐領蒙克從侍衛塔齊圖檄達瓦齊速降大軍抵伊犁詔賜親王雙俸增護衛員倍之尋率新降台吉入覲飲至詔封杜爾伯特汗賜特古斯庫魯克達賴號授左翼盟長賞銀三千遣歸牧二十一年族台吉納默庫叛誅詔籍其屬分給之尋徙牧從衆或劫驛騎參贊大臣舒赫德巡軍汛至努克木倫聞之往詰罪車凌察劫者以獻請論罪諭嘉其恭順賜佩飾奬之既而汗哈屯烏梁海衆附和託輝特逆賊青衮咱卜叛詔車凌率兵𠞰烏梁海尋為大軍所定命勿赴二十二年以噶勒雜特宰桑哈薩克錫喇附阿睦爾撒納叛大軍將由西路進𠞰詔副都統唐喀祿宣諭之曰哈薩克錫喇等或勢窮力蹙逃赴哈薩克境爾等其簡兵防守遊牧并堵禦通哈薩克隘口遇賊竄即擒獻此特為保護所部遊牧計非令其出兵協𠞰也會和碩特台吉桑濟叛擾邉車凌遣親王車凌烏巴什貝子瑪什巴圖等兵擊之復以哈薩克錫喇遣得木齊巴圖濟爾噶爾來誘叛械赴科布多軍而自擕其衆徙牧和通呼爾哈諾爾唐喀祿遵旨諭所部遣卒七十從往疏至諭嘉其誠順且明大義賜幣及佩飾尋諜明噶特烏梁海衆叛竄哈喇哈爾榜復遣兵𠞰詔酌賞從軍辨兵免追從征達瓦齊所給駝馬有察衮者其壻也附阿睦爾撒納叛聞追軍至竄和洛霍斯河為厄魯特達什所擒獻詔論罪誅宥其妻給車凌二十三年車凌卒上以準噶爾擾亂初車凌識時慕義率屬歸誠及凖噶爾蕩平始終抒誠效力鈐牧衆謐無事軫悼之賜賻祭子索羅木衮布襲一次襲索羅木衮布車凌長子乾隆二十三年三月襲扎薩克特古斯庫魯克達賴汗尋授盟長詔勤習牧務六月索羅木衮布以疾故請往禮哲卜尊丹巴呼圖克圖喀爾喀親王成衮扎布以聞詔聽之九月諭曰盟長分理全部所係甚要聞索羅木衮布襲封後時有疾今已授巴桑為副盟長巴桑亦係少年恐不更事親王車凌烏巴什貝子瑪什巴圖等誼關同族自應視如一體務宜悉心協助加意辦理不可稍存彼我之見二十五年定所部管旗章京䇿塔爾罪蓋索羅木衮布少而懦其哈屯布呢達喇喀爾喀女也鈐所部衆嚴䇿塔爾等忌之計衊歸喀爾喀副管旗章京巴顔克什克訐之成衮扎布所遣員往訊僉稱哈屯直成衮扎布將重議䇿塔爾罪以庇族女嫌疏請罷䇿塔爾職别以和通代之偕副管旗章京巴顔克什克助汗哈屯理牧務諭曰為人臣僕而威脅其汗且謀逐哈屯不法已極宜重罪之或以新附尚未悉禮法故姑從寬免然亦不可仍留舊地致起釁端其詳勘欺主滋事不受哈屯約因計陷之者解送京師成衮扎布遵旨察獲䇿塔爾黨十四人械至詔遣戍福建廣東牧産給索羅木衮布勿歸公既而布尼達喇請以巴顔克什克代管旗章京職諭曰䇿塔爾以巴顔克什克訐因而獲罪若令代之則無知者妄生希兾反以互訐為能且管旗章京既有和通理之巴顔克什克令其協助足矣三十四年索羅木衮布卒子瑪克蘇爾扎布襲二次襲瑪克蘇爾扎布索羅木衮布子乾隆三十四年襲扎薩克特古斯庫魯克達賴汗四十七年詔世襲罔替扎薩克和碩親王車凌烏巴什列傳車凌烏巴什杜爾伯特人姓綽囉斯扎薩克特古斯庫魯克達賴汗車凌從子其曾祖察衮為鄂木布岱青和碩齊次子見車凌傳察衮子二長丹津次達爾扎丹津子三曰阿喇布坦曰達克巴曰巴圖鄂齊爾阿喇布坦子二長達什次即車凌烏巴什達什子訥默庫以叛誅達克巴嗣詳貝勒剛多爾濟傳巴圖鄂齊爾無嗣達爾扎子二長車凌達什次伯勒克車凌達什子烏巴什及伯勒克皆以來歸授扎薩克台吉後停襲故不立傳乾隆十八年車凌烏巴什從車凌來歸先是喇嘛達爾扎篡襲準噶爾台吉達瓦齊約達什及車凌烏巴什挈衆內附達什等將從之已而懼以其謀告喇嘛達爾扎擊達瓦齊擒其衆之半達瓦齊篡襲達什卒車凌烏巴什擕母妻子女至從者千二百餘户上以所部諸台吉車凌長車凌烏巴什次之詔頒賜御用冠服如車凌十九年四月授副盟長五月入覲詔封扎薩克多羅郡王遣歸牧二十年詔授參贊大臣從西路軍征達瓦齊賞三眼孔雀翎諭常服之大軍抵伊犁詔晉封和碩親王時達瓦齊不即降由格登挈千餘騎竄踰庫魯克嶺諸軍分道躡皆以馬疲返車凌烏巴什偕輔國公瑪什巴圖率輕騎八百尾之達瓦齊尋為烏什伯克霍集斯所擒獻車凌烏巴什入覲飲至詔授右翼盟長二十一年從子訥默庫叛誅詔籍其屬分給之二十二年以和碩特台吉桑濟叛擾邉偕貝子瑪什巴圖馳𠞰之奬賜御用佩飾會車凌以其衆徙牧和通呼爾哈諾爾詔車凌烏巴什或從車凌往或遊牧科布多惟其便車凌烏巴什徙就車凌道遇副都統唐喀祿迎謁之唐喀祿語曰厄魯特哈薩克錫喇叛擾額爾齊斯我將赴西路軍協𠞰且奉旨令徴爾部兵車凌烏巴什遣護衛巴顔及卒三十從之且稱額爾齊斯及烏隆古地值盛夏多蚊蛇道不可行額琳哈畢爾噶哈布塔克拜達克皆以察罕郭勒為要汛請往禦賊於其地唐喀祿以聞奬賜幣二十三年諜嗎哈沁賊呼里木由索倫叛遁呼倫貝爾馳兵往𠞰二十五年或告車凌烏巴什將叛欲隂陷之定邉左副將軍成衮扎布以聞上鑒其誣詔勿問尋入覲扈蹕木蘭行圍溫諭之二十七年詔授右翼副將軍命御前行走賜岱青卓哩克圖號二十八年烏梁海叛賊庫克卒走俄羅斯道掠哈薩克馬車凌烏巴什率兵緝之偵匿和羅圖郭爾馳往擊賊潰竄尾至林際獲之斬庫克卒及從黨五十八人俘其孥及户七十餘歸詔賜幣辨兵酌賞示勵有台吉巴朗者其甥也幼被哈薩克掠二十八年脫歸伊犁請𨽻車凌烏巴什詔給之四十一年朝正車凌烏巴什先避痘歸誠二十餘載不敢至內地至是已出痘入覲京師賜宴紫光閣命進酒御前上元夕詔觀燈火御製詩紀之有厄魯近多出痘者也教元夕賞皇州之句四十七年諭曰車凌烏巴什初封郡王繼而平定伊犁晉封扎薩克和碩親王自歸誠以來鈐束所屬恪慎供職且在御前行走有年著加恩令扎薩克和碩親王爵世襲罔替欽定外藩蒙古回部王公表傳卷之九十五欽定四庫全書欽定外藩蒙古回部王公表傳卷之九十六傳第八十扎薩克多羅郡王車凌蒙克列傳車凌蒙克杜爾伯特人姓綽囉斯扎薩克特古斯庫魯克達賴汗車凌從叔父其父伯布什為保伊爾登第四子有子一即車凌蒙克乾隆十八年偕車凌車凌烏巴什來歸所部以三車凌稱之杜爾伯特諸台吉車凌蒙克行獨尊且兼領巴約特務以故從車凌蒙克至者凡七百餘户戚屬僅百有十四餘皆巴約特屬𨽻之者十九年入覲詔封扎薩克多羅貝勒車凌蒙克子四長齊默克早死次巴朗次巴雅勒當次博斯和勒巴朗從父內附中道謀竄歸凖噶爾以告巴雅勒當及宰桑濟爾哈朗達瓦達爾扎納木凱贊卜尼瑪齊崕等未敢發車凌蒙克入覲將以子巴朗及巴雅勒當行巴朗詭稱疾不之從巴雅勒當復固辭弗許携就道巴朗煽齊默克子巴布勒及屬衆二百餘遁族台吉蒙克特穆爾從之詔將軍䇿楞等緝巴朗及蒙克特穆爾務獲其從逃衆悉宥車凌蒙克歸牧巴朗遣從者伯克增啓誘巴雅勒當往會遇汛兵就擒訊得狀詔誅伯克增啓嚴防間諜及遊牧衆竄巴朗偕蒙克特穆爾由北路間道行經烏克嶺哈布塔克拜達克竒蘭阿拉克台布哈和洛諸境聞追軍至輒逸其從逃之沙拜塔爾納瑪琳曼集巴顔恩克等後先脫歸詔宥罪給車凌蒙克轄之二十年詔授參贊大臣從西路軍征達瓦齊諭西路副將軍薩拉爾曰巴朗負恩叛逃即窮􅕚乞降非投誠可比或聞其父車凌蒙克進兵西路潛由北路奔走額琳哈畢爾噶迎降乞宥爾聞之即遣兵往擒巴朗令車凌蒙克自不得以招撫為辭既而巴朗及蒙克特穆爾竄塔本集賽副都統達什敦多布馳緝之巴朗棄孥遁巴布勒偕蒙克特穆爾留噶勒雜特宰桑都噶爾所大軍至都噶爾以獻不旬日額伯津宰桑等檻巴朗至北路軍諭車凌蒙克曰爾父子前來歸誠兾受朕恩甫入覲爾子巴朗乘間遁不獨負朕恩且悖爾志情罪甚重國法難貸念爾誠心感戴效力從軍爾孫巴布勒或為巴朗所逼或與巴朗同謀皆可置之不問以加恩爾故特宥之俟至烏里雅蘇台仍遣赴爾遊牧爾其知之大軍抵伊犁詔晉爵多羅郡王定北將軍班第以達瓦齊不即降令車凌蒙克督所部兵駐防伊犁達瓦齊就擒乃遣歸詔授右翼副盟長巴朗及蒙克特穆爾械至告祭太廟社稷上御午門樓行受俘禮誅之二十二年車凌蒙克卒諭嘉其輸誠內附奮力報效賜賻祭子巴雅勒當襲一次襲巴雅勒當車凌蒙克次子乾隆二十二年襲扎薩克多羅郡王二十三年卒無嗣弟博斯和勒襲二次襲博斯和勒車凌蒙克第四子乾隆二十四年襲扎薩克多羅郡王四十六年卒子納旺索諾木襲三次襲納旺索諾木博斯和勒長子乾隆四十六年襲扎薩克多羅郡王四十七年詔世襲罔替郡王品級扎薩克多羅貝勒色布騰列傳色布騰杜爾伯特人姓綽囉斯扎薩克特古斯庫魯克達賴汗車凌族祖其祖巴特瑪多爾濟有子三長蒙和岱次扎勒次丹達爾蒙和岱裔别設扎薩克四詳貝子班珠爾傳扎勒子三長琿托和爾車凌子即色布騰次邁雅次三扎卜其裔皆授間散台吉丹達爾無嗣巴特瑪多爾濟裔設扎薩克五色布騰其一也乾隆十八年從三車凌來歸甫屯牧內汛三車凌以色布騰善約衆且內附誠告我視牧臣上知其才將任之十九年詔參贊軍務偕內大臣薩拉爾議招烏梁海及扎哈沁復以所部諸台吉避痘諭色布騰馳至張家口外命大學士公傅恆迎勞之傳旨封多羅貝勒歸牧協理所部盟長務既而三車凌率諸台吉來朝行在賜爵有差詔各授扎薩克色布騰如之時色布騰歸牧以議烏梁海務赴薩拉爾軍族台吉巴朗蒙克特穆爾等蓄叛志久至是乘間挈衆逃上聞之諭嘉色布騰善轄衆詔速以兵擒叛黨色布騰馳追之巴朗入準噶爾境不及而返是年冬詔偕新降輝特台吉阿睦爾撒納入覲二十年詔授參贊大臣從西路軍征達瓦齊大軍抵伊犁達瓦齊不即降定北將軍班第令色布騰轄烏嚕木齊至博囉塔拉郵務達瓦齊就擒色布騰入覲飲至詔授