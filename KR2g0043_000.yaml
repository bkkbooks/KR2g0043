里木達爾漢伯克額穆魯勒等銀幣有差遣歸烏什復以霍集斯妻偕子呼岱巴爾氐輸馬四十助援喀喇烏蘇軍諭嘉之大軍破喀喇烏蘇圍還阿克蘇霍集斯請赴烏什集馬詔酌賚兆惠遵旨詢由烏什進兵喀什噶爾道告曰烏什距喀什噶爾近然道多石且乏水泉不若由阿克蘇時賊急圍和闐城副都統巴圖濟爾噶勒定邉右副將軍富德後先以兵援霍集斯自烏什馳會之和闐圍解上以霍集斯舊轄其地詔授總管和闐六城阿竒木伯克富德復遵旨詢由和闐進兵葉爾羌道霍集斯告曰伊犁齊達呼爾璊取水艱甚丕雅勒瑪至固璊雖有水草而塞爾勒克楚魯克通阿里克諸站多沙磧馬行易疲且距溫都斯坦道逺賊乘間竄不及禦請由丕雅勒瑪迤南行水草足且便休馬富德議如言霍集斯請以和闐六城伯克阿什默特巴喇特等從遣赴喀什喀爾招降布拉呢敦懼事不效或纍己富德以聞諭曰霍集斯感激朕恩招降以離賊黨深可嘉悅著加恩賞給縀匹至伊輸誠效䇿果如所算自必加恩萬一布拉呢敦執迷不悟於霍集斯何與時額敏都霍什提卜等私以霍集斯招降阿卜都伯克故告霍集占霍集占戕阿卜都伯克阿卜都里木等且知大軍將至偕布拉呢敦棄城竄霍集斯從富德軍由葉爾羌尾擊之敗諸阿爾楚爾賊遁伊西洱庫爾官軍分隊擊霍集斯偕阿克蘇伯克鄂對等執纛呼曰降者生否則必死其屬阿里木立纛前中賊銃死霍集斯呼愈壯回衆聞聲趨至乞降者萬餘霍集占等以兵阻不得遁巴達克山諭曰伯克霍集斯之兄弟諸子多為霍集占戕害深可憫惻伊此次亦屬奮勉著加恩晉封多羅貝勒賜恤阿里木及從霍集斯辨兵等銀幣時巴達克山伯克素勒坦沙不即以布拉呢敦等獻其鄰部曰博羅爾居巴達克山東曰斡罕居巴達克山北霍集斯遣托霍斯遷伯克伊斯邁拉和卓招降博羅爾復自以哨探兵偕副都統伊柱屯斡罕博羅爾伯克沙瑚沙默特斡罕伯克密爾莽蘇爾遣使告曰巴達克山若不獻逆當助討巴達克山悔罪戮逆獻霍集斯乃自斡罕還軍諭曰霍集斯自進兵以來竭盡所知諸務奮勉協同將軍大臣等克蕆大事甚屬可嘉自當錫豫優渥著加恩賞給郡王品級先是軍所劾霍集斯議烏什賦謂舊例計畝徴什一别無他貢額憾阿克蘇伯克鄂對議事輒不協善阿什默特乞司和闐六城伯克務葉爾羌諸城頭目私饋受不辭知吐魯畨扎薩克額敏和卓封郡王爵故以伯克稱之疏至諭兆惠富德等曰霍集斯或不過恃功率意即暫示包容如情形叵測亦不得姑息從事霍集斯自巴達克山還請從凱師入朝約兆惠等待阿克蘇赴烏什俶裝如期會以第三子托克托索丕從時伯克等四十四人兆惠令霍集斯偕哈密扎薩克貝勒玉素卜領之舒赫德等遵旨將遣霍集斯孥赴京諭曰前霍集斯葉爾羌被圍時殊為勞苦往巴達克山亦頗效力但仍令其居於舊地究屬未便俟伊到京時再酌量從優安置伊子漠咱帕爾啓程亦不必照厄魯特宰桑之例仍與前次入覲一體辦理舒赫德等當善為慰遣至伊等起程後所查霍集斯家口不妨明白曉示以霍集斯蒙恩旨留京來取家屬團聚務宜供給饒裕加意照看蓋伊等非獲罪之人籍沒家産者可比所有積蓄俱一同辦送仍約束兵丁回人毋許妄行偷竊其田園房屋亦應變價給賞以資生計二十五年以烏什諸伯克訐霍集斯父子虐衆諭曰烏什回人等訐告霍集斯父子苦虐部衆經辦事大臣等具奏朕以霍集斯抒誠效力所有過失皆從前陋習若遽行治罪心有不忍但仍令其管轄所屬則上下猜忌不能相安無事即如凖噶爾人等亦因聚斂成讐上既凌虐下亦忿恨互相侵噬以底滅亡可為明鑒因將霍集斯父子優其廪祿安置京師而各城頭目亦自知所懲創悛改舊習恐愚頑無識之徒因此遂長刁風托拾已往之事公行訐告或伊什幹等圖得阿竒木之缺或所屬人等妄生事端挾制總管大干法紀嗣後有似此者非但不行辦理仍究明情節重治其罪斷不寬宥爾等知此惟期上下相安勤於事業勉為良善永享升平霍集斯至召覲於正大光明殿賚章服飲至豐澤園賜銀幣伯克等將歸詔宣示烏什訐霍集斯狀霍集斯奏烏什怨臣甚臣蒙恩釋罪請留居京師慰允之諭曰霍集斯懇請留京意殊誠切著照所請厚為資給安置京師但其先世墳墓逺隔故鄉著加恩將伊幼子托克托索丕遣回阿克蘇以供祭掃其烏什所有田産即行變價在阿克蘇置業賞給托克托索丕承管著舒赫德等遵照辦理仍傳諭該處回衆俾咸知朕意詔圖形紫光閣御製贊曰奉元戎檄擒達瓦齊後稍觀望旋迎我師同大軍進被圍黑水回部望族居之京邸時輔國公和什克額色尹一等台吉瑪木特圖爾都哈什木二等台吉阿卜都爾璊三等台吉帕爾薩等先後入覲詔留京師統𨽻蒙古正白旗視應得俸銀給祿米資贍霍集斯疏列和闐户産及吐魯畨舊屬詔給托克托索丕會漠咱帕爾行次沙泉子疾詔醫視俟痊乃就道復命霍集斯寄之書令善自攝疾痊偕呼岱巴爾氐至詔與其父聚處尋額敏都霍什提卜逮至上以霍集斯戚族詔免死給廣東福建駐防兵秋霍集斯偕輔國公和什克扈蹕木蘭行圍蒙古扎薩克等進宴陳詐馬什榜教駣諸戲詔霍集斯列觀旋蹕避暑山莊命觀燈火預萬樹園宴冬詔預朝正外藩蒙古回部王公伯克等宴嗣扈蹕侍禁預內王公大臣班三十年烏什逆回賚哈木圖拉等紏衆叛霍集斯遵旨列戚族居烏什者以聞詔録示伊犂將軍明瑞俟克烏什察霍集斯族被脅者勿孥戮四十六年卒子四長漠咱帕爾封公品級後以罪削授一等侍衛次呼岱巴爾氐授內大臣次托克托索丕居阿克蘇次哈第爾襲郡王爵一次襲哈第爾霍集斯第四子乾隆四十六年襲郡王品級多羅貝勒四十八年理藩院議哈第爾𨽻內蒙古旗與外藩扎薩克不同請視內旗例俟出缺時遞降至公爵乃世襲罔替詔如議欽定外藩蒙古回部王公表傳卷之一百十六欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百十七傳一百一輔國公和什克列傳居回京師之爵和什克和闐人初為喀什噶爾阿竒木伯克𨽻凖噶爾大軍既定凖噶爾遣布拉呢敦自伊犂歸和什克偕諸伯克不納聞我軍至乃迎入布拉呢敦尋偕弟霍集占謀逆和什克避走布嚕特依阿特巴什鄂拓克長明依勒哈乾隆二十三年霍集占抗大軍於喀喇烏蘇侍衛布占泰徴兵布嚕特抵明伊勒哈牧示軍檄辭不即應二十四年大軍破喀喇烏蘇圍布占泰復赴布嚕特和什克乃偕明伊勒哈至阿克蘇謁定邉將軍兆惠請降兆惠詰進兵道和什克曰霍集占昆弟善霍罕額爾德尼伯克大軍迫將竄往喀什噶爾西歧道三請先據之兆惠因檄霍罕勿助逆時定邉右副將軍富德屯和闐兆惠議分道進兵一由阿克蘇攻喀什噶爾一由和闐攻葉爾羌和什克復繪圖告曰喀什噶爾西由鄂坡勒達霍罕敏珠爾嶺由玉斯圖阿喇圖什達安集延額德格訥諸部請示檄防賊竄兆惠悉如言進兵喀什噶爾以和什克導霍集占等棄城竄葉爾羌喀什噶爾定兆惠請以和什克署葉爾羌阿竒木伯克其叔父素賚璊舊為葉爾羌商伯克請仍職允之二十五年和什克入覲詔留京師封輔國公賜雙眼孔雀翎和什克疏列和闐哈喇哈什葉爾羌沙古則里諸邑屬産詔易值留和闐贍其戚屬四十六年卒子伊巴喇伊木襲一次襲伊巴喇伊木和什克長子乾隆四十六年襲輔國公四十八年詔視出缺時視有績令子如爵無績以次降襲三等台吉五十三年詔世襲輔國公罔替輔國公額色尹列傳居世京師之回爵定襲三等台吉額色尹葉爾羌人號額爾克和卓其始祖曰𣲖罕帕爾世為回部長居葉爾羌領其族族統稱和卓猶蒙古族統稱台吉也凖噶爾強䇿妄阿喇布坦侵葉爾羌黜和卓阿哈瑪特掠其族置吐魯畨尋以吐魯畨內附復脅徙伊犁大軍定凖噶爾額色尹等將乞降阿哈瑪特子霍集占復乘阿睦爾撒納亂脅族自伊犁歸葉爾羌額色尹不從避徙布嚕特霍罕瑪爾噶朗安集延納木干塔什干諸部弟帕爾薩及兄子瑪木特圖爾都從之霍集占與布嚕特仇以兵索之不得乾隆二十三年大軍討霍集占抵葉爾羌額色尹聞之偕圖爾都及布嚕特之呼什齊鄂拓克長納喇巴圖以兵攻喀什噶爾襲英吉沙爾諸邑時霍集占抗大軍於喀喇烏蘇哈密扎薩克貝子玉素卜遣侍衛布占泰徴兵布嚕特抵阿特巴什其長曰明伊勒哈以兵寡辭布占泰歸諜霍集占兄布拉呢敦自喀什噶爾援葉爾羌聞布嚕特兵襲其邑疑與我軍應懼不敢逼喀喇烏蘇圍則未知其為布嚕特何鄂拓克也二十四年禡木特自布嚕特赴阿克蘇謁定邉將軍兆惠以故告且稱額色尹集兵納喇巴圖待我軍檄兆惠傳旨奬給幣令禡木特達額色尹書額色尹以兵至道遇賊百餘擊之獲纛一獻軍門請內附兆惠慰諭之霍集占等既竄有布嚕特兵攻喀什噶爾之布喇村額色尹亟遣屬從侍衛成果檄阻之曰葉爾羌喀什噶爾已定若復進兵是抗大軍也布嚕特兵乃還兆惠遣額色尹入覲上以其為𣲖罕帕爾裔詔封輔國公額色尹奏世居葉爾羌凖噶爾掠赴吐魯畨再徙伊犁以避霍集占亂奔布嚕特幸為天朝臣僕安置惟命詔留京師傳諭兆惠等曰額色尹等係霍集占族且居伊犁久不便遣歸葉爾羌仍將伊等家口送京四十八年詔俟出缺後子如爵視有績再傳仍襲公爵無績以次降襲三等台吉輔國公圖爾都列傳居世京師之回爵定襲三等台吉圖爾都葉爾羌人輔國公額色尹從子初徙居伊犁以不附族酋霍集占叛從額色尹走匿布嚕特境布嚕特稱曰和卓乾隆二十三年聞大軍征霍集占抵葉爾羌霍集占抗諸喀喇烏蘇隂以布嚕特兵從額色尹攻喀什噶爾分賊勢二十四年其兄禡木特謁大軍告故圖爾都尋自布嚕特至請降額色尹偕禡木特先入覲圖爾都繼至上以其為派罕帕爾裔詔授扎薩克一等台吉留京師二十七年追論攻喀什噶爾功晉封輔國公四十四年卒子託克託襲一次襲託克託圖爾都長子乾隆四十四年襲輔國公四十八年詔示出缺後視有績令子如爵無績以次降襲三等台吉扎薩克一等台吉禡木特列傳居世京師之回爵定襲二等台吉禡木特葉爾羌人輔國公額色尹從子初號鄂托蘭珠和卓以不附族酋霍集占叛偕弟圖爾都從額色尹走匿布嚕特境乾隆二十三年大軍征霍集占抵葉爾羌霍集占抗諸喀喇烏蘇額色尹圖爾都以兵攻喀什噶爾禡木特留布嚕特視戚屬二十四年額色尹復自布嚕特集兵遣禡木特赴阿克蘇謁定邉將軍兆惠告故且稱以避霍集占走布嚕特不獲早至兆惠慰諭之進兵喀什噶爾攜禡木特從令以書達額色尹額色尹馳至喀什噶爾諸城定兆惠遣禡木特入覲上以其為派罕帕爾裔詔授扎薩克一等台吉留京師復諭兆惠遣其子巴巴至與聚處四十四年卒子巴巴降襲二等台吉一次襲巴巴禡木特長子初稱和卓乾隆二十四年兆惠遵旨自軍所遣至詔授四等台吉四十四年襲二等台吉四十八年詔俟出缺時視有績令子如爵無績以次降襲四等台吉五十三年詔世襲二等台吉罔替一等台吉哈什木列傳居世京師之回爵定襲二等台吉哈什木吐魯畨人姓博爾濟吉特為元太祖裔初元太祖定西北諸部分遣王駙馬等領之次子察哈岱居伊犁兼轄吐魯畨回衆越十傳至特木爾圖呼魯克棄蒙古俗習回教子吉匝爾和卓布哈爾拜密爾徙居吐魯畨不復有伊犁地本朝康熙二十五年有阿布勒穆咱帕爾蘇勒檀瑪哈瑪特額敏巴圖爾哈什汗者自吐魯畨貢稱元裔見吐魯畨回部總傳五十九年大軍討凖噶爾由吐魯畨進擊烏嚕木齊哈什木兄莽蘇爾迎獻駝馬軍還䇿妄阿喇布坦罪之禁諸喀喇沙爾乾隆二十年大軍定凖噶爾莽蘇爾聞之乞降定北將軍班第奏請遣轄吐魯畨舊屬未定議而阿睦爾撒納叛莽蘇爾等不獲歸吐魯畨二十四年葉爾羌諸回城定乃獲莽蘇爾及哈什木二十五年入覲上以其為元太祖裔詔並授一等台吉留京師三十年哈什木卒子阿布勒降襲二等台吉莽蘇爾以無嗣停襲故不立傳一次襲阿布勒哈什木長子乾隆三十年襲二等台吉四十八年詔俟出缺後視有績令子如爵無績以次降襲四等台吉五十三年詔世襲二等台吉罔替二等台吉阿卜都爾璊列傳居世京師之回爵定襲三等台吉阿卜都爾璊葉爾羌人派罕帕爾裔初葉爾羌和卓曰阿哈瑪特䇿妄阿喇布坦黜之阿哈瑪特死復禁其子布拉呢敦霍集占葉爾羌喀什噶爾衆别立長號伊克和卓即阿卜都爾璊祖也乾隆二十年大軍定凖噶爾釋布拉呢敦歸葉爾羌伊克和卓不即納聞我軍至乃迎入已而霍集占萌叛志偕布拉呢敦分據葉爾羌喀什噶爾城戕伊克和卓阿卜都爾璊避走布嚕特霍集占捕禁之二十四年大軍定葉爾羌獲阿卜都爾璊二十五年入覲上以其為舊和卓孫詔授二等台吉留京師三十七年卒子阿卜都呢咱爾降襲三等台吉一次襲阿卜都呢咱爾阿卜都爾璊長子乾隆三十七年襲三等台吉四十八年詔俟出缺後視有績令子如爵無績降襲四等台吉五十三年詔世襲三等台吉罔替三等台吉帕爾薩列傳居回京師之爵帕爾薩葉爾羌人輔國公額色尹弟以不附族酋霍集占叛從額色尹走匿布嚕特境布嚕特稱曰和卓乾隆二十四年大軍定霍集占亂額色尹自布嚕特來降帕爾薩不即至定邉將軍兆惠遣侍衛達克塔納招降霍罕瑪爾噶朗安集延納木干諸部復齎軍檄索帕爾薩帕爾薩居瑪爾噶朗城從我使至請內附二十五年入覲上以其為派罕帕爾裔詔授三等台吉留京師四十八年詔俟出缺後視有績令子如爵無績降襲四等台吉五十三年詔世襲三等台吉罔替欽定外藩蒙古回部王公表傳卷之一百十七欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百十八傳第一百二原封貝勒品級固山貝子鄂對列傳居新疆之回爵今襲散秩大臣晉固山貝子鄂對庫車人祖瑪爾咱尼默特父頗喇特世居庫車鄂對嗣凖噶爾脅徙伊犁居河北固勒扎乾隆二十年大軍定凖噶爾鄂對乞降二十二年從定邉將軍喀爾喀親王成衮扎布勦厄魯特孽賊二十三年靖逆將軍雅爾哈善討逆回布拉呢敦霍集占鄂對請從奬授散秩大臣賜孔雀翎時逆黨阿卜都克勒木為庫車阿竒木伯克鄂對戚屬殱焉大軍抵庫車鄂對以世居悉形勝告副都統順德訥兵據城外林賊至不敢爭閉城甸餘鄂對告雅爾哈善曰庫車城固甚請設雲梯絶水道困之且將必有援至城東南達庫爾勒喀喇沙爾路可無虞北達賽哩木有沙勒達朗鄂斯伯克什二隘遣健卒塞以石賊必不能至西達沙雅爾有鄂根河水盛可行舟至東由雅哈托和鼐托木羅克達賽哩木諸城請兵備雅爾哈善遣防各隘阿卜都克勒木弟阿卜都哈里克挈賊二千餘襲托木羅克路擊敗之諭曰鄂對熟悉要隘預籌防範現在有攻克回城可即授為伯克復以霍集占攜賊二千餘自鄂根河抵庫車為我軍所敗詔賜鄂對銀幣及子鄂斯璊時霍集占已入庫車我軍不之知翌日賊開門出抗鄂對請以兵屯鄂根河遏竄路雅爾哈善不設備霍集占逸乃克庫車鄂對以子鄂斯璊偕伊勒噶爾伯克等理庫車務領沙雅爾自率兵赴阿克蘇定邉將軍兆惠代雅爾哈善察鄂對可任事疏請授阿克蘇阿竒木伯克以舊伯克頗拉特巴巴克等佐之兆惠尋進兵葉爾羌遣鄂對偕侍衛噶布舒齊凌扎卜等赴和闐六城抵額里齊伯克等以城獻撫其衆哈喇哈什玉隴哈什塔克齊爾拉克爾雅諸城聞之皆降鄂對令諸伯克使奉書赴葉爾羌軍自以書達阿克蘇其妻居阿克蘇城輸布及裘助駐防兵詔授鄂對內大臣而霍集占以賊衆抗大軍於喀喇烏蘇和闐軍書再不達鄂對將往援偵賊襲和闐遣使馳告阿克蘇參贊大臣舒赫德集諸路兵分援喀喇烏蘇和闐鄂對妻以馬百助軍鄂對復自和闐集兵千備羊及糗為禦賊計諭曰鄂對自隨軍以來諸事奮勉此次尤徴誠悃著加恩賞給公品級既而賊黨阿卜都克喇木等往來額里齊哈喇哈什間鄂對檄伯克等固拒書六城伯克名及户畜數達阿克蘇援兵至遣赴諸城賊復布偽檄脅衆鄂對再遣使告阿克蘇以兵寡遣卒二百往援鄂對妻偕伯克等令屬五十人齎糧從鄂對檄諸城曰大兵將至可固待明年春大軍破喀喇烏蘇圍副都統巴圖濟爾噶勒等以兵九百援和闐鄂對啓額里齊城迎赴哈喇哈什擊賊於博羅齊敗之諸城傳檄定遣其妻兄阿璊伯克馳告阿克蘇會定邉左副將軍富德至鄂對遣從子阿卜都爾璊攜六城伯克逺迎捷聞嘉固守和闐功詔封輔國公遣歸阿克蘇授阿卜都爾璊三等侍衛時議兆惠富德軍分道進諭曰鄂對效力軍前已將二載自當稍為休息聞伊行裝為賊所掠甚可軫念著賞銀二百兩令其在阿克蘇辦事伊若情願出兵求請誠切即同伊前往亦可仍當加意體恤命甫下兆惠奏鄂對固請從軍詔倍給裝資布拉呢敦霍集占聞大軍至皆竄鄂對抵喀什噶爾馳會富德軍擊之敗諸阿爾楚爾賊遁伊西洱庫爾官軍分隊擊鄂對偕和闐伯克霍集斯等執纛呼降賊黨萬餘趨請命布拉呢敦霍集占遁巴達克山富德遣鄂對攜降衆歸喀什噶爾諭嘉其奮勇勦賊晉封固山貝子巴達克山獻霍集占首俘逆屬有薩喀勒索丕者其妻為阿卜都爾璊女弟詔給鄂對尋諭從凱師入覲晉封貝勒品級二十五年春至召覲於正大光明殿賜章服飲至豐澤園賚銀幣詔圖形紫光閣御製贊曰平伊犁時歸順勤王回部傑出其心允良往諭和闐被圍三月共噶布舒全守卓越時阿克蘇伊什幹伯克頗拉特覬阿竒木伯克慫回衆薦已訐鄂對舒赫德斥之疏聞諭曰回人猜忌擠排乃其舊習自當嚴為杜絶鄂對果不勝任亦不當因頗拉特之言遽行斥革且鄂對即因此獲咎而頗拉特藉端聳衆希圖代任之罪亦應察究斷無墮其譎計竟授為阿竒木之里復以阿克蘇訐鄂對若歸令仍舊職將不安詔調葉爾羌阿竒木伯克鄂對抵葉爾羌伊什幹伯克阿卜都喇伊木等訐嗜飲且躁妄不稱職狀首列阿琿名詔曉示各城回人諸事嗣聽阿竒木伯克理阿琿勿妄預辦事都統新柱疏鄂對及阿卜都喇伊木隙若互忌恐誤公諭曰回人性多疑懼若為之隱覆恐伊等更覺不安朕意竟將伊等傳集衆前分别是非加以訓飭庶鄂對不致猜疑阿卜都喇伊木亦不妄行防備悔悟之後和衷共事自無掣肘之虞阿卜都喇伊木以不獲為阿竒木伯克私與霍罕額爾德尼伯克謀逆事覺論誅二十六年諭曰前因回人舊習凡伯克等多朘削所屬是以賞給各城阿竒木伯克等錢帛地畝及供役之人俾得奉公自愛近聞葉爾羌伯克鄂對喀什噶爾伯克噶岱默特等頗知守分無苛擾回人之事深屬可嘉念伊等歸誠日久著於官給六百騰格外再加二百以示鼓勵此次係出自特恩不可視以為例四十年諭曰貝勒品級鄂對公品級噶岱默特均於未得回地以前歸誠伊犁且在軍營著有勞績自與恩封者不同均令世襲罔替四十三年鄂對卒詔其子鄂斯璊襲貝勒品級賞雙眼孔雀翎時鄂斯璊任阿克蘇阿竒木伯克葉爾羌辦事侍郎高朴請令繼鄂對為葉爾羌阿竒木伯克上不允詔鄂斯璊調任喀什噶爾以喀什噶爾伯克色提卜阿勒氐調任葉爾羌烏什辦事三品大臣永貴尋疏色提卜阿勒氐訐高朴擾虐回民私售官玉狀詔訊得實豫辟諭曰今年三月鄂對病故髙朴即奏請以鄂對之子鄂斯璊接辦該處阿竒木伯克事朕以為若如此父子相繼辦事竟似葉爾羌之阿竒木為伊家世職久之與唐時藩鎮何異因將色提卜阿勒氐調至該處以鄂斯璊赴喀什噶爾意在回部伯克防微杜漸若照髙朴之奏令鄂斯璊在彼為阿竒木伯克鄂斯璊知其父與高朴相好有礙顔靣且伊年輕未能更事必順從髙朴所為扶同徇隱不能如色提卜阿勒氐之和盤托出矣復以鄂對比髙朴罪褫世爵諭曰鄂對前以軍營效力加恩賞給貝勒品級授為葉爾羌阿竒木伯克自當感激朕恩一切事務實心奮勉以圖報效即令髙朴意欲騷擾回民並欲盜買玉石伊當勸止或如色提卜阿勒氐首告始為報朕恩施乃竟引誘髙朴給豫黃金五十兩并玉石二千餘斤令在內地販賣則伊從前早有騷擾回民盜取玉石情事若不嚴加懲創朕如何尚用伯克耶倘伊尚在即當正法今雖病故自應削去貝勒品級以示懲警伊子鄂斯璊現襲貝勒品級著傳旨永貴即行削去但鄂斯璊并非隨同伊父居住此等情事與伊無涉著加恩授為散秩大臣仍留喀什噶爾阿竒木伯克之任既革去貝勒自不便令戴兩眼孔雀翎著賞給一眼孔雀翎一次襲鄂斯璊鄂對長子乾隆二十三年授庫車阿竒木伯克二十四年參贊大臣舒赫德疏鄂斯璊敏練詔授三品賞孔雀翎尋侍衛齊凌扎卜以兵護多倫回衆徙玉古爾庫爾勒鄂斯璊備糗糧令速就道嘉其急公詔如數給值二十五年從鄂對入覲賜銀幣歸庫車議偕沙雅爾賽哩木拜城諸伯克備糧四萬餘助赴伊犁屯田回民詔奬賚三十年聞烏什叛收庫車軍械藏諸家復馳兵勦嘉賞二品頂帶大軍圍烏什諸路兵分隊擊賊鄂斯璊著俘斬績詔奬賜幣三十三年來朝命乾清門行走三十四年授二等台吉四十年授阿克蘇阿竒木伯克四十三年襲貝勒品級固山貝子調喀什噶爾阿竒木伯克尋追論鄂對比高朴罪詔削世爵授散秩大臣四十八年諭曰鄂斯璊之父鄂對前在軍營出力朕即加恩封貝勒品級後因髙朴案內革去貝勒仍加恩賞給鄂斯璊散秩大臣若俟出缺後即令停止不準承襲朕心實為不忍所有鄂斯璊散秩大臣著加恩俾豫世襲罔替先是巴達克山獻布拉呢敦逆子三曰和卓阿斯瑪曰阿卜都哈里克曰和卓巴哈敦有薩木薩克者為布拉呢敦幼子竄安集延上憫其無知詔免捕誅比長窮不得食四十九年隂遣人至喀什噶爾丐財物布嚕特散秩大臣阿其睦弟額穆爾等私與通鄂斯璊聞之首諸喀什噶爾辦事大臣保成阿其睦懼其弟獲重罪誣鄂斯璊與同謀詔械阿其睦等至京訊得實諭曰阿竒木伯克鄂斯璊感激朕恩於薩木薩克與回衆潛通音信之事毫無隱諱一經得信即報知保成隨同實心查辦始終奮勉甚屬可嘉著加恩晉封固山貝子以示奬勵五十二年冬來朝五十三年正月卒京邸諭曰阿竒木伯克貝子鄂斯璊厯年輸誠宣力感戴朕恩實心盡職正資倚任今來京入覲遽爾寢疾朕遣御前侍衛帶領太醫院官往視醫治不痊忽聞溘逝深為憫惻著遣御前侍衛豐紳濟倫往奠仍賞銀五百兩令辨理喪事復諭曰鄂斯璊所遺散秩大臣世爵即施恩令伊子邁哈默特鄂三承襲至固山貝子爵係朕特恩賞給雖非世襲但鄂斯璊效力年久所有固山貝子爵亦施恩令伊子邁哈默特鄂三承襲以示朕撫恤回僕之至意三次襲邁哈默特鄂三鄂斯璊長子乾隆五十三年襲散秩大臣特恩兼襲固山貝子欽定外藩蒙古回部王公表傳卷之一百十八欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百十九傳第一百三貝子品級輔國公色提卜阿勒氐列傳居新疆之回爵色提卜阿勒氐烏什人祖和卓木呼里父齊里克舊為拜城伯克色提卜阿勒氐嗣以凖噶爾脅徙攜弟阿克伯克赴伊犁乾隆二十年大軍定凖噶爾色提卜阿勒氐乞降尋阿睦爾撒納叛擾伊犂色提卜阿勒氐奔巴里坤二十一年阿睦爾撒納走哈薩克色提卜阿勒氐復歸伊犁定邉右副將軍兆惠遣偵副都統阿敏道招降回衆狀將抵庫車諜逆賊布拉呢敦霍集占誘執阿敏道馳歸迎告兆惠軍於濟爾阿朗道遇嗎哈沁奮擊之復從勦厄魯特叛賊呢瑪等抵鄂壘扎勒圖賊遮道侍衛圖倫楚以援至破圍抵巴里坤詔授四品賞孔雀翎二十二年從定邉將軍成衮扎布勦厄魯特孽賊二十三年靖逆將軍雅爾哈善討布拉呢敦霍集占色提卜阿勒氐請從奬授三品總管抵庫車霍集占以賊五千餘來授擊敗之賚銀幣庫車克復從定邉將軍兆惠由烏什阿克蘇進抵葉爾羌賊抗諸喀喇烏蘇二十四年定邉右副將軍富德等援至破圍還阿克蘇兆惠攻喀什噶爾復以色提卜阿勒氐導布拉呢敦霍集占棄城竄富德等追勦色提卜阿勒氐駐英吉沙爾濟軍糧詔授英吉沙爾阿竒木伯克二十五年調阿克蘇阿竒木伯克會喀什噶爾伯克邁喇木呢雅斯等叛掠庫勒塔里木諸汛色提卜阿勒氐自英吉沙爾聞之以伯什克勒木派蘇巴特為賊巢偕提督楊寧往勦擒斬賊黨諭曰色提卜阿勒氐前從兆惠進兵甚屬勤慎此次著有勞績著加恩授散秩大臣尋賜二品頂帶時英吉沙爾阿竒木伯克索勒屯和卓入覲以色提卜阿勒氐代喀什噶爾辦事大臣海明復遣理派蘇巴特阿竒木伯克務以其弟阿克伯克代理英吉沙爾二十六年色提卜阿勒氐抵阿克蘇助赴伊犁屯田回民畜物命奬賚之海明復疏色提卜阿勒氐議本年雨澤應時收穫豐裕但回人不知撙節請令嵗納榖五百石貯倉備賑俟積五千石停收從之二十七年色提卜阿勒氐以世居烏什遣屬視祖父塋請給烏什入官田産以阿克蘇私業償諭曰色提卜阿勒氐前在軍營頗屬奮勉已加恩授為散秩大臣阿竒木伯克奉職亦屬盡心今以先壟之故請𣲖數户遣往守視自宜允行所有給與田産著加恩賞賜不必由阿克蘇抵交二十八年諭曰阿克蘇阿竒木伯克散秩大臣色提卜阿勒氐前隨兆惠出兵曽經奮勇效力著加恩賞給公品級以示酬庸之典二十九年來朝詔封輔國公賜貂裘三十年烏什逆回賚哈木圖拉等叛詔色提卜阿勒氐歸理軍務抵烏什伊犁將軍明瑞督兵至遣歸阿克蘇以糗糧及火藥鉛丸解軍賚哈木圖拉之叛也以烏什阿竒木伯克阿卜都拉不善撫衆故烏什既定明瑞奏葉爾羌喀什噶爾阿克蘇諸伯克等皆不協物議惟鄂對材可用請以阿克蘇伯克色提卜阿勒氐調和闐喀什噶爾伯克噶岱默特調阿克蘇鄂對令仍任葉爾羌事諭曰伯克等皆歸順舊人且遇有事務頗能出力報效此次若盡行移調則回人布嚕特等不知情事妄生猜疑謂國家乘新取烏什之威將伊等移調若謂伊等貪圖小利亦回人常事安能保其必無惟在大臣等正己率屬賞罰嚴明地方自必安靜毋庸更調紛紜轉滋惶惑即如所奏亦未有確實欵迹不過得之物議又安可盡信乎明年築烏什新城徙駐阿克蘇兵色提卜阿勒氐視役三十二年工竣嘉其勤事賜雙眼孔雀翎三十五年來朝命乾清門行走四十年授喀什噶爾阿竒木伯克四十三年葉爾羌辦事侍郎髙朴以葉爾羌阿竒木伯克鄂對卒請令其子鄂斯璊繼上不允詔以色提卜阿勒氐為葉爾羌阿竒木伯克以鄂斯璊為喀什噶爾阿竒木伯克色提卜阿勒氐抵葉爾羌察知髙朴盜採官玉出售並聽鄂對及伊什幹伯克阿布都舒庫爾等慫恿附和狀首之喀什噶爾辦事大臣永貴疏聞詔抵罪以色提卜阿勒氐能據實控告晉封貝子品級其長子邁默特阿卜都拉授二等台吉賜孔雀翎並停密爾岱山採玉交色提卜阿勒氐管理以絶滋擾五十三年詔世襲罔替尋卒諭曰色提卜阿勒氐實心效力辦理一切感激朕恩宣力有年昨據塔竒奏伊患病朕即賜藥以兾速痊兹聞溘逝深為憫惻著加恩賞銀五百兩治喪所遺貝子品級公爵即令伊子邁默特阿卜都拉承襲一次襲邁默特阿卜都拉色提卜阿勒氐長子乾隆五十三年襲貝子品級輔國公授阿克蘇阿竒木伯克欽定外藩蒙古回部王公表傳卷之一百十九欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百二十傳第一百四公品級噶岱默特列傳居新疆之回爵噶岱默特烏什人初為拜城阿竒木伯克𨽻凖噶爾乾隆二十一年聞大軍定凖噶爾棄拜城來歸道遇逆賊阿睦爾撒納使脅附不從間道至伊犁以告二十二年從定邉將軍成衮扎布勦厄魯特孽賊二十三年靖逆將軍雅爾哈善討逆回布拉呢敦霍集占噶岱默特請從奬授三品總管賜孔雀翎抵庫車霍集占以賊五千來援擊敗之賚銀幣庫車克從赴阿克蘇烏什抵葉爾羌定邉將軍兆惠遣偕副都統愛隆阿屯喀什噶爾路防賊援霍集占以兵驟至抗兆惠軍於喀喇烏蘇噶岱默特等欲破圍入不得歸阿克蘇偕辦事大臣舒赫德議集兵援和闐復告急噶岱默特曰賊困我軍和闐諸城驚懼不以兵拯恐滋變舒赫德遣兵五百赴和闐以二千援喀喇烏蘇噶岱默特攜阿克蘇伯克等列前隊告沿途回衆曰爾等或早悔罪身及家無慮也否必就滅以故無梗道者明年喀喇烏蘇圍破詔擢一等侍衛尋授拜城伯克復從大軍征葉爾羌霍集占等棄城竄尾擊之敗諸阿爾楚爾及伊西洱庫爾詔封公品級明年來朝召覲於正大光明殿賜章服飲至豐澤園賚銀幣行有期召宴之溫諭遣歸詔授喀什噶爾阿竒木伯克有阿卜都喇伊木者霍集占逆屬也初為喀什噶爾阿竒木伯克聞大軍至請降旨宥從逆罪授葉爾羌伊什幹伯克至是偕噶岱默特等入覲旋派蘇巴特伯克呢雅斯喀什噶爾商伯克邁喇木等謀逆布偽檄達葉爾羌約為應阿卜都喇伊木懼首之噶岱默特語參贊大臣舒赫德曰阿卜都喇伊木等聞賊倡亂不無疑懼請防之舒赫德以聞時叛賊呢雅斯等就擒阿卜都喇伊木族無附逆者諭曰噶岱默特心有所疑即行告稟具見悃誠但阿卜都喇伊木等係初次入覲轉回之人且邁喇木等黨與內並無伊子弟名目若以曽經霍集占委用遂懼其反覆則恐於伊等不無屈抑而回衆更生疑懼著舒赫德密諭噶岱默特以天朝法度惟顯犯罪惡始行懲治從不無故猜疑致有屈抑但爾誠意可嘉恩旨深為奬許并明白曉示阿卜都喇伊木云爾等係入覲之人不但未知賊匪倡亂之事即子弟等亦全無附和者皇上已洞鑒情形與爾等無涉嗣後惟當矢心報效以期永承恩澤曉示後仍令照舊辦事二十六年以噶岱默特及葉爾羌阿竒木伯克鄂對無侵漁回人習詔增養亷示奬二十七年噶岱默特倡議偕諸伯克輸榖千石貯城邑贍貧户復助材建兵屋三百楹命奬賚二十八年喀什噶爾辦事左都御史永貴疏言噶岱默特告回部田畝資溝渠利喀爾喀河曰赫色勒河出喀什噶爾西喀卜喀山溉東南托果斯遷賽爾璊喀什噶爾哈喇克爾多羅特巴克阿爾巴特派蘇巴特諸邑過巴爾楚克滙羅卜諾爾曰托庸河出喀什噶爾西北托庸山溉東南玉斯圖阿喇圖什阿爾琥呼爾罕阿斯圖阿喇圖什伯什克哷木諸邑與赫色勒河合流曰圖巴里克河出喀什噶爾西南吉斯嶺及西界烏帕勒山上流向東溉汗阿哩克塔斯琿赫色勒布伊諸邑下流向東北與赫色勒河合流曰庫森塔斯琿河出喀什噶爾西南英吉沙爾城西羌琿山溉東北英吉沙爾諸邑散流入沙磧惟赫色勒布伊塔斯琿汗阿哩克三邑分引圖巴里克河水不給用臣偕噶岱默特往視自赫色勒河東南浚渠四十餘里引水入赫色勒布伊又視托庸河水湍急田畝被衝刷議建土石堤壩並鑿山石以弱水勢報聞先是布嚕特額德格訥鄂拓克長阿濟拜以霍罕額爾德尼伯克掠其邑憾之聞霍集雅特之丕色勒伯克與搆難因潛兵襲霍罕使至葉爾羌掠布嚕特樵者十人告梗道噶岱默特察辭誣詰之會丕色勒伯克與額爾德尼伯克釋怨阿濟拜懼請檄霍罕勿侵己永貴偕噶岱默特責罪均令各安處未幾額爾德尼伯克以布嚕特薩婁鄂拓克長沙巴圖掠市馬告噶岱默特索所掠歸霍罕霍罕復侵額德格訥奪鄂斯邑永貴責霍罕罪霍罕詭稱鄂斯為己舊屬不即歸額德格訥時阿木都喇伊木為喀什噶爾伊什幹伯克以不獲為阿竒木懷逆志數通霍罕永貴等不之察遣侍衛托穆齊圖偕阿卜都喇伊木赴霍罕責不聽命將以軍討阿卜都喇伊木遣屬摩羅郭帕和卓哈勒默特告額爾德尼伯克曰回部和卓皆就誅惟爾存今索侵地使不以兵從爾勿懼而迎且喀什噶爾兵寡爾潛至我將為應額爾德尼伯克懼市已以丕色勒伯克搆難謝之托穆齊圖抵霍罕額爾德尼伯克不之迎示順逆義乃謝罪以鄂斯邑歸阿濟拜托穆齊圖歸不以不迎故告二十九年噶岱默特屬噶帕爾赴市霍罕偵得情告噶岱默特首之辦事大臣納世通疏聞詔磔誅其孥及赴霍罕使悉緣坐以噶岱默特發逆謀奬賜幣三十年烏什逆回賚哈木圖拉叛遣賊黨巴布敦等乞援霍罕抵布嚕特揚稱諸城悉附逆噶岱默特自喀什噶爾遣屬愛特伊默特赴布嚕特額德格訥薩爾巴噶什諸鄂拓克告自烏什外他城皆安堵薩爾巴噶什長車里克齊遣弟海蘭達爾赴軍噶岱默特索逆使車里克齊擒巴布敦獻尋克烏什詔敘噶岱默特績四十年詔世襲罔替尋卒子阿卜都喇璊襲一次襲阿卜都喇璊噶岱默特長子乾隆二十一年從父至伊犂乞降召入覲二十五年詔授拜城阿竒木伯克視英吉沙爾城伯克秩四品四十年襲公品級四十一年卒子邁瑪第敏襲二次襲邁瑪第敏阿卜都喇璊長子初授二等台吉乾隆四十一年襲公品級四十三年授拜城伊什幹伯克四十八年理藩院議邁瑪第敏祖噶岱默特以軍功封爵請仍世襲罔替詔如議三等輕車都尉薩里列傳居新疆之回爵薩里烏什人初為阿竒木伯克霍集斯屬乾隆二十年霍集斯奉我軍檄擒凖噶爾達瓦齊設伏烏什城外薩里𠂻甲從視達瓦齊至趨控馬達瓦齊將引弓射薩里以刀斷其弦達瓦齊子羅卜扎自後馳至刀擊薩里膊者三薩里傷固控之伏發達瓦齊及子就擒二十三年大軍討逆回布拉呢敦霍集占抵烏什霍集斯以城獻薩里從赴葉爾羌禦霍集占於喀喇烏蘇明年春隨定邉右副將軍富德赴和闐時和闐圍甫解衆志未定薩里傳檄示之令勿驚懼富德疏其功稱慎練可任事詔授五品賞孔雀翎尋定葉爾羌以薩里為噶雜納齊伯克二十五年烏什伯克阿琿等訐霍集斯請以薩里代諭曰薩里果行走奮勉應再行酌量加恩若即授為阿竒木則姦險之徒羣以陷人奪缺為得計時議遣兵護屯田回民赴伊犂道由阿克蘇達海弩克薩里輸馬百三十助理臺務詔如例給值復優賚俟有伊什幹伯克等缺補授冬葉爾羌諸城伯克以年班至駕幸瀛臺跽列西華門外凡三十三人薩里居班首上慰問之賜尚方食召覲於重華宫賜茶果翌日御西厰幄次詔預外藩蒙古宴賚冠服銀幣明年春遣歸二十七年葉爾羌辦事尚書都統新柱等偵布拉呢敦屬摩羅巴喇特等匿巴達克山盜布拉呢敦尸瘞派蘇巴特復竊育其孥遣薩里索且令巴達克山伯克素勒坦沙以所掠齊特喇爾邑歸博羅爾長沙瑚沙默特行旬有九日抵巴達克山示之檄素勒坦沙獻摩羅巴喇特薩里攜赴派蘇巴特掘得逆尸復索其孥素勒坦沙獻布拉呢敦妻三曰珠賚哈曰巴特瑪曰額爾克揚子三曰和卓阿斯瑪曰阿卜都哈里克曰和卓巴哈敦奬給幣而齊特喇爾邑素勒坦沙不即歸薩里還新柱等復遣往索乃悔罪以齊特喇爾給博羅爾上念薩里奉使勞賜三等輕車都尉復詔給幣俟阿竒木缺出輒列名聞會阿克蘇伊什幹伯克頗拉特以罪禠職詔薩里代三十年烏什逆回賚哈木圖拉等叛有額敏者薩里弟也居烏什賊脅赴霍罕強應命宿畢德爾山伺偕行者寢走阿克蘇告變阿克蘇辦事副都統卞塔海馳兵勦薩里助馬百復倡議偕伯克阿卜都噶頗爾等助牛二百運糧濟軍詔奬額敏不附逆復諭曰薩里等急公效力協助牲隻甚屬可嘉自當示以奬勸所助牛馬俱著賞給價值仍將朕加恩奬賞之意傳諭伊等知之薩里尋赴烏什請遣屬呼特呼默特入其城招脅從者賊不應鏖擊之奪瑚什塔克峯險烏什城下詔敘薩里績四十年卒子海色木襲一次襲海色木薩里長子乾隆四十年襲三等輕車都尉四十八年理藩院議海色木父薩里以軍功獲世職請豫世襲罔替詔如議欽定外藩蒙古回部王公表傳卷之一百二十
