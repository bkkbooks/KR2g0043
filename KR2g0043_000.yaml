蘇台汛駐防七月輝特台吉阿睦爾撒納來降詔偕參贊大臣努三移所携降衆於塔密爾尋偕副都統納木扎爾由塔密爾移置固爾班舒魯克設汛防護二十一年六月督理軍營駝馬七月授參贊大臣未幾和託輝特之逆賊青衮咱卜叛布偽檄撤喀爾喀各汛兵土謝圗汗部扎薩克台吉遜篤布車臣汗部扎薩克台吉成衮扎布覺其偽以檄由德沁扎布所至疑與青衮咱卜通以聞諭曰偽檄流傳或係他人假冒德沁扎布之名亦未可定著加恩免究飭令速歸舊汛接理驛務毋自貽誤會所屬復乘間劫馬為土謝圗汗部貝勒達什丕勒所訐詔速擒賊贖罪九月諭曰朕聞德沁扎布與親王成衮扎布甫聞逆賊背叛之信檄調衆扎薩克兵丁復令哲卜尊丹巴呼圗克圗遍行曉諭以安衆心抒誠效力甚屬可嘉著交理藩院議敘是年冬青衮咱卜就擒德沁扎布解參贊大臣職二十二年正月大軍由巴里坤𠞰厄魯特餘賊詔購馬解軍十一月上念其諳練老成復授參贊大臣赴巴里坤協理軍務二十三年緝獲盜馬賊瑪塔克加級賚幣二十七年卒子三長諾爾布扎布襲親王爵次齊旺多爾濟授貝子品級扎薩克台吉次三丕勒多爾濟授公品級三等台吉别有傳四次襲諾爾布扎布德沁扎布長子初由一等台吉晉封固山貝子互見彼傳乾隆二十七年襲扎薩克和碩親王尋授副盟長命乾清門行走賜三眼孔雀翎三十一年追襲其祖圗蒙肯所遺賽因諾顔號賜之印詳總傳是年授所部副將軍四十六年諭曰諾爾布扎布所襲親王係其曾祖善巴來歸後從征噶爾丹有功由郡王晉封之爵賽因諾顔又係伊部舊號著加恩均豫世襲罔替附固山貝子諾爾布扎布列傳今襲鎮國公諾爾布扎布親王德沁扎布長子初授一等台吉乾隆十七年賜公品級二十年三月大軍𠞰達瓦齊烏里雅蘇台大臣哈達哈檄以兵五百屯烏哈爾和碩防烏梁海并收凖噶爾降衆九月敘追𠞰包沁叛賊台拉克和濟木呼哩功詔封固山貝子二十一年以由軍汛私歸飭偕扎薩克圖汗部公品級多嶽特效力贖罪尋以督理驛務諭獎之二十二年獻馬助軍得紀録尋賜雙眼孔雀翎二十七年襲扎薩克親王互見彼傳其所遺貝子爵詔改鎮國公以子車登扎布襲一次襲車登扎布諾爾布扎布長子乾隆二十七年襲鎮國公四十六年諭曰車登扎布父親王諾爾布扎布未襲親王時曾賜公品級因追𠞰包沁有功特封貝子朕念此爵係伊本身效力所得是以于伊既襲親王之後仍令車登扎布襲鎮國公著加恩世襲罔替附公品級三等台吉三丕勒多爾濟列傳三丕勒多爾濟親王德沁扎布第三子初授三等台吉乾隆二十二年德沁扎布獻馬助軍諭議敘尋議親王爵無可加應於伊子內選一人賞公品級德沁扎布因以三丕勒多爾濟請許之四十六年理藩院議三丕勒多爾濟所授公品級例弗應世襲俟出缺時請旨詔如議欽定外藩蒙古回部王公表傳卷之六十九欽定四庫全書欽定外藩蒙古回部王公表傳卷之七十傳第五十四扎薩克和碩超勇襄親王策凌列傳策凌喀爾喀部人姓博爾濟吉特扎薩克親王善巴再從弟祖丹津號班珠爾為賽因諾顔圖蒙肯第八子生子納木扎勒號約蘇圖偉徵阿海子二長即策凌次恭格喇布坦康熙三十一年丹津妻格楚勒哈屯攜策凌及恭格喇布坦自塔密爾來歸詔授策凌三等輕車都尉賜居京師教養內廷命編所屬佐領附察哈爾鑲黃旗駐牧四十五年尚和碩純慤公主授和碩額駙尋賜貝子品級詔攜屬歸牧塔密爾五十四年上幸塞外駐蹕布爾哈蘇台策凌來朝諭赴推河隨北路大軍防禦策妄阿喇布坦五十九年大軍由阿爾台分路進𠞰策凌隨振武將軍傅爾丹擊賊布拉罕路至格爾額爾格擒準噶爾宰桑貝坤等百餘人斬獲甚衆復焚其糧於烏蘭呼濟爾軍旋次哈達青吉勒遇賊援擊敗之六十年授扎薩克雍正元年諭曰額駙策凌自出師以來從征效力甚屬奮勉著封多羅郡王以示殊眷二年入覲時撤北路大軍詔策凌偕同族親王丹津多爾濟貝勒博貝留駐阿爾台各授副將軍三年詔策凌軍用正黃旗纛四年奉命勘阿爾台形勝五年偕內大臣伯四格等赴楚庫河與俄羅斯使薩瓦立石定界陳兵鳴炮謝天議罪應削爵詔罰俸三年免削九年秋隨靖邉大將軍順承親王錫保討噶爾丹策凌偵賊由和通呼爾哈諾爾窺圖壘茂海奎素諸界偕翁牛特部貝子羅卜藏等分兵却之冬十月偕丹津多爾濟大敗準噶爾賊于蘇克阿勒達呼準噶爾有大策凌敦多卜小策凌敦多卜皆噶爾丹策凌族最用事是役也大策凌敦多卜擁衆三萬謀掠喀爾喀聞順承親王駐察罕廋爾科布多復有振武將軍傅爾丹軍不敢進潛遣將海倫曼濟等取道阿爾台迤東以賊衆六千分掠克嚕倫及鄂爾海喀喇烏蘇留餘衆于蘇克阿勒達呼為之援策凌等迎擊之至鄂登楚勒授台吉巴海兵六百令宵入賊營誘賊將貢楚克扎布喀喇巴圖魯等來追伏兵擊之斬喀喇巴圖魯餘衆潰大䇿凌敦多卜及海倫曼濟等遁諭曰額駙郡王策凌督率辨兵奮勇爭先擊敗準噶爾甚屬可嘉著晉封和碩親王賞銀一萬兩以示獎勵十一月諭議𠞰賊方略尋授喀爾喀大扎薩克十年六月小䇿凌敦多卜復糾衆三萬由竒蘭至額爾德畢喇色欽策凌偕將軍塔爾岱禦之於本博圖山未至賊掠克爾森齊老策凌等反斾擊相拒二日以丹津多爾濟援兵不至賊遂趨額爾德尼昭八月策凌追賊十餘戰賊屢敗小策凌敦多卜據杭愛山麓逼鄂爾坤河而陳策凌麾衆疾攻斬馘萬餘獲畜械無算小策凌敦多卜遁順承親王馳告捷首表策凌功上深嘉之賜超勇號諭曰準噶爾賊衆越察罕廋爾軍營至杭愛山肆其猖獗額駙親王策凌尾追千里至鄂爾坤之額爾德尼昭奮勇攻擊將三萬賊衆殱除殆盡為國輸誠忠勇超絶其特賜黃帶以旌異之此次軍功非尋常勞績可比隨征官兵著從優議敘其隨策凌在克爾森齊老擊賊者並著加倍優敘冬十月以厄魯特降衆居張家口者編三佐領賜策凌轄之復以策凌轉戰不得歸牧戚屬為小策凌敦多卜所掠牧産多失上憫之諭給馬二千牛千羊五千銀五萬并察賑所屬失業者尋命築塔密爾城建瓦屋居之十二月授固倫額駙以純慤公主已薨追贈固倫長公主十一年定邉大將軍平郡王福彭統大軍駐烏里雅蘇台詔策凌佩定邉左副將軍印進屯科布多尋授盟長十二年二月上以烏里雅蘇台距科布多逺諭進𠞰機宜悉聽策凌總理五月詔來京議軍務七月撤科布多軍駐察罕廋爾十三年三月噶爾丹策凌乞和表稱阿爾台舊係厄魯特牧杭愛舊係喀爾喀牧請由哲爾格西喇呼魯蘇至巴里坤畫界分守詔策凌議因言往者喀爾喀遊牧尚未至哲爾格西喇呼魯蘇應如所請但喀爾喀汛原設阿爾台迤東科布多額貝和碩和通額博布延圖託爾和烏蘭等處並在哲爾格西喇呼魯蘇界外應設汛如故至準噶爾遊牧應以額爾齊斯及阿爾台為界策妄阿喇布坦存日遊牧和博克薩哩察罕呼濟爾迤西數年來漸越額爾齊斯賊性狡請令毋越阿爾台為永禦計上韙其議諭噶爾丹策凌曰夫阿爾台之屬厄魯特乃噶爾丹從前之事爾準噶爾並未越此遊牧乃謂為厄魯特牧地可乎且喀爾喀尚不令近阿爾台原欲兩界稍逺免啓爭端而可令爾居之乎爾父在時曽請將阿爾台山梁外哈道里哈達青吉勒布拉青吉勒三處不必置為間地朕未允行今特欲安逸衆生將此三處屬爾祇自克木齊克汗騰格里上阿爾台山梁由索勒畢嶺下哈布塔克拜達克之中過烏蘭烏蘇羅卜諾爾直扺噶斯口為界并自呼遜托輝至喀喇巴爾楚克悉作間地爾其遵諭行九月皇上御極策凌請入覲諭曰準噶爾乞和定界事尚未決防守正宜嚴密不可暫離軍營俟夷使到日再行來京乾隆元年正月撤大軍還詔策凌統喀爾喀兵千五百駐烏里雅蘇台及鄂爾坤尋諭王大臣曰額駙超勇親王策凌總統北路軍營伊母現居京師不得朝夕定省恐其思念不置著送歸遊牧用慰孝思并賞整裝銀五千兩二月遵旨議駐兵備邉請選喀爾喀兵三千赴鄂爾坤防秋從之二年四月噶爾丹策凌貽策凌書欲仍遊牧阿爾台稱策凌為車臣汗策凌獻其書詔以己意答之策凌奏遣台吉額墨根持書往報書曰阿爾台乃天定邉界爾父琿台吉時阿爾台迤西原無厄魯特遊牧自滅噶爾丹以來我等建城駐兵其地衆所共知其不令爾遊牧者原欲以此為間地兩不相及以息爭端耳今台吉反云難以讓給試思阿爾台果係誰地誰能讓給爾誠遵旨定議我必不為禍始亦不復向科布多居住又謂我等置哨逼阿爾台宜向內撤夫哨兵乃聖祖仁皇帝時所設至今並未外移即定議地界哨兵豈能不設爾台吉其自思之十一月準噶爾使至召策凌馳來京主其議三年三月以準噶爾未遵旨指明地界飭使還十二月噶爾丹策凌遣使哈栁奉表至請循布延圖河南以博爾濟昂吉勒圖烏克克嶺噶克察等處北以遜多爾庫奎多爾多輝庫奎至哈爾竒喇博木喀喇巴爾楚克等處為界厄魯特邉人仍在阿爾台山後遊牧并乞令托爾和布延圖哨兵向內移詔弗允四年正月命哈栁往見策凌哈栁曰額駙遊牧部屬盡居喀爾喀地何弗居彼策凌答曰我主居此豫惟隨主而居喀爾喀地特豫遊牧耳哈栁又曰準噶爾尚有額駙子何不令來京答曰豫蒙恩尚公主公主所出乃為豫子他子無與也即爾準噶爾送還豫亦不以為子當奏聞誅之二月哈栁還十月復至請如原議毋踰阿爾台蓋自與準噶爾議界策凌凡三至京議始定十二月諭曰額駙超勇親王策凌入覲朕諭以噶爾丹策凌送所掠喇嘛羅卜藏西瓦還時曽言車臣汗子現在準噶爾若念之當即送還策凌奏臣受國恩至優極渥前準噶爾掠臣二子若等不即自盡尚復苟且偷生全不知恥臣欲得此不肖子何用且與國事無益噶爾丹策凌性本狡詐臣若欲得二子彼必妄行干請所關非小國事為重臣斷無念子之心朕思父子關乎天性策凌感激隆恩祇圖禆益國家顧惜大義不思復與其子相見朕心深為惻然思有以獎之伊長子成衮扎布人材出衆在軍前亦甚奮勉著加恩照宗室親王例封為世子以昭殊眷五年五月遵旨勘定喀爾喀遊牧毋越扎布堪齊克慎哈薩克圖庫克嶺等處與準噶爾各守定界十月請専用喀爾喀兵防汛允之即命策凌督調六年請給鄂爾坤及烏里雅蘇台駐防兵銀米詔從所請行尋因策凌年老諭移軍營於塔密爾七年御題詩扇賜之十二年入覲優賚遣歸十五年薨訃至上軫悼諭曰定邉左副將軍固倫額駙喀爾喀大扎薩克和碩超勇親王策凌以名藩尚主班崇懿戚在聖祖仁皇帝時即已宣力邉陲勳猷茂著世宗憲皇帝眷注優隆晉爵親王任専閫外身先血戰殄靖狡冦偉績丕昭益勤忠藎朕以王為兩朝勳舊倚毗彌殷寄重長城倍加渥澤前聞遘疾遄命賜藥選醫令伊次子車布登扎布馳驛侍奉復遣乾清門侍衛德山前往存問方期漸就痊可忽聞溘逝深為軫惻著加恩賜銀一萬兩治喪即命德山等往奠茶酒允伊遺奏合窆固倫純慤公主園寢著伊長子成衮扎布扶櫬來京俟到京日朕親臨奠醊所有應行典禮俱照宗室親王例考諡建碑具如儀式自昔功臣勳戚侑食廟廷以王之功宜配享太廟雖蒙古親王從未有與配享者朕以王功在王室名勒旗常簡在久孚宜膺特典且令衆蒙古知朕崇獎賢勞中外一體俾共知感奮益切勸勉并照和碩怡賢親王例崇祀賢良祠永垂秩祀以示朕酬庸展親優賢篤舊至意賜諡曰襄御製七言詩悼之有不必讀書知大義每於臨陳冠三軍之句子八列譜者六長成衮扎布襲扎薩克親王次車布登扎布封扎薩克