蓋自噶爾丹既滅䇿妄阿喇布坦謀并諸衛拉特族留散扎布不遣阿玉竒索其子乃逐散扎布歸額濟勒仍留從户不之給分隸凖噶爾鄂拓克阿玉竒固索不獲因搆難從子阿喇布珠爾嘗假道赴唐古特久之乃還值凖噶爾道梗乞內屬允之即遊牧額濟內河一旗也五十一年阿玉竒使薩木坦等假俄羅斯道達京師表貢方物上嘉其誠且欲悉所部疆域遣侍讀圖麗琛等齎敕往是年夏啓行秋達俄羅斯地俄羅斯故導我使紆道行五十三年始至薩喇托付蓋土爾扈特與俄羅斯界也所部使逺道迎將抵瑪努托海阿玉竒復遣台吉宰桑等導至拂廬我使授敕宣諭訖語之曰阿喇布珠爾已賜爵優養欲遣歸爾牧以䇿妄阿喇布坦惡爾恐戕之而詭以哈薩克哈喇哈爾榜為辭也爾若欲令阿喇布珠爾歸當自俄羅斯來迎阿玉竒曰我雖外夷然冠服與中國同俄羅斯乃嗜欲不通言語不同之區也若以往來數故不假道則我無由入貢中國矣阿喇布珠爾荷厚恩與歸土爾扈特等復何疑慮鄂齊爾圖妻聞我使至泣告所部未破時嘗往來納貢狀阿玉竒妻達爾瑪巴拉子沙克都爾扎布及阿喇布珠爾父納扎爾瑪穆特等各贈馬及方物我使以越境無私交辭阿玉竒待之有隆禮留旬餘筵宴不絶復附表奏謝五十四年春圖麗琛等復命退而著異域録詳述其風土情狀焉是年䇿妄阿喇布坦掠哈密我使敗之有曼濟者被擒訴土爾扈特屬留處凖噶爾為宰桑等虐思附天朝或歸故土但不獲間耳上憫之諭䇿妄阿喇布坦遣土爾扈特屬歸牧不從雍正七年上以凖噶爾匿青海叛賊羅卜藏丹津將討罪遣諭土爾扈特甫就道凖噶爾使至請獻羅卜藏丹津詔大軍暫緩進復諭土爾扈特知之九年台吉多爾濟遣使阿爾巴圖沙喇布丹津等至奏請往謁達賴喇嘛時唐古特阿爾布巴等亂初定達賴喇嘛徙噶達詔守汛者勿遣赴唐古特以其使至噶達優給糧糗比歸頒賜茶幣等物多爾濟者納扎爾瑪穆特長子也乾隆二十一年所部使吹扎布等入覲稱奉其汗敦囉布喇什令道假俄羅斯三載乃至請赴唐古特謁達賴喇嘛賜宴萬樹園遣官護往唐古特敦囉布喇什為沙克都爾扎布子即始封扎薩克汗渥巴錫父也二十二年使自唐古特還旨詢所部牧域及棄凖噶爾附俄羅斯故使者言曰聞土爾扈特部舊偕四衛拉特聚伊犂迄䇿妄阿喇布坦時阿玉竒與交惡挈族由哈薩克取明噶特衆屯牧額濟勒河俄羅斯謂為其屬然附之非降之也非大皇帝有命安肯自為人臣僕時哈薩克汗阿布賚內附子登努勒蘇爾統鄰牧土爾扈特吹扎布聞其表使將至言曰哈薩克為天朝臣僕若諭令由所部納貢無紆道慮幸甚因述所居疆域繪獻詔遣歸頒賜敦囉布喇什幣物而是時族台吉巴圖爾烏巴什及舍稜等以附牧凖噶爾乘阿睦爾撒納叛擾伊犂境巴圖爾烏巴什為大軍所逼走死舍稜詭乞降竄俄羅斯尋歸土爾扈特牧三十六年汗渥巴錫挈全部歸順舍稜從之抵伊犂將軍伊勒圖以聞上察其內附誠詔渥巴錫舍稜等入覲先是土爾扈特與凖噶爾絶凖噶爾别以輝特為四衛拉特之一大軍定凖噶爾四衛拉特自杜爾伯特外悉以叛就滅土爾扈特道逺雖修貢未內屬上不欲勤逺略索舍稜不獲仍聽之乃全部以不召至蓋自國初綏服蒙古以來至是乃盡其族而臣之御製土爾扈特全部歸順詩以志事序曰伊犂將軍伊勒圖等奏土爾扈特汗渥巴錫及其台吉䇿伯克多爾濟並舍稜等率其部衆三萬餘户來歸先期遣使至伊犂具書通欵自言為阿玉竒汗正系向居俄羅斯地久願為大皇帝臣僕而無機可乘乃於去冬謀棄舊遊牧挈屬內附因自彼逸出行程萬千有餘里閲半年餘始抵卡倫乞準令入覲以伸積誠渥巴錫等亦先後來至伊犂察其詞意懇切郵函以聞先是安泰奏偵知土爾扈特部內附信即遣額駙色布騰巴爾珠爾往迎之令即諭其偕渥巴錫等至山莊朝謁而舒赫德亦先所命由烏什馳往蒞其事者因令代伊勒圖為將軍駐伊犂安輯新附之衆給以餼贍振其乏也授之牧地資其生也其汗及台吉宰桑至者將賜宴賚封爵秩而其部衆則量地分編以居聨其情亦渙其勢也蓋土爾扈特自入俄羅斯逺阻聲教越今幾六七十年乾隆丙子秋其汗敦囉布喇什雖曽使人入貢第宴而遣之兹乃不藉招致全部內屬誠有不期然而然者且凖噶爾自底定以來築城安屯無異中國郡縣今土爾扈特復隸我藩屬于是四衛拉特之衆盡撫而有之可謂盛矣然余履泰持盈之念彌以是為兢兢序而系之以詩紀實也詩曰土爾扈特部昔汗阿玉竒今來渥巴錫明背俄羅斯向化非招致頒恩應博施舍稜逃復返彼亦合無辭衛拉特相忌携孥往海濱終焉懷故土遂爾棄殊倫弗受將為盜俾安皆我民從今蒙古類無一不王臣駕幸木蘭次伊綿峪渥巴錫等至召覲行幄親以蒙古語垂詢俾伸悃狀賜章服易所被繒罽伊綿峪舊名布祜圖昻阿前以受綽羅斯台吉噶爾藏多爾濟等朝詔賜名義取會歸也已而哈薩克布魯特使皆迎謁其地至是復受渥巴錫等朝御製詩紀之有類已全歸衆蒙古峪徴嘉兆信伊綿之句旋蹕避暑山莊賜宴萬樹園及溥仁寺命設燈宴觀火戲優賚白金文綺諸珍器有差諭曰土爾扈特台吉等以俄羅斯風氣逈殊且奔走疆場不遑休息因慕我國家尊崇黃教及撫御降番仁化誠心歸順跋涉逺道甚屬可嘉自當錫豫封爵以示渥澤詔分新舊二部各設扎薩克曰烏訥恩蘇珠克圖舊土爾扈特以渥巴錫領之稱汗如故諸台吉授親王郡王貝勒貝子公一等台吉有差曰青色特啓勒圖新土爾扈特以舍稜領之封郡王别授貝子一復命工圖其形藏武成殿時布達拉廟落成上以所部素崇黃教詔往瞻禮與法會御製土爾扈特全部歸順記曰始逆命而終徠服謂之歸降弗加征而自臣屬謂之歸順若今之土爾扈特携全部捨異域投誠嚮化跋涉萬里而來是歸順非歸降也西域既定興屯種于伊犂薄賦稅于回部若哈薩克若布魯特俾為外圉而羈縻之若安集延若巴達克山益稱逺徼而槩置之知足不辱知止不殆朕意亦如是而已矣豈其盡天所覆至于海隅必欲悉主悉臣為我僕屬哉而兹土爾扈特之歸順則實天與人歸有不期然而然者故不可以不記土爾扈特者凖噶爾四衛拉特之一其詳已見于凖噶爾全部紀略之文溯厥始率亦荒略弗可考後因其汗阿玉竒與䇿妄不睦竄歸俄羅斯俄羅斯居之額濟勒之地康熙年間我皇祖聖祖仁皇帝嘗欲悉其領要令侍讀圖麗琛等假道俄羅斯以往而俄羅斯故為紆繞其程凡行三年又數月始返命今之汗渥巴錫者即阿玉竒之曽孫也以俄羅斯征調師旅不息近且徴其子入質而俄羅斯又屬别教非黃教故與合族台吉密謀挈全部投中國興黃教之地以息肩焉自去嵗十一月啓行由額濟勒厯哈薩克繞巴勒喀什諾爾戈壁于今嵗六月杪始至伊犂之沙拉伯勒界凡八月厯萬有餘里先是朕聞有土爾扈特來歸之信慮伊犂將軍伊勒圖一人不能經理得宜時舒赫德以參贊居烏什辦回部事因命就近前往而畏事者乃以新來中有舍稜其人曽以計誘害我副都統唐喀祿因以竄投俄羅斯者恐其有詭計議論沸起古云受降如受敵朕亦不能不為之少惑而略為備焉然熟計舍稜一人豈能聳動渥巴錫等全部且俄羅斯亦大國也彼既背棄而來又擾我大國邊界進退無據彼將焉往是則歸順之事十之九詭計之伏什之一耳既而果然而舒赫德至伊犂一切安汛設偵籌儲密備之事無不悉妥故新投之人一至如歸且掄其應入覲者由驛而來朕即命隨圍觀獵且于山莊燕賚如杜爾伯特車凌等之例焉夫此山莊乃我皇祖所建以柔逺人之地而宴賚車凌等之後遂平定西域兹不數年間又于無意中不因招致而有土爾扈特全部歸順之事自斯凡屬蒙古之族無不為我大清國之臣神御咫尺有不以操先劵閲後成愜志而愈快者乎豫小子所以仰答祖恩益凜天寵惴惴焉孜孜焉惟恐意或滿而力或弛念兹在兹遑敢自詡為誠所感與德所致哉或又以為不宜受俄羅斯叛臣虞啓邊釁蓋舍稜即我之叛臣歸俄羅斯者何嘗不一再索取而俄羅斯訖未與我也今既來歸即以此語折俄羅斯彼亦將無辭以對且數萬乏食之人既至近界驅之使去彼不劫掠畜牧將何以生雖有堅壁清野之説不知伊犂甫築新城而諸色人皆賴耕牧為活是壁亦不易堅而野亦不可清也夫明知人以嚮化而來而我以畏事而止且反致冦甚無謂也其衆涉逺厯久力甚疲矣視其之死而惜費勿救仁人君子所不忍為况體天御世之大君乎發帑出畜力為優恤則已命司事之臣兹不贅記記事之緣起如右舊傳土爾扈特部自阿玉竒汗始徙牧俄羅斯雖所部使亦以是為辭至是渥巴錫等來朝上詢所部顛末奏阿玉竒曽祖曰和鄂爾勒克與巴圖爾琿台吉修怨徙牧俄羅斯之額濟勒河迄阿玉竒已越四傳上以傳聞異辭御製土爾扈特部紀略記其始祖所自出並證前之失精核而未實者尋遣渥巴錫等歸伊犂御製優恤土爾扈特部衆記曰歸降歸順之不同既明則歸順歸降之甲乙可定蓋戰而勝人不如不戰而勝人之為盡美也降而來歸不如順而來歸之為盡善也然則歸順者較歸降者之宜優恤不亦宜乎土爾扈特歸順源委已見前記兹記所以優恤之者方其渡額濟勒而來也户凡三萬三千有竒口十六萬九千有竒其至伊犂者僅以半計夫以逺人嚮化携孥挈屬而來其意甚誠而其阽危求息狀亦甚􅉵既撫而納之茍弗為之贍其生猶弗納也贍之而弗為之計長久猶弗贍也故自聞其來及其始至以逮于今惟此七萬餘衆凍餒尫瘠之形時懸于目而惻于心凡宵旰所究圖郵函所咨訪無暇無輟乃得悉其大要于是為之口給以食人授之衣分地安居使就米穀而資耕牧則以屬之伊犂將軍舒赫德出我牧羣之孳息驅往供饋則以屬之張家口都統常青發帑運茶市羊及裘則以屬之陜甘總督吳達善而嘉峪關外董視經理則以屬之西安巡撫文綬惟時諸臣以次馳牘入告于伊犂塔爾巴哈台之察哈爾厄魯特凡市得馬牛羊九萬五千五百其自達哩剛愛商都達布遜牧羣運往者又十有四萬而哈密闢展所市之三萬不與焉撥官茶二萬餘封出屯庾米麥四萬一千餘石而初至伊犂賑贍之茶米不與焉甘肅邊內外暨回部諸城購羊裘五萬一千餘襲布六萬一千餘匹棉五萬九千餘斤氊廬四百餘具而給庫貯之氊棉衣什布幅不與焉計費儲用帑銀二十萬兩而賞貸路資及宴次賚豫不與焉其台吉渥巴錫等之入覲者乘傳給餼而來至則錫封爵備恩禮其往也復慮其身之生不宜內地氣候則命由邊外各臺厯巴里坤以行而迎及送並遣大臣侍衛等護視之用以柔懷逺人俾毋致失所或有以為優恤太甚者蓋意出于鄙吝未習聞國家成憲毋惑乎其見之隘也昔我皇祖聖祖仁皇帝時喀爾喀土謝圖汗等為厄魯特所殘破率全部十萬衆來歸皇祖矜其窮厄命尚書阿喇尼等往撫之發歸化城張家獨石口倉儲以賑其乏且足其食又敕內大臣費揚古明珠等齎白金茶布以給其用採買生畜以資其生遂皆安居得所循法度樂休養迄今八十餘年畜牧日以蕃生殖日以盛樂樂利利殷阜十倍于初其汗王台吉等世延爵祿恪守藩衛一如內扎薩克之效臣僕長子孫莫不感戴聖祖德澤及人之深得以長享升平之福也朕惟體皇祖之心為心法皇祖之事為事惟兹土爾扈特之來其窮厄殆無異曩時之喀爾喀故所以為之籌畫無弗詳賙惠無少靳優而恤之且計長久庸距知謀之勞而費之巨乎冀兹土爾扈特之衆亦能如喀爾喀之安居循法勤畜牧務生殖勿替厥志則其世延爵祿長享升平之福又何以異于今之喀爾喀哉用是臚舉大凡勒石熱河及伊犂俾土爾扈特汗全部衆咸識朕意且以詔自今以往我諸臣之董其事者三十七年賜諸扎薩克牧地曰齋爾曰和博克薩哩以塔爾巴哈台大臣轄之曰濟爾哈朗以庫爾喀喇烏蘇大臣轄之曰晶河以伊犂將軍兼轄之曰布勒罕河以喀喇沙爾大臣轄之統聽伊犂將軍節制四十八年詔設舊土爾扈特盟長四副盟長三新土爾扈特正副盟長各一所部旗十有三爵如之遊牧額濟內河舊土爾扈特扎薩克多羅貝勒一由貝子晉襲烏諾恩蘇珠克圖舊土爾扈特分四路曰南北東西南路扎薩克卓哩克圖汗一扎薩克巴雅爾圖貝子一扎薩克輔國公一扎薩克一等台吉一北路扎薩克布延圖親王一公品級扎薩克一等台吉一扎薩克一等台吉一東路扎薩克畢錫哷勒圖郡王一扎薩克伊特格勒貝子一西路扎薩克濟爾哈朗貝勒一青色特啓勒圖新土爾扈特分二翼左翼扎薩克弼哩克圖郡王一右翼扎薩克烏察喇勒圖貝子一欽定外藩蒙古回部王公表傳卷之一百欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百一傳第八十五固山貝子阿喇布珠爾列傳今襲扎薩克多羅貝勒阿喇布珠爾土爾扈特人其五世祖曰書庫爾岱青子四長固嚕次達什次朋楚克固嚕達什皆嗣絶次納木策稜生納扎爾瑪穆特子四長多爾濟次即阿喇布珠爾餘皆無嗣多爾濟裔别設扎薩克二朋楚克裔别設扎薩克七統𨽻烏訥恩蘇珠克圖舊土爾扈特部自有傳初納扎爾瑪穆特從其汗阿玉竒遊牧額濟勒河地逼俄羅斯及凖噶爾阿喇布珠爾嘗假道凖噶爾赴唐古特謁達賴喇嘛已而阿玉竒與策妄阿喇布坦修怨康熙四十三年阿喇布珠爾自唐古特還以凖噶爾道梗留嘉峪關外遣使至京師請內屬上憫其窮無所歸賜牧色爾騰詔封固山貝子轄從衆五十二年遣使齎敕往諭阿玉竒令迎阿喇布珠爾歸使至阿玉竒及納扎爾瑪穆特以阿喇布珠爾幸為天朝臣僕且俄羅斯假道不易請勿遣歸五十四年凖噶爾掠哈密境詔阿喇布珠爾備兵聽調會凖噶爾敗于哈密遁走議撤噶斯防禦兵以色爾騰牧通噶斯之察罕齊老圖遣侍衛往偵凖噶爾蹤五十五年阿喇布珠爾奏請從軍效力詔率兵五百駐噶斯防凖噶爾諜尋卒子丹忠襲一次襲丹忠阿喇布珠爾長子初襲固山貝子雍正七年來朝詔晉封多羅貝勒九年凖噶爾遣諜煽喀爾喀及內附之厄魯特復以兵分掠諸牧有墨爾根綽爾濟者丹忠屬也叛附之丹忠懼凖噶爾掠乞內徙署陜西總督查郎阿令携戚屬遊牧阿拉克山阿勒坦特卜什等處凖噶爾尋叛遁丹忠徙牧額濟內河十年以鄂爾多斯諸扎薩克私易赴調兵論罪詔檄丹忠知之令偕諸扎薩克協力備賊乾隆五年卒子羅卜藏達爾扎襲二次襲羅卜藏達爾扎丹忠長子乾隆五年襲多羅貝勒以幼遣理藩院官代理牧務十七年撤還十八年詔授扎薩克領其衆未幾以羅卜藏達爾扎不更事仍遣官代理二十四年理藩院奏羅卜藏達爾扎漸習牧務屬衆咸守法請撤還代理官允之三十二年卒子旺扎勒車稜襲三次襲旺扎勒車稜羅卜藏達爾扎長子乾隆三十二年襲扎薩克多羅貝勒四十八年詔世襲罔替欽定外藩蒙古回部王公表傳卷之一百一欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百二傳第八十六扎薩克卓哩克圖汗渥巴錫列傳渥巴錫土爾扈特人阿玉竒汗曽孫阿玉竒汗父曰朋楚克見總傳朋楚克子三長即阿玉竒子八次伊克扎木素次諾爾布扎木素皆無嗣阿玉竒子自沙克都爾扎布衮扎布外餘皆無嗣沙克都爾扎布子十三曰敦囉布喇什為渥巴錫父曰巴圖其裔别為二扎薩克詳貝子額默根烏巴什傳曰多爾濟喇什其裔别為一扎薩克見台吉伯爾哈什哈傳曰布蘇爾們子阿喇克巴為間散台吉餘無嗣或留牧額濟勒河故不著衮扎布裔别為三扎薩克詳親王䇿伯克多爾濟傳敦囉布喇什子四長巴克克庫次薩賴次扣庫皆早死無嗣渥巴錫其季也土爾扈特自阿玉竒始稱汗三傳至渥巴錫號勿絶乾隆三十六年挈所部自額濟勒河至請內附昆弟子姓皆從之入覲詔仍稱汗賜號卓哩克圖授扎薩克賞三眼孔雀翎黃馬褂及御廄馬黃轡尋遣歸三十七年賜牧齋爾遣三等侍衛阿思哈往護視三十九年阿思哈受代還先是土爾扈特內附渥巴錫獻七寶刀及金錯刀稱其曽祖阿玉竒自洪豁爾得之洪豁爾界鄰俄羅斯在哈薩克西北自昔未通中國故不隸職方産精鐵及良馬阿玉竒遊牧額濟勒河嘗往來洪豁爾因得其刀以為佩令子孫世守之渥巴錫獻且告世為天朝臣僕繼自今無甲兵患也至是復函匙乂及匕首各一乞阿思哈齎貢上嘉其誠後先所獻物各製詩紀之是年渥巴錫卒諭曰渥巴錫自歸誠以來感激朕恩諸事俱極恭順辦理遊牧事宜頗為盡心邇聞患病朕意不過偶疾可冀速痊今遽溘逝深為軫惜所有渥巴錫汗爵號著令其長子䇿琳納木扎勒承襲一次襲䇿琳納木扎勒渥巴錫長子乾隆三十九年襲扎薩克卓哩克圖汗四十年定齋爾牧為舊土爾扈特部南路以䇿琳納木扎勒領之詔授盟長賜扎薩克及盟長印四十八年詔世襲罔替扎薩克固山巴雅爾圖貝子額默根烏巴什列傳額默根烏巴什土爾扈特人扎薩克卓哩克圖汗渥巴錫從弟父巴圖子二長唐阿特子一即額默根烏巴什次喀木齊克子拜濟呼授扎薩克輔國公别有傳乾隆三十六年額默根烏巴什從渥巴錫來歸詔封固山貝子賜號巴雅爾圖授扎薩克尋卒子恭坦襲一次襲恭坦額默根烏巴什長子乾隆三十七年襲扎薩克固山巴雅爾圖貝子賜牧齋爾四十年詔授副盟長轄南路中翼旗務賜扎薩克印四十八年詔世襲罔替扎薩克輔國公拜濟瑚列傳拜濟瑚土爾扈特人