齊巴漢偵達瓦齊居格登在伊犁河西急奪船渡達瓦齊遁車布登扎布隨軍追襲伊犁平定北將軍班第表其功詔嘉之普封多羅貝勒會逆賊阿睦爾撒納謀據伊犁潛與其黨納噶察貽書哈薩克汗阿布賚詭言統領蒙古漢兵駐伊犁車布登扎布責納噶察曰爾等匿奉天子命反若自統兵至可乎納噶察不從車布登扎布告將軍班第飭易書且密陳阿睦爾撒納擅奪宰桑鄂勒錐駝馬藉稱防禦哈薩克及布魯特私調兵九千駐各路諸狂悖狀班第具以聞蓋阿睦爾撒納謀逆同事者多不之察獨車布登扎布發其姦師旋命招降烏梁海部衆即令轄之二十一年春烏梁海賊酋郭勒卓輝訛言哈薩克汗阿布賚與阿睦爾撒納連和詔車布登扎布以參贊大臣隨定邊左副將軍哈達哈率師往勦有固爾班和卓者竒爾吉斯宰桑也擕千餘戶潛赴烏梁海謀偕遁車布登扎布麾兵擊擒固爾班和卓誅其衆因進兵哈薩克界偕尚書阿里衮由伊什勒諾爾勦賊至汗扎爾會斬獲無算上嘉其功普封多羅郡王秋和託輝特逆賊青衮咱卜叛親王成衮扎布討之詔車布登扎布還烏里雅蘇台協理軍務尋命緝賊郭勒卓輝冬十月軍旋賜三眼孔雀翎尋以兵七百赴克木克木齊克協勦青衮咱卜聞就擒乃還二十二年正月成衮扎布奉命以定邊將軍由巴里坤勦輝特叛賊巴雅爾詔車布登扎布署定邊左副將軍印駐烏里雅蘇台八月遣兵擒附逆賊青衮咱卜叛逃之達瑪琳優賚幣九月請遣烏梁海內大臣察達克率兵四百往招烏梁海博和勒納木扎勒等復由布延圖軍選兵策應上韙其議十月諭曰車布登扎布辦理軍務皆合機宜較前大有進益明嵗進兵著授兆惠為定邊將軍代成衮扎布而以車布登扎布為之副即來京請訓喀爾喀王公內有能協同辦事之人伊即指名具奏毋庸𣲖兵但將親隨人役酌量足用仍加恩賞銀二千兩以備整裝之用十一月奏𣲖土謝圖汗部公品級扎薩克台吉三都布多爾濟一等台吉齊旺扎布賽因諾顔部扎薩克台吉達什一等台吉敦多卜四等台吉庫爾奎等隨征聽調從之二十三年正月詔授定邊右副將軍隨將軍兆惠由巴里坤進勦厄魯特餘賊及逆回霍集占三月兵至伊犁時叛酋阿睦爾撒納竄死逸賊阿巴噶斯哈丹舍稜布庫察罕哈薩克錫喇等未就獲車布登扎布奏遣兵赴哈什崆格斯搜逸賊諭曰此等處所伊犁進兵時俱已經過何必重勞馬力現今阿巴噶斯哈丹及舍稜等俱未殱除殊屬不知緩急伊等當自知愧悟益加奮勉車布登扎布奏請赴塔爾巴噶台偵緝舍稜諭曰當舍稜初遁時伊等若即尾追又有和碩齊堵截必為擒獲今已逋逃兩月餘豈尚在塔爾巴噶台坐待追兵耶可速赴額爾齊斯與成衮扎布等協力會勦尋諭赴博囉塔拉緝阿巴噶斯哈丹布庫察罕哈薩克錫喇毋庸復至額爾齊斯六月奏收服烏魯特得木齊托羅和卓六十餘戶於哈什河諭即䇿應兆惠會布庫察罕為哈薩克部人察哈瑪巴圖爾所擒諭曰前諭車布登扎布不必往追舍稜俟擒布庫察罕等即䇿應兆惠今聞布庫察罕見擒於哈薩克則哈薩克錫喇亦必竄伏其地車布登扎布速由塔爾巴噶台檄諭哈薩克阿布賚汗將哈薩克錫喇一體擒獻先是哈薩克錫喇及宰桑鄂哲特等潛遁和落霍斯聞追急度不得脫悉衆據髙岡侍衛瑪琥等以我兵少請待其走攻之車布登扎布持不可麾兵擊擒鄂哲特哈薩克錫喇僅以身免斬獲甚衆捷聞詔以其父超勇號賜之七月鄂哲特械至供稱副將軍車布登扎布身先士卒所向無前上愈嘉歎賜金黃帶諭曰車布登扎布奮勇勦賊以少克敵不愧超勇之目前者舍稜逃遁伊未及尾追諒因不能兼顧亦事勢使然此時布庫察罕料哈薩克自必縳獻惟聞哈薩克錫喇逃西哈薩克部之特栁克參贊大臣富德兵少窮追似屬可虞昨諭車布登扎布策應自應前往但亦須酌量馬力倘有不足即撤兵與富德暫回伊犁再圗進取朕於他人每降旨督催伊天性勇往故降此旨著傳諭知之是月車布登扎布由固爾班察爾進屯阿布勒噶爾哈薩克縳獻布庫察罕車布登扎布因請馳赴阿克蘇策應將軍兆惠命還駐伊犁普親王品級九月諭曰撫定回部已有兆惠納穆扎爾等自易竣事車布登扎布軍營效力已久撤兵後即歸遊牧休息二十四年春偕車木楚克扎布率兵千越阿爾台捕嗎哈沁詔沿途偵緝阿巴噶斯哈丹及綽囉斯台吉烏勒木濟夏詔由塔爾巴噶台赴特穆爾圖諾爾協勦霍集占會將軍兆惠已率兵進葉爾羌諭車布登扎布由博羅呼濟爾還駐伊犁冬十月以追嗎哈沁賊不力訓飭之十二月入覲賜宴遣歸尋授所部副將軍二十五年命圖形紫光閣御製贊曰拍馬彎弓無敵所向不曽讀書如古名將和落霍斯少勝彼衆超勇親王額駙之子二十七年奉使西藏三十三年入覲賜第京師三十六年授定邊左副將軍尋授盟長三十八年以牟利為同部貝子品級齊旺多爾濟所訐詔罷左副將軍職三十九年車布登扎布年七十賜無量壽佛及珊瑚朝珠四團龍服四十四年授議政大臣上追念其擊賊和落霍斯功命繒圖以賜四十五年以擅請展牧界削親王品級四十六年諭曰車布登扎布敡厯戎行戰功𢡟著由台吉洊封郡王兼授扎薩克著恩豫世襲罔替四十七年卒子三丕勒多爾濟襲一次襲三丕勒多爾濟車布登扎布長子乾隆四十七年襲扎薩克多羅郡王命御前行走扎薩克多羅郡王衮布列傳今襲多羅貝勒衮布喀爾喀部人姓博爾濟吉特扎薩克親王善巴叔祖為賽因諾顔圖蒙肯第十三子康熙元年右翼扎薩克圖汗旺舒克為羅卜藏台吉額琳沁所戕衮布率左翼兵擊走額琳沁土謝圖汗察琿多爾濟嘉其勇授昆都倫博碩克圖號二十五年赴庫掄伯勒齊爾盟詔授扎薩克二十七年為噶爾丹所掠集衆來歸二十九年三月尚書阿喇尼統大軍禦噶爾丹諜衮布居額爾古納河謀內徙遣郎中馬迪往迎渡克嚕倫河而南時噶爾丹居阿爾坦額默爾在克嚕倫河北由烏爾順喀爾喀二河來追衮布敗走阿喇尼援之噶爾丹遁諭衮布移牧內汛三十年迎覲多倫諾爾詔封多羅郡王仍兼扎薩克三十二年上幸塞外駐蹕齊老圖昂阿衮布來朝優賜之命遣偵噶爾丹三十五年隨撫逺大將軍費揚古敗噶爾丹於昭莫多復遣屬色爾濟等赴齊斯希特克木齊克迎和託輝特貝勒根敦凱旋獻俘獲厄魯特畜械命賚之仍隨軍聽調是年十月遣屬烏勒木濟偕土謝圖汗部郡王固嚕什喜屬阿玉什等齎敕諭厄魯特台吉阿喇布坦絶噶爾丹來降十二月以兵緝厄魯特逸賊三十六年噶爾丹竄斃朔漠平遣歸遊牧四十七年卒子二長額琳沁降襲多羅貝勒次都噶爾扎布孫額墨根授扎薩克台吉别有傳一次襲額琳沁衮布長子康熙三十五年隨撫逺大將軍費揚古敗噶爾丹於昭莫多四十七年襲扎薩克多羅貝勒四十九年諭曰貝勒額琳沁於喀爾喀部為尊行人甚老成昭莫多之捷伊從征亦甚奮勉伊父本係郡王著加恩普襲原爵出缺時仍襲貝勒是年卒子吹扎木三襲二次襲吹扎木三額琳沁長子康熙五十年襲扎薩克多羅貝勒五十六年隨大軍進勦策妄阿喇布坦雍正元年卒子納木扎勒齊素嚨襲三次襲納木扎勒齊素嚨吹扎木三長子雍正二年襲扎薩克多羅貝勒九年凖噶爾賊由阿濟入掠納木扎勒齊素嚨偕扎薩克圖汗部貝勒班第台吉根敦等徙居色楞額河南北岸保護遊牧十年隨大軍擊賊克爾森齊老獻馬助軍得紀録乾隆十八年杜爾伯特台吉車凌等降納木扎勒齊素嚨率兵百餘馳會參贊大臣達青阿禦凖噶爾追兵尋赴扎布堪塔本托羅海駐防十九年偕土謝圖汗部郡王桑齋多爾濟等屯鄂爾海喀喇烏蘇復遣長子一等台吉旺沁多爾濟從軍二十年正月大軍勦達瓦齊獻馬助五月以兵三百緝杜爾伯特逃賊巴朗復偕同部貝子車布登扎布等追達瓦齊至沙喇雅雅嶺達瓦齊尋就擒軍旋赴哈勒巴烏蘭駐防二十一年隨定邊左副將軍哈達哈勦烏梁海賊郭勒卓輝博博等因進討哈薩克敗其汗阿布賚兵賜雙眼孔雀翎命還軍營督牧駝馬二十五年卒子齊默特多爾濟襲四次襲齊默特多爾濟納木扎勒齊素嚨第三子乾隆二十五年襲扎薩克多羅貝勒二十七年扈駕木蘭行圍賜雙眼孔雀翎尋授所部副將軍參贊四十六年諭曰齊默特多爾濟之始祖衮布本喀爾喀舊扎薩克首先來歸封郡王爵嗣降襲貝勒已厯四世著加恩令其世襲罔替欽定外藩蒙古回部王公表傳卷之七十一欽定四庫全書欽定外藩蒙古回部王公表傳卷之七十二傳第五十六扎薩克鎮國公托多額爾德尼列傳今襲多羅郡王托多額爾德尼喀爾喀部人姓博爾濟吉特扎薩克親王善巴再從弟祖卓特巴號車臣諾顔為賽因諾顔圗蒙肯長子有子三長齊滿生本塔爾子圗巴授扎薩克台吉别有傳次察斯希布子齊旺多爾濟次索諾木和碩齊子二長烏巴達次即托多額爾德尼康熙二十七年托多額爾德尼從烏巴達攜衆來歸詔附烏喇特界遊牧先是噶爾丹自杭愛山越圗拉河轉略克嚕倫所部多潰走托多額爾德尼獨拒戰殺傷略相當賊衆稍衰有兩人共一騎及削木為仗者二十九年三月偵噶爾丹居巴顔烏蘭偕同族素泰伊勒登以兵三千隨侍郎溫達赴圗拉遏凖噶爾歸路十月自軍營入覲優賚之三十年迎覲多倫諾爾詔封扎薩克鎮國公復以厄魯特巴圗爾額爾克濟農和囉理既降復叛命備禦之尋和囉理乞降罷兵初托多額爾德尼無嗣以從兄齊旺多爾濟子策旺諾爾布為巳子請備宿衛許之三十一年托多額爾德尼卒時策旺諾爾布在京詔烏巴達襲鎮國公一次襲烏巴達托多額爾德尼兄康熙三十二年襲扎薩克鎮國公三十五年大軍敗噶爾丹詔烏巴達偕同族郡王衮布等沿邊偵緝三十六年叛賊伊拉古克三呼圗克圗竄伏黃河西岸謀劫汛馬諭防緝之四十九年卒子巴穆襲二次襲巴穆烏巴達長子康熙五十年襲扎薩克鎮國公五十一年卒詔以托多額爾德尼嗣子策旺諾爾布襲鎮國公爵而改授巴穆子諾爾布扎布為扎薩克一等台吉自有傳三次襲策旺諾爾布托多額爾德尼嗣子初授侍衛擢內大臣上駟院卿兼蒙古正黃旗佐領康熙五十一年襲扎薩克鎮國公五十五年閏三月以青海右翼台吉羅卜藏丹津察罕丹津達顔與左翼台吉額爾德尼額爾克托克托鼐阿喇布坦俄木布搆釁詔偕侍衛布達哩􅊩盟諭令和好五十六年策妄阿喇布坦遣大策凌敦多卜潛兵擾西藏詔策旺諾爾布偕侍衛阿齊圖等駐噶斯偵禦之五十七年三月侍衛色楞奉命援西藏廷臣議檄策旺諾爾布及四川總督額倫特都統瑚錫圖赴噶順固木護青海額倫特請令瑚錫圖以兵千駐噶順固木已與色楞分路進藏策旺諾爾布復請令額倫特瑚錫圗同駐噶順固木上以兩奏互異訓飭之尋議瑚錫圗駐守色楞額倫特進勦策旺諾爾布繼援九月色楞額倫特擊賊於喀喇烏蘇齊諾郭勒乘勝深入以兵寡戰殁䇿旺諾爾布援弗至全軍還詔優恤色楞額倫特他日諭廷臣曰色楞額倫特固屬失機但䇿旺諾爾布係隨往接應之兵而遲延不進致前軍失援戰殁雖伊所統克全兵丁固屬感念於國事有何禆益五十八年四月撫逺大將軍固山貝子允禵奉命駐西寧檄策旺諾爾布偕副都統寶色等防索羅木策旺諾爾布請檄青海兵六百守軍營尋由索羅木護自西藏來歸之扎穆揚善木巴等至西寧時裏塘逹賴喇嘛瑚畢勒罕羅卜藏噶勒藏嘉穆錯居西寧唐古特人以其部拉藏汗為大策凌敦多卜所戕願迎達賴喇嘛瑚畢勒罕歸置禪榻允禵以聞諭集青海王台吉等定議并召䇿旺諾爾布等入奏五十九年正月羅卜藏噶勒藏嘉穆錯封第六世達賴喇嘛詔策旺諾爾布參贊平逆將軍延信軍護往西藏八月由卜克河進屯齊諾郭勒綽瑪喇擊敗凖噶爾賊諜定西將軍噶爾弼率雲南四川兵由拉里扺藏馳進大策凌敦多卜遁西藏平軍旋六十年三月䇿旺諾爾布復奉命隨延信駐藏尋延信病召還噶爾弼代復病詔策旺諾爾布佩定西將軍印代之雍正元年三月命撤兵還先是策旺諾爾布赴青海􅊩盟時羅卜藏丹津偽從命既而背盟謀脅衆據西藏與凖噶爾連和有諾顔哈什漢及台吉巴勒珠爾者䇿旺諾爾布同族居青海聞其謀先後密遣人告䇿旺諾爾布四月䇿旺諾爾布奏言臣聞羅卜藏丹津負恩倡逆自取滅亡以臣愚見青海台吉等彼此不睦骨肉離析各逞己見羅卜藏丹津又甚糊塗酗酒失人心伊雖傳集會盟度衆人無不感戴養育深恩未必與伊同逆但事有關係不可不預為防備臣現行文駐劄西寧侍郎常壽雲貴總督髙其倬等一體偵禦疏至上命常壽馳赴青海宣諭羅卜藏丹津至則羅卜藏丹津已叛十月大軍進討明年羅卜藏丹津為大軍所敗竄凖噶爾青海平䇿旺諾爾布由西寧入覲詔奬進藏功晉封固山貝子賜三眼孔雀翎四年授副盟長十年因老乞休許之子車木楚克扎布襲鎮國公四次襲車木楚克扎布策旺諾爾布長子雍正十年隨大軍擊凖噶爾於克爾森齊老及額爾德尼昭有功優賚之命乾清門行走是年襲扎薩克鎮國公乾隆三年諭曰車木楚克扎布之父䇿旺諾爾布當世宗憲皇帝時內廷行走宣力有年嗣駐藏奮勉由鎮國公晉封貝子前因年老豫告以車木楚克扎布降襲鎮國公今觀車木楚克扎布效力軍營亦屬奮勉著加恩令其晉襲貝子六年參贊大臣副都統慶泰奉命赴桑錦托羅海閲防秋兵以車木楚克扎布旗軍容整奬賚之十八年偕副都統達青阿駐防烏里雅蘇台偵凖噶爾宰桑禡木特以兵二百入汛追來降之杜爾伯特台吉車凌車凌烏巴什車凌蒙克馳由巴顔珠爾克博托和尼溝往禡木特揚言其部台吉噶爾藏多爾濟阿睦爾撒納將至因遣報定邊左副將軍親王成衮扎布發兵援而自赴車凌車凌烏巴什所諭速徙烏里雅蘇台車凌蒙克後至復令由庫密固爾河入西爾哈瀚海禡木特蹙馳遁車木楚克扎布等追之不及詔責其疏縱飭偕達青阿擒賊自效禡木特尋就擒復釋還諭偕同部貝子沙克都爾扎布等以兵二千赴卓克索駐防賜雙眼孔雀翎十九年購馬六千解軍隨參贊大臣薩拉爾以兵千餘擊烏梁海宰桑察達克於察罕烏蘇還至沙噶扎海迎會參贊大臣努三軍捕宰桑通禡木特等獲之降其衆敘功賜貝勒品級優賚之命隨參贊大臣烏爾登赴塔本托羅海駐防二十年隨大軍勦達瓦齊由巴里坤至珠勒格圖偕杜爾伯特公瑪什巴圖等以兵三百前行擒凖噶爾宰桑伊勒巴爾屬復奉定邊右副將軍薩拉爾檄偕阿拉善貝勒羅卜藏多爾濟杜爾伯特貝勒色布騰益兵七百招降扎哈沁宰桑敦多布布魯古特台吉諾海竒齊克輝特台吉敦博勒達克噶勒雜特宰桑哈薩克錫喇等諜達瓦齊居格登阻伊犁河疾引兵由博囉塔拉赴哈塔濟勒渡奪其舟大軍合兵進擊達瓦齊遁車木楚克扎布以兵四百會諸將分路追達瓦齊尋就擒偕扎薩克圗汗部輔國公旺布多爾濟攜所部兵還會逆賊阿睦爾撒納叛布庫努特宰桑敦多克曼集等附逆車木楚克扎布偕台吉唐古特追擊之誅其衆復乘勝與旺布多爾濟勦叛黨阿巴噶斯哈丹等遊牧詔嘉其功賜三眼孔雀翎諭隨定西將軍䇿楞由博囉塔拉復赴伊犁二十一年四月師旋縳獻阿巴噶斯哈丹戚屬請駐巴里坤勦逸賊諭曰爾等自去嵗效力軍營往返勞頓今不過弋捕逸犯毋庸多人可歸遊牧休息七月以車木楚克扎布遊牧距驛近詔轄汛務會和託輝特逆賊青衮咱卜叛梗驛車木楚克扎布督兵續之軍書乃達詔晉封多羅貝勒閏九月諭曰比者車木楚克扎布接續驛站朕已優封貝勒今復自伊遊牧解送駝馬助軍著加恩於軍需項內將此項牲畜折價賞給十二月青衮咱卜就擒親王成衮扎布表車木楚克扎布隨征功詔晉郡王品級二十二年四月偕參贊大臣唐喀祿率兵八百赴阿爾台緝逃賊哈薩克錫喇以察罕郭勒為要隘馳往偵禦八月偕唐喀祿奏言杜爾伯特貝勒巴圗博羅特公舍稜台吉阿喇善等通阿逆走額爾齊斯不從其汗車凌徙牧臣等偵得狀偕副都統瑚爾起馳赴輝巴朗山後擒巴圖博羅特等并勦烏梁海賊五十戶乃旋兵赴塔爾巴噶台緝哈薩克錫喇諭嘉和𠂻且協機宜以御用佩飾賜之飭敘加級九月諭偕郡王車布登扎布撫烏梁海以宰桑博和勒納木扎勒等不即降烏梁海內大臣察達克率兵四百往招車木楚克扎布檄布延圗兵百繼進盡降之有特勒伯克扎爾納克者阿勒坦諾爾之烏梁海宰桑也聞之亦擕屬至詔車木楚克扎布定貢賞例宣示德意十二月諭曰車木楚克扎布數年宣力戎行勤勞懋著近復招降烏梁海善為撫納著晉封多羅郡王二十三年春奏偕察達克勘烏梁海戶口其得秦有十餘戶二十餘戶不等分置得木齊收楞額等員請併戶少者約四十戶編得秦一上知其悉烏梁海情詔如所請夏命護理盟長印偕親王成衮扎布勦詭降之土爾扈特台吉舍稜偵遁俄羅斯乃還秋烏梁海總管阿喇善恩克等叛竄車木楚克扎布偕扎薩克圗汗部公品級多嶽特分勦阿喇善及恩克屬就擒諜恩克竄哈屯河疏請暫歸阿勒和碩屯駐冬雪後賊必就擒許之冬果擒恩克優賚幣二十四年四月副將軍郡王車布登扎布赴塔爾巴噶台捕嗎哈沁命車木楚克扎布參贊其軍七月進伊犁緝逃賊十二月召覲京師賜宴奬賚二十五年隨車布登扎布擒掠烏梁海之哈薩克賊巴圗克巴圗爾二十六年復勦嗎哈沁色布騰逸走追不力訓飭之會俄羅斯擒獻色布騰