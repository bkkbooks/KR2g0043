門外舞蹈稱慶詔以額爾衮巴雅爾溝名其地蒙古謂喜為巴雅爾志慶也四十八年詔世襲罔替欽定外藩蒙古回部王公表傳卷之一百四欽定四庫全書欽定外藩蒙古回部王公表傳卷之一百五傳第八十九和碩特部總傳和碩特部舊為四衛拉特之一系出元太祖弟哈布圖哈薩爾有博貝密爾咱者始稱汗子哈尼諾顔洪果爾嗣之有子六牧青海西套伊犁諸境詳青海厄魯特部傳其第三子昆都倫烏巴什第四子圖魯拜琥裔蕃衍圖魯拜琥號顧實汗其裔或稱青海厄魯特設扎薩克二十有一或稱阿拉善厄魯特設扎薩克一或隸察哈爾旗設爵三皆不著和碩特部號昆都倫烏巴什號都爾格齊諾顔子十六長邁瑪達賴烏巴什次烏巴什琿台吉次多爾濟次額爾克岱青鄂克綽特布次第巴卓哩克圖次噶布楚諾顔次蒙固次青巴圖爾次哈喇庫濟次羅卜藏達什次塔爾巴次色稜次朋素克今和碩特設扎薩克四皆多爾濟及額爾克岱青鄂克綽特布裔崇德七年昆都倫烏巴什遣索諾木從達賴喇嘛使貢駝馬賜布幣及朝鮮貢物順治八年貢所産馬及黑狐皮九年復貢駝馬嗣數遣使至康熙十六年邁瑪達賴烏巴什子丹津琿台吉遣達爾漢宰桑入貢二十一年復遣杭勒岱等至諸昆弟遣使從凡六百餘人二十四年定四衛拉特貢例使入關以二百人為額諭所部知之詳杜爾伯特部傳時凖噶爾稍強和碩特族懼其威咸奉令後噶爾丹亂定顧實汗諸子姓遊牧青海者咸內附噶爾丹從子䇿妄阿喇布坦逼和碩特族與同處表請青海復舊業如噶爾丹時將隂謀為己屬上燭其姦諭責之令遣和碩特歸舊牧勿私據不從有羅卜藏車凌者多爾濟曽孫也䇿妄阿喇布坦以女妻之雍正八年靖邉大將軍傅爾丹屯科布多將擊凖噶爾或告曰噶爾丹䇿凌以兵萬授羅卜藏車凌遣禦哈薩克設汛阿里瑪圖沙拉伯勒境羅卜藏車凌棄之率户三千餘由噶斯走青海將內附噶爾丹䇿凌遣宰桑烏喇特巴哈曼集等追之為所敗復遣喀喇沁宰桑都噶爾往襲不之及也傅爾丹以聞詔副都統達鼐偵防噶斯路俟羅卜藏車凌降遣入覲以兵監從衆置內汛勿墮詭降計久之羅卜藏車凌不至乾隆二十年大軍征達瓦齊抵伊犁有善披嶺集賽之得木齊蘇克都爾格齊霍什哈及古里特鄂拓克之得木齊和通喀喇博羅莽鼐伊什克特咱瑪博勒等告舊為羅卜藏車凌屬獻籍六百餘户羅卜藏車凌子曰諾爾布敦多克遊牧額琳哈畢爾噶遣長子鄂齊爾馳降定北將軍班第遣招其族台吉三濟特聞之獻籍三百户丹津琿台吉子曰阿喇布坦有子二長噶勒丹敦多布生沙克都爾曼濟次敦多布車凌生明噶特達瓦齊善沙克都爾曼濟倚任之小策凌敦多卜孫訥默庫濟爾噶爾與達瓦齊搆兵沙克都爾曼濟擊之殱其孥班第等至達瓦齊竄格登沙克都爾曼濟乃降有班珠爾者顧實汗裔也與輝特阿睦爾撒納異父同母隂比之前避達瓦齊亂來歸授多羅郡王詔俟厄魯特定將以為和碩特汗時從大軍抵伊犁私奪諾爾布敦多克沙克都爾曼濟諸台吉屬産班第禁之乃稍戢尋定入覲次以沙克都爾曼濟及班珠爾列初班三濟特鄂齊爾次之阿睦爾撒納阻其行詭稱沙克都爾曼濟將叛迎達瓦齊請以班珠爾屯特穆爾圖諾爾護降衆班第斥詞妄班珠爾詭入覲赴塔密爾牧取阿睦爾撒納孥謀偕遁參贊大臣阿蘭泰擒之沙克都爾曼濟入覲避暑山莊上御淡泊敬誠殿受朝詔封和碩特汗授盟長諭董所屬勤教養圖生聚三濟特鄂齊爾繼至詔授三濟特扎薩克一等台吉鄂齊爾間散一等台吉遣歸牧定西將軍策楞將以大兵𠞰阿睦爾撒納詔沙克都爾曼濟往會甫就道諜者以阿睦爾撒納據伊犁告諭遣親信宰桑馳喻所部備兵勿為逆煽而以身從大軍擊賊班珠爾械至禁獄所請遺三濟特鄂齊爾書令和碩特族衆分𠞰阿逆三濟特既得書言諾爾布敦多克沙克都爾曼濟皆鄰牧且族台吉瑪尼巴圖巴蘇泰瑪賚烏巴什弩庫特圖魯孟克阿穆爾弩斯海薩望等皆無異志當以書遺之鄂齊爾稱願歸告父共𠞰逆而我副將軍薩拉爾集伊犁宰桑等定議約諾爾布敦多克及沙克都爾曼濟子圖捫以兵至博囉塔拉布爾哈蘇台闥勒竒嶺𠞰阿睦爾撒納諾爾布敦多克圖捫各遣使至巴里坤告故諾爾布敦多克表曰臣父羅卜藏車凌前噶爾丹䇿凌時謀內附不獲間大軍征達瓦齊臣族班珠爾倚阿睦爾撒納奪臣屬臣願奮志𠞰賊上嘉其誠詔封公爵以班珠爾所奪給之班珠爾尋伏誅二十一年諾爾布敦多克來歸薩拉爾等既定謀阿睦爾撒納偵知之先備諾爾布敦多克以兵擊諸伊犁之諾爾斯哈濟拜甡不勝偕薩拉爾間道行由珠勒都斯至巴里坤時沙克都爾曼濟抵䇿楞軍詔令遺書其子圗捫以兵護牧書未達明噶特附阿睦爾撒納叛脅所部衆圖捫不之從挈戚屬抵珠勒都斯請內徙上憫之詔封多羅貝勒賜銀千兩賞雙眼孔雀翎諭由額琳哈畢爾噶往會沙克都爾曼濟有圖什墨勒厄爾錐音者從大軍𠞰阿睦爾撒納中道強取諾爾布敦多克屬詔責之察所取以歸諾爾布敦多克及子鄂齊爾尋相繼卒詔以鄂齊爾弟博爾和津襲公爵諭曰諾爾布敦多克舊牧與哈薩克接壤恐或掠之若欲徙歸額琳哈畢爾噶惟其便沙克都爾曼濟携子圖捫及博爾和津等由珠勒都斯至巴里坤乞屯牧近地副都統雅爾哈善以聞諭曰沙克都爾曼濟以舊牧乏生計跋涉逺至殊堪憫惻凖噶爾頻年不靖諸部生計維艱然使台吉等各收其屬安處遊牧以耕畜為業善自謀生不數年間可復舊業今沙克都爾曼濟等雖暫處巴里坤究非故土難以久處又喀爾喀附近之和碩特杜爾伯特輝特等俱將遣歸舊牧且諭令各安生業嚴戢盜賊沙克都爾曼濟等自宜仍歸舊牧但甫從逺道至遽令之歸不免困頓可令暫處巴里坤附近